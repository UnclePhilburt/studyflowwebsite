<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Editor - StudyFlow Suite</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quill-table-better@1/dist/quill-table-better.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@enzedonline/quill-blot-formatter2/dist/css/quill-blot-formatter2.css" rel="stylesheet">
  <!-- KaTeX for math formulas -->
  <link href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <!-- Highlight.js for syntax highlighting -->
  <link href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill-table-better@1/dist/quill-table-better.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@enzedonline/quill-blot-formatter2@3.0/dist/index.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f5f4f0 0%, #ede9e4 100%);
      min-height: 100vh;
      color: #2d2d2d;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 30% 20%, rgba(124, 152, 133, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(232, 155, 95, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    .page-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(124, 152, 133, 0.15);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      gap: 16px;
    }

    .back-link {
      color: #7c9885;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .back-link:hover { color: #6a8573; }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      color: #2d2d2d;
      font-family: 'Lora', serif;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
      cursor: pointer;
      border: 1px solid transparent;
      padding: 4px 8px;
      border-radius: 6px;
      transition: border-color 0.2s, background 0.2s;
    }

    .header-title:hover {
      border-color: rgba(124, 152, 133, 0.3);
      background: rgba(124, 152, 133, 0.05);
    }

    .header-title-input {
      font-size: 17px;
      font-weight: 600;
      color: #2d2d2d;
      font-family: 'Lora', serif;
      flex: 1;
      min-width: 0;
      border: 1px solid #7c9885;
      padding: 4px 8px;
      border-radius: 6px;
      outline: none;
      background: white;
    }

    .save-status {
      font-size: 13px;
      color: #9a9a9a;
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .save-status.unsaved { color: #e89b5f; }
    .save-status.saving { color: #7c9885; }
    .save-status.saved { color: #7c9885; }
    .save-status.error { color: #d9534f; }

    .save-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #7c9885 0%, #6b8575 100%);
      color: white;
      flex-shrink: 0;
    }

    .save-btn:hover:not(:disabled) {
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.4);
      transform: translateY(-1px);
    }

    .save-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Editor area */
    .editor-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-top: 56px;
      position: relative;
      z-index: 1;
    }

    /* Quill overrides */
    .ql-toolbar.ql-snow {
      border: none;
      border-bottom: 1px solid rgba(124, 152, 133, 0.15);
      background: rgba(255, 255, 255, 0.85);
      padding: 8px 16px;
      position: sticky;
      top: 56px;
      z-index: 10;
    }

    .ql-toolbar.ql-snow .ql-stroke {
      stroke: #5a5a5a;
    }

    .ql-toolbar.ql-snow .ql-fill {
      fill: #5a5a5a;
    }

    .ql-toolbar.ql-snow .ql-picker {
      color: #5a5a5a;
    }

    .ql-toolbar.ql-snow button:hover .ql-stroke,
    .ql-toolbar.ql-snow .ql-picker-label:hover .ql-stroke {
      stroke: #7c9885;
    }

    .ql-toolbar.ql-snow button:hover .ql-fill,
    .ql-toolbar.ql-snow .ql-picker-label:hover .ql-fill {
      fill: #7c9885;
    }

    .ql-toolbar.ql-snow button:hover,
    .ql-toolbar.ql-snow .ql-picker-label:hover {
      color: #7c9885;
    }

    .ql-toolbar.ql-snow button.ql-active .ql-stroke,
    .ql-toolbar.ql-snow .ql-picker-label.ql-active .ql-stroke {
      stroke: #7c9885;
    }

    .ql-toolbar.ql-snow button.ql-active .ql-fill,
    .ql-toolbar.ql-snow .ql-picker-label.ql-active .ql-fill {
      fill: #7c9885;
    }

    .ql-toolbar.ql-snow button.ql-active,
    .ql-toolbar.ql-snow .ql-picker-label.ql-active {
      color: #7c9885;
    }

    .ql-container.ql-snow {
      border: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
    }

    .ql-editor {
      flex: 1;
      padding: 40px;
      padding-bottom: 44px;
      line-height: 1.7;
      color: #2d2d2d;
      background: rgba(255, 255, 255, 0.6);
      min-height: calc(100vh - 56px - 50px - 28px);
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
    }

    .ql-editor:focus {
      background: rgba(255, 255, 255, 0.85);
    }

    .ql-editor.ql-blank::before {
      color: #b0b0b0;
      font-style: normal;
    }

    .ql-editor h1 {
      font-family: 'Lora', serif;
      font-size: 28px;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 8px;
    }

    .ql-editor h2 {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 600;
      color: #3d3d3d;
      margin-bottom: 6px;
    }

    .ql-editor h3 {
      font-family: 'Lora', serif;
      font-size: 18px;
      font-weight: 600;
      color: #4d4d4d;
      margin-bottom: 4px;
    }

    .ql-editor blockquote {
      border-left: 3px solid #7c9885;
      padding-left: 16px;
      color: #5a5a5a;
      margin: 12px 0;
    }

    .ql-editor pre.ql-syntax {
      background: #2d2d2d;
      color: #e8e8e8;
      border-radius: 8px;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      margin: 12px 0;
      overflow-x: auto;
    }

    .ql-editor code {
      background: rgba(124, 152, 133, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', 'Courier New', monospace;
      font-size: 13px;
    }

    .ql-editor a {
      color: #7c9885;
      text-decoration: underline;
    }

    .ql-editor img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 12px 0;
      cursor: pointer;
    }

    .ql-editor img.ql-image-align-left {
      float: left;
      margin: 4px 16px 12px 0;
    }

    .ql-editor img.ql-image-align-right {
      float: right;
      margin: 4px 0 12px 16px;
    }

    .ql-editor img.ql-image-align-center {
      display: block;
      margin: 12px auto;
    }

    /* Checklists */
    .ql-editor ul[data-checked="true"] > li::before,
    .ql-editor ul[data-checked="false"] > li::before {
      color: #7c9885;
    }

    .ql-editor li[data-list="checked"] {
      text-decoration: line-through;
      color: #9a9a9a;
    }

    /* KaTeX formula styling */
    .ql-editor .ql-formula {
      padding: 2px 4px;
    }

    /* Color picker overrides */
    .ql-snow .ql-color-picker .ql-picker-options {
      width: 152px;
    }

    .ql-snow .ql-tooltip {
      z-index: 200;
    }

    /* Tables */
    .ql-editor table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
    }

    .ql-editor table td {
      border: 1px solid rgba(124, 152, 133, 0.3);
      padding: 8px 12px;
      min-width: 60px;
    }

    .ql-editor table td:focus-within {
      background: rgba(124, 152, 133, 0.04);
    }

    /* Table-better plugin overrides */
    .ql-table-better-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Loading state */
    .loading-overlay {
      position: fixed;
      top: 56px; left: 0; right: 0; bottom: 0;
      background: rgba(245, 244, 240, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(124, 152, 133, 0.2);
      border-top-color: #7c9885;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay p {
      margin-top: 16px;
      color: #7a7a7a;
      font-size: 14px;
    }

    /* Error state */
    .error-message {
      position: fixed;
      top: 56px; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      background: rgba(245, 244, 240, 0.95);
      padding: 24px;
      text-align: center;
    }

    .error-message h3 {
      color: #d9534f;
      font-size: 18px;
      margin-bottom: 8px;
    }

    .error-message p {
      color: #7a7a7a;
      font-size: 14px;
    }

    /* Word count bar */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(124, 152, 133, 0.12);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 20px;
      gap: 16px;
      font-size: 12px;
      color: #9a9a9a;
      z-index: 100;
    }

    .status-bar span {
      white-space: nowrap;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .page-header {
        padding: 0 12px;
        gap: 8px;
      }

      .header-title {
        font-size: 15px;
      }

      .save-status {
        display: none;
      }

      .ql-editor {
        padding: 16px;
      }

      .ql-toolbar.ql-snow {
        padding: 6px 8px;
      }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1266375537905101" crossorigin="anonymous"></script>

<body>

  <!-- Header -->
  <div class="page-header">
    <a class="back-link" href="notes.html" id="backLink">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 12L6 8l4-4"/></svg>
      Back
    </a>
    <span class="header-title" id="headerTitle" onclick="startRename()">Loading...</span>
    <span class="save-status" id="saveStatus"></span>
    <button class="save-btn" id="saveBtn" disabled>Save</button>
  </div>

  <!-- Editor -->
  <div class="editor-wrapper">
    <div id="quillEditor"></div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span id="wordCount">0 words</span>
    <span id="charCount">0 characters</span>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p>Loading note...</p>
  </div>

  <!-- Error overlay -->
  <div class="error-message" id="errorOverlay" style="display: none;">
    <h3 id="errorTitle">Error</h3>
    <p id="errorText">Something went wrong.</p>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let authToken = null;
    let noteId = null;
    let originalContent = '';
    let hasUnsavedChanges = false;
    let currentTitle = '';
    let quill = null;
    let autoSaveTimer = null;
    const AUTO_SAVE_DELAY = 3000;

    // DOM elements
    const saveBtn = document.getElementById('saveBtn');
    const saveStatus = document.getElementById('saveStatus');
    const headerTitle = document.getElementById('headerTitle');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const errorOverlay = document.getElementById('errorOverlay');

    // Register plugins
    Quill.register({ 'modules/table-better': QuillTableBetter }, true);
    Quill.register('modules/blotFormatter2', QuillBlotFormatter2.default);

    // Highlight.js color palette for app theme
    const COLORS = [
      '#2d2d2d', '#5a5a5a', '#9a9a9a', '#ffffff',
      '#7c9885', '#6a8573', '#4a6b55', '#3d5a47',
      '#e89b5f', '#d4854a', '#c06f35', '#a05a28',
      '#d9534f', '#c9433f', '#b03333', '#4a90d9',
      '#3b7dd8', '#2d6bc4', '#6b4fa0', '#9b59b6'
    ];

    const BG_COLORS = [
      false,
      '#fef9e7', '#fef3cd', '#fce4b8',
      '#e8f5e9', '#c8e6c9', '#d4edda',
      '#e3f2fd', '#bbdefb', '#d6eaf8',
      '#fce4ec', '#f8d7da', '#f5c6cb',
      '#f3e5f5', '#e8daef', '#d5c4e0',
      '#fff9c4', '#fff176', '#fff59d',
      '#e0e0e0', '#bdbdbd'
    ];

    // Initialize Quill with all modules
    quill = new Quill('#quillEditor', {
      theme: 'snow',
      placeholder: '',
      modules: {
        table: false,
        'table-better': {
          language: 'en_US',
          menus: ['column', 'row', 'merge', 'table', 'cell', 'delete'],
          toolbarTable: true
        },
        blotFormatter2: {},
        syntax: { hljs: hljs },
        formula: true,
        keyboard: {
          bindings: {
            ...QuillTableBetter.keyboardBindings,
            // Markdown shortcuts
            'header-1': {
              key: ' ',
              prefix: /^#$/,
              handler: function(range) {
                const line = quill.getLine(range.index);
                quill.formatLine(range.index, 1, 'header', 1);
                quill.deleteText(range.index - 1, 1);
              }
            },
            'header-2': {
              key: ' ',
              prefix: /^##$/,
              handler: function(range) {
                quill.formatLine(range.index, 1, 'header', 2);
                quill.deleteText(range.index - 2, 2);
              }
            },
            'header-3': {
              key: ' ',
              prefix: /^###$/,
              handler: function(range) {
                quill.formatLine(range.index, 1, 'header', 3);
                quill.deleteText(range.index - 3, 3);
              }
            },
            'blockquote': {
              key: ' ',
              prefix: /^>$/,
              handler: function(range) {
                quill.formatLine(range.index, 1, 'blockquote', true);
                quill.deleteText(range.index - 1, 1);
              }
            },
            'unordered-list': {
              key: ' ',
              prefix: /^-$/,
              handler: function(range) {
                quill.formatLine(range.index, 1, 'list', 'bullet');
                quill.deleteText(range.index - 1, 1);
              }
            },
            'ordered-list': {
              key: ' ',
              prefix: /^1\.$/,
              handler: function(range) {
                quill.formatLine(range.index, 1, 'list', 'ordered');
                quill.deleteText(range.index - 2, 2);
              }
            },
            'checklist': {
              key: ' ',
              prefix: /^\[\]$/,
              handler: function(range) {
                quill.formatLine(range.index, 1, 'list', 'unchecked');
                quill.deleteText(range.index - 2, 2);
              }
            },
            'code-block': {
              key: ' ',
              prefix: /^```$/,
              handler: function(range) {
                quill.formatLine(range.index, 1, 'code-block', true);
                quill.deleteText(range.index - 3, 3);
              }
            }
          }
        },
        toolbar: {
          container: [
            [{ 'header': [1, 2, 3, false] }],
            ['bold', 'italic', 'underline', 'strike'],
            [{ 'color': COLORS }, { 'background': BG_COLORS }],
            [{ 'list': 'ordered' }, { 'list': 'bullet' }, { 'list': 'check' }],
            ['blockquote', 'code-block'],
            ['link', 'image', 'formula'],
            ['table-better'],
            ['clean']
          ],
          handlers: {
            image: function() { imageButtonHandler(); }
          }
        }
      }
    });

    // Disable editor until content loads
    quill.enable(false);

    // --- Image upload helpers ---
    async function uploadImage(file) {
      const formData = new FormData();
      formData.append('file', file);
      const res = await fetch(`${BACKEND_URL}/api/notes/upload-image`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${authToken}` },
        body: formData
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || 'Image upload failed');
      }
      const data = await res.json();
      return data.url;
    }

    function insertImage(url) {
      const range = quill.getSelection(true);
      quill.insertEmbed(range.index, 'image', url);
      quill.setSelection(range.index + 1);
    }

    // Toolbar image button -- opens file picker
    function imageButtonHandler() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/png, image/jpeg, image/gif, image/webp';
      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        try {
          saveStatus.textContent = 'Uploading image...';
          saveStatus.className = 'save-status saving';
          const url = await uploadImage(file);
          insertImage(url);
          saveStatus.textContent = '';
          saveStatus.className = 'save-status';
        } catch (err) {
          console.error('Image upload error:', err);
          saveStatus.textContent = 'Image upload failed';
          saveStatus.className = 'save-status error';
        }
      };
      input.click();
    }

    // Drag & drop images
    quill.root.addEventListener('drop', (e) => {
      const files = e.dataTransfer?.files;
      if (!files || files.length === 0) return;
      const imageFile = Array.from(files).find(f => f.type.startsWith('image/'));
      if (!imageFile) return;

      e.preventDefault();
      e.stopPropagation();
      (async () => {
        try {
          saveStatus.textContent = 'Uploading image...';
          saveStatus.className = 'save-status saving';
          const url = await uploadImage(imageFile);
          insertImage(url);
          saveStatus.textContent = '';
          saveStatus.className = 'save-status';
        } catch (err) {
          console.error('Drop image error:', err);
          saveStatus.textContent = 'Image upload failed';
          saveStatus.className = 'save-status error';
        }
      })();
    });

    // Paste images (from clipboard)
    quill.root.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      const imageItem = Array.from(items).find(i => i.type.startsWith('image/'));
      if (!imageItem) return;

      e.preventDefault();
      e.stopPropagation();
      const file = imageItem.getAsFile();
      if (!file) return;
      (async () => {
        try {
          saveStatus.textContent = 'Uploading image...';
          saveStatus.className = 'save-status saving';
          const url = await uploadImage(file);
          insertImage(url);
          saveStatus.textContent = '';
          saveStatus.className = 'save-status';
        } catch (err) {
          console.error('Paste image error:', err);
          saveStatus.textContent = 'Image upload failed';
          saveStatus.className = 'save-status error';
        }
      })();
    });

    // Get note ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    noteId = urlParams.get('id');

    if (!noteId) {
      showError('No note ID', 'No note ID was provided in the URL.');
    } else {
      init();
    }

    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'mobile.html';
        return;
      }
      authToken = session.access_token;
      await loadNote();
    }

    async function loadNote() {
      try {
        const [metaRes, contentRes] = await Promise.all([
          fetch(`${BACKEND_URL}/api/notes/${noteId}/metadata`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
          }),
          fetch(`${BACKEND_URL}/api/notes/${noteId}/raw-content`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
          })
        ]);

        if (metaRes.status === 401) {
          await supabaseClient.auth.signOut();
          window.location.href = 'mobile.html';
          return;
        }

        if (!metaRes.ok) throw new Error('Failed to load note metadata');

        const metaData = await metaRes.json();
        const filename = metaData.note?.filename || 'Untitled';
        currentTitle = filename.replace(/\.html$/, '').replace(/\.txt$/, '');
        headerTitle.textContent = currentTitle;
        document.title = `${currentTitle} - StudyFlow Suite`;

        if (!contentRes.ok) throw new Error('Failed to load note content');

        const textContent = await contentRes.text();

        // Auto-detect: if plain text (no HTML tags), wrap in <p> tags
        let htmlContent = textContent;
        if (textContent.trim() && !/<[a-z][\s\S]*>/i.test(textContent)) {
          htmlContent = textContent.split('\n').map(line =>
            `<p>${line || '<br>'}</p>`
          ).join('');
        }

        // Load content into Quill
        if (htmlContent.trim()) {
          quill.root.innerHTML = htmlContent;
        }

        originalContent = quill.root.innerHTML;
        quill.enable(true);
        saveBtn.disabled = false;
        loadingOverlay.style.display = 'none';
        updateWordCount();
      } catch (error) {
        console.error('Load error:', error);
        showError('Failed to load note', error.message);
      }
    }

    // Track changes via Quill text-change event
    quill.on('text-change', () => {
      const changed = quill.root.innerHTML !== originalContent;
      if (changed !== hasUnsavedChanges) {
        hasUnsavedChanges = changed;
        updateSaveStatus();
      }

      updateWordCount();

      // Auto-save: reset timer on every change
      if (autoSaveTimer) clearTimeout(autoSaveTimer);
      if (hasUnsavedChanges) {
        autoSaveTimer = setTimeout(() => {
          saveContent();
        }, AUTO_SAVE_DELAY);
      }
    });

    function updateSaveStatus() {
      if (hasUnsavedChanges) {
        saveStatus.textContent = 'Unsaved changes';
        saveStatus.className = 'save-status unsaved';
      } else {
        saveStatus.textContent = '';
        saveStatus.className = 'save-status';
      }
    }

    // Save content
    async function saveContent() {
      if (!noteId || !authToken) return;

      saveBtn.disabled = true;
      saveStatus.textContent = 'Saving...';
      saveStatus.className = 'save-status saving';

      try {
        const htmlContent = quill.root.innerHTML;
        const res = await fetch(`${BACKEND_URL}/api/notes/${noteId}/content`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ content: htmlContent })
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.error || 'Save failed');
        }

        originalContent = htmlContent;
        hasUnsavedChanges = false;
        saveStatus.textContent = 'Saved';
        saveStatus.className = 'save-status saved';

        setTimeout(() => {
          if (!hasUnsavedChanges) {
            saveStatus.textContent = '';
            saveStatus.className = 'save-status';
          }
        }, 2000);
      } catch (error) {
        console.error('Save error:', error);
        saveStatus.textContent = 'Save failed';
        saveStatus.className = 'save-status error';
      } finally {
        saveBtn.disabled = false;
      }
    }

    saveBtn.addEventListener('click', saveContent);

    // Cmd+S / Ctrl+S shortcut
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        if (!saveBtn.disabled) {
          saveContent();
        }
      }
    });

    // Warn before leaving with unsaved changes
    window.addEventListener('beforeunload', (e) => {
      if (hasUnsavedChanges) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // Editable title -- click to rename
    function startRename() {
      const titleEl = document.getElementById('headerTitle');
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'header-title-input';
      input.value = currentTitle;
      titleEl.replaceWith(input);
      input.focus();
      input.select();

      async function commitRename() {
        const newTitle = input.value.trim() || currentTitle;
        input.replaceWith(titleEl);
        if (newTitle === currentTitle) return;

        try {
          const res = await fetch(`${BACKEND_URL}/api/notes/${noteId}/rename`, {
            method: 'PATCH',
            headers: {
              'Authorization': `Bearer ${authToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ filename: newTitle + '.html' })
          });
          if (res.ok) {
            currentTitle = newTitle;
            titleEl.textContent = currentTitle;
            document.title = `${currentTitle} - StudyFlow Suite`;
          }
        } catch (err) {
          console.error('Rename error:', err);
        }
      }

      input.addEventListener('blur', commitRename);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = currentTitle; input.blur(); }
      });
    }

    function updateWordCount() {
      const text = quill.getText().trim();
      const chars = text.length;
      const words = text ? text.split(/\s+/).length : 0;
      document.getElementById('wordCount').textContent = words === 1 ? '1 word' : `${words} words`;
      document.getElementById('charCount').textContent = chars === 1 ? '1 character' : `${chars} characters`;
    }

    function showError(title, message) {
      loadingOverlay.style.display = 'none';
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorText').textContent = message;
      errorOverlay.style.display = 'flex';
    }
  </script>
</body>
