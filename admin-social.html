<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Social Moderation - Admin - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f5f4f0; color: #2d2d2d; min-height: 100vh; padding: 24px; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 24px; }
    .header h1 { font-family: 'Lora', serif; font-size: 28px; margin-bottom: 6px; }
    .header p { font-size: 14px; color: #9ca3af; }
    .back-link { display: inline-block; margin-bottom: 16px; font-size: 14px; color: #7c9885; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }

    .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border-radius: 8px; border: 1.5px solid #ddd; background: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .filter-btn:hover { border-color: #7c9885; }
    .filter-btn.active { background: #7c9885; color: white; border-color: #7c9885; }

    .stats { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; border-radius: 12px; padding: 16px 20px; border: 1px solid #eee; flex: 1; text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: #2d2d2d; }
    .stat-label { font-size: 12px; color: #999; margin-top: 2px; }

    .posts-list { display: flex; flex-direction: column; gap: 12px; }

    .post-card { background: white; border-radius: 12px; border: 1px solid #eee; padding: 20px; display: flex; gap: 16px; align-items: flex-start; }
    .post-card.denied { opacity: 0.5; border-color: #fca5a5; }

    .post-avatar { width: 40px; height: 40px; border-radius: 50%; background: #7c9885; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
    .post-body { flex: 1; min-width: 0; }
    .post-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .post-username { font-weight: 600; font-size: 14px; }
    .post-type { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .post-type.note { background: #dbeafe; color: #1d4ed8; }
    .post-type.text { background: #fef3c7; color: #92400e; }
    .post-type.group_invite { background: #d1fae5; color: #065f46; }
    .post-time { font-size: 12px; color: #999; }
    .post-content { font-size: 14px; color: #444; line-height: 1.5; margin-bottom: 8px; word-break: break-word; }
    .post-note { font-size: 12px; color: #7c9885; font-weight: 500; margin-bottom: 8px; }
    .post-stats { display: flex; gap: 16px; font-size: 12px; color: #999; }
    .post-status { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
    .post-status.approved { background: #d1fae5; color: #065f46; }
    .post-status.denied { background: #fee2e2; color: #991b1b; }

    .post-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .action-btn { padding: 8px 14px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; min-width: 80px; }
    .action-btn.approve { background: #d1fae5; color: #065f46; }
    .action-btn.approve:hover { background: #a7f3d0; }
    .action-btn.deny { background: #fee2e2; color: #991b1b; }
    .action-btn.deny:hover { background: #fca5a5; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: white; border-radius: 14px; padding: 24px; max-width: 420px; width: 90%; }
    .modal h3 { font-size: 17px; margin-bottom: 12px; }
    .modal textarea { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 13px; min-height: 80px; resize: vertical; margin-bottom: 12px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; border: none; }
    .modal-btn.cancel { background: #f5f5f5; color: #666; }
    .modal-btn.confirm { background: #ef4444; color: white; }

    .empty { text-align: center; padding: 60px 20px; color: #999; }

    @media (max-width: 600px) {
      .post-card { flex-direction: column; }
      .post-actions { flex-direction: row; }
      .stats { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="admin.html" class="back-link">Back to Admin Hub</a>
    <div class="header">
      <h1>Social Post Moderation</h1>
      <p>Review and moderate social posts. Posts go live immediately -- deny to remove.</p>
    </div>

    <div class="stats" id="statsBar">
      <div class="stat-card"><div class="stat-value" id="totalCount">-</div><div class="stat-label">Total Posts</div></div>
      <div class="stat-card"><div class="stat-value" id="approvedCount">-</div><div class="stat-label">Approved</div></div>
      <div class="stat-card"><div class="stat-value" id="deniedCount">-</div><div class="stat-label">Denied</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('approved', this)">Approved</button>
      <button class="filter-btn" onclick="setFilter('denied', this)">Denied</button>
    </div>

    <div class="posts-list" id="postsList">
      <div class="empty">Loading posts...</div>
    </div>
  </div>

  <!-- Deny Modal -->
  <div class="modal-overlay" id="denyModal">
    <div class="modal">
      <h3>Deny Post</h3>
      <p style="font-size:13px;color:#888;margin-bottom:12px;">This will delete the post and notify the user.</p>
      <textarea id="denyReason" placeholder="Reason (optional)..."></textarea>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeDenyModal()">Cancel</button>
        <button class="modal-btn confirm" onclick="confirmDeny()">Remove Post</button>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const adminKey = sessionStorage.getItem('studyflow_admin_key') || '';
    if (!adminKey) window.location.href = 'admin.html';

    let allPosts = [];
    let currentFilter = 'all';
    let denyPostId = null;

    async function loadPosts() {
      try {
        const res = await fetch(`${BACKEND_URL}/admin/social/posts?key=${encodeURIComponent(adminKey)}&status=${currentFilter}&limit=100`);
        if (!res.ok) {
          if (res.status === 403) { sessionStorage.removeItem('studyflow_admin_key'); window.location.href = 'admin.html'; return; }
          throw new Error('Failed to load');
        }
        const data = await res.json();
        allPosts = data.posts;
        renderPosts();
        updateStats();
      } catch (e) {
        document.getElementById('postsList').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
      }
    }

    function updateStats() {
      const approved = allPosts.filter(p => p.moderation_status === 'approved').length;
      const denied = allPosts.filter(p => p.moderation_status === 'denied').length;
      document.getElementById('totalCount').textContent = allPosts.length;
      document.getElementById('approvedCount').textContent = approved;
      document.getElementById('deniedCount').textContent = denied;
    }

    function renderPosts() {
      const container = document.getElementById('postsList');
      if (allPosts.length === 0) {
        container.innerHTML = '<div class="empty">No posts found</div>';
        return;
      }

      container.innerHTML = allPosts.map(p => {
        const avatar = (p.username || 'U').charAt(0).toUpperCase();
        const status = p.moderation_status || 'approved';
        const isDenied = status === 'denied';
        const content = p.text_content ? (p.text_content.length > 200 ? p.text_content.slice(0, 200) + '...' : p.text_content) : '';
        const noteHtml = p.note_filename ? `<div class="post-note">Note: ${escapeHtml(p.note_filename)}</div>` : '';
        const time = new Date(p.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        return `
          <div class="post-card ${isDenied ? 'denied' : ''}">
            <div class="post-avatar">${avatar}</div>
            <div class="post-body">
              <div class="post-meta">
                <span class="post-username">${escapeHtml(p.username || 'Anonymous')}</span>
                <span class="post-type ${p.post_type}">${p.post_type}</span>
                <span class="post-status ${status}">${status}</span>
                <span class="post-time">${time}</span>
              </div>
              ${noteHtml}
              ${content ? `<div class="post-content">${escapeHtml(content)}</div>` : ''}
              <div class="post-stats">
                <span>${p.upvote_count || 0} upvotes</span>
                <span>${p.downvote_count || 0} downvotes</span>
                <span>${p.comment_count || 0} comments</span>
              </div>
            </div>
            <div class="post-actions">
              ${!isDenied ? `<button class="action-btn approve" onclick="approvePost('${p.id}')">Approve</button>` : ''}
              ${!isDenied ? `<button class="action-btn deny" onclick="openDenyModal('${p.id}')">Deny</button>` : ''}
              ${isDenied ? '<span style="font-size:11px;color:#999;">Removed</span>' : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadPosts();
    }

    async function approvePost(postId) {
      try {
        await fetch(`${BACKEND_URL}/admin/social/posts/${postId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: adminKey, action: 'approve' })
        });
        loadPosts();
      } catch (e) {
        alert('Failed to approve: ' + e.message);
      }
    }

    function openDenyModal(postId) {
      denyPostId = postId;
      document.getElementById('denyReason').value = '';
      document.getElementById('denyModal').classList.add('active');
    }

    function closeDenyModal() {
      denyPostId = null;
      document.getElementById('denyModal').classList.remove('active');
    }

    async function confirmDeny() {
      if (!denyPostId) return;
      const reason = document.getElementById('denyReason').value.trim();
      try {
        await fetch(`${BACKEND_URL}/admin/social/posts/${denyPostId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: adminKey, action: 'deny', reason })
        });
        closeDenyModal();
        loadPosts();
      } catch (e) {
        alert('Failed to deny: ' + e.message);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadPosts();
  </script>
</body>
</html>
