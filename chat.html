<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow - StudyFlowSuite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1419;
      height: 100vh;
      overflow: hidden;
    }

    /* Main Layout */
    .app-container {
      display: flex;
      height: 100vh;
    }

    /* Left Sidebar */
    .sidebar {
      width: 280px;
      background: #1a1f2e;
      border-right: 1px solid #2d3748;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: #2d3748;
      color: #e5e7eb;
    }

    .new-chat-btn {
      margin: 16px;
      padding: 12px;
      background: transparent;
      color: #d1d5db;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .new-chat-btn:hover {
      background: #2d3748;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      padding: 12px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      color: #d1d5db;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-item:hover {
      background: #2d3748;
    }

    .conversation-item.active {
      background: #2d3748;
      color: #e5e7eb;
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid #2d3748;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4b5563;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-email {
      font-size: 13px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      background: transparent;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: #2d1f1f;
    }

    /* Main Chat Area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0f1419;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-title {
      font-size: 18px;
      font-weight: 600;
      color: #e5e7eb;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      text-align: left;
      color: #9ca3af;
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .welcome-greeting {
      font-size: 32px;
      font-weight: 400;
      color: #e5e7eb;
      margin-bottom: 8px;
    }

    .welcome-title {
      font-size: 48px;
      font-weight: 400;
      color: #e5e7eb;
      margin-bottom: 48px;
    }

    .suggested-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .prompt-chip {
      padding: 14px 20px;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 24px;
      color: #d1d5db;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .prompt-chip:hover {
      background: #2d3748;
      border-color: #4b5563;
      transform: translateY(-2px);
    }

    /* Centered input for welcome screen */
    .welcome-input-container {
      width: 100%;
      max-width: 800px;
      margin-top: 32px;
    }

    .welcome-input-wrapper {
      position: relative;
      width: 100%;
    }

    .welcome-input-box {
      width: 100%;
      padding: 16px 60px 16px 20px;
      border: 2px solid #2d3748;
      border-radius: 28px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      resize: none;
      min-height: 56px;
      max-height: 200px;
      transition: border-color 0.2s;
      background: #1a1f2e;
      color: #e5e7eb;
    }

    .welcome-input-box:focus {
      outline: none;
      border-color: #4b5563;
    }

    .welcome-send-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: #4b5563;
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, opacity 0.2s;
    }

    .welcome-send-btn:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .welcome-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Hide bottom input when on welcome screen */
    .input-container.hidden {
      display: none;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 700px;
      margin: 0 auto;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.assistant {
      transform: translateX(-50px);
    }

    .message.user {
      transform: translateX(50px);
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: #4b5563;
      color: white;
    }

    .message.assistant .message-avatar {
      background: #2d3748;
      color: #9ca3af;
    }

    .message-content {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
    }

    .message.user .message-content {
      background: #4b5563;
      color: white;
    }

    .message.assistant .message-content {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      color: #e5e7eb;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    /* Input Area */
    .input-container {
      padding: 24px;
      border-top: 1px solid #2d3748;
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    .input-box {
      width: 100%;
      padding: 14px 56px 14px 16px;
      border: 2px solid #2d3748;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      resize: none;
      min-height: 52px;
      max-height: 200px;
      transition: border-color 0.2s;
      background: #1a1f2e;
      color: #e5e7eb;
    }

    .input-box:focus {
      outline: none;
      border-color: #4b5563;
    }

    .send-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      background: #4b5563;
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, opacity 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Mobile Menu Toggle */
    .mobile-menu-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      color: #e5e7eb;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 999;
        transform: translateX(-100%);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .mobile-menu-toggle {
        display: block;
      }

      .chat-header {
        padding-left: 64px;
      }
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
    }

    .error-message {
      background: #2d1f1f;
      color: #f87171;
      border: 1px solid #3f1f1f;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 16px;
      text-align: center;
      font-size: 14px;
    }

    /* Settings Popup */
    .settings-popup {
      position: fixed;
      top: 60px;
      left: 16px;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      z-index: 1000;
      min-width: 280px;
      display: none;
    }

    .settings-popup.active {
      display: block;
    }

    .settings-popup-header {
      font-size: 16px;
      font-weight: 600;
      color: #e5e7eb;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2d3748;
    }

    .settings-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }

    .settings-option-label {
      color: #d1d5db;
      font-size: 14px;
      font-weight: 500;
    }

    .settings-option-description {
      color: #9ca3af;
      font-size: 12px;
      margin-top: 4px;
      line-height: 1.4;
    }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      width: 48px;
      height: 24px;
      background: #2d3748;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-switch.active {
      background: #10b981;
    }

    .toggle-slider {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle-switch.active .toggle-slider {
      transform: translateX(24px);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>

    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="header-actions">
          <button class="icon-btn" id="uploadBtn">Upload</button>
          <button class="icon-btn" id="myNotesBtn">Notes</button>
          <button class="icon-btn" id="settingsBtn">Settings</button>
        </div>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <span>New Chat</span>
      </button>

      <div class="conversation-list" id="conversationList">
        <!-- Conversations will be loaded here -->
      </div>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <div class="user-email" id="userEmail">Loading...</div>
            <button class="logout-btn" id="logoutBtn">Sign out</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Settings Popup -->
    <div class="settings-popup" id="settingsPopup">
      <div class="settings-popup-header">Settings</div>
      <div class="settings-option">
        <div>
          <div class="settings-option-label">Collective Brain</div>
          <div class="settings-option-description">Search all user notes for answers</div>
        </div>
        <div class="toggle-switch active" id="collectiveBrainToggle">
          <div class="toggle-slider"></div>
        </div>
      </div>
    </div>

    <!-- Main Chat Area -->
    <main class="chat-container">
      <header class="chat-header">
        <h1 class="chat-title">StudyFlow</h1>
      </header>

      <div class="messages-container" id="messagesContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-greeting" id="welcomeGreeting">Hi</div>
          <h1 class="welcome-title">Where should we start?</h1>
          <div class="suggested-prompts" id="suggestedPrompts">
            <!-- Random questions will be inserted here -->
          </div>
          <div class="welcome-input-container">
            <div class="welcome-input-wrapper">
              <textarea
                class="welcome-input-box"
                id="welcomeMessageInput"
                placeholder="Ask me anything..."
                rows="1"
              ></textarea>
              <button class="welcome-send-btn" id="welcomeSendBtn" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="input-container hidden" id="bottomInputContainer">
        <div class="input-wrapper">
          <textarea
            class="input-box"
            id="messageInput"
            placeholder="Ask a question about your notes..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Configuration
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    // Initialize Supabase
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // State
    let currentUser = null;
    let userProfile = null;
    let authToken = null;
    let conversationId = null;
    let conversations = [];
    let collectiveBrainEnabled = true;

    // DOM Elements
    const messagesContainer = document.getElementById('messagesContainer');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const welcomeMessageInput = document.getElementById('welcomeMessageInput');
    const welcomeSendBtn = document.getElementById('welcomeSendBtn');
    const bottomInputContainer = document.getElementById('bottomInputContainer');
    const newChatBtn = document.getElementById('newChatBtn');
    const conversationList = document.getElementById('conversationList');
    const userEmail = document.getElementById('userEmail');
    const userAvatar = document.getElementById('userAvatar');
    const logoutBtn = document.getElementById('logoutBtn');
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const sidebar = document.getElementById('sidebar');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPopup = document.getElementById('settingsPopup');
    const collectiveBrainToggle = document.getElementById('collectiveBrainToggle');
    const uploadBtn = document.getElementById('uploadBtn');
    const myNotesBtn = document.getElementById('myNotesBtn');

    // Initialize
    async function init() {
      // Check authentication
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = session.user;
      authToken = session.access_token;

      // Fetch user profile from backend to get their name
      try {
        const profileResponse = await fetch(`${BACKEND_URL}/api/current-user`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (profileResponse.ok) {
          userProfile = await profileResponse.json();
        }
      } catch (error) {
        console.error('Error fetching user profile:', error);
      }

      // Update UI with user info
      userEmail.textContent = currentUser.email;

      // Get user's actual name from profile, or fall back to email
      const userName = userProfile?.name || currentUser.email.split('@')[0];
      const firstName = userName.split(' ')[0];
      const capitalizedName = firstName.charAt(0).toUpperCase() + firstName.slice(1);

      userAvatar.textContent = capitalizedName.charAt(0).toUpperCase();

      // Update welcome greeting with user's name
      const welcomeGreeting = document.getElementById('welcomeGreeting');
      if (welcomeGreeting) {
        welcomeGreeting.textContent = `Hi ${capitalizedName}`;
      }

      // Populate random academic questions
      populateSuggestedPrompts();

      // Load conversation history
      await loadConversations();

      // Enable inputs (welcome input is visible by default, bottom is hidden)
      welcomeMessageInput.disabled = false;
      messageInput.disabled = false;
    }

    // Load Conversations List
    async function loadConversations() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/conversations`, {
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        displayConversations(data.conversations || []);

      } catch (error) {
        console.error('Error loading conversations:', error);
      }
    }

    // Display Conversations in Sidebar
    function displayConversations(conversations) {
      conversationList.innerHTML = '';

      if (conversations.length === 0) {
        conversationList.innerHTML = '<div style="padding: 12px; color: #6b7280; font-size: 13px; text-align: center;">No conversations yet</div>';
        return;
      }

      conversations.forEach(conv => {
        const item = document.createElement('div');
        item.className = 'conversation-item';
        if (conv.id === conversationId) {
          item.classList.add('active');
        }

        const title = conv.title || 'New conversation';
        item.textContent = title.length > 40 ? title.substring(0, 40) + '...' : title;
        item.title = title;

        item.addEventListener('click', (e) => loadConversation(conv.id, e.currentTarget));

        conversationList.appendChild(item);
      });
    }

    // Load Specific Conversation
    async function loadConversation(convId, clickedElement) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/conversations/${convId}/messages`, {
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        // Clear current messages
        messagesContainer.innerHTML = '';

        // Hide welcome screen
        if (welcomeScreen) {
          welcomeScreen.style.display = 'none';
        }

        // Display all messages
        data.messages.forEach(msg => {
          addMessage(msg.content, msg.role);
        });

        // Set active conversation
        conversationId = convId;

        // Update active state in sidebar
        document.querySelectorAll('.conversation-item').forEach(item => {
          item.classList.remove('active');
        });
        event.target.classList.add('active');

      } catch (error) {
        console.error('Error loading conversation:', error);
      }
    }

    // Academic questions across different subjects
    const academicQuestions = [
      // History
      "What caused World War I?",
      "How did the Industrial Revolution change society?",
      "What were the main causes of the French Revolution?",
      "Explain the significance of the Renaissance",
      "What led to the fall of the Roman Empire?",
      "How did the Cold War begin?",
      "What was the impact of colonialism?",
      "Explain the causes of the American Civil War",

      // Science - Biology
      "How does DNA replication work?",
      "Explain the process of photosynthesis",
      "What is cellular respiration?",
      "How does natural selection work?",
      "Explain the structure and function of cells",
      "What are the stages of mitosis?",
      "How does the immune system work?",
      "Explain the difference between prokaryotes and eukaryotes",

      // Science - Chemistry
      "What are ionic and covalent bonds?",
      "Explain the periodic table trends",
      "How does pH affect chemical reactions?",
      "What is the difference between acids and bases?",
      "Explain oxidation and reduction reactions",
      "What are the laws of thermodynamics?",
      "How do catalysts work?",

      // Science - Physics
      "What are Newton's laws of motion?",
      "Explain the theory of relativity",
      "How does gravity work?",
      "What is quantum mechanics?",
      "Explain electromagnetic waves",
      "How do electric circuits work?",
      "What is the difference between kinetic and potential energy?",

      // Mathematics
      "How do you solve quadratic equations?",
      "Explain the Pythagorean theorem",
      "What is calculus used for?",
      "How do derivatives work?",
      "Explain probability and statistics",
      "What are imaginary numbers?",
      "How do you calculate integrals?",
      "Explain the concept of limits",

      // Literature & English
      "What are the main themes in Shakespeare's works?",
      "Explain symbolism in literature",
      "What is the Hero's Journey?",
      "How do you analyze poetry?",
      "What are literary devices?",
      "Explain narrative perspectives",
      "What is the difference between denotation and connotation?",

      // Economics
      "What is supply and demand?",
      "Explain how inflation works",
      "What causes economic recessions?",
      "How do interest rates affect the economy?",
      "What is GDP and how is it measured?",
      "Explain market structures",

      // Psychology
      "What are the stages of cognitive development?",
      "Explain classical vs operant conditioning",
      "How does memory work?",
      "What are defense mechanisms?",
      "Explain Maslow's hierarchy of needs",

      // Computer Science
      "What is object-oriented programming?",
      "Explain how algorithms work",
      "What are data structures?",
      "How does machine learning work?",
      "What is Big O notation?",

      // Geography
      "How do tectonic plates move?",
      "What causes climate change?",
      "Explain the water cycle",
      "How are mountains formed?",

      // Philosophy
      "What is the mind-body problem?",
      "Explain utilitarianism vs deontology",
      "What is epistemology?",
      "How does logic work in philosophy?"
    ];

    // Get random academic questions
    function getRandomQuestions(count = 5) {
      const shuffled = [...academicQuestions].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count);
    }

    // Populate suggested prompts
    function populateSuggestedPrompts() {
      const promptsContainer = document.getElementById('suggestedPrompts');
      if (!promptsContainer) return;

      const randomQuestions = getRandomQuestions(5);
      promptsContainer.innerHTML = randomQuestions.map(q =>
        `<div class="prompt-chip" onclick="sendPrompt('${q.replace(/'/g, "\\'")}')">${q}</div>`
      ).join('');
    }

    // Send suggested prompt
    function sendPrompt(prompt) {
      // Use the welcome input if it's visible, otherwise use bottom input
      const welcomeInputElement = document.getElementById('welcomeMessageInput');
      if (welcomeInputElement && !bottomInputContainer.classList.contains('hidden') === false) {
        welcomeInputElement.value = prompt;
      } else {
        messageInput.value = prompt;
      }
      sendMessage(prompt);
    }

    // Send Message
    async function sendMessage(messageText = null) {
      const message = messageText || messageInput.value.trim();
      if (!message) return;

      // If sending from welcome screen, switch to bottom input
      const currentWelcomeScreen = document.getElementById('welcomeScreen');
      if (currentWelcomeScreen && currentWelcomeScreen.style.display !== 'none') {
        currentWelcomeScreen.style.display = 'none';
        bottomInputContainer.classList.remove('hidden');
      }

      // Clear inputs and disable
      messageInput.value = '';
      const currentWelcomeInput = document.getElementById('welcomeMessageInput');
      const currentWelcomeSendBtn = document.getElementById('welcomeSendBtn');
      if (currentWelcomeInput) currentWelcomeInput.value = '';
      messageInput.disabled = true;
      sendBtn.disabled = true;
      if (currentWelcomeInput) currentWelcomeInput.disabled = true;
      if (currentWelcomeSendBtn) currentWelcomeSendBtn.disabled = true;

      // Add user message
      addMessage(message, 'user');

      // Show typing indicator
      const typingId = addTypingIndicator();

      try {
        // Call backend
        const requestBody = { message };
        if (conversationId) {
          requestBody.conversation_id = conversationId;
        }

        const response = await fetch(`${BACKEND_URL}/api/notes/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        // Remove typing indicator
        removeTypingIndicator(typingId);

        // Store conversation ID
        if (data.conversation_id) {
          conversationId = data.conversation_id;
        }

        // Add AI response
        addMessage(data.response || 'Sorry, I couldn\'t generate a response.', 'assistant');

        // Refresh conversation list (to show new chat or updated title)
        await loadConversations();

      } catch (error) {
        console.error('Error sending message:', error);
        removeTypingIndicator(typingId);
        addMessage('Sorry, something went wrong. Please try again.', 'assistant');
      } finally {
        // Re-enable inputs
        messageInput.disabled = false;
        welcomeMessageInput.disabled = false;

        // Focus on the visible input
        if (!bottomInputContainer.classList.contains('hidden')) {
          messageInput.focus();
        } else {
          welcomeMessageInput.focus();
        }
      }
    }

    // Add Message to UI
    function addMessage(content, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'user' ? currentUser.email.charAt(0).toUpperCase() : 'AI';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = content;

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Typing Indicator
    function addTypingIndicator() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message assistant';
      messageDiv.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = 'AI';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';

      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      contentDiv.appendChild(typingDiv);
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      return 'typing-indicator';
    }

    function removeTypingIndicator(id) {
      const indicator = document.getElementById(id);
      if (indicator) {
        indicator.remove();
      }
    }

    // New Chat
    function startNewChat() {
      conversationId = null;
      messagesContainer.innerHTML = '';

      // Remove active state from all conversations
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.classList.remove('active');
      });

      const welcomeDiv = document.createElement('div');
      welcomeDiv.className = 'welcome-screen';
      welcomeDiv.id = 'welcomeScreen';

      // Get user's actual name from profile, or fall back to email
      const userName = userProfile?.name || currentUser?.email?.split('@')[0] || 'there';
      const firstName = userName.split(' ')[0];
      const capitalizedName = firstName.charAt(0).toUpperCase() + firstName.slice(1);

      // Generate random academic questions
      const randomQuestions = getRandomQuestions(5);
      const promptChipsHTML = randomQuestions.map(q =>
        `<div class="prompt-chip" onclick="sendPrompt('${q.replace(/'/g, "\\'")}')">${q}</div>`
      ).join('');

      welcomeDiv.innerHTML = `
        <div class="welcome-greeting">Hi ${capitalizedName}</div>
        <h1 class="welcome-title">Where should we start?</h1>
        <div class="suggested-prompts">
          ${promptChipsHTML}
        </div>
        <div class="welcome-input-container">
          <div class="welcome-input-wrapper">
            <textarea
              class="welcome-input-box"
              id="welcomeMessageInput"
              placeholder="Ask me anything..."
              rows="1"
            ></textarea>
            <button class="welcome-send-btn" id="welcomeSendBtn" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      `;
      messagesContainer.appendChild(welcomeDiv);

      // Hide bottom input, show welcome
      bottomInputContainer.classList.add('hidden');

      // Re-attach event listeners to new welcome input
      const newWelcomeInput = document.getElementById('welcomeMessageInput');
      const newWelcomeSendBtn = document.getElementById('welcomeSendBtn');

      newWelcomeInput.addEventListener('input', () => {
        newWelcomeSendBtn.disabled = !newWelcomeInput.value.trim();
        newWelcomeInput.style.height = 'auto';
        newWelcomeInput.style.height = Math.min(newWelcomeInput.scrollHeight, 200) + 'px';
      });

      newWelcomeInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const message = newWelcomeInput.value.trim();
          if (message) {
            sendMessage(message);
          }
        }
      });

      newWelcomeSendBtn.addEventListener('click', () => {
        const message = newWelcomeInput.value.trim();
        if (message) {
          sendMessage(message);
        }
      });

      newWelcomeInput.focus();
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    welcomeSendBtn.addEventListener('click', () => {
      const message = welcomeMessageInput.value.trim();
      if (message) {
        sendMessage(message);
      }
    });

    messageInput.addEventListener('input', () => {
      sendBtn.disabled = !messageInput.value.trim();

      // Auto-resize textarea
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
    });

    welcomeMessageInput.addEventListener('input', () => {
      welcomeSendBtn.disabled = !welcomeMessageInput.value.trim();

      // Auto-resize textarea
      welcomeMessageInput.style.height = 'auto';
      welcomeMessageInput.style.height = Math.min(welcomeMessageInput.scrollHeight, 200) + 'px';
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (messageInput.value.trim()) {
          sendMessage();
        }
      }
    });

    welcomeMessageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const message = welcomeMessageInput.value.trim();
        if (message) {
          sendMessage(message);
        }
      }
    });

    newChatBtn.addEventListener('click', startNewChat);

    logoutBtn.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    });

    mobileMenuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    // Settings popup toggle
    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsPopup.classList.toggle('active');
    });

    // Upload button - navigate to upload page
    uploadBtn.addEventListener('click', () => {
      window.location.href = 'upload.html';
    });

    // My Notes button - navigate to notes page
    myNotesBtn.addEventListener('click', () => {
      window.location.href = 'notes.html';
    });

    // Collective Brain toggle
    collectiveBrainToggle.addEventListener('click', () => {
      collectiveBrainEnabled = !collectiveBrainEnabled;
      collectiveBrainToggle.classList.toggle('active');
      console.log('Collective Brain:', collectiveBrainEnabled ? 'Enabled' : 'Disabled');
    });

    // Close settings popup when clicking outside
    document.addEventListener('click', (e) => {
      if (!settingsPopup.contains(e.target) && !settingsBtn.contains(e.target)) {
        settingsPopup.classList.remove('active');
      }
    });

    // Initialize on load
    init();
  </script>
</body>
</html>
