<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow - StudyFlowSuite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f5f4f0 0%, #ede9e4 100%);
      height: 100vh;
      overflow: hidden;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      margin: 0;
      padding: 0;
      color: #2d2d2d;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(124, 152, 133, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(232, 155, 95, 0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body.chat-started {
      background: linear-gradient(180deg, #f8f7f3 0%, #f1ede8 100%);
    }









































    /* Main Layout */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* Welcome screen - centered search bar */
    .search-bar-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 680px;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 50;
    }

    body.chat-started .search-bar-container {
      display: none;
    }

    .search-bar-wrapper {
      position: relative;
      width: 100%;
    }

    /* Sidebar - Shoji Door Effect */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: linear-gradient(to bottom, rgba(245, 243, 240, 0.98) 0%, rgba(248, 246, 243, 0.98) 100%);
      backdrop-filter: blur(60px);
      -webkit-backdrop-filter: blur(60px);
      border-right: 3px solid transparent;
      border-image: linear-gradient(to bottom, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.3) 100%) 1;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 12px 0 60px rgba(124, 152, 133, 0.1), 8px 0 40px rgba(232, 155, 95, 0.05);
      z-index: 1000;
      opacity: 1;
    }

    .sidebar.active {
      transform: translateX(0);
    }

    /* Menu button - Gentle appearance */
    .menu-btn {
      position: fixed;
      top: 28px;
      left: 28px;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.1) 0%, rgba(232, 155, 95, 0.1) 100%);
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.3) 100%) 1;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 99;
      color: #7c9885;
      font-size: 18px;
      box-shadow: 0 4px 20px rgba(124, 152, 133, 0.1);
    }

    body.chat-started .menu-btn {
      display: flex;
      animation: gentleFadeIn 0.8s ease 0.4s forwards;
      opacity: 0;
    }

    @keyframes gentleFadeIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .menu-btn:hover {
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.2) 100%);
      box-shadow: 0 6px 30px rgba(124, 152, 133, 0.2), 0 4px 20px rgba(232, 155, 95, 0.15);
      transform: translateY(-2px);
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.6) 0%, rgba(232, 155, 95, 0.6) 100%) 1;
      color: #d88850;
    }

    /* Top right buttons - Settings and Calendar */
    .settings-top-btn, .calendar-top-btn {
      position: fixed;
      top: 28px;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.1) 0%, rgba(232, 155, 95, 0.1) 100%);
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.3) 100%) 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 99;
      color: #7c9885;
      font-size: 18px;
      box-shadow: 0 4px 20px rgba(124, 152, 133, 0.1);
      animation: gentleFadeIn 0.8s ease 0.2s forwards;
      opacity: 0;
    }

    .settings-top-btn {
      right: 28px;
    }

    .calendar-top-btn {
      right: 88px; /* Position to the left of settings button */
    }

    .settings-top-btn:hover, .calendar-top-btn:hover {
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.2) 100%);
      box-shadow: 0 6px 30px rgba(124, 152, 133, 0.2), 0 4px 20px rgba(232, 155, 95, 0.15);
      transform: translateY(-2px);
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.6) 0%, rgba(232, 155, 95, 0.6) 100%) 1;
      color: #d88850;
    }

    .sidebar-header {
      padding: 28px 16px;
      border-bottom: 1px solid rgba(124, 152, 133, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, rgba(124, 152, 133, 0.03) 0%, transparent 100%);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 400;
      font-family: 'Lora', Georgia, serif;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #7c9885 0%, #d88850 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Zen Action Stones - Bottom navigation */
    .zen-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px 16px;
      border-top: 1px solid rgba(124, 152, 133, 0.15);
      background: linear-gradient(to bottom, rgba(124, 152, 133, 0.02) 0%, transparent 100%);
    }

    .zen-stone {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(245, 243, 240, 0.6) 100%);
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.2) 100%) 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      box-shadow: 0 2px 8px rgba(45, 45, 45, 0.08),
                  inset 0 1px 2px rgba(255, 255, 255, 0.5);
    }

    .zen-stone svg {
      width: 20px;
      height: 20px;
      stroke: #7c9885;
      stroke-width: 2;
      fill: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .zen-stone:hover {
      transform: translateY(-3px) scale(1.05);
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.15) 0%, rgba(232, 155, 95, 0.1) 100%);
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.6) 0%, rgba(232, 155, 95, 0.5) 100%) 1;
      box-shadow: 0 6px 20px rgba(124, 152, 133, 0.2),
                  0 4px 12px rgba(232, 155, 95, 0.15),
                  inset 0 1px 2px rgba(255, 255, 255, 0.7);
    }

    .zen-stone:hover svg {
      stroke: #e89b5f;
      transform: scale(1.1);
    }

    .zen-stone:active {
      transform: translateY(-1px) scale(1.02);
    }

    /* Zen Confirmation Modal */
    .zen-confirm-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(45, 45, 45, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .zen-confirm-overlay.active {
      display: flex;
      opacity: 1;
    }

    .zen-confirm-card {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.98) 0%, rgba(248, 246, 243, 0.98) 100%);
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(45, 45, 45, 0.2),
                  0 8px 32px rgba(124, 152, 133, 0.15);
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.3) 100%) 1;
      transform: scale(0.9);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .zen-confirm-overlay.active .zen-confirm-card {
      transform: scale(1);
    }

    .zen-confirm-title {
      font-size: 20px;
      font-weight: 500;
      font-family: 'Lora', Georgia, serif;
      color: #2d2d2d;
      margin-bottom: 12px;
      text-align: center;
    }

    .zen-confirm-message {
      font-size: 15px;
      color: #5d5d5d;
      line-height: 1.6;
      margin-bottom: 28px;
      text-align: center;
    }

    .zen-confirm-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .zen-confirm-btn {
      padding: 12px 28px;
      border-radius: 12px;
      border: 2px solid transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', sans-serif;
    }

    .zen-confirm-btn.cancel {
      background: rgba(124, 152, 133, 0.1);
      color: #7c9885;
      border-color: rgba(124, 152, 133, 0.3);
    }

    .zen-confirm-btn.cancel:hover {
      background: rgba(124, 152, 133, 0.2);
      border-color: rgba(124, 152, 133, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.2);
    }

    .zen-confirm-btn.confirm {
      background: linear-gradient(135deg, rgba(220, 100, 80, 0.15) 0%, rgba(220, 100, 80, 0.1) 100%);
      color: #dc6450;
      border-color: rgba(220, 100, 80, 0.4);
    }

    .zen-confirm-btn.confirm:hover {
      background: linear-gradient(135deg, rgba(220, 100, 80, 0.25) 0%, rgba(220, 100, 80, 0.15) 100%);
      border-color: rgba(220, 100, 80, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(220, 100, 80, 0.3);
    }

    .zen-confirm-btn:active {
      transform: translateY(0);
    }


    .new-chat-btn {
      margin: 16px;
      padding: 14px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.1) 0%, rgba(107, 133, 117, 0.1) 100%);
      color: #2d2d2d;
      border: 1px solid rgba(124, 152, 133, 0.3);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .new-chat-btn:hover {
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(107, 133, 117, 0.2) 100%);
      border-color: rgba(124, 152, 133, 0.5);
      box-shadow: 0 8px 32px rgba(124, 152, 133, 0.3);
      transform: translateY(-2px);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      padding: 12px 40px 12px 14px;
      margin-bottom: 6px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #3d3d3d;
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid transparent;
      position: relative;
    }

    .conversation-item:hover {
      background: linear-gradient(to right, rgba(124, 152, 133, 0.08) 0%, rgba(232, 155, 95, 0.05) 100%);
      transform: translateX(4px);
      border-color: rgba(232, 155, 95, 0.3);
      box-shadow: 0 2px 8px rgba(232, 155, 95, 0.1);
    }

    .conversation-item.active {
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.15) 0%, rgba(232, 155, 95, 0.1) 100%);
      color: #2d2d2d;
      font-weight: 600;
      border-color: #e89b5f;
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.15), 0 2px 12px rgba(232, 155, 95, 0.1);
    }

    /* Zen Delete Stone - appears on hover */
    .delete-stone {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(245, 240, 235, 0.8) 100%);
      border: 1.5px solid rgba(220, 100, 80, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 6px rgba(45, 45, 45, 0.1);
      z-index: 10;
    }

    .delete-stone svg {
      width: 12px;
      height: 12px;
      stroke: #dc6450;
      stroke-width: 2.5;
    }

    .conversation-item:hover .delete-stone {
      opacity: 1;
      pointer-events: auto;
    }

    .delete-stone:hover {
      background: linear-gradient(135deg, rgba(220, 100, 80, 0.15) 0%, rgba(220, 100, 80, 0.1) 100%);
      border-color: rgba(220, 100, 80, 0.6);
      transform: translateY(-50%) scale(1.15);
      box-shadow: 0 3px 10px rgba(220, 100, 80, 0.25);
    }

    .delete-stone:hover svg {
      stroke: #c43a28;
    }

    .delete-stone:active {
      transform: translateY(-50%) scale(0.95);
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.02);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c9885 0%, #6b8575 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(124, 152, 133, 0.3);
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-email {
      font-size: 13px;
      color: #5d5d5d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      background: transparent;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: #2d1f1f;
    }

    /* Main Chat Area - Full width, centered */
    .chat-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: transparent;
    }

    /* No header - clean and minimal */
    .chat-header {
      display: none;
    }

    .chat-title {
      font-size: 18px;
      font-weight: 600;
      color: #2d2d2d;
    }

    /* Messages Container - Lots of breathing room */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 80px 40px 160px 40px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .messages-container::-webkit-scrollbar {
      width: 8px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: rgba(124, 152, 133, 0.05);
      border-radius: 4px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.3) 100%);
      border-radius: 4px;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .messages-container::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(124, 152, 133, 0.5) 0%, rgba(232, 155, 95, 0.5) 100%);
    }

    /* Welcome hint text - above search bar */
    .welcome-hint {
      text-align: center;
      margin-bottom: 40px;
      animation: welcomeAppear 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes welcomeAppear {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-hint h1 {
      font-size: 48px;
      font-weight: 400;
      background: linear-gradient(135deg, #2d2d2d 0%, #3d4d3d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 12px 0;
      letter-spacing: -0.01em;
      font-family: 'Lora', Georgia, serif;
    }

    .welcome-hint p {
      font-size: 16px;
      font-weight: 400;
      color: rgba(124, 152, 133, 0.6);
      margin: 0;
      font-style: italic;
    }

    body.chat-started .welcome-hint {
      animation: welcomeFade 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes welcomeFade {
      to {
        opacity: 0;
        transform: translateY(-20px);
        pointer-events: none;
      }
    }

    /* Hide welcome screen elements */
    .welcome-screen {
      display: none;
    }

    .welcome-greeting,
    .welcome-title {
      display: none;
    }

    /* Suggested prompts - hidden */
    .suggested-prompts {
      display: none;
    }

    .prompt-chip {
      display: none;
    }

    /* Welcome input - hidden, using floating input instead */
    .welcome-input-container {
      display: none;
    }

    .welcome-input-wrapper {
      display: none;
    }

    .welcome-input-box {
      display: none;
    }

    .welcome-send-btn {
      display: none;
    }

    .welcome-send-btn:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .welcome-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Hide old elements */
    .floating-chats-btn {
      display: none;
    }

    .sidebar-trigger {
      display: none;
    }

    .chat-header {
      display: none !important;
    }

    .input-container.hidden {
      display: none;
    }

    /* Messages Container - Cards layout */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: none;
    }

    body.chat-started .messages-container {
      display: block;
      padding: 80px 24px 180px 24px;
    }

    .messages-container::-webkit-scrollbar {
      width: 8px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: rgba(124, 152, 133, 0.05);
      border-radius: 4px;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.3) 100%);
      border-radius: 4px;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .messages-container::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(124, 152, 133, 0.5) 0%, rgba(232, 155, 95, 0.5) 100%);
    }

    /* Paper Card Messages - Like notes on a desk */
    .message {
      max-width: 600px;
      margin: 32px auto 56px auto;
      position: relative;
      animation: messageBreathe 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      animation-fill-mode: forwards;
    }

    .message.user {
      margin-left: calc(50% - 270px);
      margin-right: calc(50% - 330px);
    }

    .message.assistant {
      margin-left: calc(50% - 330px);
      margin-right: calc(50% - 270px);
    }

    .message:first-child {
      margin-top: 0;
    }

    @keyframes messageBreathe {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Role label - Subtle ink stamp */
    .message::before {
      content: attr(data-role);
      display: block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
      opacity: 0.35;
      font-family: 'Inter', sans-serif;
    }

    .message.user::before {
      content: "You";
      color: #d88850;
    }

    .message.assistant::before {
      content: "StudyFlow";
      color: #7c9885;
      opacity: 0.5;
    }

    /* Paper card with ribbon bookmark */
    .message-content {
      position: relative;
      padding: 24px 28px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.9;
      color: #2d2d2d;
      font-family: 'Lora', Georgia, serif;
      font-weight: 400;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 16px rgba(45, 45, 45, 0.06),
                  0 8px 32px rgba(45, 45, 45, 0.04);
      border-left: 4px solid transparent;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .message.user .message-content {
      border-left-color: #e89b5f;

    /* SB 1324 Provenance Marker */
    .provenance-marker {

      gap: 6px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(124, 152, 133, 0.12);

      font-weight: 500;

    .typing-dot:nth-child(1) { animation-delay: 0s; }

    .typing-dot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes breathe {
      0%, 100% {
        opacity: 0.3;
        transform: scale(0.9);
      }
      50% {
        opacity: 1;
        transform: scale(1.1);
      }

    /* Search input - looks like Google search */
    .search-input {

    .search-btn:hover:not(:disabled) {

    .search-btn:disabled {

    .input-wrapper {

    .mobile-menu-toggle {

    .settings-overlay {
      position: fixed;

    // ---- SB 1324 Provenance Compliance ----

    // Zero-width steganography: encode "STUDYFLOW-AI" into invisible Unicode
    const ZWSP = '\u200B'; // zero-width space
    const ZWNJ = '\u200C'; // zero-width non-joiner
    const ZWJ  = '\u200D'; // zero-width joiner

    function encodeProvenance(text) {
      // Encode a signature as zero-width characters
      // Each char of signature: 0 = ZWSP, 1 = ZWNJ, separator = ZWJ
      const signature = 'SFAI' + Date.now().toString(36);
      let encoded = '';
      for (const char of signature) {
        const bits = char.charCodeAt(0).toString(2).padStart(8, '0');
        for (const bit of bits) {
          encoded += bit === '0' ? ZWSP : ZWNJ;
        }
        encoded += ZWJ; // char separator
      }
      return encoded;
    }

    function injectSteganography(text) {
      // Insert the zero-width provenance marker after the first sentence
      const marker = encodeProvenance(text);
      const firstPeriod = text.indexOf('. ');
      if (firstPeriod > 0 && firstPeriod < 200) {
        return text.slice(0, firstPeriod + 1) + marker + text.slice(firstPeriod + 1);
      }
      // Fallback: prepend
      return marker + text;
    }

    function getProvenanceTimestamp() {
      return new Date().toLocaleString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });
    }

    // Clipboard intercept: append provenance line when copying AI text
    document.addEventListener('copy', function(e) {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;

      // Check if selection is inside an assistant message
      const range = selection.getRangeAt(0);
      const messageEl = range.commonAncestorContainer.nodeType === 1
        ? range.commonAncestorContainer.closest('.message.assistant')
        : range.commonAncestorContainer.parentElement?.closest('.message.assistant');

      if (messageEl) {
        e.preventDefault();
        const selectedText = selection.toString();
        const provenance = `\n\n---\nAI-Generated by StudyFlow Suite | ${getProvenanceTimestamp()}\nThis content is AI-generated and does not reflect the actual statements or actions of any depicted individual.`;
        e.clipboardData.setData('text/plain', selectedText + provenance);
      }
    });

    // Add Message to UI
    function addMessage(content, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';

      // Convert markdown to HTML for assistant messages (which may contain Wikipedia links)
      if (role === 'assistant') {
        // Inject zero-width steganography into raw text before rendering
        const steganographicContent = injectSteganography(content);

        // Configure marked to open links in new tabs
        const renderer = new marked.Renderer();
        const originalLinkRenderer = renderer.link;
        renderer.link = function(href, title, text) {
          const html = originalLinkRenderer.call(this, href, title, text);
          return html.replace(/^<a /, '<a target="_blank" rel="noopener noreferrer" ');
        };

        marked.setOptions({
          renderer: renderer,
          breaks: true,
          gfm: true
        });

        contentDiv.innerHTML = marked.parse(steganographicContent);

        // Append visible provenance marker (SB 1324 "clear and conspicuous" label)
        const provenanceDiv = document.createElement('div');
        provenanceDiv.className = 'provenance-marker';
        provenanceDiv.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <span>AI-Generated by StudyFlow Suite &middot; ${getProvenanceTimestamp()}</span>
        `;

        // Depiction disclaimer
        const depictionDiv = document.createElement('span');
        depictionDiv.className = 'provenance-depiction';
        depictionDiv.textContent = 'This content is AI-generated and does not reflect the actual statements or actions of any depicted individual.';
        provenanceDiv.appendChild(depictionDiv);

        contentDiv.appendChild(provenanceDiv);
      } else {
        // User messages are plain text
        contentDiv.textContent = content;
      }

      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Typing Indicator
    function addTypingIndicator() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message assistant';
      messageDiv.id = 'typing-indicator';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';

      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      contentDiv.appendChild(typingDiv);
      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      return 'typing-indicator';
    }

    function removeTypingIndicator(id) {
      const indicator = document.getElementById(id);
      if (indicator) {
        indicator.remove();
      }
    }

    // New Chat - Reset to search engine state
    function startNewChat() {
      conversationId = null;
      messagesContainer.innerHTML = '';

      // Reset to initial state
      document.body.classList.remove('chat-started');

      // Remove active state from all conversations
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.classList.remove('active');
      });

      // Close sidebar
      sidebar.classList.remove('active');

      // Clear and focus search input
      searchInput.value = '';
      searchInput.focus();

      // Restart rolling disclosure timer (SB 1455)
      startAiDisclosureTimer();
    }

    // Event Listeners
    searchBtn.addEventListener('click', sendMessage);

    searchInput.addEventListener('input', () => {
      searchBtn.disabled = !searchInput.value.trim();
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (searchInput.value.trim()) {
          sendMessage();
        }
      }
    });

    // Bottom input handlers
    bottomInput.addEventListener('input', () => {
      bottomSendBtn.disabled = !bottomInput.value.trim();
    });

    bottomInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (bottomInput.value.trim()) {
          sendMessageFromBottom();
        }
      }
    });

    bottomSendBtn.addEventListener('click', () => {
      if (bottomInput.value.trim()) {
        sendMessageFromBottom();
      }
    });

    // Menu button - toggle sidebar
    menuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    // Auto-open sidebar when mouse approaches left edge
    let sidebarAutoOpened = false;

    document.addEventListener('mousemove', (e) => {
      const edgeThreshold = 80; // pixels from left edge
      const isNearEdge = e.clientX <= edgeThreshold;

      if (isNearEdge && !sidebar.classList.contains('active')) {
        sidebar.classList.add('active');
        sidebarAutoOpened = true;
      } else if (!isNearEdge && sidebarAutoOpened && sidebar.classList.contains('active')) {
        // Only auto-close if it was auto-opened (not manually clicked)
        const sidebarRect = sidebar.getBoundingClientRect();
        const isOverSidebar = e.clientX <= sidebarRect.right;

        if (!isOverSidebar) {
          sidebar.classList.remove('active');
          sidebarAutoOpened = false;
        }
      }
    });

    // Close sidebar when clicking outside of it
    document.addEventListener('click', (e) => {
      if (sidebar.classList.contains('active')) {
        const sidebarRect = sidebar.getBoundingClientRect();
        const isClickInSidebar = e.clientX <= sidebarRect.right;
        const isMenuBtn = e.target.closest('#menuBtn');

        if (!isClickInSidebar && !isMenuBtn) {
          sidebar.classList.remove('active');
          sidebarAutoOpened = false;
        }
      }
    });

    newChatBtn.addEventListener('click', startNewChat);

    logoutBtn.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    });

    mobileMenuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    // Settings popup toggle
    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsOverlay.classList.toggle('active');
    });

    // Upload button - navigate to upload page
    uploadBtn.addEventListener('click', () => {
      window.location.href = 'upload.html';
    });

    // My Notes button - navigate to notes page
    myNotesBtn.addEventListener('click', () => {
      window.location.href = 'notes.html';
    });

    // Browse button - navigate to browse page
    browseBtn.addEventListener('click', () => {
      window.location.href = 'browse.html';
    });

    // Account button - navigate to account page
    accountBtn.addEventListener('click', () => {
      window.location.href = 'account.html';
    });

    // Theme toggle

    // Nexus toggle
    collectiveBrainToggle.addEventListener('click', () => {
      collectiveBrainEnabled = !collectiveBrainEnabled;
      collectiveBrainToggle.classList.toggle('active');
      console.log('Nexus:', collectiveBrainEnabled ? 'Enabled' : 'Disabled');
    });

    // Close sidebar when clicking outside
    document.addEventListener('click', (e) => {
      if (sidebar.classList.contains('active') &&
          !sidebar.contains(e.target) &&
          !menuBtn.contains(e.target)) {
        sidebar.classList.remove('active');
      }
    });

    // Close settings popup when clicking outside or on overlay
    settingsOverlay.addEventListener('click', (e) => {
      if (e.target === settingsOverlay) {
        settingsOverlay.classList.remove('active');
      }
    });

    // Initialize on load
    init();
  </script>
</body>
</html>
