    async function deleteFolder(folderId, folderName) {
      ctxMenu.classList.remove('active');
      const confirmed = await sfConfirm(`Delete "${folderName}"? Conversations inside will become unfiled.`);
      if (!confirmed) return;
      try {
        await fetch(`${BACKEND_URL}/api/chat-folders/${folderId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        _preloadedData = null;
        if (currentLevel === 'folder') {
          navigateToFolder(currentFolderId, currentFolderName);
        } else {
          navigateHome(true);
        }
      } catch (e) { console.error('Delete folder error:', e); }
    }

    async function renameFolder(folderId) {
      ctxMenu.classList.remove('active');
      const name = prompt('New folder name:');
      if (!name || !name.trim()) return;
      try {
        await fetch(`${BACKEND_URL}/api/chat-folders/${folderId}`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name.trim() })
        });
        _preloadedData = null;
        if (currentLevel === 'folder') {
          navigateToFolder(currentFolderId, currentFolderName);
        } else {
          navigateHome(true);
        }
      } catch (e) { console.error('Rename folder error:', e); }
    }

    // ============ CANVAS STATE ============
    const viewport = document.getElementById('canvasViewport');
    const world = document.getElementById('canvasWorld');
    const svgLayer = document.getElementById('connectionsSvg');

    let panX = 0, panY = 0, scale = 1;
    let isPanning = false, panStartX = 0, panStartY = 0;
    let cards = []; // {id, element, x, y, parentId, question, response, sources, followups[]}
    let connections = []; // {fromId, toId, line}
    let nextCardId = 0;
    let draggedCard = null, dragOffsetX = 0, dragOffsetY = 0, dragStartX = 0, dragStartY = 0, isDragging = false;

    function updateTransform() {
      world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      // Sync dot grid with pan
      viewport.style.backgroundPosition = `${panX}px ${panY}px`;
      viewport.style.backgroundSize = `${24 * scale}px ${24 * scale}px`;
      document.getElementById('zoomIndicator').textContent = Math.round(scale * 100) + '%';
      renderMinimap();
    }

    // ============ MOBILE CARD HELPERS ============

    function zoomToCard(cardObj) {
      // Animate canvas to center and zoom on the specified card
      const cardWidth = cardObj.element.offsetWidth || 600;
      const cardHeight = cardObj.element.offsetHeight || 400;

      // Target scale - zoom in enough to see the card clearly
      const targetScale = Math.min(1.5, Math.max(0.8, window.innerWidth / (cardWidth + 100)));

      // Calculate target pan to center the card in viewport
      const targetPanX = window.innerWidth / 2 - (cardObj.x + cardWidth / 2) * targetScale;
      const targetPanY = window.innerHeight / 2 - (cardObj.y + cardHeight / 2) * targetScale;

      // Animate from current position to target
      const startPanX = panX, startPanY = panY, startScale = scale;
      const duration = 400;
      const start = performance.now();

      function anim(t) {
        const p = Math.min((t - start) / duration, 1);
        const e = 1 - Math.pow(1 - p, 3); // ease out cubic

        panX = startPanX + (targetPanX - startPanX) * e;
        panY = startPanY + (targetPanY - startPanY) * e;
        scale = startScale + (targetScale - startScale) * e;

        updateTransform();
        if (p < 1) requestAnimationFrame(anim);
      }
      requestAnimationFrame(anim);
    }

    function showCardContextMenu(cardObj, x, y) {
      // Show mobile-friendly context menu for card actions
      const ctxMenu = document.getElementById('ctxMenu');
      const isCollapsed = cardObj.element.classList.contains('collapsed');

      ctxMenu.innerHTML = `
        <button class="ctx-item" onclick="document.getElementById('card-${cardObj.id}').querySelector('.card-collapse-btn').click(); ctxMenu.classList.remove('active');">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;">
            ${isCollapsed
              ? '<polyline points="6 9 12 15 18 9"/>'
              : '<polyline points="18 15 12 9 6 15"/>'}
          </svg>
          ${isCollapsed ? 'Expand Card' : 'Collapse Card'}
        </button>
        <button class="ctx-item" onclick="
          const card = cards.find(c => c.id === ${cardObj.id});
          if (card && card.response) {
            navigator.clipboard.writeText(card.response).catch(() => {
              console.error('Failed to copy to clipboard');
            });
          }
          document.getElementById('ctxMenu').classList.remove('active');
        ">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy Response
        </button>
        <button class="ctx-item" onclick="
          const card = cards.find(c => c.id === ${cardObj.id});
          if (card) zoomToCard(card);
          ctxMenu.classList.remove('active');
        ">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><circle cx="11" cy="11" r="3"/>
          </svg>
          Center on Card
        </button>
      `;

      // Position menu at touch location, but keep it on screen
      const menuWidth = 200;
      const menuHeight = 150;
      let menuX = x;
      let menuY = y;

      if (menuX + menuWidth > window.innerWidth) menuX = window.innerWidth - menuWidth - 10;
      if (menuY + menuHeight > window.innerHeight) menuY = window.innerHeight - menuHeight - 10;
      if (menuX < 10) menuX = 10;
      if (menuY < 10) menuY = 10;

      ctxMenu.style.left = menuX + 'px';
      ctxMenu.style.top = menuY + 'px';
      ctxMenu.classList.add('active');
    }

    // ============ PAN & ZOOM ============
    viewport.addEventListener('mousedown', (e) => {
      if (e.shiftKey) return; // Shift+drag is for selection, not panning
      if (e.target !== viewport && e.target !== world && e.target !== svgLayer) return;
      isPanning = true;
      panStartX = e.clientX - panX;
      panStartY = e.clientY - panY;
      viewport.classList.add('grabbing');
    });

    window.addEventListener('mousemove', (e) => {
      if (isPanning) {
        panX = e.clientX - panStartX;
        panY = e.clientY - panStartY;
        updateTransform();
      }
      if (draggedCard !== null) {
        const dx = (e.clientX - dragStartX) / scale;
        const dy = (e.clientY - dragStartY) / scale;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
        const card = cards.find(c => c.id === draggedCard);
        if (card) {
          card.x = dragOffsetX + dx;
          card.y = dragOffsetY + dy;
          card.element.style.left = card.x + 'px';
          card.element.style.top = card.y + 'px';
          if (card._titleLabel) {
            card._titleLabel.style.left = card.x + 'px';
            card._titleLabel.style.top = (card.y - 36) + 'px';
          }
          updateFollowupPositions(card);
          updateConnections();
        }
      }
    });

    window.addEventListener('mouseup', () => {
      isPanning = false;
      viewport.classList.remove('grabbing');
      if (draggedCard !== null) {
        const card = cards.find(c => c.id === draggedCard);
        if (card) card.element.classList.remove('dragging');
        if (isDragging) saveLayout();
        draggedCard = null;
        viewport.classList.remove('dragging-card');
        setTimeout(() => isDragging = false, 50);
      }
    });

    // ============ TOUCH SUPPORT FOR MOBILE ============
    let touchStartDist = 0;
    let touchStartScale = 1;

    viewport.addEventListener('touchstart', (e) => {
      if (e.target !== viewport && e.target !== world && e.target !== svgLayer) return;

      if (e.touches.length === 1) {
        // Single finger - pan
        isPanning = true;
        panStartX = e.touches[0].clientX - panX;
        panStartY = e.touches[0].clientY - panY;
        viewport.classList.add('grabbing');
      } else if (e.touches.length === 2) {
        // Two fingers - pinch zoom
        e.preventDefault(); // Prevent default browser zoom
        isPanning = false;
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        touchStartDist = Math.sqrt(dx * dx + dy * dy);
        touchStartScale = scale;
      }
    });

    viewport.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1 && isPanning) {
        // Single finger panning
        panX = e.touches[0].clientX - panStartX;
        panY = e.touches[0].clientY - panStartY;
        updateTransform();
      } else if (e.touches.length === 2) {
        // Pinch zoom
        e.preventDefault(); // Prevent default browser zoom
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        const newScale = Math.min(2, Math.max(0.3, touchStartScale * (dist / touchStartDist)));

        // Zoom around midpoint between fingers
        const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        panX = mx - (mx - panX) * (newScale / scale);
        panY = my - (my - panY) * (newScale / scale);
        scale = newScale;

        updateTransform();
      }
    });

    viewport.addEventListener('touchend', (e) => {
      if (e.touches.length === 0) {
        isPanning = false;
        viewport.classList.remove('grabbing');
      }
    });

    viewport.addEventListener('wheel', (e) => {
      // If scrolling inside a card response, let it scroll naturally
      const responseEl = e.target.closest('.card-response');
      if (responseEl) {
        const atTop = responseEl.scrollTop === 0;
        const atBottom = responseEl.scrollTop + responseEl.clientHeight >= responseEl.scrollHeight - 1;
        if ((e.deltaY < 0 && !atTop) || (e.deltaY > 0 && !atBottom)) {
          return; // Let card scroll
        }
      }

      e.preventDefault();

      // Mac trackpad: ctrlKey is true on pinch-to-zoom gesture
      if (e.ctrlKey || e.metaKey) {
        // ZOOM (pinch gesture or Ctrl+scroll)
        const zoomSpeed = 0.005;
        const delta = -e.deltaY * zoomSpeed;
        const newScale = Math.min(3, Math.max(0.15, scale + delta * scale));
        const mx = e.clientX, my = e.clientY;
        panX = mx - (mx - panX) * (newScale / scale);
        panY = my - (my - panY) * (newScale / scale);
        scale = newScale;
      } else if (Math.abs(e.deltaX) > Math.abs(e.deltaY) * 0.5 || e.deltaMode === 0 && Math.abs(e.deltaX) > 2) {
        // PAN (trackpad two-finger scroll -- has significant deltaX)
        panX -= e.deltaX;
        panY -= e.deltaY;
      } else {
        // ZOOM (mouse wheel -- only has deltaY, no deltaX)
        const zoomSpeed = 0.001;
        const delta = -e.deltaY * zoomSpeed;
        const newScale = Math.min(3, Math.max(0.15, scale + delta * scale));
        const mx = e.clientX, my = e.clientY;
        panX = mx - (mx - panX) * (newScale / scale);
        panY = my - (my - panY) * (newScale / scale);
        scale = newScale;
      }

      updateTransform();
    }, { passive: false });

    // ============ CARD CREATION ============

    function createCard(question, x, y, parentId = null) {
      const id = nextCardId++;
      const el = document.createElement('div');
      el.id = 'card-' + id;
      el.className = 'canvas-card expanding' + (parentId !== null ? ' child-card' : '');
      el.style.left = x + 'px';
      el.style.top = y + 'px';

      el.innerHTML = `
        <button class="card-collapse-btn" title="Collapse/Expand" aria-label="Collapse or expand card">-</button>
        <div class="card-question">${escapeHtml(question)}</div>
        <div class="card-loading">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      `;

      // Collapse toggle
      el.querySelector('.card-collapse-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        el.classList.toggle('collapsed');
        e.currentTarget.textContent = el.classList.contains('collapsed') ? '+' : '-';
        setTimeout(() => {
          const card = cards.find(c => c.id === id);
          if (card) { updateFollowupPositions(card); updateConnections(); }
        }, 50);
      });

      // Drag handler on the question header specifically
      function attachDragHandler() {
        const qHeader = el.querySelector('.card-question');
        if (!qHeader) return;
        qHeader.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const cardObj = cards.find(c => c.id === id);
          if (!cardObj) return;
          draggedCard = id;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          dragOffsetX = cardObj.x;
          dragOffsetY = cardObj.y;
          isDragging = false;
          el.classList.add('dragging');
          viewport.classList.add('dragging-card');
        });
      }
      attachDragHandler();

      // Double-click to zoom into card
      el.addEventListener('dblclick', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const cardObj = cards.find(c => c.id === id);
        if (cardObj) zoomToCard(cardObj);
      });

      // ============ MOBILE TOUCH INTERACTIONS ============
      let tapCount = 0;
      let tapTimeout = null;
      let longPressTimeout = null;
      let touchStartTime = 0;
      let touchMoved = false;
      let isDragMode = false;
      let touchStartX = 0;
      let touchStartY = 0;

      // Touch interactions on card
      el.addEventListener('touchstart', (e) => {
        const cardObj = cards.find(c => c.id === id);
        if (!cardObj) return;

        // Don't trigger viewport panning when touching card
        e.stopPropagation();

        const isHeaderTouch = e.target.closest('.card-question');
        const isResponseTouch = e.target.closest('.card-response');

        // Prevent text selection unless touching response area
        if (!isResponseTouch) {
          e.preventDefault();
        }

        touchStartTime = Date.now();
        touchMoved = false;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;

        // Prevent text selection during long-press detection
        if (!isResponseTouch) {
          el.classList.add('no-select');
        }

        // Long press detection
        longPressTimeout = setTimeout(() => {
          if (!touchMoved) {
            if (isHeaderTouch) {
              // Long-press on header = show context menu
              el.classList.remove('no-select');
              showCardContextMenu(cardObj, e.touches[0].clientX, e.touches[0].clientY);
            } else {
              // Long-press on card body = enter drag mode
              isDragMode = true;
              el.classList.remove('no-select');
              el.classList.add('drag-mode');
              // Haptic feedback if available
              if (navigator.vibrate) navigator.vibrate(50);
              draggedCard = id;
              dragOffsetX = cardObj.x;
              dragOffsetY = cardObj.y;
              dragStartX = e.touches[0].clientX;
              dragStartY = e.touches[0].clientY;
            }
          }
        }, 500); // 500ms long press

        // Double-tap detection (only if not in drag mode)
        if (!isDragMode) {
          tapCount++;
          if (tapCount === 1) {
            tapTimeout = setTimeout(() => {
              tapCount = 0;
            }, 300); // 300ms window for double-tap
          } else if (tapCount === 2) {
            clearTimeout(tapTimeout);
            clearTimeout(longPressTimeout);
            tapCount = 0;
            // Double-tap detected - zoom to this card
            zoomToCard(cardObj);
            e.preventDefault();
          }
        }
      });

      el.addEventListener('touchmove', (e) => {
        const dx = Math.abs(e.touches[0].clientX - touchStartX);
        const dy = Math.abs(e.touches[0].clientY - touchStartY);

        // If moved more than 5px, cancel tap gestures
        if (dx > 5 || dy > 5) {
          touchMoved = true;
          clearTimeout(longPressTimeout);
          tapCount = 0;
          clearTimeout(tapTimeout);
          el.classList.remove('no-select');
        }

        // If in drag mode, move the card
        if (isDragMode) {
          e.preventDefault();
          const cardObj = cards.find(c => c.id === id);
          if (cardObj) {
            const moveX = (e.touches[0].clientX - dragStartX) / scale;
            const moveY = (e.touches[0].clientY - dragStartY) / scale;
            cardObj.x = dragOffsetX + moveX;
            cardObj.y = dragOffsetY + moveY;
            cardObj.element.style.left = cardObj.x + 'px';
            cardObj.element.style.top = cardObj.y + 'px';
            if (cardObj._titleLabel) {
              cardObj._titleLabel.style.left = cardObj.x + 'px';
              cardObj._titleLabel.style.top = (cardObj.y - 36) + 'px';
            }
            updateFollowupPositions(cardObj);
            updateConnections();
          }
        }
      });

      el.addEventListener('touchend', (e) => {
        clearTimeout(longPressTimeout);
        el.classList.remove('no-select');

        // Exit drag mode
        if (isDragMode) {
          isDragMode = false;
          el.classList.remove('drag-mode');
          draggedCard = null;

          // Save card position to backend
          saveLayout();
        }

        // Reset touch tracking
        setTimeout(() => {
          touchMoved = false;
        }, 50);
      });

      el.addEventListener('touchcancel', (e) => {
        clearTimeout(longPressTimeout);
        el.classList.remove('no-select');

        // Exit drag mode
        if (isDragMode) {
          isDragMode = false;
          el.classList.remove('drag-mode');
          draggedCard = null;
        }

        touchMoved = false;
      });

      world.appendChild(el);

      const card = { id, element: el, x, y, parentId, question, response: null, sources: null, followups: [] };
      cards.push(card);

      // Draw connection to parent
      if (parentId !== null) {
        drawConnection(parentId, id);
      }

      return card;
    }

    function populateCard(card, response, sources, followups) {
      card.response = response;
      card.sources = sources;

      // Render response with markdown
      const renderer = new marked.Renderer();
      renderer.link = function(href, title, text) {
        return `<a href="${href}" target="_blank" rel="noopener">${text}</a>`;
      };
      marked.setOptions({ renderer, breaks: true, gfm: true });

      // Inject steganographic watermark before rendering
      const watermarkedResponse = injectSteganography(response);
      let responseHtml = marked.parse(watermarkedResponse);

      // Sources HTML
      let sourcesHtml = '';
      console.log('DEBUG populateCard sources:', sources); // DEBUG
      if (sources && sources.length > 0) {
        const noteSources = sources.filter(s => !s.from_wikipedia);
        const wikiSources = sources.filter(s => s.from_wikipedia && s.wikipedia_url);
        console.log('DEBUG noteSources:', noteSources, 'wikiSources:', wikiSources); // DEBUG

        if (noteSources.length > 0) {
          sourcesHtml += '<div style="margin-top:12px;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:8px;">Sources</div>';
          noteSources.forEach(s => {
            const name = s.filename.replace(/\s*\([^)]*\)$/, '').replace(/\.(txt|pdf|docx?)$/i, '');
            const user = s.username ? `@${s.username}` : 'Anonymous';
            sourcesHtml += `
              <div class="source-card">
                <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;">
                  <div style="min-width:0;">
                    <a href="note-viewer.html?id=${s.note_id}" target="_blank">${name}</a>
                    <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">${user} - ${s.university || ''}</div>
                  </div>
                  <div style="display:flex;gap:4px;flex-shrink:0;">
                    <button class="vote-btn vote-up" data-note-id="${s.note_id}" style="padding:4px 8px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-tertiary);color:var(--text-muted);font-size:10px;cursor:pointer;display:flex;align-items:center;gap:3px;">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px;"><polyline points="18 15 12 9 6 15"/></svg>Yes
                    </button>
                    <button class="vote-btn vote-down" data-note-id="${s.note_id}" style="padding:4px 8px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-tertiary);color:var(--text-muted);font-size:10px;cursor:pointer;display:flex;align-items:center;gap:3px;">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px;"><polyline points="6 9 12 15 18 9"/></svg>No
                    </button>
                  </div>
                </div>
              </div>`;
          });
        }

        if (wikiSources.length > 0) {
          wikiSources.forEach(s => {
            const title = s.filename.replace('.txt', '').replace(/ \(Wikipedia.*\)/, '');
            sourcesHtml += `<div class="source-card"><a href="${s.wikipedia_url}" target="_blank">Wikipedia: ${title}</a></div>`;
          });
        }
      }

      card.element.innerHTML = `
        <button class="card-collapse-btn" title="Collapse/Expand" aria-label="Collapse or expand card">-</button>
        <div class="card-question">${escapeHtml(card.question)}</div>
        <div class="card-response">${responseHtml}${sourcesHtml}</div>
      `;

      // Re-attach collapse handler
      card.element.querySelector('.card-collapse-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        card.element.classList.toggle('collapsed');
        e.currentTarget.textContent = card.element.classList.contains('collapsed') ? '+' : '-';
        setTimeout(() => { updateFollowupPositions(card); updateConnections(); }, 50);
      });

      // Re-attach drag handler on new question header
      const qHeader = card.element.querySelector('.card-question');
      if (qHeader) {
        qHeader.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          draggedCard = card.id;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          dragOffsetX = card.x;
          dragOffsetY = card.y;
          isDragging = false;
          card.element.classList.add('dragging');
          viewport.classList.add('dragging-card');
        });
      }

      // KaTeX rendering
      const responseEl = card.element.querySelector('.card-response');
      if (window.renderMathInElement) {
        renderMathInElement(responseEl, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false}
          ],
          throwOnError: false
        });
      }

      // Vote handlers
      card.element.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const target = e.currentTarget;
          const isUp = target.classList.contains('vote-up');
          const noteId = target.dataset.noteId;
          if (!noteId) return;
          try {
            const msgId = `msg_${Date.now()}_${noteId}_${Math.random().toString(36).substr(2, 9)}`;
            await fetch(`${BACKEND_URL}/api/chat/rate-response`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ message_id: msgId, conversation_id: conversationId, vote: isUp ? 1 : -1, cited_note_ids: [noteId] })
            });
            const sc = target.closest('.source-card');
            if (sc) {
              sc.querySelectorAll('.vote-btn').forEach(b => { b.style.opacity = '0.4'; b.style.pointerEvents = 'none'; });
              target.style.opacity = '1';
              target.style.background = 'var(--accent-primary)';
              target.style.color = 'white';
            }
          } catch (err) { console.error('Vote error:', err); }
        });
      });

      // Create follow-up bubbles
      if (followups && followups.length > 0) {
        card.followups = followups.map((text, i) => {
          const bubble = document.createElement('div');
          bubble.className = 'followup-bubble';
          bubble.textContent = text;
          bubble.title = text;
          world.appendChild(bubble);

          bubble.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isDragging) return;
            askFollowup(card.id, text, bubble);
          });

          return { text, element: bubble };
        });

        updateFollowupPositions(card);
      }

      updateConnections();
    }

    function updateFollowupPositions(card) {
      const cardW = card.element.classList.contains('child-card') ? 520 : 550;
      const cardH = card.element.offsetHeight || 200;
      const count = card.followups.length;
      const startY = card.y + cardH + 40;

      // Remove old followup lines
      if (card._followupPaths) {
        card._followupPaths.forEach(p => p.remove());
      }
      card._followupPaths = [];

      const anchorX = card.x + cardW / 2;
      const anchorY = card.y + cardH;

      // Separate input bubble from suggestion bubbles
      const inputItems = card.followups.filter(f => f.isInput);
      const suggestionItems = card.followups.filter(f => !f.isInput);

      // Row 1: Input bubble centered
      const row1Y = startY;
      inputItems.forEach(f => {
        const bw = f.element.offsetWidth || 210;
        f.element.style.left = (anchorX - bw / 2) + 'px';
        f.element.style.top = row1Y + 'px';
      });

      // Row 2: Suggestion bubbles centered below
      const row2Y = startY + (inputItems.length > 0 ? 50 : 0);
      const suggWidths = suggestionItems.map(f => f.element.offsetWidth || 140);
      const gap = 16;
      const totalSuggW = suggWidths.reduce((sum, w) => sum + w, 0) + gap * Math.max(suggestionItems.length - 1, 0);
      let cursorX = anchorX - totalSuggW / 2;

      suggestionItems.forEach((f, i) => {
        const bw = suggWidths[i];
        f.element.style.left = cursorX + 'px';
        f.element.style.top = row2Y + 'px';
        cursorX += bw + gap;
      });

      // Draw lines from card to all items
      const allItems = [...inputItems, ...suggestionItems];
      allItems.forEach(f => {
        const fx = parseFloat(f.element.style.left) || 0;
        const fy = parseFloat(f.element.style.top) || 0;
        const bw = f.element.offsetWidth || 140;
        const bcx = fx + bw / 2;
        const bcy = fy;

        // Draw bezier line from card bottom to bubble
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const ax = anchorX + SVG_OFFSET, ay = anchorY + SVG_OFFSET;
        const bx = bcx + SVG_OFFSET, by = bcy + SVG_OFFSET;
        const midY = ay + (by - ay) * 0.5;
        path.setAttribute('d', `M ${ax} ${ay} C ${ax} ${midY}, ${bx} ${midY}, ${bx} ${by}`);
        path.setAttribute('stroke', '#7c9885');
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('opacity', '0.3');
        path.setAttribute('stroke-dasharray', '4 3');
        svgLayer.appendChild(path);
        card._followupPaths.push(path);
      });
    }

    // ============ CONNECTIONS (BEZIER) ============
    const SVG_OFFSET = 10000; // SVG starts at -10000, so add offset to coords

    function drawConnection(fromId, toId) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('stroke', '#7c9885');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('fill', 'none');
      path.setAttribute('opacity', '0.35');
      svgLayer.appendChild(path);

      // Create branch button on the line midpoint
      const branchBtn = document.createElement('div');
      branchBtn.className = 'branch-btn';
      branchBtn.textContent = '+';
      branchBtn.title = 'Branch from here';
      world.appendChild(branchBtn);

      branchBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const parentCard = cards.find(c => c.id === fromId);
        if (parentCard && parentCard.response) {
          createFollowupBubbles(parentCard, [
            'Tell me more about this',
            'How does this connect to other topics?'
          ]);
        }
      });

      connections.push({ fromId, toId, path, branchBtn });
      updateConnections();
    }

    function updateConnections() {
      connections.forEach(conn => {
        const from = cards.find(c => c.id === conn.fromId);
        const to = cards.find(c => c.id === conn.toId);
        if (!from || !to) return;
        const fw = from.element.classList.contains('child-card') ? 520 : 550;
        const tw = to.element.classList.contains('child-card') ? 520 : 550;
        const fh = from.element.offsetHeight || 200;
        const x1 = from.x + fw / 2 + SVG_OFFSET, y1 = from.y + fh + SVG_OFFSET;
        const x2 = to.x + tw / 2 + SVG_OFFSET, y2 = to.y + SVG_OFFSET;
        const cy1 = y1 + (y2 - y1) * 0.5;
        const cy2 = y2 - (y2 - y1) * 0.5;
        conn.path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${cy1}, ${x2} ${cy2}, ${x2} ${y2}`);

        // Position branch button at midpoint of the line (in world coords, not SVG coords)
        const midX = (from.x + fw / 2 + to.x + tw / 2) / 2 - 12;
        const midY = ((from.y + fh) + to.y) / 2 - 12;
        if (conn.branchBtn) {
          conn.branchBtn.style.left = midX + 'px';
          conn.branchBtn.style.top = midY + 'px';
        }
      });
    }

    // ============ SEND MESSAGE ============
    async function sendMessage(text, parentId = null, originBubble = null) {
      if (!text.trim()) return;

      // Remove empty hints
      document.querySelectorAll('.empty-hint').forEach(h => h.remove());

      // SB 1455: Disclosure at initiation of first card
      if (cards.length === 0) {
        injectInitiationDisclosure();
        startAiDisclosureTimer();
      }

      // Position the new card
      let cx, cy;
      if (parentId !== null) {
        const parent = cards.find(c => c.id === parentId);
        const ph = parent.element.offsetHeight || 200;
        cx = parent.x + (Math.random() - 0.5) * 100;
        cy = parent.y + ph + 120;
      } else {
        // New root card: center of viewport
        cx = (window.innerWidth / 2 - panX) / scale - 275;
        cy = (window.innerHeight / 2 - panY) / scale - 100 + cards.length * 30;
      }

      // Set conversationId from parent card if in folder view
      if (parentId !== null) {
        const parentCardForConv = cards.find(c => c.id === parentId);
        if (parentCardForConv && parentCardForConv._conversationId) {
          conversationId = parentCardForConv._conversationId;
        }
      }

      // Remove all followup bubbles and paths from parent
      if (originBubble) {
        const parentCard = cards.find(c => c.id === parentId);
        if (parentCard) {
          if (parentCard._followupPaths) {
            parentCard._followupPaths.forEach(p => p.remove());
            parentCard._followupPaths = [];
          }
          // Remove all bubbles
          parentCard.followups.forEach(f => f.element.remove());
          parentCard.followups = [];

          // Position new card below parent
          const pcW = parentCard.element.classList.contains('child-card') ? 520 : 550;
          const pcH = parentCard.element.offsetHeight || 200;
          const cardW = 520;
          cx = parentCard.x + pcW / 2 - cardW / 2;
          cy = parentCard.y + pcH + 100;
        }
      }

      const card = createCard(text, cx, cy, parentId);
      // drawConnection in createCard handles the line (and it updates on drag)

      // Pan to show the new card
      panToCard(card);

      try {
        const body = { message: text };
        if (conversationId) body.conversation_id = conversationId;

        const res = await fetch(`${BACKEND_URL}/api/notes/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
          body: JSON.stringify(body)
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.conversation_id) {
          conversationId = data.conversation_id;
          card._conversationId = data.conversation_id;
          invalidatePreload();

          // If we're inside a folder, move the new conversation into it
          if (currentFolderId) {
            fetch(`${BACKEND_URL}/api/conversations/${data.conversation_id}/move`, {
              method: 'PUT',
              headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ folder_id: currentFolderId })
            }).catch(() => {});
          }
        }

        populateCard(card, data.response || 'Sorry, something went wrong.', data.sources, []);

        // Use AI suggestions if available, fallback to generic
        const suggestions = (data.followup_suggestions && data.followup_suggestions.length > 0)
          ? data.followup_suggestions
          : ['Tell me more about this', 'Give me an example'];
        createFollowupBubbles(card, suggestions);
        panToCard(card);
        saveLayout();
        window.dispatchEvent(new CustomEvent('sf:chat-response', { detail: { hasResponse: true } }));

      } catch (err) {
        console.error('Chat error:', err);
        window.dispatchEvent(new CustomEvent('sf:error', { detail: { page: 'chat', message: 'Chat request failed' } }));
        populateCard(card, 'Sorry, something went wrong. Please try again.', null, []);
      }
    }

    function askFollowup(parentId, text, bubbleEl) {
      sendMessage(text, parentId, bubbleEl);
    }

    function createFollowupBubbles(card, aiSuggestions) {
      // Remove existing followups
      card.followups.forEach(f => f.element.remove());
      if (card._followupPaths) card._followupPaths.forEach(p => p.remove());
      card.followups = [];
      card._followupPaths = [];

      const items = [];

      // 1. Text input bubble
      const inputBubble = document.createElement('div');
      inputBubble.className = 'followup-input-bubble';
      inputBubble.innerHTML = `
        <input type="text" placeholder="Ask a follow-up..." />
        <button aria-label="Send message">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      `;
      world.appendChild(inputBubble);

      const inputEl = inputBubble.querySelector('input');
      const sendEl = inputBubble.querySelector('button');

      function submitInput() {
        const val = inputEl.value.trim();
        if (!val) return;
        askFollowup(card.id, val, inputBubble);
      }

      sendEl.addEventListener('click', (e) => { e.stopPropagation(); submitInput(); });
      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); submitInput(); }
      });
      inputEl.addEventListener('click', (e) => e.stopPropagation());

      items.push({ text: '', element: inputBubble, isInput: true });

      // 2. AI-generated suggestion bubbles
      const suggestions = (aiSuggestions || []).slice(0, 2);
      suggestions.forEach(text => {
        const bubble = document.createElement('div');
        bubble.className = 'followup-bubble';
        bubble.textContent = text;
        bubble.title = text;
        world.appendChild(bubble);

        bubble.addEventListener('click', (e) => {
          e.stopPropagation();
          if (isDragging) return;
          askFollowup(card.id, text, bubble);
        });

        items.push({ text, element: bubble, isInput: false });
      });

      card.followups = items;
      updateFollowupPositions(card);
    }

    function panToCard(card) {
      const targetX = -(card.x * scale) + window.innerWidth / 2 - 275 * scale;
      const targetY = -(card.y * scale) + window.innerHeight / 2 - 100 * scale;

      const startX = panX, startY = panY;
      const duration = 400;
      const start = performance.now();

      function animate(t) {
        const elapsed = t - start;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        panX = startX + (targetX - startX) * ease;
        panY = startY + (targetY - startY) * ease;
        updateTransform();
        if (progress < 1) requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    }

    // ============ CONVERSATIONS ============
    async function loadConversations() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/conversations`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (!res.ok) return;
        const data = await res.json();
        const list = document.getElementById('conversationList');

        if (!data.conversations || data.conversations.length === 0) {
          list.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:var(--text-muted);">No conversations yet</div>';
          return;
        }

        list.innerHTML = data.conversations.map(c => `
          <div class="conversation-item ${c.id === conversationId ? 'active' : ''}" data-id="${c.id}">
            <span class="title">${c.title || 'New Chat'}</span>
            <button class="delete-btn" title="Delete" aria-label="Delete conversation">&times;</button>
          </div>
        `).join('');

        // Click handlers
        list.querySelectorAll('.conversation-item').forEach(item => {
          item.querySelector('.title').addEventListener('click', () => loadConversation(item.dataset.id));
          item.querySelector('.delete-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            deleteConversation(item.dataset.id, item);
          });
        });
      } catch (e) { console.error('Load conversations error:', e); }
    }

    async function loadConversation(convId) {
      try {
        // Fetch messages and saved layout in parallel
        const [msgRes, savedLayout] = await Promise.all([
          fetch(`${BACKEND_URL}/api/conversations/${convId}/messages`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
          }),
          getSavedLayout(convId)
        ]);

        if (!msgRes.ok) return;
        const data = await msgRes.json();

        // Clear canvas
        clearCanvas();
        conversationId = convId;
        // (welcome screen removed)
        // (input bar removed)

        // Build a lookup from saved layout by question text
        const savedPositions = {};
        if (savedLayout && savedLayout.cards) {
          savedLayout.cards.forEach((sc, i) => {
            savedPositions[sc.question] = { x: sc.x, y: sc.y, parentId: sc.parentId, index: i };
          });
        }

        // Rebuild cards from messages, using saved positions if available
        let lastCardId = null;
        let pendingQuestion = null;
        let fallbackY = 0;
        let fallbackDir = 1;

        for (const msg of (data.messages || [])) {
          if (msg.role === 'user') {
            pendingQuestion = msg.content;
          } else if (msg.role === 'assistant' && pendingQuestion) {
            const saved = savedPositions[pendingQuestion];
            let cx, cy, parentId;

            if (saved) {
              cx = saved.x;
              cy = saved.y;
              // Map saved parentId to actual card id
              parentId = saved.parentId !== null && saved.parentId !== undefined
                ? (saved.parentId < cards.length ? saved.parentId : lastCardId)
                : lastCardId;
            } else {
              // Fallback: zigzag layout
              const offsetX = fallbackDir * (40 + Math.random() * 30);
              fallbackDir *= -1;
              cx = offsetX;
              cy = fallbackY;
              parentId = lastCardId;
            }

            const card = createCard(pendingQuestion, cx, cy, parentId);
            populateCard(card, msg.content, msg.sources, []);

            if (!saved) {
              fallbackY += (card.element.offsetHeight || 200) + 100;
            }

            lastCardId = card.id;
            pendingQuestion = null;
          }
        }

        // Restore pan/zoom from saved layout
        if (savedLayout && savedLayout.panX !== undefined) {
          panX = savedLayout.panX;
          panY = savedLayout.panY;
          scale = savedLayout.scale || 1;
          updateTransform();
        } else if (cards.length > 0) {
          panToCard(cards[0]);
        }

        // Add follow-ups to all leaf cards (cards that have no children)
        if (cards.length > 0) {
          const parentIds = new Set(cards.map(c => c.parentId).filter(id => id !== null));
          cards.forEach(c => {
            if (!parentIds.has(c.id) && c.response) {
              createFollowupBubbles(c, [
                'Tell me more about this',
                'What else should I know?'
              ]);
            }
          });
        }

        // Start disclosure timer for loaded conversation
        startAiDisclosureTimer();

        currentLevel = 'conversation';
        updateBreadcrumb();

      } catch (e) { console.error('Load conversation error:', e); }
    }

    async function deleteConversation(convId, el) {
      ctxMenu.classList.remove('active');
      const confirmed = await sfConfirm('Delete this conversation?');
      if (!confirmed) return;
      try {
        if (el) el.style.opacity = '0';
        await fetch(`${BACKEND_URL}/api/conversations/${convId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        // Force fresh data
        _preloadedData = null;
        invalidatePreload();
        await preloadCanvas();
        // Refresh current view
        if (currentLevel === 'folder') {
          navigateToFolder(currentFolderId, currentFolderName);
        } else if (currentLevel === 'home') {
          navigateHome();
        }
        window.dispatchEvent(new CustomEvent('sf:conversation-deleted'));
      } catch (e) {
        if (el) el.style.opacity = '1';
        console.error('Delete error:', e);
      }
    }

    function startNewChat() {
      clearCanvas();
      clearLevelElements();
      window.dispatchEvent(new CustomEvent('sf:chat-started'));
      conversationId = null;
      currentLevel = 'conversation';
      updateBreadcrumb();
      // (welcome screen removed)
      // (input bar removed)
    }

    function clearCanvas() {
      // Remove all cards, followup bubbles, and followup paths
      cards.forEach(c => {
        c.element.remove();
        c.followups.forEach(f => f.element.remove());
        if (c._followupPaths) c._followupPaths.forEach(p => p.remove());
      });
      connections.forEach(c => {
        c.path.remove();
        if (c.branchBtn) c.branchBtn.remove();
      });
      cards = [];
      connections = [];
      nextCardId = 0;

      // Clear any orphaned SVG elements (fixes bug where connections persist between folders)
      svgLayer.innerHTML = '';

      panX = 0; panY = 0; scale = 1;
      updateTransform();
    }

    // ============ LAYOUT SAVE/RESTORE (SUPABASE) ============
    let _saveTimeout = null;

    function saveLayout() {
      if (cards.length === 0) return;
      clearTimeout(_saveTimeout);
      _saveTimeout = setTimeout(async () => {
        // Group cards by conversation and save each
        const convGroups = {};
        cards.forEach(c => {
          const cid = c._conversationId || conversationId;
          if (!cid) return;
          if (!convGroups[cid]) convGroups[cid] = [];

          // Find parent card's question instead of saving numeric ID
          let parentQuestion = null;
          if (c.parentId !== null) {
            const parentCard = cards.find(pc => pc.id === c.parentId);
            if (parentCard) {
              parentQuestion = parentCard.question;
            }
          }

          convGroups[cid].push({
            question: c.question,
            x: c.x,
            y: c.y,
            parentId: c.parentId, // Keep for backward compatibility
            parentQuestion: parentQuestion, // NEW: parent's question text
            collapsed: c.element.classList.contains('collapsed')
          });
        });

        for (const [cid, layout] of Object.entries(convGroups)) {
          try {
            // Find the minimum x and y to determine cluster position
            const minX = Math.min(...layout.map(c => c.x));
            const minY = Math.min(...layout.map(c => c.y));

            // Convert absolute positions to relative positions
            const relativeLayout = layout.map(c => ({
              ...c,
              x: c.x - minX,
              y: c.y - minY
            }));

            console.log(`[SAVE] Conversation ${cid}: cluster_x=${minX}, cluster_y=${minY}, cards=${layout.length}`);

            await fetch(`${BACKEND_URL}/api/conversations/${cid}/layout`, {
              method: 'PUT',
              headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                cards: relativeLayout,
                cluster_x: minX,
                cluster_y: minY,
                panX,
                panY,
                scale
              })
            });
          } catch (e) {
            console.error(`[SAVE ERROR] Conversation ${cid}:`, e);
          }
        }

        // Invalidate preload cache so next load gets fresh data
        invalidatePreload();
      }, 1000);
    }

    async function getSavedLayout(convId) {
      try {
        const res = await fetch(`${BACKEND_URL}/api/conversations/${convId}/layout`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (!res.ok) return null;
        const data = await res.json();
        return data;
      } catch (e) { return null; }
    }

    // ============ NOTIFICATIONS ============
    let notifData = [];

    async function fetchNotifications() {
      if (!authToken) return;
      try {
        const res = await fetch(`${BACKEND_URL}/api/notifications`, { headers: { 'Authorization': `Bearer ${authToken}` } });
        if (res.ok) {
          const json = await res.json();
          notifData = json.notifications || [];
        }
        renderNotifications();
      } catch (e) {}
    }

    function renderNotifications() {
      const list = document.getElementById('notifList');
      const badge = document.getElementById('notifBadge');
      const unread = notifData.filter(n => !n.is_read).length;
      badge.classList.toggle('visible', unread > 0);

      if (!notifData.length) {
        list.innerHTML = '<div class="notif-empty">No notifications yet</div>';
        return;
      }

      list.innerHTML = notifData.map(n => `
        <div class="notif-item ${n.is_read ? '' : 'unread'}" data-id="${n.id}" data-note="${n.note_id || ''}">
          ${n.message || n.title}
          <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">${timeAgo(n.created_at)}</div>
        </div>
      `).join('');
    }

    function timeAgo(d) {
      const s = Math.floor((new Date() - new Date(d)) / 1000);
      if (s < 60) return 'just now';
      const m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
      const days = Math.floor(h / 24); if (days < 7) return days + 'd ago';
      return new Date(d).toLocaleDateString();
    }

    document.getElementById('notifBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('notifDropdown').classList.toggle('active');
      fetchNotifications();
    });

    document.getElementById('notifMarkAll').addEventListener('click', async () => {
      try {
        await fetch(`${BACKEND_URL}/api/notifications/read`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ all: true })
        });
        notifData.forEach(n => n.is_read = true);
        renderNotifications();
      } catch (e) {}
    });

    document.getElementById('notifList').addEventListener('click', (e) => {
      const item = e.target.closest('.notif-item');
      if (!item) return;
      const noteId = item.dataset.note;
      if (noteId) window.open(`note-viewer.html?id=${noteId}`, '_blank');
      document.getElementById('notifDropdown').classList.remove('active');
    });

    document.addEventListener('click', (e) => {
      if (!document.getElementById('notifDropdown').contains(e.target) && !document.getElementById('notifBtn').contains(e.target))
        document.getElementById('notifDropdown').classList.remove('active');
    });

    setInterval(fetchNotifications, 60000);

    // ============ MINIMAP ============
    const minimapCanvas = document.getElementById('minimapCanvas');
    const minimapCtx = minimapCanvas.getContext('2d');

    function renderMinimap() {
      const ctx = minimapCtx;
      const cw = minimapCanvas.width, ch = minimapCanvas.height;
      ctx.clearRect(0, 0, cw, ch);

      if (cards.length === 0) return;

      // Find bounds of all cards
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      cards.forEach(c => {
        const w = c.element.classList.contains('child-card') ? 520 : 550;
        const h = c.element.offsetHeight || 200;
        minX = Math.min(minX, c.x);
        minY = Math.min(minY, c.y);
        maxX = Math.max(maxX, c.x + w);
        maxY = Math.max(maxY, c.y + h);
      });

      const padding = 100;
      minX -= padding; minY -= padding; maxX += padding; maxY += padding;
      const worldW = maxX - minX || 1;
      const worldH = maxY - minY || 1;
      const mapScale = Math.min(cw / worldW, ch / worldH);

      // Draw cards as small rectangles
      cards.forEach(c => {
        const w = c.element.classList.contains('child-card') ? 520 : 550;
        const h = c.element.offsetHeight || 200;
        const rx = (c.x - minX) * mapScale;
        const ry = (c.y - minY) * mapScale;
        const rw = w * mapScale;
        const rh = h * mapScale;

        ctx.fillStyle = c.element.classList.contains('child-card') ? 'rgba(124,152,133,0.4)' : 'rgba(124,152,133,0.6)';
        ctx.fillRect(rx, ry, Math.max(rw, 2), Math.max(rh, 2));
      });

      // Draw connections
      ctx.strokeStyle = 'rgba(124,152,133,0.3)';
      ctx.lineWidth = 1;
      connections.forEach(conn => {
        const from = cards.find(c => c.id === conn.fromId);
        const to = cards.find(c => c.id === conn.toId);
        if (!from || !to) return;
        const fw = from.element.classList.contains('child-card') ? 520 : 550;
        ctx.beginPath();
        ctx.moveTo((from.x + fw / 2 - minX) * mapScale, (from.y + (from.element.offsetHeight || 200) - minY) * mapScale);
        const tw = to.element.classList.contains('child-card') ? 520 : 550;
        ctx.lineTo((to.x + tw / 2 - minX) * mapScale, (to.y - minY) * mapScale);
        ctx.stroke();
      });

      // Draw viewport rectangle
      const vx = (-panX / scale - minX) * mapScale;
      const vy = (-panY / scale - minY) * mapScale;
      const vw = (window.innerWidth / scale) * mapScale;
      const vh = (window.innerHeight / scale) * mapScale;
      ctx.strokeStyle = 'rgba(124,152,133,0.8)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(vx, vy, vw, vh);
    }

    // ============ FIT ALL & ZOOM BUTTONS ============
    function fitAllContent() {
      // Gather bounding box from all visible elements: cards, folder elements, sticky notes
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      let hasContent = false;

      cards.forEach(c => {
        const w = c.element.classList.contains('child-card') ? 520 : 550;
        const h = c.element.offsetHeight || 200;
        minX = Math.min(minX, c.x); minY = Math.min(minY, c.y);
        maxX = Math.max(maxX, c.x + w); maxY = Math.max(maxY, c.y + h);
        hasContent = true;
      });

      folderElements.forEach(el => {
        const x = parseFloat(el.style.left) || 0;
        const y = parseFloat(el.style.top) || 0;
        minX = Math.min(minX, x); minY = Math.min(minY, y);
        maxX = Math.max(maxX, x + 180); maxY = Math.max(maxY, y + 140);
        hasContent = true;
      });

      convoElements.forEach(el => {
        const x = parseFloat(el.style.left) || 0;
        const y = parseFloat(el.style.top) || 0;
        const w = el.offsetWidth || 180;
        const h = el.offsetHeight || 140;
        minX = Math.min(minX, x); minY = Math.min(minY, y);
        maxX = Math.max(maxX, x + w); maxY = Math.max(maxY, y + h);
        hasContent = true;
      });

      stickyNotes.forEach(s => {
        const el = s.element || document.querySelector(`[data-sticky-id="${s.id}"]`);
        if (!el) return;
        const x = parseFloat(el.style.left) || 0;
        const y = parseFloat(el.style.top) || 0;
        minX = Math.min(minX, x); minY = Math.min(minY, y);
        maxX = Math.max(maxX, x + 200); maxY = Math.max(maxY, y + 200);
        hasContent = true;
      });

      if (!hasContent) return;

      const padding = 120;
      const worldW = (maxX - minX) + padding * 2;
      const worldH = (maxY - minY) + padding * 2;
      const newScale = Math.min(window.innerWidth / worldW, (window.innerHeight - 60) / worldH, 1.2);
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      const targetPanX = window.innerWidth / 2 - cx * newScale;
      const targetPanY = window.innerHeight / 2 - cy * newScale;

      // Animate smoothly
      const startX = panX, startY = panY, startScale = scale;
      const duration = 400;
      const start = performance.now();
      function anim(t) {
        const p = Math.min((t - start) / duration, 1);
        const e = 1 - Math.pow(1 - p, 3);
        panX = startX + (targetPanX - startX) * e;
        panY = startY + (targetPanY - startY) * e;
        scale = startScale + (newScale - startScale) * e;
        updateTransform();
        if (p < 1) requestAnimationFrame(anim);
      }
      requestAnimationFrame(anim);
    }

      fitAllContent();

    const ZWSP = '\u200B';
    const ZWNJ = '\u200C';
    const ZWJ  = '\u200D';

    function encodeProvenance(text) {
      const signature = 'SFAI' + Date.now().toString(36);
      let encoded = '';
      for (const char of signature) {
        const bits = char.charCodeAt(0).toString(2).padStart(8, '0');
        for (const bit of bits) {
          encoded += bit === '0' ? ZWSP : ZWNJ;
        }
        encoded += ZWJ;
      }
      return encoded;
    }

    function injectSteganography(text) {
      const marker = encodeProvenance(text);
      const firstPeriod = text.indexOf('. ');
      if (firstPeriod > 0 && firstPeriod < 200) {
        return text.slice(0, firstPeriod + 1) + marker + text.slice(firstPeriod + 1);
      }
      return marker + text;
    }

    function getProvenanceTimestamp() {
      return new Date().toLocaleString('en-US', {

        e.clipboardData.setData('text/plain', selectedText + provenance);

            content: text,
            position_x: x,
            position_y: y,
            folder_id: currentFolderId || null
          })
        });
        if (res.ok) {
          const data = await res.json();
          noteId = data.id;
        }
      } catch (e) {}

      renderStickyNote(noteId, x, y, text);
    }

    function renderStickyNote(noteId, x, y, text) {
      const note = document.createElement('div');
      note.className = 'sticky-note';
      note.style.left = x + 'px';
      note.style.top = y + 'px';

      note.innerHTML = `
        <div class="sticky-note-header">
          <button class="sticky-note-delete" title="Delete" aria-label="Delete note">&times;</button>
        </div>
        <textarea placeholder="Write a note...">${text || ''}</textarea>
      `;

      let dragState = null;
      let saveTimeout = null;

      note.addEventListener('mousedown', (e) => {
        if (e.target.closest('textarea') || e.target.closest('button')) return;
        e.preventDefault();
        e.stopPropagation();
        dragState = { startX: e.clientX, startY: e.clientY, origX: parseFloat(note.style.left), origY: parseFloat(note.style.top) };
      });

      const moveHandler = (e) => {
        if (!dragState) return;
        const dx = (e.clientX - dragState.startX) / scale;
        const dy = (e.clientY - dragState.startY) / scale;
        note.style.left = (dragState.origX + dx) + 'px';
        note.style.top = (dragState.origY + dy) + 'px';
      };

      const upHandler = () => {
        if (dragState && noteId) {
          const nx = parseFloat(note.style.left);
          const ny = parseFloat(note.style.top);
          fetch(`${BACKEND_URL}/api/sticky-notes/${noteId}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ position_x: nx, position_y: ny })
          }).catch(() => {});
        }
        dragState = null;
      };

      window.addEventListener('mousemove', moveHandler);
      window.addEventListener('mouseup', upHandler);

      // Auto-save content on typing
      note.querySelector('textarea').addEventListener('input', () => {
        if (!noteId) return;
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
          fetch(`${BACKEND_URL}/api/sticky-notes/${noteId}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: note.querySelector('textarea').value })
          }).catch(() => {});
        }, 1000);
      });

      // Delete
      note.querySelector('.sticky-note-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        note.remove();
        stickyNotes = stickyNotes.filter(n => n.element !== note);
        if (noteId) {
          fetch(`${BACKEND_URL}/api/sticky-notes/${noteId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${authToken}` }
          }).catch(() => {});
        }
      });

      note._cleanup = () => {
        window.removeEventListener('mousemove', moveHandler);
        window.removeEventListener('mouseup', upHandler);
      };

      world.appendChild(note);
      stickyNotes.push({ element: note, id: noteId });

      setTimeout(() => note.querySelector('textarea').focus(), 100);
    }

    function mcRenderMessages(messages) {
      const body = document.getElementById('mcBody');
      if (messages.length === 0) {
        body.innerHTML = `<div class="mc-messages"><div class="mc-empty">
          <div class="mc-empty-text">Start the conversation</div>
          <div class="mc-empty-sub">Ask anything about your notes</div>
        </div></div>`;
        return;
      }

      let html = '<div class="mc-messages">';
      messages.forEach(msg => {
        const role = msg.role || 'user';
        let content = msg.content || '';
        // Basic markdown: bold, italic, code
        content = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        content = content.replace(/\*(.*?)\*/g, '<em>$1</em>');
        content = content.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px;font-size:13px;">$1</code>');
        content = content.replace(/\n/g, '<br>');

        html += `<div class="mc-msg ${role}">${content}`;

        // Sources
        if (role === 'assistant' && msg.sources && msg.sources.length > 0) {
          html += '<div class="mc-sources">Sources: ';
          msg.sources.forEach(s => {
            const name = (s.filename || s.original_filename || 'Note').replace(/\s*\([^)]*\)$/, '').replace(/\.(txt|pdf|docx?)$/i, '');
            const noteId = s.note_id || s.id || '';
            if (noteId) {
              html += `<a href="note-viewer.html?id=${noteId}" class="mc-source-tag">${name}</a>`;
            } else {
              html += `<span class="mc-source-tag">${name}</span>`;
            }
          });
          html += '</div>';
        }

        html += '</div>';
      });
      html += '</div>';
      body.innerHTML = html;
    }

    async function mcSend() {
      if (mcSending) return;
      const input = document.getElementById('mcInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      mcSending = true;
      document.getElementById('mcSendBtn').disabled = true;

      const body = document.getElementById('mcBody');
      let msgsContainer = body.querySelector('.mc-messages');
      if (!msgsContainer) {
        body.innerHTML = '<div class="mc-messages"></div>';
        msgsContainer = body.querySelector('.mc-messages');
      }

      // Remove empty state
      const empty = msgsContainer.querySelector('.mc-empty');
      if (empty) empty.remove();

      // Add user message
      const userBubble = document.createElement('div');
      userBubble.className = 'mc-msg user';
      userBubble.textContent = text;
      msgsContainer.appendChild(userBubble);

      // Add typing indicator
      const typing = document.createElement('div');
      typing.className = 'mc-typing';
      typing.textContent = 'Thinking...';
      msgsContainer.appendChild(typing);
      body.scrollTop = body.scrollHeight;

      try {
        const reqBody = { message: text };
        if (mcConvoId) reqBody.conversation_id = mcConvoId;

        const res = await fetch(`${BACKEND_URL}/api/notes/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
          body: JSON.stringify(reqBody)
        });

        typing.remove();

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.conversation_id) {
          mcConvoId = data.conversation_id;

          // If in folder, move convo into it
          if (mcFolderId) {
            fetch(`${BACKEND_URL}/api/conversations/${data.conversation_id}/move`, {
              method: 'PUT',
              headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ folder_id: mcFolderId })
            }).catch(() => {});
          }

          // Update title in header if this is a new conversation
          if (data.title) {
            document.getElementById('mcTitle').textContent = data.title;
          }
        }

        // Add assistant bubble
        const aiBubble = document.createElement('div');
        aiBubble.className = 'mc-msg assistant';
        let responseText = (data.response || 'Sorry, something went wrong.').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        responseText = responseText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        responseText = responseText.replace(/\*(.*?)\*/g, '<em>$1</em>');
        responseText = responseText.replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:4px;font-size:13px;">$1</code>');
        responseText = responseText.replace(/\n/g, '<br>');
        let bubbleHtml = responseText;

        if (data.sources && data.sources.length > 0) {
          bubbleHtml += '<div class="mc-sources">Sources: ';
          data.sources.forEach(s => {
            const name = (s.filename || s.original_filename || 'Note').replace(/\s*\([^)]*\)$/, '').replace(/\.(txt|pdf|docx?)$/i, '');
            const noteId = s.note_id || s.id || '';
            if (noteId) {
              bubbleHtml += `<a href="note-viewer.html?id=${noteId}" class="mc-source-tag">${name}</a>`;
            } else {
              bubbleHtml += `<span class="mc-source-tag">${name}</span>`;
            }
          });
          bubbleHtml += '</div>';
        }

        aiBubble.innerHTML = bubbleHtml;
        msgsContainer.appendChild(aiBubble);

        body.scrollTop = body.scrollHeight;

        // Invalidate preload so new convo shows in lists
        mcPreloaded = null;

      } catch (err) {
        typing.remove();
        const errBubble = document.createElement('div');
        errBubble.className = 'mc-msg assistant';
        errBubble.textContent = 'Sorry, something went wrong. Please try again.';
        msgsContainer.appendChild(errBubble);
      }

      mcSending = false;
      document.getElementById('mcSendBtn').disabled = false;
      input.focus();
    }

      const body = document.getElementById('mcBody');
      body.innerHTML = `<div class="mc-messages"><div class="mc-empty">
        <div class="mc-empty-text">Start a conversation</div>
        <div class="mc-empty-sub">Ask anything about your notes</div>
      </div></div>`;

      document.getElementById('mcInput').focus();
    }

    async function mcGoBack() {
      if (mcView === 'conversation') {
        // Re-fetch data if it was invalidated
        if (!mcPreloaded) {
          try {
            const res = await fetch(`${BACKEND_URL}/api/canvas/preload`, {
              headers: { 'Authorization': `Bearer ${authToken}` }
            });
            if (res.ok) mcPreloaded = await res.json();
          } catch(e) {}
          mcPreloaded = mcPreloaded || { folders: [], conversations: [], sticky_notes: [] };
        }

        if (mcFolderId) {
          mcOpenFolder(mcFolderId, mcFolderName);
        } else {
          mcShowHome();
        }
      } else if (mcView === 'folder') {
        // Check if this folder has a parent
        const folder = (mcPreloaded?.folders || []).find(f => f.id === mcFolderId);
        if (folder && folder.parent_id) {
          const parent = (mcPreloaded?.folders || []).find(f => f.id === folder.parent_id);
          mcOpenFolder(folder.parent_id, parent?.name || 'Folder');
        } else {
          mcShowHome();
        }
      }
    }

    function mcTimeAgo(dateStr) {
      const now = new Date();
      const d = new Date(dateStr);
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    init();
  </script>
