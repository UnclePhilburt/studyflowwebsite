<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<style>#sf-page-transition{position:fixed;inset:0;background:#f5f4f0;z-index:999999;opacity:1;transition:opacity .15s ease;pointer-events:none;}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Chat with your AI study assistant. Ask questions, get explanations, and study smarter with StudyFlow Suite.">
  <link rel="icon" type="image/png" href="icon128.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c9885">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon192.png">
  <title>Chat - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Theme Variables */
    :root {
      --bg-primary: #f5f4f0;
      --bg-secondary: #ede9e4;
      --bg-tertiary: rgba(255, 255, 255, 0.98);
      --text-primary: #2d2d2d;
      --text-secondary: #5d5d5d;
      --text-muted: #9ca3af;
      --accent-primary: #7c9885;
      --accent-secondary: #6a8573;
      --accent-tertiary: #e89b5f;
      --border-color: rgba(139, 157, 131, 0.2);
      --hover-bg: rgba(124, 152, 133, 0.08);
      --shadow: rgba(0, 0, 0, 0.1);
      --chat-bg: #f8f7f3;
      --chat-bg-end: #f1ede8;
    }

    body[data-theme="dark"] {
      --bg-primary: #1a1a1a; --bg-secondary: #0f0f0f; --bg-tertiary: rgba(40, 40, 40, 0.98);
      --text-primary: #f5f5f5; --text-secondary: #d0d0d0; --text-muted: #a0a0a0;
      --accent-primary: #7c9885; --accent-secondary: #6a8573; --accent-tertiary: #e89b5f;
      --border-color: rgba(124, 152, 133, 0.3); --hover-bg: rgba(124, 152, 133, 0.15);
      --shadow: rgba(0, 0, 0, 0.4); --chat-bg: #1f1f1f; --chat-bg-end: #151515;
    }

    body[data-theme="ocean"] {
      --bg-primary: #F0F8FF; --bg-secondary: #dceef8; --bg-tertiary: rgba(240, 250, 255, 0.98);
      --text-primary: #1e3a5f; --text-secondary: #4a6b8a; --text-muted: #7a9cb8;
      --accent-primary: #4a90a4; --accent-secondary: #3a7a8e; --accent-tertiary: #5fb3c8;
      --border-color: rgba(74, 144, 164, 0.2); --hover-bg: rgba(74, 144, 164, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #e8f6fb; --chat-bg-end: #d8ecf5;
    }

    body[data-theme="sunset"] {
      --bg-primary: #FFF5F0; --bg-secondary: #f5e5d8; --bg-tertiary: rgba(255, 245, 238, 0.98);
      --text-primary: #4a2c2a; --text-secondary: #8a5a4a; --text-muted: #b88a7a;
      --accent-primary: #d17a5f; --accent-secondary: #b86a4f; --accent-tertiary: #e89b7f;
      --border-color: rgba(209, 122, 95, 0.2); --hover-bg: rgba(209, 122, 95, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #fef0e8; --chat-bg-end: #f5e5d8;
    }

    body[data-theme="minimal"] {
      --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --bg-tertiary: rgba(250, 250, 250, 0.98);
      --text-primary: #1a1a1a; --text-secondary: #666666; --text-muted: #999999;
      --accent-primary: #4a4a4a; --accent-secondary: #3a3a3a; --accent-tertiary: #6a6a6a;
      --border-color: rgba(74, 74, 74, 0.2); --hover-bg: rgba(74, 74, 74, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #fafafa; --chat-bg-end: #f5f5f5;
    }

    body[data-theme="forest"] {
      --bg-primary: #F5F9F5; --bg-secondary: #e0f0e0; --bg-tertiary: rgba(245, 250, 245, 0.98);
      --text-primary: #2a3a2a; --text-secondary: #4a6a4a; --text-muted: #7a9a7a;
      --accent-primary: #5a8a5a; --accent-secondary: #4a7a4a; --accent-tertiary: #7aaa7a;
      --border-color: rgba(90, 138, 90, 0.2); --hover-bg: rgba(90, 138, 90, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #eef8ee; --chat-bg-end: #e0f0e0;
    }

    body[data-theme="lavender"] {
      --bg-primary: #F8F5FF; --bg-secondary: #ebe5f5; --bg-tertiary: rgba(250, 245, 255, 0.98);
      --text-primary: #3a2a4a; --text-secondary: #6a5a8a; --text-muted: #9a8ab8;
      --accent-primary: #8a7aa4; --accent-secondary: #7a6a94; --accent-tertiary: #aa9ac8;
      --border-color: rgba(138, 122, 164, 0.2); --hover-bg: rgba(138, 122, 164, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #f3f0fb; --chat-bg-end: #ebe5f5;
    }

    body[data-theme="coffee"] {
      --bg-primary: #F5F0EB; --bg-secondary: #e8ddd2; --bg-tertiary: rgba(245, 240, 235, 0.98);
      --text-primary: #3a2d24; --text-secondary: #6b5a4e; --text-muted: #9a8878;
      --accent-primary: #8B6F4E; --accent-secondary: #7a5f3e; --accent-tertiary: #c49a6c;
      --border-color: rgba(139, 111, 78, 0.2); --hover-bg: rgba(139, 111, 78, 0.08);
      --shadow: rgba(0, 0, 0, 0.06); --chat-bg: #F5F0EB; --chat-bg-end: #e8ddd2;
    }

    body[data-theme="rose"] {
      --bg-primary: #FFF5F5; --bg-secondary: #f5e0e0; --bg-tertiary: rgba(255, 248, 248, 0.98);
      --text-primary: #4a2a2a; --text-secondary: #8a5a5a; --text-muted: #b88a8a;
      --accent-primary: #c47a7a; --accent-secondary: #b06a6a; --accent-tertiary: #e0a0a0;
      --border-color: rgba(196, 122, 122, 0.2); --hover-bg: rgba(196, 122, 122, 0.08);
      --shadow: rgba(0, 0, 0, 0.06); --chat-bg: #FFF5F5; --chat-bg-end: #f5e0e0;
    }

    body[data-theme="midnight"] {
      --bg-primary: #0f1628; --bg-secondary: #1a2340; --bg-tertiary: rgba(25, 35, 60, 0.98);
      --text-primary: #e8ecf4; --text-secondary: #a0b0cc; --text-muted: #6a7a9a;
      --accent-primary: #5b8af5; --accent-secondary: #4a7ae5; --accent-tertiary: #7aa4ff;
      --border-color: rgba(91, 138, 245, 0.2); --hover-bg: rgba(91, 138, 245, 0.1);
      --shadow: rgba(0, 0, 0, 0.4); --chat-bg: #0f1628; --chat-bg-end: #1a2340;
    }

    body[data-theme="ember"] {
      --bg-primary: #1a1614; --bg-secondary: #2a2220; --bg-tertiary: rgba(40, 34, 30, 0.98);
      --text-primary: #f0e8e0; --text-secondary: #c0a898; --text-muted: #8a7a6a;
      --accent-primary: #e8734a; --accent-secondary: #d0633a; --accent-tertiary: #f09060;
      --border-color: rgba(232, 115, 74, 0.25); --hover-bg: rgba(232, 115, 74, 0.1);
      --shadow: rgba(0, 0, 0, 0.4); --chat-bg: #1a1614; --chat-bg-end: #2a2220;
    }

    body[data-theme="neon"] {
      --bg-primary: #0a0a14; --bg-secondary: #12121e; --bg-tertiary: rgba(18, 18, 30, 0.98);
      --text-primary: #e0e8f0; --text-secondary: #a0a8c0; --text-muted: #6a708a;
      --accent-primary: #00d4aa; --accent-secondary: #00c09a; --accent-tertiary: #ff6090;
      --border-color: rgba(0, 212, 170, 0.2); --hover-bg: rgba(0, 212, 170, 0.08);
      --shadow: rgba(0, 0, 0, 0.5); --chat-bg: #0a0a14; --chat-bg-end: #12121e;
    }

    body[data-theme="sand"] {
      --bg-primary: #F8F2EA; --bg-secondary: #ede4d8; --bg-tertiary: rgba(248, 242, 234, 0.98);
      --text-primary: #4a3828; --text-secondary: #7a6248; --text-muted: #a89078;
      --accent-primary: #c4784a; --accent-secondary: #b0683a; --accent-tertiary: #d8986a;
      --border-color: rgba(196, 120, 74, 0.2); --hover-bg: rgba(196, 120, 74, 0.08);
      --shadow: rgba(0, 0, 0, 0.06); --chat-bg: #F8F2EA; --chat-bg-end: #ede4d8;
    }

    body[data-theme="arctic"] {
      --bg-primary: #F0F6FA; --bg-secondary: #dce8f0; --bg-tertiary: rgba(240, 246, 250, 0.98);
      --text-primary: #1e2e3e; --text-secondary: #4a6478; --text-muted: #7a98b0;
      --accent-primary: #5a9ab8; --accent-secondary: #4a8aa8; --accent-tertiary: #7abcd8;
      --border-color: rgba(90, 154, 184, 0.2); --hover-bg: rgba(90, 154, 184, 0.08);
      --shadow: rgba(0, 0, 0, 0.05); --chat-bg: #F0F6FA; --chat-bg-end: #dce8f0;
    }

    body[data-theme="slate"] {
      --bg-primary: #F2F4F6; --bg-secondary: #e2e6ea; --bg-tertiary: rgba(242, 244, 246, 0.98);
      --text-primary: #1e2430; --text-secondary: #4a5468; --text-muted: #7a8498;
      --accent-primary: #5a6a8a; --accent-secondary: #4a5a7a; --accent-tertiary: #7a8aaa;
      --border-color: rgba(90, 106, 138, 0.2); --hover-bg: rgba(90, 106, 138, 0.08);
      --shadow: rgba(0, 0, 0, 0.06); --chat-bg: #F2F4F6; --chat-bg-end: #e2e6ea;
    }

    body[data-theme="matcha"] {
      --bg-primary: #F4F8F2; --bg-secondary: #e2eddc; --bg-tertiary: rgba(244, 248, 242, 0.98);
      --text-primary: #2a3424; --text-secondary: #5a6a4a; --text-muted: #8a9a78;
      --accent-primary: #7aa45a; --accent-secondary: #6a944a; --accent-tertiary: #9ac47a;
      --border-color: rgba(122, 164, 90, 0.2); --hover-bg: rgba(122, 164, 90, 0.08);
      --shadow: rgba(0, 0, 0, 0.05); --chat-bg: #F4F8F2; --chat-bg-end: #e2eddc;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--chat-bg);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    /* ============ MOBILE CHAT ============ */
    .mobile-chat { display: none; }

    @media (max-width: 768px) {
      .mobile-chat {
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
        background: var(--chat-bg);
        position: fixed;
        inset: 0;
        z-index: 9000;
      }

      /* Hide desktop canvas stuff */
      #canvasViewport, .breadcrumb, .canvas-controls, .minimap,
      .top-btn, #navDrawer, .nav-overlay, .notif-dropdown,
      #contextMenu, #folderContextMenu { display: none !important; }

      .mc-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: var(--bg-tertiary);
        border-bottom: 1px solid var(--border-color);
        min-height: 56px;
        flex-shrink: 0;
      }

      .mc-back {
        width: 36px; height: 36px;
        border-radius: 10px;
        border: none;
        background: var(--hover-bg);
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }

      .mc-header-title {
        font-size: 16px;
        font-weight: 600;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mc-header-action {
        width: 36px; height: 36px;
        border-radius: 10px;
        border: none;
        background: var(--hover-bg);
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }

      .mc-body {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 12px 16px;
      }

      /* Folder list view */
      .mc-folder-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        margin-bottom: 8px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .mc-folder-item:active { transform: scale(0.98); }

      .mc-folder-icon {
        width: 40px; height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .mc-folder-icon svg {
        width: 20px; height: 20px;
        fill: #fff;
        stroke: none;
      }

      .mc-folder-info { flex: 1; min-width: 0; }

      .mc-folder-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mc-folder-count {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .mc-chevron {
        color: var(--text-muted);
        flex-shrink: 0;
      }

      /* Conversation list item */
      .mc-convo-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        margin-bottom: 8px;
        cursor: pointer;
      }

      .mc-convo-item:active { transform: scale(0.98); }

      .mc-convo-icon {
        width: 36px; height: 36px;
        border-radius: 10px;
        background: var(--hover-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .mc-convo-icon svg {
        width: 16px; height: 16px;
        stroke: var(--accent-primary);
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .mc-convo-info { flex: 1; min-width: 0; }

      .mc-convo-title {
        font-size: 14px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mc-convo-time {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* Message view */
      .mc-messages {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding-bottom: 8px;
      }

      .mc-msg {
        max-width: 85%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 14px;
        line-height: 1.55;
        word-break: break-word;
      }

      .mc-msg.user {
        align-self: flex-end;
        background: var(--accent-primary);
        color: #fff;
        border-bottom-right-radius: 6px;
      }

      .mc-msg.assistant {
        align-self: flex-start;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-bottom-left-radius: 6px;
        color: var(--text-primary);
      }

      .mc-msg.assistant .mc-sources {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border-color);
        font-size: 11px;
        color: var(--text-muted);
      }

      .mc-msg.assistant .mc-source-tag {
        display: inline-block;
        background: var(--hover-bg);
        border-radius: 6px;
        padding: 4px 10px;
        margin: 2px 4px 2px 0;
        font-size: 11px;
        color: var(--accent-primary);
        text-decoration: none;
        cursor: pointer;
      }

      .mc-msg.assistant a.mc-source-tag:active {
        transform: scale(0.95);
        opacity: 0.8;
      }

      .mc-typing {
        align-self: flex-start;
        padding: 12px 20px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 18px;
        border-bottom-left-radius: 6px;
        font-size: 13px;
        color: var(--text-muted);
        animation: mcPulse 1.5s ease-in-out infinite;
      }

      @keyframes mcPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      /* Input bar */
      .mc-input-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: var(--bg-tertiary);
        border-top: 1px solid var(--border-color);
        flex-shrink: 0;
      }

      .mc-input-bar input {
        flex: 1;
        padding: 12px 16px;
        border-radius: 24px;
        border: 1px solid var(--border-color);
        background: var(--chat-bg);
        color: var(--text-primary);
        font-size: 14px;
        font-family: inherit;
        outline: none;
      }

      .mc-input-bar input:focus {
        border-color: var(--accent-primary);
      }

      .mc-input-bar input::placeholder {
        color: var(--text-muted);
      }

      .mc-send-btn {
        width: 44px; height: 44px;
        border-radius: 50%;
        border: none;
        background: var(--accent-primary);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex-shrink: 0;
      }

      .mc-send-btn:active { transform: scale(0.92); }

      .mc-send-btn:disabled {
        opacity: 0.4;
      }

      .mc-empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
      }

      .mc-empty-icon {
        width: 48px; height: 48px;
        margin: 0 auto 12px;
        opacity: 0.3;
      }

      .mc-empty-text {
        font-size: 14px;
        margin-bottom: 4px;
      }

      .mc-empty-sub {
        font-size: 12px;
      }

      .mc-section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-muted);
        padding: 8px 4px 6px;
      }

      .mc-new-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 14px;
        background: var(--hover-bg);
        border: 1px dashed var(--border-color);
        border-radius: 14px;
        color: var(--accent-primary);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        margin-bottom: 12px;
        font-family: inherit;
      }

      .mc-new-btn:active { transform: scale(0.98); }
    }

    /* ============ CANVAS ============ */
    #canvasViewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      /* Prevent default browser zoom on mobile */
      touch-action: none;
      /* Dot grid background */
      background-image: radial-gradient(circle, var(--border-color) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    #canvasViewport.grabbing { cursor: grabbing; user-select: none; -webkit-user-select: none; }
    #canvasViewport.dragging-card { user-select: none; -webkit-user-select: none; }

    #canvasWorld {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }

    /* SVG connection lines */
    #connectionsSvg {
      position: absolute;
      top: -10000px;
      left: -10000px;
      width: 20000px;
      height: 20000px;
      pointer-events: none;
    }

    /* ============ CARDS ============ */
    .canvas-card {
      position: absolute;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 4px 24px var(--shadow);
      width: 550px;
      overflow: hidden;
      cursor: grab;
      transition: box-shadow 0.2s, max-height 0.3s ease;
      z-index: 1;
    }

    .canvas-card:hover { box-shadow: 0 8px 32px var(--shadow); }
    .canvas-card.dragging { cursor: grabbing; box-shadow: 0 12px 40px var(--shadow); z-index: 100; }
    .canvas-card.drag-mode {
      box-shadow: 0 12px 40px var(--shadow), 0 0 0 3px var(--accent-primary);
      z-index: 100;
      opacity: 0.95;
      animation: dragModePulse 1.5s ease-in-out infinite;
      -webkit-user-select: none;
      user-select: none;
    }
    .canvas-card.no-select {
      -webkit-user-select: none;
      user-select: none;
    }
    @keyframes dragModePulse {
      0%, 100% { box-shadow: 0 12px 40px var(--shadow), 0 0 0 3px var(--accent-primary); }
      50% { box-shadow: 0 12px 40px var(--shadow), 0 0 0 3px rgba(99, 102, 241, 0.5); }
    }
    .canvas-card.expanding { animation: cardExpand 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .canvas-card.child-card { width: 520px; border-left: 3px solid var(--accent-primary); }
    .canvas-card.collapsed .card-response { display: none; }
    .canvas-card.collapsed { max-height: 52px; }

    @keyframes cardExpand {
      from { opacity: 0; transform: scale(0.85) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Collapse toggle button */
    .card-collapse-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px; height: 24px;
      border-radius: 6px;
      border: none;
      background: rgba(255,255,255,0.3);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 5;
      pointer-events: none;
    }

    .canvas-card:hover .card-collapse-btn { opacity: 1; pointer-events: auto; }

    .card-question {
      padding: 12px 16px;
      padding-right: 36px;
      background: var(--accent-primary);
      color: white;
      font-size: 13px;
      font-weight: 500;
      border-radius: 16px 16px 0 0;
      line-height: 1.5;
      cursor: grab;
    }

    .card-question:active { cursor: grabbing; }
    .card-question { user-select: none; -webkit-user-select: none; }

    .card-response {
      padding: 16px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-primary);
      overflow-y: auto;
      max-height: 380px;
    }

    .card-response h1, .card-response h2, .card-response h3 { margin: 12px 0 6px; font-size: 15px; }
    .card-response p { margin-bottom: 8px; }
    .card-response ul, .card-response ol { margin: 8px 0 8px 20px; }
    .card-response li { margin-bottom: 4px; }
    .card-response code { background: var(--hover-bg); padding: 1px 4px; border-radius: 4px; font-size: 12px; }
    .card-response pre { background: var(--hover-bg); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
    .card-response pre code { background: none; padding: 0; }
    .card-response mark { background: rgba(232, 155, 95, 0.2); padding: 0 2px; border-radius: 2px; }

    .card-loading {
      padding: 24px 16px;
      text-align: center;
    }

    .card-loading .typing-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-primary);
      margin: 0 3px;
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .card-loading .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .card-loading .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* Source cards inside response */
    .source-card {
      margin-top: 8px;
      padding: 10px;
      background: var(--hover-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }

    .source-card a { color: var(--accent-primary); text-decoration: none; font-weight: 600; font-size: 12px; }
    .source-card a:hover { text-decoration: underline; }

    /* ============ FOLLOW-UP BUBBLES ============ */
    .followup-bubble {
      position: absolute;
      background: var(--bg-tertiary);
      border: 1.5px solid var(--accent-primary);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-primary);
      cursor: pointer;
      white-space: nowrap;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.2s;
      z-index: 2;
      box-shadow: 0 2px 12px var(--shadow), 0 0 0 0 rgba(124, 152, 133, 0);
      animation: bubbleAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, bubblePulse 3s ease-in-out 1s infinite;
      opacity: 0;
    }

    @keyframes bubbleAppear {
      from { opacity: 0; transform: scale(0.5) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes bubblePulse {
      0%, 100% { box-shadow: 0 2px 12px var(--shadow), 0 0 0 0 rgba(124, 152, 133, 0); }
      50% { box-shadow: 0 2px 12px var(--shadow), 0 0 0 4px rgba(124, 152, 133, 0.1); }
    }

    .followup-bubble:hover {
      background: var(--accent-primary);
      color: white;
      transform: scale(1.08);
      animation: none;
      opacity: 1;
    }

    /* ============ EMPTY STATE HINT ============ */
    .empty-hint {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      pointer-events: none;
      animation: emptyHintFade 0.6s ease forwards;
    }

    @keyframes emptyHintFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .empty-hint-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: var(--hover-bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-hint-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.5;
    }

    .empty-hint-text {
      font-family: 'Lora', serif;
      font-size: 16px;
      font-weight: 400;
    }

    .empty-hint-sub {
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .empty-hint-key {
      display: inline-block;
      padding: 2px 8px;
      background: var(--hover-bg);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
    }

    /* ============ CLUSTER TITLE ============ */
    .cluster-title {
      position: absolute;
      font-family: 'Lora', serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      z-index: 1;
      user-select: none;
      pointer-events: none;
    }

    /* ============ SELECTION BOX ============ */
    .selection-box {
      position: fixed;
      border: 1.5px solid var(--accent-primary);
      background: rgba(124, 152, 133, 0.08);
      border-radius: 4px;
      pointer-events: none;
      z-index: 400;
      display: none;
    }

    .folder-card.selected, .convo-preview.selected, .canvas-card.selected {
      outline: 2px solid var(--accent-primary);
      outline-offset: 2px;
    }

    /* Selection toolbar */
    .selection-toolbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 8px 12px;
      display: none;
      align-items: center;
      gap: 8px;
      z-index: 300;
      box-shadow: 0 8px 32px var(--shadow);
    }

    .selection-toolbar.visible { display: flex; }

    .selection-toolbar .sel-count {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      padding: 0 8px;
    }

    .selection-toolbar button {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .selection-toolbar button:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

    .selection-toolbar button.danger { color: #dc2626; border-color: #dc262644; }
    .selection-toolbar button.danger:hover { background: #dc2626; color: white; border-color: #dc2626; }

    /* ============ INPUT BUBBLE ============ */
    .followup-input-bubble {
      position: absolute;
      background: var(--bg-tertiary);
      border: 1.5px solid var(--border-color);
      border-radius: 14px;
      padding: 0;
      z-index: 2;
      box-shadow: 0 2px 12px var(--shadow);
      display: flex;
      align-items: center;
      overflow: hidden;
      animation: bubbleAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    .followup-input-bubble input {
      border: none;
      outline: none;
      background: none;
      padding: 8px 12px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text-primary);
      width: 180px;
    }

    .followup-input-bubble input::placeholder { color: var(--text-muted); }

    .followup-input-bubble button {
      border: none;
      background: var(--accent-primary);
      color: white;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .followup-input-bubble button:hover { background: var(--accent-secondary); }

    .followup-input-bubble:focus-within {
      border-color: var(--accent-primary);
    }

    /* ============ BRANCH BUTTON ============ */
    .branch-btn {
      position: absolute;
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--accent-primary);
      background: var(--bg-tertiary);
      color: var(--accent-primary);
      font-size: 16px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 2px 8px var(--shadow);
      transform: scale(0.8);
    }

    .branch-btn {
      opacity: 0.4;
      transform: scale(1);
    }

    .branch-btn:hover {
      opacity: 1;
      background: var(--accent-primary);
      color: white;
      transform: scale(1.2);
    }

    /* ============ CONTEXT MENU ============ */
    .ctx-menu {
      position: fixed;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 8px 32px var(--shadow);
      padding: 6px;
      z-index: 500;
      min-width: 180px;
      display: none;
      animation: ctxAppear 0.15s ease;
    }

    .ctx-menu.active { display: block; }

    @keyframes ctxAppear {
      from { opacity: 0; transform: scale(0.95) translateY(-4px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .ctx-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.1s;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      text-align: left;
    }

    .ctx-item:hover { background: var(--hover-bg); }

    .ctx-item svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .ctx-divider {
      height: 1px;
      background: var(--border-color);
      margin: 4px 8px;
    }

    /* ============ STICKY NOTE ============ */
    .sticky-note {
      position: absolute;
      width: 200px;
      min-height: 200px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 2px 12px var(--shadow);
      z-index: 1;
      cursor: grab;
      display: flex;
      flex-direction: column;
      animation: cardExpand 0.3s ease forwards;
    }

    .sticky-note-header {
      display: flex;
      justify-content: flex-end;
      padding: 4px 6px 0;
    }

    .sticky-note-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.15s;
      padding: 2px 4px;
    }

    .sticky-note:hover .sticky-note-delete { opacity: 0.6; }
    .sticky-note-delete:hover { opacity: 1 !important; }

    .sticky-note textarea {
      flex: 1;
      border: none;
      background: none;
      resize: none;
      padding: 6px 10px 10px;
      font-size: 12px;
      font-family: inherit;
      line-height: 1.5;
      color: var(--text-primary);
      outline: none;
    }

    .sticky-note textarea::placeholder { color: var(--text-muted); }

    /* ============ WELCOME SCREEN ============ */
    #welcomeScreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      pointer-events: none;
    }

    #welcomeScreen.hidden { display: none; }

    #welcomeScreen h1 {
      font-family: 'Lora', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 8px;
      opacity: 0.8;
    }

    #welcomeScreen p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* ============ INPUT BAR ============ */
    .input-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      z-index: 200;
      display: flex;
      gap: 8px;
    }

    .input-bar textarea {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg-tertiary);
      backdrop-filter: blur(20px);
      color: var(--text-primary);
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      box-shadow: 0 4px 24px var(--shadow);
      transition: border-color 0.2s;
    }

    .input-bar textarea:focus { border-color: var(--accent-primary); }
    .input-bar textarea::placeholder { color: var(--text-muted); }

    .input-bar button {
      width: 48px; height: 48px;
      border-radius: 14px;
      border: none;
      background: var(--accent-primary);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 4px 16px var(--shadow);
    }

    .input-bar button:hover { background: var(--accent-secondary); transform: translateY(-1px); }
    .input-bar button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ============ SIDEBAR ============ */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      background: var(--bg-tertiary);
      border-right: 1px solid var(--border-color);
      z-index: 300;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .sidebar.active { transform: translateX(0); }

    .sidebar-header {
      padding: 20px;
      font-family: 'Lora', serif;
      font-size: 18px;
      font-weight: 500;
      border-bottom: 1px solid var(--border-color);
    }

    .new-chat-btn {
      margin: 12px 16px;
      padding: 10px;
      border: 1.5px solid var(--border-color);
      border-radius: 10px;
      background: none;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .new-chat-btn:hover { border-color: var(--accent-primary); background: var(--hover-bg); }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .conversation-item:hover { background: var(--hover-bg); }
    .conversation-item.active { background: var(--hover-bg); color: var(--text-primary); font-weight: 500; }

    .conversation-item .title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-item .delete-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
    }

    .conversation-item:hover .delete-btn { display: block; }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border-color);
    }

    .sidebar-footer .user-email {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-footer .logout-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .sidebar-footer .logout-btn:hover { color: #dc2626; }

    /* ============ TOP BUTTONS ============ */
    .top-btn {
      position: fixed;
      z-index: 200;
      width: 40px; height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      backdrop-filter: blur(10px);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .top-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

    #homeBtn { top: 16px; left: 68px; }
    #navBtn { top: 16px; left: 116px; }
    #notifBtn { top: 20px; right: 20px; z-index: 250; }

    /* Notification badge */
    .notif-badge {
      position: absolute;
      top: -4px; right: -4px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #dc2626;
      display: none;
    }

    .notif-badge.visible { display: block; }

    /* ============ NOTIFICATION DROPDOWN ============ */
    .notif-dropdown {
      position: fixed;
      top: 70px; right: 20px;
      width: 320px;
      max-height: 400px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      box-shadow: 0 8px 32px var(--shadow);
      z-index: 400;
      display: none;
      overflow: hidden;
    }

    .notif-dropdown.active { display: block; }

    .notif-dropdown-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .notif-dropdown-header h3 { font-size: 14px; font-weight: 600; }

    .notif-mark-all {
      background: none; border: none;
      color: var(--accent-primary);
      font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }

    .notif-list {
      overflow-y: auto;
      max-height: 340px;
    }

    .notif-item {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      transition: background 0.15s;
    }

    .notif-item:hover { background: var(--hover-bg); }
    .notif-item.unread { background: var(--hover-bg); font-weight: 500; }
    .notif-empty { padding: 24px; text-align: center; color: var(--text-muted); font-size: 13px; }

    /* ============ NAV DRAWER ============ */
    .nav-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      z-index: 350;
      display: none;
    }

    .nav-overlay.active { display: block; }

    .nav-drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 260px;
      background: var(--bg-tertiary);
      border-right: 1px solid var(--border-color);
      z-index: 360;
      transform: translateX(-100%);
      transition: transform 0.3s;
      padding: 24px;
    }

    .nav-drawer.active { transform: translateX(0); }

    .nav-drawer-title {
      font-family: 'Lora', serif;
      font-size: 18px;
      margin-bottom: 24px;
    }

    .nav-drawer a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      transition: all 0.15s;
    }

    .nav-drawer a:hover { background: var(--hover-bg); color: var(--text-primary); }
    .nav-drawer a.active { background: var(--hover-bg); color: var(--accent-primary); }
    .nav-drawer svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ============ CANVAS CONTROLS ============ */
    .canvas-controls {
      position: fixed;
      bottom: 88px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 200;
    }

    .canvas-ctrl-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.15s;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .canvas-ctrl-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

    .zoom-indicator {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      user-select: none;
      padding: 2px 0;
    }

    /* ============ MINIMAP ============ */
    .minimap {
      position: fixed;
      top: 80px;
      right: 20px;
      width: 180px;
      height: 120px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 4px 16px var(--shadow);
      opacity: 0.85;
      transition: all 0.2s;
      cursor: pointer;
    }

    .minimap:hover {
      opacity: 1;
      transform: scale(1.02);
      box-shadow: 0 6px 20px var(--shadow);
    }

    .minimap canvas {
      width: 100%;
      height: 100%;
    }

    /* ============ BREADCRUMB ============ */
    .breadcrumb {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 8px 16px;
      z-index: 200;
      font-size: 13px;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .breadcrumb-item {
      color: var(--text-muted);

      border: none;
      font-family: inherit;
      font-size: inherit;

      background: var(--accent-primary);
      color: white;
      padding: 6px 14px;
      border-radius: 8px;
      transform: scale(1.15);
      transition: all 0.15s;
    }

    .breadcrumb-sep {
      color: var(--text-muted);
      font-size: 11px;
    }

    /* ============ FOLDER CARDS (HOME LEVEL) ============ */
    .folder-card {
      position: absolute;
      width: 180px;
      height: 140px;
      background: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 4px 20px var(--shadow);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      z-index: 1;
      animation: cardExpand 0.3s ease forwards;
    }

    .folder-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 32px var(--shadow);
      border-color: var(--accent-primary);
    }

    .folder-card-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .folder-card-icon svg {
      width: 28px;
      height: 28px;
      stroke: white;
      fill: none;
      stroke-width: 2;
    }

    .folder-card-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      padding: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;

    .folder-card-count {
      font-size: 10px;
      color: var(--text-muted);

      transform: translateY(-3px);
      box-shadow: 0 8px 28px var(--shadow);
      border-color: var(--accent-primary);

      .nav-drawer {

      .card-title {
        font-size: 15px;

      }

        padding: 12px 16px;
        font-size: 14px;

        width: 160px;

        width: 44px;
        height: 44px;

        width: 26px;
        height: 26px;
      }

        width: 240px;
      }

    .nav-back {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 12px;

      }

      /* Follow-up bubbles */
      .followup-bubble {
        max-width: 140px;
        font-size: 11px;
        padding: 6px 12px;
      }
    }
  </style>
</head>

    function clearLevelElements() {

      folderElements = [];
      convoElements.forEach(el => { if (el._cleanup) el._cleanup(); el.remove(); });
      convoElements = [];

    async function navigateHome(forceRefresh = false) {
      clearCanvas();
      clearLevelElements();
      currentLevel = 'home';
      currentFolderId = null;
      conversationId = null;
      updateBreadcrumb();

      panX = window.innerWidth / 2;
      panY = window.innerHeight / 2 - 50;
      scale = 1;
      updateTransform();

      // Preload or refresh data
      if (!_preloadedData || forceRefresh) {
        invalidatePreload();
        await preloadCanvas();
      }

      folders = getPreloadedFolders().filter(f => !f.parent_id);

      // Render folder cards
      folders.forEach((f, i) => {
        const fx = f.position_x || (Math.random() - 0.5) * 500;
        const fy = f.position_y || (Math.random() - 0.5) * 300;
        const el = createDraggableFolderCard(f, fx, fy, (clickedEl) => navigateToFolder(f.id, f.name, clickedEl));
        folderElements.push(el);
      });

      // Load unfiled conversations as card clusters directly on home canvas
      const unfiledConvos = getPreloadedConversations(null);
      if (unfiledConvos.length > 0) {

        let clusterX = 500; // Start to the right of folders
        unfiledConvos.forEach((conv, ci) => {
          const messages = conv.messages || [];
          const savedLayout = conv.canvas_layout;
          // Use saved cluster position, or auto-space if not saved
          const clusterOffsetX = (savedLayout && savedLayout.cluster_x !== undefined) ? savedLayout.cluster_x : clusterX;
          const clusterOffsetY = (savedLayout && savedLayout.cluster_y !== undefined) ? savedLayout.cluster_y : 0;

          console.log(`[LOAD HOME] Conversation ${conv.id} (${conv.title}): cluster_x=${savedLayout?.cluster_x}, cluster_y=${savedLayout?.cluster_y}, using saved=${savedLayout && savedLayout.cluster_x !== undefined}`);

          // Title label
          const titleLabel = document.createElement('div');
          titleLabel.className = 'cluster-title';
          titleLabel.textContent = conv.title || 'New Chat';
          titleLabel.style.left = clusterOffsetX + 'px';
          titleLabel.style.top = (clusterOffsetY - 40) + 'px';
          world.appendChild(titleLabel);
          folderElements.push(titleLabel);

          const savedPositions = {};
          if (savedLayout && savedLayout.cards) {
            savedLayout.cards.forEach(sc => { savedPositions[sc.question] = sc; });
          }

          let lastCardId = null;
          let pendingQuestion = null;
          let fallbackY = clusterOffsetY;
          let firstCard = null;
          let maxX = clusterOffsetX;
          const usingSavedCluster = (savedLayout && savedLayout.cluster_x !== undefined);

          for (const msg of messages) {
            if (msg.role === 'user') {
              pendingQuestion = msg.content;
            } else if (msg.role === 'assistant' && pendingQuestion) {
              const saved = savedPositions[pendingQuestion];
              let cx, cy, parentId;
              if (saved) {
                cx = saved.x + clusterOffsetX;
                cy = saved.y + clusterOffsetY;
                parentId = saved.parentId !== null && saved.parentId !== undefined
                  ? (saved.parentId < cards.length ? saved.parentId : lastCardId) : lastCardId;
              } else {
                cx = clusterOffsetX;
                cy = fallbackY;
                parentId = lastCardId;
              }

              const card = createCard(pendingQuestion, cx, cy, parentId);
              card._conversationId = conv.id;
              populateCard(card, msg.content, msg.sources, []);

              if (saved && saved.collapsed) {
                card.element.classList.add('collapsed');
                const btn = card.element.querySelector('.card-collapse-btn');
                if (btn) btn.textContent = '+';
              }

              if (!firstCard) firstCard = card;

              if (!saved) fallbackY += (card.element.offsetHeight || 200) + 100;
              maxX = Math.max(maxX, cx + 600);
              lastCardId = card.id;
              pendingQuestion = null;
            }
          }

          // Link title to first card
          if (firstCard) {
            firstCard._titleLabel = titleLabel;
            titleLabel.style.left = firstCard.x + 'px';
            titleLabel.style.top = (firstCard.y - 36) + 'px';
          }

          // Follow-up bubbles on leaf cards
          const clusterCards = cards.filter(c => c._conversationId === conv.id);
          const parentIds = new Set(clusterCards.map(c => c.parentId).filter(id => id !== null));
          clusterCards.forEach(c => {
            if (!parentIds.has(c.id) && c.response) {
              createFollowupBubbles(c, ['Tell me more', 'What else?']);
            }
          });

          // Only update clusterX for auto-spacing if this conversation didn't have a saved cluster position
          if (!usingSavedCluster) {
            clusterX = maxX + 200;
          }
        });
      }

      // Load sticky notes for home level (from preloaded data)
      getPreloadedStickies(null).forEach(n => {
        renderStickyNote(n.id, n.position_x || 0, n.position_y || 0, n.content || '');
      });

      // Show empty state hint if nothing on canvas
      if (folders.length === 0 && unfiledConvos.length === 0 && stickyNotes.length === 0) {
        showEmptyHint('Your workspace is empty', 'Right-click anywhere to create a folder or start a chat');
      }

      // Fit camera to show all content
      setTimeout(() => fitAllContent(), 50);
    }

    function createDraggableFolderCard(folder, x, y, onClick) {
      const el = document.createElement('div');
      el.className = 'folder-card';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      if (folder._dashed) { el.style.borderStyle = 'dashed'; el.style.opacity = '0.6'; }

      const defaultIcon = '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>';
      const icon = folder._icon || folder.icon || defaultIcon;
      const countHtml = folder._count !== undefined ? `<div class="folder-card-count">${folder._count} conversation${folder._count !== 1 ? 's' : ''}</div>` : '';

      el.innerHTML = `
        <div class="folder-card-icon" style="background:linear-gradient(135deg,${folder.color},${folder.color}dd);">
          <svg viewBox="0 0 24 24">${icon}</svg>
        </div>
        <div class="folder-card-name">${folder.name}</div>
        ${countHtml}
      `;

      // Right-click context menu on folder
      if (folder.id) {
        el.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          e.stopPropagation();
          _ctxFolderId = folder.id;
          const colors = ['#7c9885','#4a90a4','#d17a5f','#8a7aa4','#5a8a5a','#e89b5f','#dc2626','#6366f1','#2d2d2d'];

          const colorDots = colors.map(c => `<div data-color="${c}" style="width:22px;height:22px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c === folder.color ? 'var(--text-primary)' : 'transparent'};transition:all 0.15s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'"></div>`).join('');

          const iconBtns = FOLDER_ICONS.map((ic, idx) => `<div data-icon-idx="${idx}" title="${ic.name}" style="width:28px;height:28px;border-radius:6px;background:var(--hover-bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;"><svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text-secondary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;">${ic.svg}</svg></div>`).join('');

          ctxMenu.innerHTML = `
            <button class="ctx-item" onclick="renameFolder('${folder.id}')">
              <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Rename
            </button>
            <div class="ctx-divider"></div>
            <div style="padding:6px 12px;">
              <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:6px;">Color</div>
              <div style="display:flex;gap:6px;flex-wrap:wrap;">${colorDots}</div>
            </div>
            <div style="padding:6px 12px;">
              <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:6px;">Icon</div>
              <div style="display:flex;gap:4px;flex-wrap:wrap;">${iconBtns}</div>
            </div>
            <div class="ctx-divider"></div>
            <button class="ctx-item" onclick="deleteFolder('${folder.id}', '${folder.name.replace(/'/g, "\\'")}')">
              <svg viewBox="0 0 24 24" style="stroke:#dc2626;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              <span style="color:#dc2626;">Delete</span>
            </button>
          `;
          ctxMenu.style.left = e.clientX + 'px';
          ctxMenu.style.top = e.clientY + 'px';
          ctxMenu.classList.add('active');
        });
      }

      // Drag + click detection
      let dragState = null;
      let didDrag = false;

      el.addEventListener('mousedown', (e) => {
        if (e.button === 2) return; // Ignore right-click
        e.preventDefault();
        e.stopPropagation();
        dragState = { startX: e.clientX, startY: e.clientY, origX: x, origY: y };
        didDrag = false;
      });

      const moveHandler = (e) => {
        if (!dragState) return;
        const dx = (e.clientX - dragState.startX) / scale;
        const dy = (e.clientY - dragState.startY) / scale;
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didDrag = true;
        if (didDrag) {
          x = dragState.origX + dx;
          y = dragState.origY + dy;
          el.style.left = x + 'px';
          el.style.top = y + 'px';
          if (folder.id) checkBreadcrumbHover(e.clientX, e.clientY);
        }
      };

      const upHandler = (e) => {
        if (dragState && didDrag && folder.id) {
          // Check if dropped on breadcrumb
          const bcTarget = checkBreadcrumbHover(e.clientX, e.clientY);
          clearBreadcrumbHover();
          if (bcTarget) {
            dropOnBreadcrumb(bcTarget, { type: 'folder', id: folder.id });
            dragState = null;
            return;
          }
          // Otherwise just save position
          fetch(`${BACKEND_URL}/api/chat-folders/${folder.id}`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ position_x: x, position_y: y })
          }).catch(() => {});
        }
        if (dragState && !didDrag) {
          onClick(el);
        }
        clearBreadcrumbHover();
        dragState = null;
      };

      window.addEventListener('mousemove', moveHandler);
      window.addEventListener('mouseup', upHandler);

      // Store cleanup refs
      el._cleanup = () => {
        window.removeEventListener('mousemove', moveHandler);
        window.removeEventListener('mouseup', upHandler);
      };

      world.appendChild(el);
      return el;
    }

    function createDraggableElement(className, x, y, innerHTML, onClick, dragMeta) {
      const el = document.createElement('div');
      el.className = className;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.innerHTML = innerHTML;

      let dragState = null;
      let didDrag = false;

      el.addEventListener('mousedown', (e) => {
        if (e.button === 2) return; // Ignore right-click
        e.preventDefault();
        e.stopPropagation();
        dragState = { startX: e.clientX, startY: e.clientY, origX: x, origY: y };
        didDrag = false;
      });

      const moveHandler = (e) => {
        if (!dragState) return;
        const dx = (e.clientX - dragState.startX) / scale;
        const dy = (e.clientY - dragState.startY) / scale;
        if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didDrag = true;
        if (didDrag) {
          x = dragState.origX + dx;
          y = dragState.origY + dy;
          el.style.left = x + 'px';
          el.style.top = y + 'px';
          // Check breadcrumb hover
          if (dragMeta) checkBreadcrumbHover(e.clientX, e.clientY);
        }
      };

      const upHandler = (e) => {
        if (dragState && didDrag && dragMeta) {
          const bcTarget = checkBreadcrumbHover(e.clientX, e.clientY);
          clearBreadcrumbHover();
          if (bcTarget) {
            dropOnBreadcrumb(bcTarget, dragMeta);
            dragState = null;
            return;
          }
        }
        if (dragState && !didDrag && onClick) onClick(el);
        clearBreadcrumbHover();
        dragState = null;
      };

      window.addEventListener('mousemove', moveHandler);
      window.addEventListener('mouseup', upHandler);
      el._cleanup = () => {
        window.removeEventListener('mousemove', moveHandler);
        window.removeEventListener('mouseup', upHandler);
      };

      world.appendChild(el);
      return el;
    }

    async function navigateToFolder(folderId, folderName, fromElement) {
      // Find the clicked folder card to zoom into it
      const clickedEl = fromElement || folderElements.find(el => el.style && el.querySelector('.folder-card-name')?.textContent === folderName);

      // Skip zoom animation on mobile (768px or less)
      const isMobile = window.innerWidth <= 768;

      if (clickedEl && !isMobile) {
        // Get the folder's world position
        const fx = parseFloat(clickedEl.style.left) || 0;
        const fy = parseFloat(clickedEl.style.top) || 0;

        // Animate zoom into the folder
        const targetScale = 3;
        const targetPanX = window.innerWidth / 2 - fx * targetScale - 90 * targetScale;
        const targetPanY = window.innerHeight / 2 - fy * targetScale - 70 * targetScale;
        const startPanX = panX, startPanY = panY, startScale = scale;
        const duration = 500;
        const start = performance.now();

        await new Promise(resolve => {
          function anim(t) {
            const p = Math.min((t - start) / duration, 1);
            const e = 1 - Math.pow(1 - p, 3); // ease out cubic
            panX = startPanX + (targetPanX - startPanX) * e;
            panY = startPanY + (targetPanY - startPanY) * e;
            scale = startScale + (targetScale - startScale) * e;

            // Fade out folder elements
            folderElements.forEach(el => { el.style.opacity = 1 - p; });

            updateTransform();
            if (p < 1) requestAnimationFrame(anim);
            else resolve();
          }
          requestAnimationFrame(anim);
        });
      } else if (clickedEl && isMobile) {
        // On mobile, just fade out folders without zoom
        folderElements.forEach(el => { el.style.opacity = 0; });
      }

      clearCanvas();
      clearLevelElements();
      currentLevel = 'folder';
      currentFolderId = folderId;
      currentFolderName = folderName;
      conversationId = null;
      // (input bar removed)
      updateBreadcrumb();

      panX = window.innerWidth / 2;
      panY = window.innerHeight / 2 - 50;
      scale = 1;
      updateTransform();

      try {
        // Load conversations list
        // Use preloaded data (instant)
        if (!_preloadedData) await preloadCanvas();
        const convos = getPreloadedConversations(folderId);

        // Render each conversation as a card cluster
        let clusterX = 0;

        convos.forEach((conv, ci) => {
          const messages = conv.messages || [];
          const savedLayout = conv.canvas_layout;

          // Use saved cluster position, or auto-space if not saved
          const clusterOffsetX = (savedLayout && savedLayout.cluster_x !== undefined) ? savedLayout.cluster_x : clusterX;
          const clusterOffsetY = (savedLayout && savedLayout.cluster_y !== undefined) ? savedLayout.cluster_y : 0;

          console.log(`[LOAD FOLDER] Conversation ${conv.id} (${conv.title}): cluster_x=${savedLayout?.cluster_x}, cluster_y=${savedLayout?.cluster_y}, using saved=${savedLayout && savedLayout.cluster_x !== undefined}`);


          // Title label (will be positioned relative to first card)
          const titleLabel = document.createElement('div');
          titleLabel.className = 'cluster-title';
          titleLabel.textContent = conv.title || 'New Chat';
          titleLabel.style.left = clusterOffsetX + 'px';
          titleLabel.style.top = (clusterOffsetY - 40) + 'px';
          titleLabel.style.position = 'absolute';
          world.appendChild(titleLabel);
          convoElements.push(titleLabel);

          // Build saved position lookup
          const savedPositions = {};
          if (savedLayout && savedLayout.cards) {
            savedLayout.cards.forEach(sc => {
              savedPositions[sc.question] = sc;
            });
          }

          // Create cards from messages
          let lastCardId = null;
          let pendingQuestion = null;
          let fallbackY = clusterOffsetY;
          let maxX = clusterOffsetX;
          let maxY = clusterOffsetY;
          const usingSavedCluster = (savedLayout && savedLayout.cluster_x !== undefined);

          // Track this conversation's first card for setting conversationId on click
          let firstCardInCluster = null;

          // Track cards in THIS conversation cluster by their question text (for parent lookup)
          const clusterCardMap = {}; // {question: cardId}

          for (const msg of messages) {
            if (msg.role === 'user') {
              pendingQuestion = msg.content;
            } else if (msg.role === 'assistant' && pendingQuestion) {
              const saved = savedPositions[pendingQuestion];
              let cx, cy, parentId;

              if (saved) {
                cx = saved.x + clusterOffsetX;
                cy = saved.y + clusterOffsetY;
                // Look up parent by saved parent question text instead of array index
                if (saved.parentQuestion && clusterCardMap[saved.parentQuestion] !== undefined) {
                  parentId = clusterCardMap[saved.parentQuestion];
                } else {
                  parentId = lastCardId;
                }
              } else {
                cx = clusterOffsetX;
                cy = fallbackY;
                parentId = lastCardId;
              }

              const card = createCard(pendingQuestion, cx, cy, parentId);
              card._conversationId = conv.id;
              populateCard(card, msg.content, msg.sources, []);

              // Add to cluster map so child cards can reference this as parent
              clusterCardMap[pendingQuestion] = card.id;

              // Restore collapse state
              if (saved && saved.collapsed) {
                card.element.classList.add('collapsed');
                const collapseBtn = card.element.querySelector('.card-collapse-btn');
                if (collapseBtn) collapseBtn.textContent = '+';
              }

              if (!firstCardInCluster) firstCardInCluster = card;

              maxX = Math.max(maxX, cx + 550);
              maxY = Math.max(maxY, cy + (card.element.offsetHeight || 200));

              if (!saved) {
                fallbackY += (card.element.offsetHeight || 200) + 100;
              }

              lastCardId = card.id;
              pendingQuestion = null;
            }
          }

          // Link title label to first card so it follows during drag
          if (firstCardInCluster) {
            firstCardInCluster._titleLabel = titleLabel;
            titleLabel.style.left = firstCardInCluster.x + 'px';
            titleLabel.style.top = (firstCardInCluster.y - 36) + 'px';
          }

          // Add follow-up bubbles to leaf cards of this cluster
          const clusterCards = cards.filter(c => c._conversationId === conv.id);
          const parentIds = new Set(clusterCards.map(c => c.parentId).filter(id => id !== null));
          clusterCards.forEach(c => {
            if (!parentIds.has(c.id) && c.response) {
              createFollowupBubbles(c, ['Tell me more about this', 'What else should I know?']);
            }
          });

          // Only update clusterX for auto-spacing if this conversation didn't have a saved cluster position
          if (!usingSavedCluster) {
            clusterX = maxX + 200;
          }
        });

        // Render subfolders from preloaded data
        {
          const subFolders = getPreloadedFolders().filter(f => f.parent_id === folderId);
          subFolders.forEach(sf => {
            const sfx = sf.position_x || clusterX;
            const sfy = sf.position_y || (Math.random() - 0.5) * 300;
            const el = createDraggableFolderCard(sf, sfx, sfy, (clickedEl) => navigateToFolder(sf.id, sf.name, clickedEl));
            convoElements.push(el);
            clusterX += 220;
          });
        }

        // Load sticky notes for this folder (from preloaded data)
        getPreloadedStickies(folderId).forEach(n => {
          renderStickyNote(n.id, n.position_x || 0, n.position_y || 0, n.content || '');
        });

        // Show empty hint if folder is empty
        if (convos.length === 0 && convoElements.length === 0 && stickyNotes.length === 0) {
          showEmptyHint('This folder is empty', 'Right-click to add a chat or subfolder');
        }

        // Fit camera to show all content after a brief render settle
        setTimeout(() => fitAllContent(), 50);

      } catch (e) { console.error('Folder load error:', e); }
    }

    async function createNewFolder(parentId) {
      const name = prompt('Folder name:');
      if (!name || !name.trim()) return;
      document.querySelectorAll('.empty-hint').forEach(h => h.remove());
      try {
        const body = {
          name: name.trim(),
          position_x: ctxWorldX || (Math.random() - 0.5) * 400,
          position_y: ctxWorldY || (Math.random() - 0.5) * 300
        };
        if (parentId) body.parent_id = parentId;
        await fetch(`${BACKEND_URL}/api/chat-folders`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        window.dispatchEvent(new CustomEvent('sf:chat-folder-created'));
        // Refresh current view (force refresh to bypass stale preload cache)
        _preloadedData = null;
        if (currentLevel === 'folder') {
          navigateToFolder(currentFolderId, currentFolderName);
        } else {
          navigateHome(true);
        }
      } catch (e) { console.error('Create folder error:', e); }
    }
