<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow - StudyFlowSuite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg, #0a0a0a, #1a1a1a, #0f0f14, #0a0a0a);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s ease;
    }

    /* Light Mode Theme - Soft and minimal */
    body.light-mode {
      background: linear-gradient(-45deg, #f8f9fa, #ffffff, #f5f6f8, #f8f9fa);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    body.light-mode .sidebar {
      background: rgba(255, 255, 255, 0.95);
      border-right: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 8px 0 40px rgba(0, 0, 0, 0.08);
    }

    body.light-mode .sidebar-header {
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      background: rgba(0, 0, 0, 0.02);
    }

    body.light-mode .logo-text {
      color: #1a202c;
    }

    body.light-mode .icon-btn {
      color: #4a5568;
    }

    body.light-mode .icon-btn:hover {
      background: rgba(102, 126, 234, 0.08);
      color: #1a202c;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
    }

    body.light-mode .delete-chat-btn {
      color: #4a5568;
    }

    body.light-mode .delete-chat-btn:hover {
      background: #fff5f5;
      color: #e53e3e;
    }

    body.light-mode .new-chat-btn {
      color: #2d3748;
      background: linear-gradient(135deg, #ececed 0%, #e0e2e5 100%);
      border: 1px solid #d1d5db;
    }

    body.light-mode .new-chat-btn:hover {
      background: linear-gradient(135deg, #e0e2e5 0%, #d6d9dd 100%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    body.light-mode .conversation-item {
      color: #2d3748;
    }

    body.light-mode .conversation-item:hover {
      background: #ececed;
    }

    body.light-mode .conversation-item.active {
      background: linear-gradient(135deg, #e0e2e5 0%, #d6d9dd 100%);
      color: #1a202c;
      border-left: 3px solid #667eea;
    }

    body.light-mode .sidebar-footer {
      border-top: 1px solid #e0e4e8;
    }

    body.light-mode .user-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body.light-mode .user-email {
      color: #4a5568;
    }

    body.light-mode .logout-btn {
      color: #e53e3e;
    }

    body.light-mode .logout-btn:hover {
      background: #fff5f5;
    }

    body.light-mode .chat-container {
      background: linear-gradient(135deg, #e8eaed 0%, #d6d9dd 100%);
    }

    body.light-mode .chat-header {
      border-bottom: 1px solid #d1d5db;
      background: rgba(245, 246, 247, 0.8);
      backdrop-filter: blur(10px);
    }

    body.light-mode .chat-title {
      color: #1a202c;
    }

    body.light-mode .welcome-greeting {
      color: rgba(0, 0, 0, 0.4);
    }

    body.light-mode .welcome-title {
      color: #1a202c;
    }

    body.light-mode .prompt-chip {
      background: transparent;
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: rgba(0, 0, 0, 0.5);
    }

    body.light-mode .prompt-chip:hover {
      background: rgba(102, 126, 234, 0.08);
      border-color: rgba(102, 126, 234, 0.3);
      color: rgba(0, 0, 0, 0.9);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
    }

    body.light-mode .input-box {
      background: rgba(255, 255, 255, 0.7);
      color: #1a202c;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.05);
    }

    body.light-mode .input-box::placeholder {
      color: rgba(0, 0, 0, 0.3);
    }

    body.light-mode .input-box:focus {
      border-color: rgba(102, 126, 234, 0.4);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(102, 126, 234, 0.3), 0 0 40px rgba(102, 126, 234, 0.1);
    }

    body.light-mode .send-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
    }

    body.light-mode .send-btn:hover:not(:disabled) {
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.5);
    }

    body.light-mode .message.user::before {
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 0 12px rgba(102, 126, 234, 0.4);
    }

    body.light-mode .message.assistant::before {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0.05) 100%);
    }

    body.light-mode .message.user .message-content {
      color: #1a202c;
    }

    body.light-mode .message.assistant .message-content {
      color: rgba(0, 0, 0, 0.75);
    }

    body.light-mode .message.user::after {
      color: #667eea;
    }

    body.light-mode .message.assistant::after {
      color: rgba(0, 0, 0, 0.4);
    }

    body.light-mode .typing-dot {
      background: #667eea;
    }

    body.light-mode .input-container {
      border-top: 1px solid #d1d5db;
      background: rgba(245, 246, 247, 0.8);
      backdrop-filter: blur(10px);
    }

    body.light-mode .settings-popup {
      background: #f5f6f7;
      border: 1px solid #d1d5db;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    body.light-mode .settings-popup-header {
      color: #1a202c;
      border-bottom: 1px solid #d1d5db;
    }

    body.light-mode .settings-option-label {
      color: #2d3748;
    }

    body.light-mode .settings-option-description {
      color: #4a5568;
    }

    body.light-mode .error-message {
      background: #fef0f0;
      color: #e53e3e;
      border: 1px solid #f8b4b4;
    }

    /* Main Layout - Full width, no sidebar visible */
    .app-container {
      display: block;
      height: 100vh;
      width: 100vw;
    }

    /* Left Sidebar - Hidden by default, slides out on hover */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 8px 0 40px rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }

    .sidebar:hover,
    .sidebar.active {
      transform: translateX(0);
    }

    /* Hover trigger area for sidebar */
    .sidebar-trigger {
      position: fixed;
      left: 0;
      top: 0;
      width: 20px;
      height: 100vh;
      z-index: 999;
    }

    .sidebar-trigger:hover + .sidebar,
    .sidebar-trigger:hover ~ .sidebar {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 10px;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
      transform: translateY(-1px);
    }

    .delete-chat-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 8px;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .delete-chat-btn:hover {
      background: #3a1a1a;
      color: #fca5a5;
    }

    .new-chat-btn {
      margin: 16px;
      padding: 14px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      color: #e5e7eb;
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .new-chat-btn:hover {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
      transform: translateY(-2px);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      padding: 12px 14px;
      margin-bottom: 6px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #d1d5db;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid transparent;
      position: relative;
    }

    .conversation-item:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateX(4px);
      border-color: rgba(102, 126, 234, 0.2);
    }

    .conversation-item.active {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
      color: #fff;
      font-weight: 600;
      border-color: rgba(102, 126, 234, 0.4);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.2);
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.02);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-email {
      font-size: 13px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      background: transparent;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: #2d1f1f;
    }

    /* Main Chat Area - Full width, centered */
    .chat-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: transparent;
    }

    /* No header - clean and minimal */
    .chat-header {
      display: none;
    }

    .chat-title {
      font-size: 18px;
      font-weight: 600;
      color: #e5e7eb;
    }

    /* Messages Container - Lots of breathing room */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 80px 40px 160px 40px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .messages-container::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Welcome Screen - Ultra minimal, centered */
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #9ca3af;
      padding: 60px 40px 180px 40px;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    .welcome-greeting {
      font-size: 18px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 16px;
      letter-spacing: 0.05em;
    }

    .welcome-title {
      font-size: 56px;
      font-weight: 300;
      color: #f5f5f7;
      margin-bottom: 64px;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .suggested-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 48px;
    }

    .prompt-chip {
      padding: 10px 18px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }

    .prompt-chip:hover {
      background: rgba(102, 126, 234, 0.08);
      border-color: rgba(102, 126, 234, 0.3);
      transform: translateY(-2px);
      color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
    }

    /* Welcome input - hidden, using floating input instead */
    .welcome-input-container {
      display: none;
    }

    .welcome-input-wrapper {
      display: none;
    }

    .welcome-input-box {
      display: none;
    }

    .welcome-send-btn {
      display: none;
    }

    .welcome-send-btn:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .welcome-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Floating button for saved chats */
    .floating-chats-btn {
      position: fixed;
      bottom: 40px;
      left: 40px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(15, 15, 15, 0.7);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 99;
      color: rgba(255, 255, 255, 0.5);
      font-size: 20px;
    }

    .floating-chats-btn:hover {
      background: rgba(102, 126, 234, 0.15);
      border-color: rgba(102, 126, 234, 0.3);
      color: #fff;
      transform: scale(1.1);
      box-shadow: 0 12px 40px rgba(102, 126, 234, 0.3);
    }

    /* Hide bottom input when on welcome screen */
    .input-container.hidden {
      display: none;
    }

    /* Messages - Centered, no bubbles, clean typography */
    .message {
      max-width: 680px;
      margin: 0 auto 48px auto;
      padding: 0 24px;
      animation: breatheIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      animation-fill-mode: forwards;
    }

    @keyframes breatheIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user,
    .message.assistant {
      display: block;
      position: relative;
      padding-left: 32px;
    }

    /* Gradient accent line on left */
    .message.user::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      border-radius: 2px;
      box-shadow: 0 0 12px rgba(102, 126, 234, 0.5);
    }

    .message.assistant::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
      border-radius: 2px;
    }

    /* No avatars - clean and minimal */
    .message-avatar {
      display: none;
    }

    /* Clean typography, no background */
    .message-content {
      padding: 0;
      background: none;
      border: none;
      box-shadow: none;
      color: #e5e7eb;
      font-size: 16px;
      line-height: 1.8;
      letter-spacing: 0.01em;
    }

    .message.user .message-content {
      color: #f5f5f7;
      font-weight: 400;
    }

    .message.assistant .message-content {
      color: rgba(255, 255, 255, 0.85);
      font-weight: 300;
    }

    /* Small label above message */
    .message::after {
      content: attr(data-role);
      position: absolute;
      left: 32px;
      top: -20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    .message.user::after {
      content: 'You';
      color: #667eea;
    }

    .message.assistant::after {
      content: 'StudyFlow';
      color: rgba(255, 255, 255, 0.5);
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    /* Input Area - Floating at bottom, detached */
    .input-container {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 720px;
      padding: 0;
      border: none;
      z-index: 100;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    .input-box {
      width: 100%;
      padding: 20px 70px 20px 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      resize: none;
      min-height: 64px;
      max-height: 200px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(15, 15, 15, 0.7);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      color: #f5f5f7;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .input-box::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .input-box:focus {
      outline: none;
      border-color: rgba(102, 126, 234, 0.4);
      background: rgba(15, 15, 15, 0.85);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(102, 126, 234, 0.3), 0 0 40px rgba(102, 126, 234, 0.15);
      transform: translateY(-2px);
    }

    .send-btn {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.1);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.6);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Mobile Menu Toggle */
    .mobile-menu-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      color: #e5e7eb;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 999;
        transform: translateX(-100%);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .mobile-menu-toggle {
        display: block;

  <script>
    // Configuration
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    // Theme Management
    function loadTheme() {
      const savedTheme = localStorage.getItem('studyflow-theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');

      document.body.classList.toggle('light-mode');

      localStorage.setItem('studyflow-theme', isLight ? 'light' : 'dark');
      themeToggle.classList.toggle('active', isLight);
    }

    // Initialize
    async function init() {
      // Load theme preference
      loadTheme();
      // Check authentication
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = session.user;
      authToken = session.access_token;

      // Fetch user profile from backend to get their name
      try {
        const profileResponse = await fetch(`${BACKEND_URL}/api/current-user`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (profileResponse.ok) {
          userProfile = await profileResponse.json();
        }
      } catch (error) {
        console.error('Error fetching user profile:', error);
      }

      // Update UI with user info
      userEmail.textContent = currentUser.email;

      // Get user's actual name from profile, or fall back to email
      const userName = userProfile?.name || currentUser.email.split('@')[0];
      const firstName = userName.split(' ')[0];
      const capitalizedName = firstName.charAt(0).toUpperCase() + firstName.slice(1);

      userAvatar.textContent = capitalizedName.charAt(0).toUpperCase();

      // Update welcome greeting with user's name
      const welcomeGreeting = document.getElementById('welcomeGreeting');
      if (welcomeGreeting) {
        welcomeGreeting.textContent = `Hi ${capitalizedName}`;
      }

      // Populate random academic questions
      populateSuggestedPrompts();

      // Load conversation history
      await loadConversations();

      // Enable inputs (welcome input is visible by default, bottom is hidden)
      welcomeMessageInput.disabled = false;
      messageInput.disabled = false;
    }

    // Load Conversations List
    async function loadConversations() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/conversations`, {
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        displayConversations(data.conversations || []);

      } catch (error) {
        console.error('Error loading conversations:', error);
      }
    }

    // Display Conversations in Sidebar
    function displayConversations(conversations) {
      conversationList.innerHTML = '';

      if (conversations.length === 0) {
        conversationList.innerHTML = '<div style="padding: 12px; color: #6b7280; font-size: 13px; text-align: center;">No conversations yet</div>';
        return;
      }

      conversations.forEach(conv => {
        const item = document.createElement('div');
        item.className = 'conversation-item';
        item.setAttribute('data-conversation-id', conv.id);
        if (conv.id === conversationId) {
          item.classList.add('active');
        }

        const title = conv.title || 'New conversation';
        item.textContent = title.length > 40 ? title.substring(0, 40) + '...' : title;
        item.title = title;

        item.addEventListener('click', (e) => loadConversation(conv.id, e.currentTarget));

        conversationList.appendChild(item);
      });
    }

    // Load Specific Conversation
    async function loadConversation(convId, clickedElement) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/conversations/${convId}/messages`, {
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        // Clear current messages
        messagesContainer.innerHTML = '';

        // Hide welcome screen
        if (welcomeScreen) {
          welcomeScreen.style.display = 'none';
        }

        // Show bottom input container
        bottomInputContainer.classList.remove('hidden');

        // Display all messages
        data.messages.forEach(msg => {
          addMessage(msg.content, msg.role);
        });

        // Set active conversation
        conversationId = convId;

        // Show delete button
        const deleteBtn = document.getElementById('deleteChatBtn');
        if (deleteBtn) {
          deleteBtn.style.display = 'flex';
        }

        // Update active state in sidebar
        document.querySelectorAll('.conversation-item').forEach(item => {
          item.classList.remove('active');
        });
        event.target.classList.add('active');

      } catch (error) {
        console.error('Error loading conversation:', error);
      }
    }

    async function deleteCurrentConversation() {
      if (!conversationId) return;

      if (!confirm('Are you sure you want to delete this chat?')) {
        return;
      }

      try {
        const response = await fetch(`${BACKEND_URL}/api/conversations/${conversationId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        // Remove conversation from sidebar
        const conversationElement = document.querySelector(`.conversation-item[data-conversation-id="${conversationId}"]`);
        if (conversationElement) {
          conversationElement.remove();
        }

        // Start a new chat
        startNewChat();

        // Hide delete button
        const deleteBtn = document.getElementById('deleteChatBtn');
        if (deleteBtn) {
          deleteBtn.style.display = 'none';
        }

      } catch (error) {
        console.error('Error deleting conversation:', error);
        alert('Failed to delete conversation. Please try again.');
      }
    }

    // Academic questions across different subjects
    const academicQuestions = [
      // History
      "What caused World War I?",
      "How did the Industrial Revolution change society?",
      "What were the main causes of the French Revolution?",
      "Explain the significance of the Renaissance",

      "How do you analyze poetry?",
      "What are literary devices?",
      "Explain narrative perspectives",

      // Economics
      "What is supply and demand?",

      "What causes economic recessions?",
      "How do interest rates affect the economy?",
      "What is GDP and how is it measured?",

      // Psychology
      "What are the stages of cognitive development?",

      "What is the mind-body problem?",

      "What is epistemology?",
      "How does logic work in philosophy?"
    ];

    // Get random academic questions
    function getRandomQuestions(count = 5) {
      const shuffled = [...academicQuestions].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count);
    }

    // Populate suggested prompts
    function populateSuggestedPrompts() {
      const promptsContainer = document.getElementById('suggestedPrompts');
      if (!promptsContainer) return;

      const randomQuestions = getRandomQuestions(5);
      promptsContainer.innerHTML = randomQuestions.map(q =>
        `<div class="prompt-chip" onclick="sendPrompt('${q.replace(/'/g, "\\'")}')">${q}</div>`
      ).join('');
    }

    // Send suggested prompt
    function sendPrompt(prompt) {
      // Use the welcome input if it's visible, otherwise use bottom input
      const welcomeInputElement = document.getElementById('welcomeMessageInput');
      if (welcomeInputElement && !bottomInputContainer.classList.contains('hidden') === false) {
        welcomeInputElement.value = prompt;
      } else {
        messageInput.value = prompt;
      }
      sendMessage(prompt);
    }

    // Send Message
    async function sendMessage(messageText = null) {
      const message = messageText || messageInput.value.trim();
      if (!message) return;

      // If sending from welcome screen, switch to bottom input
      const currentWelcomeScreen = document.getElementById('welcomeScreen');
      if (currentWelcomeScreen && currentWelcomeScreen.style.display !== 'none') {
        currentWelcomeScreen.style.display = 'none';
        bottomInputContainer.classList.remove('hidden');
      }

      // Clear inputs and disable
      messageInput.value = '';
      const currentWelcomeInput = document.getElementById('welcomeMessageInput');
      const currentWelcomeSendBtn = document.getElementById('welcomeSendBtn');
      if (currentWelcomeInput) currentWelcomeInput.value = '';
      messageInput.disabled = true;
      sendBtn.disabled = true;
      if (currentWelcomeInput) currentWelcomeInput.disabled = true;
      if (currentWelcomeSendBtn) currentWelcomeSendBtn.disabled = true;

      // Add user message
      addMessage(message, 'user');

      // Show typing indicator
      const typingId = addTypingIndicator();

      try {
        // Call backend
        const requestBody = { message };
        if (conversationId) {
          requestBody.conversation_id = conversationId;
        }

        const response = await fetch(`${BACKEND_URL}/api/notes/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        // Remove typing indicator
        removeTypingIndicator(typingId);

        // Store conversation ID
        if (data.conversation_id) {
          conversationId = data.conversation_id;
        }

        // Add AI response
        addMessage(data.response || 'Sorry, I couldn\'t generate a response.', 'assistant');

        // Refresh conversation list (to show new chat or updated title)
        await loadConversations();

      } catch (error) {
        console.error('Error sending message:', error);
        removeTypingIndicator(typingId);
        addMessage('Sorry, something went wrong. Please try again.', 'assistant');
      } finally {
        // Re-enable inputs
        messageInput.disabled = false;
        welcomeMessageInput.disabled = false;

        // Focus on the visible input
        if (!bottomInputContainer.classList.contains('hidden')) {
          messageInput.focus();
        } else {
          welcomeMessageInput.focus();
        }
      }
    }

    // Add Message to UI
    function addMessage(content, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'user' ? currentUser.email.charAt(0).toUpperCase() : 'AI';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = content;

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Typing Indicator
    function addTypingIndicator() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message assistant';
      messageDiv.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = 'AI';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';

      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      contentDiv.appendChild(typingDiv);
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      return 'typing-indicator';
    }

    function removeTypingIndicator(id) {
      const indicator = document.getElementById(id);
      if (indicator) {
        indicator.remove();
      }
    }

    // New Chat

      conversationId = null;
      messagesContainer.innerHTML = '';

      // Hide delete button
      const deleteBtn = document.getElementById('deleteChatBtn');
      if (deleteBtn) {
        deleteBtn.style.display = 'none';
      }

      // Remove active state from all conversations
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.classList.remove('active');
      });

      const welcomeDiv = document.createElement('div');
      welcomeDiv.className = 'welcome-screen';
      welcomeDiv.id = 'welcomeScreen';

      // Get user's actual name from profile, or fall back to email
      const userName = userProfile?.name || currentUser?.email?.split('@')[0] || 'there';
      const firstName = userName.split(' ')[0];
      const capitalizedName = firstName.charAt(0).toUpperCase() + firstName.slice(1);

      // Generate random academic questions
      const randomQuestions = getRandomQuestions(5);
      const promptChipsHTML = randomQuestions.map(q =>
        `<div class="prompt-chip" onclick="sendPrompt('${q.replace(/'/g, "\\'")}')">${q}</div>`
      ).join('');

      welcomeDiv.innerHTML = `
        <div class="welcome-greeting">Hi ${capitalizedName}</div>
        <h1 class="welcome-title">Where should we start?</h1>
        <div class="suggested-prompts">
          ${promptChipsHTML}
        </div>
        <div class="welcome-input-container">
          <div class="welcome-input-wrapper">
            <textarea
              class="welcome-input-box"
              id="welcomeMessageInput"
              placeholder="Ask me anything..."
              rows="1"
            ></textarea>
            <button class="welcome-send-btn" id="welcomeSendBtn" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      `;
      messagesContainer.appendChild(welcomeDiv);

      // Hide bottom input, show welcome
      bottomInputContainer.classList.add('hidden');

      // Re-attach event listeners to new welcome input
      const newWelcomeInput = document.getElementById('welcomeMessageInput');
      const newWelcomeSendBtn = document.getElementById('welcomeSendBtn');

      newWelcomeInput.addEventListener('input', () => {
        newWelcomeSendBtn.disabled = !newWelcomeInput.value.trim();
        newWelcomeInput.style.height = 'auto';
        newWelcomeInput.style.height = Math.min(newWelcomeInput.scrollHeight, 200) + 'px';
      });

      newWelcomeInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          const message = newWelcomeInput.value.trim();
          if (message) {
            sendMessage(message);
          }
        }
      });

      newWelcomeSendBtn.addEventListener('click', () => {
        const message = newWelcomeInput.value.trim();
        if (message) {
          sendMessage(message);
        }
      });

      newWelcomeInput.focus();
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    welcomeSendBtn.addEventListener('click', () => {
      const message = welcomeMessageInput.value.trim();
      if (message) {
        sendMessage(message);
      }
    });

    messageInput.addEventListener('input', () => {
      sendBtn.disabled = !messageInput.value.trim();

      // Auto-resize textarea
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
    });

    welcomeMessageInput.addEventListener('input', () => {
      welcomeSendBtn.disabled = !welcomeMessageInput.value.trim();

      // Auto-resize textarea
      welcomeMessageInput.style.height = 'auto';
      welcomeMessageInput.style.height = Math.min(welcomeMessageInput.scrollHeight, 200) + 'px';
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (messageInput.value.trim()) {
          sendMessage();
        }
      }
    });

    welcomeMessageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const message = welcomeMessageInput.value.trim();
        if (message) {
          sendMessage(message);
        }
      }
    });

    newChatBtn.addEventListener('click', startNewChat);

    const deleteChatBtn = document.getElementById('deleteChatBtn');
    if (deleteChatBtn) {
      deleteChatBtn.addEventListener('click', deleteCurrentConversation);
    }

    logoutBtn.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    });

    mobileMenuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    // Settings popup toggle
    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsPopup.classList.toggle('active');
    });

    // Upload button - navigate to upload page
    uploadBtn.addEventListener('click', () => {
      window.location.href = 'upload.html';
    });

    // My Notes button - navigate to notes page
    myNotesBtn.addEventListener('click', () => {
      window.location.href = 'notes.html';
    });

    // Theme toggle
    themeToggle.addEventListener('click', toggleTheme);

    // Collective Brain toggle
    collectiveBrainToggle.addEventListener('click', () => {
      collectiveBrainEnabled = !collectiveBrainEnabled;
      collectiveBrainToggle.classList.toggle('active');
      console.log('Collective Brain:', collectiveBrainEnabled ? 'Enabled' : 'Disabled');
    });

    // Floating chats button - toggle sidebar
    const floatingChatsBtn = document.getElementById('floatingChatsBtn');
    floatingChatsBtn.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    // Close sidebar when clicking outside
    document.addEventListener('click', (e) => {
      if (sidebar.classList.contains('active') &&
          !sidebar.contains(e.target) &&
          !floatingChatsBtn.contains(e.target)) {
        sidebar.classList.remove('active');
      }
    });

    // Close settings popup when clicking outside
    document.addEventListener('click', (e) => {
      if (!settingsPopup.contains(e.target) && !settingsBtn.contains(e.target)) {
        settingsPopup.classList.remove('active');
      }
    });

    // Initialize on load
    init();
  </script>
</body>
</html>
