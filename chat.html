<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chat with your AI study assistant. Ask questions, get explanations, and study smarter with StudyFlow Suite.">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Chat - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Theme Variables */
    :root {
      --bg-primary: #f5f4f0;
      --bg-secondary: #ede9e4;
      --bg-tertiary: rgba(255, 255, 255, 0.98);
      --text-primary: #2d2d2d;
      --text-secondary: #5d5d5d;
      --text-muted: #9ca3af;
      --accent-primary: #7c9885;
      --accent-secondary: #6a8573;
      --accent-tertiary: #e89b5f;
      --border-color: rgba(139, 157, 131, 0.2);
      --hover-bg: rgba(124, 152, 133, 0.08);
      --shadow: rgba(0, 0, 0, 0.1);
      --chat-bg: #f8f7f3;
      --chat-bg-end: #f1ede8;
    }

    body[data-theme="dark"] {
      --bg-primary: #1a1a1a; --bg-secondary: #0f0f0f; --bg-tertiary: rgba(40, 40, 40, 0.98);
      --text-primary: #f5f5f5; --text-secondary: #d0d0d0; --text-muted: #a0a0a0;
      --accent-primary: #7c9885; --accent-secondary: #6a8573; --accent-tertiary: #e89b5f;
      --border-color: rgba(124, 152, 133, 0.3); --hover-bg: rgba(124, 152, 133, 0.15);
      --shadow: rgba(0, 0, 0, 0.4); --chat-bg: #1f1f1f; --chat-bg-end: #151515;
    }

    body[data-theme="ocean"] {
      --bg-primary: #F0F8FF; --bg-secondary: #dceef8; --bg-tertiary: rgba(240, 250, 255, 0.98);
      --text-primary: #1e3a5f; --text-secondary: #4a6b8a; --text-muted: #7a9cb8;
      --accent-primary: #4a90a4; --accent-secondary: #3a7a8e; --accent-tertiary: #5fb3c8;
      --border-color: rgba(74, 144, 164, 0.2); --hover-bg: rgba(74, 144, 164, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #e8f6fb; --chat-bg-end: #d8ecf5;
    }

    body[data-theme="sunset"] {
      --bg-primary: #FFF5F0; --bg-secondary: #f5e5d8; --bg-tertiary: rgba(255, 245, 238, 0.98);
      --text-primary: #4a2c2a; --text-secondary: #8a5a4a; --text-muted: #b88a7a;
      --accent-primary: #d17a5f; --accent-secondary: #b86a4f; --accent-tertiary: #e89b7f;
      --border-color: rgba(209, 122, 95, 0.2); --hover-bg: rgba(209, 122, 95, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #fef0e8; --chat-bg-end: #f5e5d8;
    }

    body[data-theme="minimal"] {
      --bg-primary: #ffffff; --bg-secondary: #f5f5f5; --bg-tertiary: rgba(250, 250, 250, 0.98);
      --text-primary: #1a1a1a; --text-secondary: #666666; --text-muted: #999999;
      --accent-primary: #4a4a4a; --accent-secondary: #3a3a3a; --accent-tertiary: #6a6a6a;
      --border-color: rgba(74, 74, 74, 0.2); --hover-bg: rgba(74, 74, 74, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #fafafa; --chat-bg-end: #f5f5f5;
    }

    body[data-theme="forest"] {
      --bg-primary: #F5F9F5; --bg-secondary: #e0f0e0; --bg-tertiary: rgba(245, 250, 245, 0.98);
      --text-primary: #2a3a2a; --text-secondary: #4a6a4a; --text-muted: #7a9a7a;
      --accent-primary: #5a8a5a; --accent-secondary: #4a7a4a; --accent-tertiary: #7aaa7a;
      --border-color: rgba(90, 138, 90, 0.2); --hover-bg: rgba(90, 138, 90, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #eef8ee; --chat-bg-end: #e0f0e0;
    }

    body[data-theme="lavender"] {
      --bg-primary: #F8F5FF; --bg-secondary: #ebe5f5; --bg-tertiary: rgba(250, 245, 255, 0.98);
      --text-primary: #3a2a4a; --text-secondary: #6a5a8a; --text-muted: #9a8ab8;
      --accent-primary: #8a7aa4; --accent-secondary: #7a6a94; --accent-tertiary: #aa9ac8;
      --border-color: rgba(138, 122, 164, 0.2); --hover-bg: rgba(138, 122, 164, 0.08);
      --shadow: rgba(0, 0, 0, 0.1); --chat-bg: #f3f0fb; --chat-bg-end: #ebe5f5;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--chat-bg);
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ============ CANVAS ============ */
    #canvasViewport {
      position: fixed;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      /* Dot grid background */
      background-image: radial-gradient(circle, var(--border-color) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    #canvasViewport.grabbing { cursor: grabbing; user-select: none; -webkit-user-select: none; }
    #canvasViewport.dragging-card { user-select: none; -webkit-user-select: none; }

    #canvasWorld {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }

    /* SVG connection lines */
    #connectionsSvg {
      position: absolute;
      top: -10000px;
      left: -10000px;
      width: 20000px;
      height: 20000px;
      pointer-events: none;
    }

    /* ============ CARDS ============ */
    .canvas-card {
      position: absolute;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      box-shadow: 0 4px 24px var(--shadow);
      width: 550px;
      overflow: hidden;
      cursor: grab;
      transition: box-shadow 0.2s, max-height 0.3s ease;
      z-index: 1;
    }

    .canvas-card:hover { box-shadow: 0 8px 32px var(--shadow); }
    .canvas-card.dragging { cursor: grabbing; box-shadow: 0 12px 40px var(--shadow); z-index: 100; }
    .canvas-card.expanding { animation: cardExpand 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .canvas-card.child-card { width: 520px; border-left: 3px solid var(--accent-primary); }
    .canvas-card.collapsed .card-response { display: none; }
    .canvas-card.collapsed { max-height: 52px; }

    @keyframes cardExpand {
      from { opacity: 0; transform: scale(0.85) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Collapse toggle button */
    .card-collapse-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px; height: 24px;
      border-radius: 6px;
      border: none;
      background: rgba(255,255,255,0.3);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 5;
      pointer-events: none;
    }

    .canvas-card:hover .card-collapse-btn { opacity: 1; pointer-events: auto; }

    .card-question {
      padding: 12px 16px;
      padding-right: 36px;
      background: var(--accent-primary);
      color: white;
      font-size: 13px;
      font-weight: 500;
      border-radius: 16px 16px 0 0;
      line-height: 1.5;
      cursor: grab;
    }

    .card-question:active { cursor: grabbing; }
    .card-question { user-select: none; -webkit-user-select: none; }

    .card-response {
      padding: 16px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-primary);
      overflow-y: auto;
      max-height: 380px;
    }

    .card-response h1, .card-response h2, .card-response h3 { margin: 12px 0 6px; font-size: 15px; }
    .card-response p { margin-bottom: 8px; }
    .card-response ul, .card-response ol { margin: 8px 0 8px 20px; }
    .card-response li { margin-bottom: 4px; }
    .card-response code { background: var(--hover-bg); padding: 1px 4px; border-radius: 4px; font-size: 12px; }
    .card-response pre { background: var(--hover-bg); padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
    .card-response pre code { background: none; padding: 0; }
    .card-response mark { background: rgba(232, 155, 95, 0.2); padding: 0 2px; border-radius: 2px; }

    .card-loading {
      padding: 24px 16px;
      text-align: center;
    }

    .card-loading .typing-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-primary);
      margin: 0 3px;
      animation: typingBounce 1.4s ease-in-out infinite;
    }

    .card-loading .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .card-loading .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* Source cards inside response */
    .source-card {
      margin-top: 8px;
      padding: 10px;
      background: var(--hover-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }

    .source-card a { color: var(--accent-primary); text-decoration: none; font-weight: 600; font-size: 12px; }
    .source-card a:hover { text-decoration: underline; }

    /* ============ FOLLOW-UP BUBBLES ============ */
    .followup-bubble {
      position: absolute;
      background: var(--bg-tertiary);
      border: 1.5px solid var(--accent-primary);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-primary);
      cursor: pointer;
      white-space: nowrap;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.2s;
      z-index: 2;
      box-shadow: 0 2px 12px var(--shadow), 0 0 0 0 rgba(124, 152, 133, 0);
      animation: bubbleAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, bubblePulse 3s ease-in-out 1s infinite;
      opacity: 0;
    }

    @keyframes bubbleAppear {
      from { opacity: 0; transform: scale(0.5) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes bubblePulse {
      0%, 100% { box-shadow: 0 2px 12px var(--shadow), 0 0 0 0 rgba(124, 152, 133, 0); }
      50% { box-shadow: 0 2px 12px var(--shadow), 0 0 0 4px rgba(124, 152, 133, 0.1); }
    }

    .followup-bubble:hover {
      background: var(--accent-primary);
      color: white;
      transform: scale(1.08);
      animation: none;
      opacity: 1;
    }

    /* ============ INPUT BUBBLE ============ */
    .followup-input-bubble {
      position: absolute;
      background: var(--bg-tertiary);
      border: 1.5px solid var(--border-color);
      border-radius: 14px;
      padding: 0;
      z-index: 2;
      box-shadow: 0 2px 12px var(--shadow);
      display: flex;
      align-items: center;
      overflow: hidden;
      animation: bubbleAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    .followup-input-bubble input {
      border: none;
      outline: none;
      background: none;
      padding: 8px 12px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text-primary);
      width: 180px;
    }

    .followup-input-bubble input::placeholder { color: var(--text-muted); }

    .followup-input-bubble button {
      border: none;
      background: var(--accent-primary);
      color: white;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .followup-input-bubble button:hover { background: var(--accent-secondary); }

    .followup-input-bubble:focus-within {
      border-color: var(--accent-primary);
    }

    /* ============ BRANCH BUTTON ============ */
    .branch-btn {
      position: absolute;
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1.5px solid var(--accent-primary);
      background: var(--bg-tertiary);
      color: var(--accent-primary);
      font-size: 16px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 2px 8px var(--shadow);
      transform: scale(0.8);
    }

    .branch-btn {
      opacity: 0.4;
      transform: scale(1);
    }

    .branch-btn:hover {
      opacity: 1;
      background: var(--accent-primary);
      color: white;
      transform: scale(1.2);
    }

    /* ============ CONTEXT MENU ============ */
    .ctx-menu {
      position: fixed;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 8px 32px var(--shadow);
      padding: 6px;
      z-index: 500;
      min-width: 180px;
      display: none;
      animation: ctxAppear 0.15s ease;
    }

    .ctx-menu.active { display: block; }

    @keyframes ctxAppear {
      from { opacity: 0; transform: scale(0.95) translateY(-4px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .ctx-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.1s;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      text-align: left;
    }

    .ctx-item:hover { background: var(--hover-bg); }

    .ctx-item svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .ctx-divider {
      height: 1px;
      background: var(--border-color);
      margin: 4px 8px;
    }

    /* ============ STICKY NOTE ============ */
    .sticky-note {
      position: absolute;
      width: 200px;
      min-height: 80px;
      background: #fef3c7;
      border: 1px solid #f59e0b33;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      z-index: 1;
      cursor: grab;
      display: flex;
      flex-direction: column;
      animation: cardExpand 0.3s ease forwards;
    }

    body[data-theme="dark"] .sticky-note {
      background: #422006;
      border-color: #92400e55;
      color: #fef3c7;
    }

    .sticky-note-header {
      display: flex;
      justify-content: flex-end;
      padding: 4px 6px 0;
    }

    .sticky-note-delete {
      background: none;
      border: none;
      color: #d97706;
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.15s;
      padding: 2px 4px;
    }

    .sticky-note:hover .sticky-note-delete { opacity: 0.6; }
    .sticky-note-delete:hover { opacity: 1 !important; }

    .sticky-note textarea {
      flex: 1;
      border: none;
      background: none;
      resize: none;
      padding: 6px 10px 10px;
      font-size: 12px;
      font-family: inherit;
      line-height: 1.5;
      color: inherit;
      outline: none;
    }

    .sticky-note textarea::placeholder { color: #d97706aa; }

    /* ============ WELCOME SCREEN ============ */
    #welcomeScreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      pointer-events: none;
    }

    #welcomeScreen.hidden { display: none; }

    #welcomeScreen h1 {
      font-family: 'Lora', serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text-primary);
      margin-bottom: 8px;
      opacity: 0.8;
    }

    #welcomeScreen p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* ============ INPUT BAR ============ */
    .input-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      z-index: 200;
      display: flex;
      gap: 8px;
    }

    .input-bar textarea {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg-tertiary);
      backdrop-filter: blur(20px);
      color: var(--text-primary);
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      box-shadow: 0 4px 24px var(--shadow);
      transition: border-color 0.2s;
    }

    .input-bar textarea:focus { border-color: var(--accent-primary); }
    .input-bar textarea::placeholder { color: var(--text-muted); }

    .input-bar button {
      width: 48px; height: 48px;
      border-radius: 14px;
      border: none;
      background: var(--accent-primary);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 4px 16px var(--shadow);
    }

    .input-bar button:hover { background: var(--accent-secondary); transform: translateY(-1px); }
    .input-bar button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ============ SIDEBAR ============ */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      background: var(--bg-tertiary);
      border-right: 1px solid var(--border-color);
      z-index: 300;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .sidebar.active { transform: translateX(0); }

    .sidebar-header {
      padding: 20px;
      font-family: 'Lora', serif;
      font-size: 18px;
      font-weight: 500;
      border-bottom: 1px solid var(--border-color);
    }

    .new-chat-btn {
      margin: 12px 16px;
      padding: 10px;
      border: 1.5px solid var(--border-color);
      border-radius: 10px;
      background: none;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .new-chat-btn:hover { border-color: var(--accent-primary); background: var(--hover-bg); }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .conversation-item:hover { background: var(--hover-bg); }
    .conversation-item.active { background: var(--hover-bg); color: var(--text-primary); font-weight: 500; }

    .conversation-item .title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-item .delete-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
    }

    .conversation-item:hover .delete-btn { display: block; }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border-color);
    }

    .sidebar-footer .user-email {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-footer .logout-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .sidebar-footer .logout-btn:hover { color: #dc2626; }

    /* ============ TOP BUTTONS ============ */
    .top-btn {
      position: fixed;
      z-index: 200;
      width: 40px; height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      backdrop-filter: blur(10px);
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .top-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

    #menuBtn { top: 16px; left: 16px; }
    #navBtn { top: 16px; left: 64px; }
    #notifBtn { top: 16px; right: 64px; }
    #settingsBtn { top: 16px; right: 16px; }

    /* Notification badge */
    .notif-badge {
      position: absolute;
      top: -4px; right: -4px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #dc2626;
      display: none;
    }

    .notif-badge.visible { display: block; }

    /* ============ NOTIFICATION DROPDOWN ============ */
    .notif-dropdown {
      position: fixed;
      top: 64px; right: 16px;
      width: 320px;
      max-height: 400px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      box-shadow: 0 8px 32px var(--shadow);
      z-index: 400;
      display: none;
      overflow: hidden;
    }

    .notif-dropdown.active { display: block; }

    .notif-dropdown-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;

    .nav-drawer svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ============ CANVAS CONTROLS ============ */
    .canvas-controls {
      position: fixed;
      bottom: 88px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;

    .canvas-ctrl-btn {

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

  <script>
    // ============ CONSTANTS ============
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let authToken = null;
    let currentUser = null;
    let conversationId = null;
    let userProfile = null;

    // ============ CANVAS STATE ============
    const viewport = document.getElementById('canvasViewport');
    const world = document.getElementById('canvasWorld');
    const svgLayer = document.getElementById('connectionsSvg');

    let panX = 0, panY = 0, scale = 1;
    let isPanning = false, panStartX = 0, panStartY = 0;
    let cards = []; // {id, element, x, y, parentId, question, response, sources, followups[]}
    let connections = []; // {fromId, toId, line}
    let nextCardId = 0;
    let draggedCard = null, dragOffsetX = 0, dragOffsetY = 0, dragStartX = 0, dragStartY = 0, isDragging = false;

    function updateTransform() {
      world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      // Sync dot grid with pan
      viewport.style.backgroundPosition = `${panX}px ${panY}px`;
      viewport.style.backgroundSize = `${24 * scale}px ${24 * scale}px`;
      document.getElementById('zoomIndicator').textContent = Math.round(scale * 100) + '%';
      renderMinimap();
    }

    // ============ PAN & ZOOM ============
    viewport.addEventListener('mousedown', (e) => {
      if (e.target !== viewport && e.target !== world && e.target !== svgLayer) return;
      isPanning = true;
      panStartX = e.clientX - panX;
      panStartY = e.clientY - panY;
      viewport.classList.add('grabbing');
    });

    window.addEventListener('mousemove', (e) => {
      if (isPanning) {
        panX = e.clientX - panStartX;
        panY = e.clientY - panStartY;
        updateTransform();
      }
      if (draggedCard !== null) {
        const dx = (e.clientX - dragStartX) / scale;
        const dy = (e.clientY - dragStartY) / scale;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
        const card = cards.find(c => c.id === draggedCard);
        if (card) {
          card.x = dragOffsetX + dx;
          card.y = dragOffsetY + dy;
          card.element.style.left = card.x + 'px';
          card.element.style.top = card.y + 'px';
          updateFollowupPositions(card);
          updateConnections();
        }
      }
    });

    window.addEventListener('mouseup', () => {
      isPanning = false;
      viewport.classList.remove('grabbing');
      if (draggedCard !== null) {
        const card = cards.find(c => c.id === draggedCard);
        if (card) card.element.classList.remove('dragging');
        if (isDragging) saveLayout();
        draggedCard = null;
        viewport.classList.remove('dragging-card');
        setTimeout(() => isDragging = false, 50);
      }
    });

    viewport.addEventListener('wheel', (e) => {
      // If scrolling inside a card response, let it scroll naturally
      const responseEl = e.target.closest('.card-response');
      if (responseEl) {
        const atTop = responseEl.scrollTop === 0;
        const atBottom = responseEl.scrollTop + responseEl.clientHeight >= responseEl.scrollHeight - 1;
        // Only zoom if at scroll boundary and scrolling further
        if ((e.deltaY < 0 && !atTop) || (e.deltaY > 0 && !atBottom)) {
          return; // Let card scroll
        }
      }

      e.preventDefault();
      const zoomSpeed = 0.001;
      const delta = -e.deltaY * zoomSpeed;
      const newScale = Math.min(2, Math.max(0.3, scale + delta * scale));

      const mx = e.clientX, my = e.clientY;
      panX = mx - (mx - panX) * (newScale / scale);
      panY = my - (my - panY) * (newScale / scale);
      scale = newScale;

      updateTransform();
    }, { passive: false });

    // ============ CARD CREATION ============

    function createCard(question, x, y, parentId = null) {
      const id = nextCardId++;
      const el = document.createElement('div');
      el.className = 'canvas-card expanding' + (parentId !== null ? ' child-card' : '');
      el.style.left = x + 'px';
      el.style.top = y + 'px';

      el.innerHTML = `
        <button class="card-collapse-btn" title="Collapse/Expand">-</button>
        <div class="card-question">${escapeHtml(question)}</div>
        <div class="card-loading">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      `;

      // Collapse toggle
      el.querySelector('.card-collapse-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        el.classList.toggle('collapsed');
        e.currentTarget.textContent = el.classList.contains('collapsed') ? '+' : '-';
        setTimeout(() => {
          const card = cards.find(c => c.id === id);
          if (card) { updateFollowupPositions(card); updateConnections(); }
        }, 50);
      });

      // Drag handler on the question header specifically
      function attachDragHandler() {
        const qHeader = el.querySelector('.card-question');
        if (!qHeader) return;
        qHeader.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const cardObj = cards.find(c => c.id === id);
          if (!cardObj) return;
          draggedCard = id;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          dragOffsetX = cardObj.x;
          dragOffsetY = cardObj.y;
          isDragging = false;
          el.classList.add('dragging');
          viewport.classList.add('dragging-card');
        });
      }
      attachDragHandler();

      world.appendChild(el);

      const card = { id, element: el, x, y, parentId, question, response: null, sources: null, followups: [] };
      cards.push(card);

      // Draw connection to parent
      if (parentId !== null) {
        drawConnection(parentId, id);
      }

      return card;
    }

    function populateCard(card, response, sources, followups) {
      card.response = response;
      card.sources = sources;

      // Render response with markdown
      const renderer = new marked.Renderer();
      renderer.link = function(href, title, text) {
        return `<a href="${href}" target="_blank" rel="noopener">${text}</a>`;
      };
      marked.setOptions({ renderer, breaks: true, gfm: true });

      // Inject steganographic watermark before rendering
      const watermarkedResponse = injectSteganography(response);
      let responseHtml = marked.parse(watermarkedResponse);

      // Sources HTML
      let sourcesHtml = '';
      if (sources && sources.length > 0) {
        const noteSources = sources.filter(s => !s.from_wikipedia);
        const wikiSources = sources.filter(s => s.from_wikipedia && s.wikipedia_url);

        if (noteSources.length > 0) {
          sourcesHtml += '<div style="margin-top:12px;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:8px;">Sources</div>';
          noteSources.forEach(s => {
            const name = s.filename.replace(/\s*\([^)]*\)$/, '').replace(/\.(txt|pdf|docx?)$/i, '');
            const user = s.username ? `@${s.username}` : 'Anonymous';
            sourcesHtml += `
              <div class="source-card">
                <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;">
                  <div style="min-width:0;">
                    <a href="note-viewer.html?id=${s.note_id}" target="_blank">${name}</a>
                    <div style="font-size:10px;color:var(--text-muted);margin-top:2px;">${user} - ${s.university || ''}</div>
                  </div>
                  <div style="display:flex;gap:4px;flex-shrink:0;">
                    <button class="vote-btn vote-up" data-note-id="${s.note_id}" style="padding:4px 8px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-tertiary);color:var(--text-muted);font-size:10px;cursor:pointer;display:flex;align-items:center;gap:3px;">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px;"><polyline points="18 15 12 9 6 15"/></svg>Yes
                    </button>
                    <button class="vote-btn vote-down" data-note-id="${s.note_id}" style="padding:4px 8px;border:1px solid var(--border-color);border-radius:6px;background:var(--bg-tertiary);color:var(--text-muted);font-size:10px;cursor:pointer;display:flex;align-items:center;gap:3px;">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:10px;height:10px;"><polyline points="6 9 12 15 18 9"/></svg>No
                    </button>
                  </div>
                </div>
              </div>`;
          });
        }

        if (wikiSources.length > 0) {
          wikiSources.forEach(s => {
            const title = s.filename.replace('.txt', '').replace(/ \(Wikipedia.*\)/, '');
            sourcesHtml += `<div class="source-card"><a href="${s.wikipedia_url}" target="_blank">Wikipedia: ${title}</a></div>`;
          });
        }
      }

      card.element.innerHTML = `
        <button class="card-collapse-btn" title="Collapse/Expand">-</button>
        <div class="card-question">${escapeHtml(card.question)}</div>
        <div class="card-response">${responseHtml}${sourcesHtml}</div>
      `;

      // Re-attach collapse handler
      card.element.querySelector('.card-collapse-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        card.element.classList.toggle('collapsed');
        e.currentTarget.textContent = card.element.classList.contains('collapsed') ? '+' : '-';
        setTimeout(() => { updateFollowupPositions(card); updateConnections(); }, 50);
      });

      // Re-attach drag handler on new question header
      const qHeader = card.element.querySelector('.card-question');
      if (qHeader) {
        qHeader.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          draggedCard = card.id;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          dragOffsetX = card.x;
          dragOffsetY = card.y;
          isDragging = false;
          card.element.classList.add('dragging');
          viewport.classList.add('dragging-card');
        });
      }

      // KaTeX rendering
      const responseEl = card.element.querySelector('.card-response');
      if (window.renderMathInElement) {
        renderMathInElement(responseEl, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\[', right: '\\]', display: true},
            {left: '\\(', right: '\\)', display: false}
          ],
          throwOnError: false
        });
      }

      // Vote handlers
      card.element.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const target = e.currentTarget;
          const isUp = target.classList.contains('vote-up');
          const noteId = target.dataset.noteId;
          if (!noteId) return;
          try {
            const msgId = `msg_${Date.now()}_${noteId}_${Math.random().toString(36).substr(2, 9)}`;
            await fetch(`${BACKEND_URL}/api/chat/rate-response`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ message_id: msgId, conversation_id: conversationId, vote: isUp ? 1 : -1, cited_note_ids: [noteId] })
            });
            const sc = target.closest('.source-card');
            if (sc) {
              sc.querySelectorAll('.vote-btn').forEach(b => { b.style.opacity = '0.4'; b.style.pointerEvents = 'none'; });
              target.style.opacity = '1';
              target.style.background = 'var(--accent-primary)';
              target.style.color = 'white';
            }
          } catch (err) { console.error('Vote error:', err); }
        });
      });

      // Create follow-up bubbles
      if (followups && followups.length > 0) {
        card.followups = followups.map((text, i) => {
          const bubble = document.createElement('div');
          bubble.className = 'followup-bubble';
          bubble.textContent = text;
          bubble.title = text;
          world.appendChild(bubble);

          bubble.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isDragging) return;
            askFollowup(card.id, text, bubble);
          });

          return { text, element: bubble };
        });

        updateFollowupPositions(card);
      }

      updateConnections();
    }

    function updateFollowupPositions(card) {
      const cardW = card.element.classList.contains('child-card') ? 520 : 550;
      const cardH = card.element.offsetHeight || 200;
      const count = card.followups.length;
      const startY = card.y + cardH + 40;

      // Remove old followup lines
      if (card._followupPaths) {
        card._followupPaths.forEach(p => p.remove());
      }
      card._followupPaths = [];

      const anchorX = card.x + cardW / 2;
      const anchorY = card.y + cardH;

      // Separate input bubble from suggestion bubbles
      const inputItems = card.followups.filter(f => f.isInput);
      const suggestionItems = card.followups.filter(f => !f.isInput);

      // Row 1: Input bubble centered
      const row1Y = startY;
      inputItems.forEach(f => {
        const bw = f.element.offsetWidth || 210;
        f.element.style.left = (anchorX - bw / 2) + 'px';
        f.element.style.top = row1Y + 'px';
      });

      // Row 2: Suggestion bubbles centered below
      const row2Y = startY + (inputItems.length > 0 ? 50 : 0);
      const suggWidths = suggestionItems.map(f => f.element.offsetWidth || 140);
      const gap = 16;
      const totalSuggW = suggWidths.reduce((sum, w) => sum + w, 0) + gap * Math.max(suggestionItems.length - 1, 0);
      let cursorX = anchorX - totalSuggW / 2;

      suggestionItems.forEach((f, i) => {
        const bw = suggWidths[i];
        f.element.style.left = cursorX + 'px';
        f.element.style.top = row2Y + 'px';
        cursorX += bw + gap;
      });

      // Draw lines from card to all items
      const allItems = [...inputItems, ...suggestionItems];
      allItems.forEach(f => {
        const fx = parseFloat(f.element.style.left) || 0;
        const fy = parseFloat(f.element.style.top) || 0;
        const bw = f.element.offsetWidth || 140;
        const bcx = fx + bw / 2;
        const bcy = fy;

        // Draw bezier line from card bottom to bubble
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const ax = anchorX + SVG_OFFSET, ay = anchorY + SVG_OFFSET;
        const bx = bcx + SVG_OFFSET, by = bcy + SVG_OFFSET;
        const midY = ay + (by - ay) * 0.5;
        path.setAttribute('d', `M ${ax} ${ay} C ${ax} ${midY}, ${bx} ${midY}, ${bx} ${by}`);
        path.setAttribute('stroke', '#7c9885');
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('opacity', '0.3');
        path.setAttribute('stroke-dasharray', '4 3');
        svgLayer.appendChild(path);
        card._followupPaths.push(path);
      });
    }

    // ============ CONNECTIONS (BEZIER) ============
    const SVG_OFFSET = 10000; // SVG starts at -10000, so add offset to coords

    function drawConnection(fromId, toId) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('stroke', '#7c9885');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('fill', 'none');
      path.setAttribute('opacity', '0.35');
      svgLayer.appendChild(path);

      // Create branch button on the line midpoint
      const branchBtn = document.createElement('div');
      branchBtn.className = 'branch-btn';
      branchBtn.textContent = '+';
      branchBtn.title = 'Branch from here';
      world.appendChild(branchBtn);

      branchBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const parentCard = cards.find(c => c.id === fromId);
        if (parentCard && parentCard.response) {
          createFollowupBubbles(parentCard, [
            'Tell me more about this',
            'How does this connect to other topics?'
          ]);
        }
      });

      connections.push({ fromId, toId, path, branchBtn });
      updateConnections();
    }

    function updateConnections() {
      connections.forEach(conn => {
        const from = cards.find(c => c.id === conn.fromId);
        const to = cards.find(c => c.id === conn.toId);
        if (!from || !to) return;
        const fw = from.element.classList.contains('child-card') ? 520 : 550;
        const tw = to.element.classList.contains('child-card') ? 520 : 550;
        const fh = from.element.offsetHeight || 200;
        const x1 = from.x + fw / 2 + SVG_OFFSET, y1 = from.y + fh + SVG_OFFSET;
        const x2 = to.x + tw / 2 + SVG_OFFSET, y2 = to.y + SVG_OFFSET;
        const cy1 = y1 + (y2 - y1) * 0.5;
        const cy2 = y2 - (y2 - y1) * 0.5;
        conn.path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${cy1}, ${x2} ${cy2}, ${x2} ${y2}`);

        // Position branch button at midpoint of the line (in world coords, not SVG coords)
        const midX = (from.x + fw / 2 + to.x + tw / 2) / 2 - 12;
        const midY = ((from.y + fh) + to.y) / 2 - 12;
        if (conn.branchBtn) {
          conn.branchBtn.style.left = midX + 'px';
          conn.branchBtn.style.top = midY + 'px';
        }
      });
    }

    // ============ SEND MESSAGE ============
    async function sendMessage(text, parentId = null, originBubble = null) {
      if (!text.trim()) return;

      document.getElementById('welcomeScreen').classList.add('hidden');
      document.querySelector('.input-bar').style.display = 'none';

      // SB 1455: Disclosure at initiation of first card
      if (cards.length === 0) {
        injectInitiationDisclosure();
        startAiDisclosureTimer();
      }

      // Position the new card
      let cx, cy;
      if (parentId !== null) {
        const parent = cards.find(c => c.id === parentId);
        const ph = parent.element.offsetHeight || 200;
        cx = parent.x + (Math.random() - 0.5) * 100;
        cy = parent.y + ph + 120;
      } else {
        // New root card: center of viewport
        cx = (window.innerWidth / 2 - panX) / scale - 275;
        cy = (window.innerHeight / 2 - panY) / scale - 100 + cards.length * 30;
      }

      // Remove all followup bubbles and paths from parent
      if (originBubble) {
        const parentCard = cards.find(c => c.id === parentId);
        if (parentCard) {
          if (parentCard._followupPaths) {
            parentCard._followupPaths.forEach(p => p.remove());
            parentCard._followupPaths = [];
          }
          // Remove all bubbles
          parentCard.followups.forEach(f => f.element.remove());
          parentCard.followups = [];

          // Position new card below parent
          const pcW = parentCard.element.classList.contains('child-card') ? 520 : 550;
          const pcH = parentCard.element.offsetHeight || 200;
          const cardW = 520;
          cx = parentCard.x + pcW / 2 - cardW / 2;
          cy = parentCard.y + pcH + 100;
        }
      }

      const card = createCard(text, cx, cy, parentId);
      // drawConnection in createCard handles the line (and it updates on drag)

      // Pan to show the new card
      panToCard(card);

      try {
        const body = { message: text };
        if (conversationId) body.conversation_id = conversationId;

        const res = await fetch(`${BACKEND_URL}/api/notes/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
          body: JSON.stringify(body)
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.conversation_id) conversationId = data.conversation_id;

        populateCard(card, data.response || 'Sorry, something went wrong.', data.sources, []);

        // Use AI suggestions if available, fallback to generic
        const suggestions = (data.followup_suggestions && data.followup_suggestions.length > 0)
          ? data.followup_suggestions
          : ['Tell me more about this', 'Give me an example'];
        createFollowupBubbles(card, suggestions);
        panToCard(card);
        saveLayout();
        loadConversations();

      } catch (err) {
        console.error('Chat error:', err);
        populateCard(card, 'Sorry, something went wrong. Please try again.', null, []);
      }
    }

    function askFollowup(parentId, text, bubbleEl) {
      sendMessage(text, parentId, bubbleEl);
    }

    function createFollowupBubbles(card, aiSuggestions) {
      // Remove existing followups
      card.followups.forEach(f => f.element.remove());
      if (card._followupPaths) card._followupPaths.forEach(p => p.remove());
      card.followups = [];
      card._followupPaths = [];

      const items = [];

      // 1. Text input bubble
      const inputBubble = document.createElement('div');
      inputBubble.className = 'followup-input-bubble';
      inputBubble.innerHTML = `
        <input type="text" placeholder="Ask a follow-up..." />
        <button>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      `;
      world.appendChild(inputBubble);

      const inputEl = inputBubble.querySelector('input');
      const sendEl = inputBubble.querySelector('button');

      function submitInput() {
        const val = inputEl.value.trim();
        if (!val) return;
        askFollowup(card.id, val, inputBubble);
      }

      sendEl.addEventListener('click', (e) => { e.stopPropagation(); submitInput(); });
      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); e.stopPropagation(); submitInput(); }
      });
      inputEl.addEventListener('click', (e) => e.stopPropagation());

      items.push({ text: '', element: inputBubble, isInput: true });

      // 2. AI-generated suggestion bubbles
      const suggestions = (aiSuggestions || []).slice(0, 2);
      suggestions.forEach(text => {
        const bubble = document.createElement('div');
        bubble.className = 'followup-bubble';
        bubble.textContent = text;
        bubble.title = text;
        world.appendChild(bubble);

        bubble.addEventListener('click', (e) => {
          e.stopPropagation();
          if (isDragging) return;
          askFollowup(card.id, text, bubble);
        });

        items.push({ text, element: bubble, isInput: false });
      });

      card.followups = items;
      updateFollowupPositions(card);
    }

    function panToCard(card) {
      const targetX = -(card.x * scale) + window.innerWidth / 2 - 275 * scale;
      const targetY = -(card.y * scale) + window.innerHeight / 2 - 100 * scale;

      const startX = panX, startY = panY;
      const duration = 400;
      const start = performance.now();

      function animate(t) {
        const elapsed = t - start;
        const progress = Math.min(elapsed / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        panX = startX + (targetX - startX) * ease;
        panY = startY + (targetY - startY) * ease;
        updateTransform();
        if (progress < 1) requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    }

    // ============ CONVERSATIONS ============
    async function loadConversations() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/conversations`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (!res.ok) return;
        const data = await res.json();
        const list = document.getElementById('conversationList');

        if (!data.conversations || data.conversations.length === 0) {
          list.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:var(--text-muted);">No conversations yet</div>';
          return;
        }

        list.innerHTML = data.conversations.map(c => `
          <div class="conversation-item ${c.id === conversationId ? 'active' : ''}" data-id="${c.id}">
            <span class="title">${c.title || 'New Chat'}</span>
            <button class="delete-btn" title="Delete">&times;</button>
          </div>
        `).join('');

        // Click handlers
        list.querySelectorAll('.conversation-item').forEach(item => {
          item.querySelector('.title').addEventListener('click', () => loadConversation(item.dataset.id));
          item.querySelector('.delete-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            deleteConversation(item.dataset.id, item);
          });
        });
      } catch (e) { console.error('Load conversations error:', e); }
    }

    async function loadConversation(convId) {
      try {
        // Fetch messages and saved layout in parallel
        const [msgRes, savedLayout] = await Promise.all([
          fetch(`${BACKEND_URL}/api/conversations/${convId}/messages`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
          }),
          getSavedLayout(convId)
        ]);

        if (!msgRes.ok) return;
        const data = await msgRes.json();

        // Clear canvas
        clearCanvas();
        conversationId = convId;
        document.getElementById('welcomeScreen').classList.add('hidden');
        document.querySelector('.input-bar').style.display = 'none';

        // Build a lookup from saved layout by question text
        const savedPositions = {};
        if (savedLayout && savedLayout.cards) {
          savedLayout.cards.forEach((sc, i) => {
            savedPositions[sc.question] = { x: sc.x, y: sc.y, parentId: sc.parentId, index: i };
          });
        }

        // Rebuild cards from messages, using saved positions if available
        let lastCardId = null;
        let pendingQuestion = null;
        let fallbackY = 0;
        let fallbackDir = 1;

        for (const msg of (data.messages || [])) {
          if (msg.role === 'user') {
            pendingQuestion = msg.content;
          } else if (msg.role === 'assistant' && pendingQuestion) {
            const saved = savedPositions[pendingQuestion];
            let cx, cy, parentId;

            if (saved) {
              cx = saved.x;
              cy = saved.y;
              // Map saved parentId to actual card id
              parentId = saved.parentId !== null && saved.parentId !== undefined
                ? (saved.parentId < cards.length ? saved.parentId : lastCardId)
                : lastCardId;
            } else {
              // Fallback: zigzag layout
              const offsetX = fallbackDir * (40 + Math.random() * 30);
              fallbackDir *= -1;
              cx = offsetX;
              cy = fallbackY;
              parentId = lastCardId;
            }

            const card = createCard(pendingQuestion, cx, cy, parentId);
            populateCard(card, msg.content, msg.sources, []);

            if (!saved) {
              fallbackY += (card.element.offsetHeight || 200) + 100;
            }

            lastCardId = card.id;
            pendingQuestion = null;
          }
        }

        // Restore pan/zoom from saved layout
        if (savedLayout && savedLayout.panX !== undefined) {
          panX = savedLayout.panX;
          panY = savedLayout.panY;
          scale = savedLayout.scale || 1;
          updateTransform();
        } else if (cards.length > 0) {
          panToCard(cards[0]);
        }

        // Add follow-ups to all leaf cards (cards that have no children)
        if (cards.length > 0) {
          const parentIds = new Set(cards.map(c => c.parentId).filter(id => id !== null));
          cards.forEach(c => {
            if (!parentIds.has(c.id) && c.response) {
              createFollowupBubbles(c, [
                'Tell me more about this',
                'What else should I know?'
              ]);
            }
          });
        }

        // Start disclosure timer for loaded conversation
        startAiDisclosureTimer();

        // Update sidebar active state
        document.querySelectorAll('.conversation-item').forEach(i => i.classList.toggle('active', i.dataset.id === convId));
        sidebar.classList.remove('active');

      } catch (e) { console.error('Load conversation error:', e); }
    }

    async function deleteConversation(convId, el) {
      if (!confirm('Delete this conversation?')) return;
      try {
        el.style.opacity = '0';
        await fetch(`${BACKEND_URL}/api/conversations/${convId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        setTimeout(() => {
          if (convId === conversationId) startNewChat();
          loadConversations();
        }, 300);
      } catch (e) {
        el.style.opacity = '1';
        console.error('Delete error:', e);
      }
    }

    function startNewChat() {
      clearCanvas();
      conversationId = null;
      document.getElementById('welcomeScreen').classList.remove('hidden');
      document.querySelector('.input-bar').style.display = 'flex';
      document.querySelectorAll('.conversation-item').forEach(i => i.classList.remove('active'));
      sidebar.classList.remove('active');
      document.getElementById('chatInput').focus();
    }

    function clearCanvas() {
      // Remove all cards, followup bubbles, and followup paths
      cards.forEach(c => {
        c.element.remove();
        c.followups.forEach(f => f.element.remove());
        if (c._followupPaths) c._followupPaths.forEach(p => p.remove());
      });
      connections.forEach(c => {
        c.path.remove();
        if (c.branchBtn) c.branchBtn.remove();
      });
      cards = [];
      connections = [];
      nextCardId = 0;
      panX = 0; panY = 0; scale = 1;
      updateTransform();
    }

    // ============ LAYOUT SAVE/RESTORE (SUPABASE) ============
    let _saveTimeout = null;

    function saveLayout() {
      if (!conversationId || cards.length === 0) return;
      // Debounce -- save 1 second after last change
      clearTimeout(_saveTimeout);
      _saveTimeout = setTimeout(async () => {
        const layout = cards.map(c => ({
          question: c.question,
          x: c.x,
          y: c.y,
          parentId: c.parentId
        }));
        try {
          await fetch(`${BACKEND_URL}/api/conversations/${conversationId}/layout`, {
            method: 'PUT',
            headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ cards: layout, panX, panY, scale })
          });
        } catch (e) {}
      }, 1000);
    }

    async function getSavedLayout(convId) {
      try {
        const res = await fetch(`${BACKEND_URL}/api/conversations/${convId}/layout`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (!res.ok) return null;
        const data = await res.json();
        return data;
      } catch (e) { return null; }
    }

    // ============ NOTIFICATIONS ============
    let notifData = [];

    async function fetchNotifications() {
      if (!authToken) return;
      try {
        const res = await fetch(`${BACKEND_URL}/api/notifications`, { headers: { 'Authorization': `Bearer ${authToken}` } });
        if (res.ok) {
          const json = await res.json();
          notifData = json.notifications || [];
        }
        renderNotifications();
      } catch (e) {}
    }

    function renderNotifications() {
      const list = document.getElementById('notifList');
      const badge = document.getElementById('notifBadge');
      const unread = notifData.filter(n => !n.is_read).length;
      badge.classList.toggle('visible', unread > 0);

      if (!notifData.length) {
        list.innerHTML = '<div class="notif-empty">No notifications yet</div>';
        return;
      }

      list.innerHTML = notifData.map(n => `
        <div class="notif-item ${n.is_read ? '' : 'unread'}" data-id="${n.id}" data-note="${n.note_id || ''}">
          ${n.message || n.title}
          <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">${timeAgo(n.created_at)}</div>
        </div>
      `).join('');
    }

    function timeAgo(d) {
      const s = Math.floor((new Date() - new Date(d)) / 1000);
      if (s < 60) return 'just now';
      const m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
      const h = Math.floor(m / 60); if (h < 24) return h + 'h ago';
      const days = Math.floor(h / 24); if (days < 7) return days + 'd ago';
      return new Date(d).toLocaleDateString();
    }

    document.getElementById('notifBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('notifDropdown').classList.toggle('active');
      fetchNotifications();
    });

    document.getElementById('notifMarkAll').addEventListener('click', async () => {
      try {
        await fetch(`${BACKEND_URL}/api/notifications/read`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ all: true })
        });
        notifData.forEach(n => n.is_read = true);
        renderNotifications();
      } catch (e) {}
    });

    document.getElementById('notifList').addEventListener('click', (e) => {
      const item = e.target.closest('.notif-item');
      if (!item) return;
      const noteId = item.dataset.note;
      if (noteId) window.open(`note-viewer.html?id=${noteId}`, '_blank');
      document.getElementById('notifDropdown').classList.remove('active');
    });

    document.addEventListener('click', (e) => {
      if (!document.getElementById('notifDropdown').contains(e.target) && !document.getElementById('notifBtn').contains(e.target))
        document.getElementById('notifDropdown').classList.remove('active');
    });

    setInterval(fetchNotifications, 60000);

    // ============ MINIMAP ============
    const minimapCanvas = document.getElementById('minimapCanvas');
    const minimapCtx = minimapCanvas.getContext('2d');

    function renderMinimap() {
      const ctx = minimapCtx;
      const cw = minimapCanvas.width, ch = minimapCanvas.height;
      ctx.clearRect(0, 0, cw, ch);

      if (cards.length === 0) return;

      // Find bounds of all cards
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      cards.forEach(c => {
        const w = c.element.classList.contains('child-card') ? 520 : 550;
        const h = c.element.offsetHeight || 200;
        minX = Math.min(minX, c.x);
        minY = Math.min(minY, c.y);
        maxX = Math.max(maxX, c.x + w);
        maxY = Math.max(maxY, c.y + h);
      });

      const padding = 100;
      minX -= padding; minY -= padding; maxX += padding; maxY += padding;
      const worldW = maxX - minX || 1;
      const worldH = maxY - minY || 1;
      const mapScale = Math.min(cw / worldW, ch / worldH);

      // Draw cards as small rectangles
      cards.forEach(c => {
        const w = c.element.classList.contains('child-card') ? 520 : 550;
        const h = c.element.offsetHeight || 200;
        const rx = (c.x - minX) * mapScale;
        const ry = (c.y - minY) * mapScale;
        const rw = w * mapScale;
        const rh = h * mapScale;

        ctx.fillStyle = c.element.classList.contains('child-card') ? 'rgba(124,152,133,0.4)' : 'rgba(124,152,133,0.6)';
        ctx.fillRect(rx, ry, Math.max(rw, 2), Math.max(rh, 2));
      });

      // Draw connections
      ctx.strokeStyle = 'rgba(124,152,133,0.3)';
      ctx.lineWidth = 1;
      connections.forEach(conn => {
        const from = cards.find(c => c.id === conn.fromId);
        const to = cards.find(c => c.id === conn.toId);
        if (!from || !to) return;
        const fw = from.element.classList.contains('child-card') ? 520 : 550;
        ctx.beginPath();
        ctx.moveTo((from.x + fw / 2 - minX) * mapScale, (from.y + (from.element.offsetHeight || 200) - minY) * mapScale);
        const tw = to.element.classList.contains('child-card') ? 520 : 550;
        ctx.lineTo((to.x + tw / 2 - minX) * mapScale, (to.y - minY) * mapScale);
        ctx.stroke();
      });

      // Draw viewport rectangle
      const vx = (-panX / scale - minX) * mapScale;
      const vy = (-panY / scale - minY) * mapScale;
      const vw = (window.innerWidth / scale) * mapScale;
      const vh = (window.innerHeight / scale) * mapScale;
      ctx.strokeStyle = 'rgba(124,152,133,0.8)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(vx, vy, vw, vh);
    }

    // ============ FIT ALL & ZOOM BUTTONS ============
    function fitAll() {
      if (cards.length === 0) return;

      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      cards.forEach(c => {
        const w = c.element.classList.contains('child-card') ? 520 : 550;
        const h = c.element.offsetHeight || 200;
        minX = Math.min(minX, c.x);
        minY = Math.min(minY, c.y);
        maxX = Math.max(maxX, c.x + w);
        maxY = Math.max(maxY, c.y + h);
      });

      const padding = 120;
      const worldW = (maxX - minX) + padding * 2;
      const worldH = (maxY - minY) + padding * 2;
      const newScale = Math.min(window.innerWidth / worldW, window.innerHeight / worldH, 1.5);
      const cx = (minX + maxX) / 2;
      const cy = (minY + maxY) / 2;
      const targetPanX = window.innerWidth / 2 - cx * newScale;
      const targetPanY = window.innerHeight / 2 - cy * newScale;

      // Animate
      const startX = panX, startY = panY, startScale = scale;
      const duration = 500;
      const start = performance.now();
      function anim(t) {
        const p = Math.min((t - start) / duration, 1);
        const e = 1 - Math.pow(1 - p, 3);
        panX = startX + (targetPanX - startX) * e;
        panY = startY + (targetPanY - startY) * e;
        scale = startScale + (newScale - startScale) * e;
        updateTransform();
        if (p < 1) requestAnimationFrame(anim);
      }
      requestAnimationFrame(anim);
    }

    document.getElementById('fitAllBtn').addEventListener('click', fitAll);
    document.getElementById('zoomInBtn').addEventListener('click', () => {
      scale = Math.min(2, scale * 1.2);
      updateTransform();
    });
    document.getElementById('zoomOutBtn').addEventListener('click', () => {
      scale = Math.max(0.3, scale / 1.2);
      updateTransform();
    });

    // ============ COMPLIANCE: STEGANOGRAPHY & PROVENANCE ============
    const ZWSP = '\u200B';
    const ZWNJ = '\u200C';
    const ZWJ  = '\u200D';

    function encodeProvenance(text) {
      const signature = 'SFAI' + Date.now().toString(36);
      let encoded = '';
      for (const char of signature) {
        const bits = char.charCodeAt(0).toString(2).padStart(8, '0');
        for (const bit of bits) {
          encoded += bit === '0' ? ZWSP : ZWNJ;
        }
        encoded += ZWJ;
      }
      return encoded;
    }

    function injectSteganography(text) {
      const marker = encodeProvenance(text);
      const firstPeriod = text.indexOf('. ');
      if (firstPeriod > 0 && firstPeriod < 200) {
        return text.slice(0, firstPeriod + 1) + marker + text.slice(firstPeriod + 1);
      }
      return marker + text;
    }

    function getProvenanceTimestamp() {
      return new Date().toLocaleString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
      });
    }

    // Clipboard intercept: append provenance when copying AI text
    document.addEventListener('copy', function(e) {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      const cardEl = range.commonAncestorContainer.nodeType === 1
        ? range.commonAncestorContainer.closest('.card-response')
        : range.commonAncestorContainer.parentElement?.closest('.card-response');
      if (cardEl) {
        e.preventDefault();
        const selectedText = selection.toString();
        const provenance = `\n\n---\nAI-Generated by StudyFlow Suite | ${getProvenanceTimestamp()}\nThis content is AI-synthesized and grounded in community notes. For full context, always review the original source documents.`;
        e.clipboardData.setData('text/plain', selectedText + provenance);
      }
    });

    // ============ COMPLIANCE: SB 1455 AI DISCLOSURE ============
    const AI_DISCLOSURE_INTERVAL_MS = 30 * 60 * 1000;
    let aiDisclosureTimerId = null;

    function startAiDisclosureTimer() {
      if (aiDisclosureTimerId) clearInterval(aiDisclosureTimerId);
      aiDisclosureTimerId = setInterval(() => {
        injectDisclosureCard();
      }, AI_DISCLOSURE_INTERVAL_MS);
    }

    function injectDisclosureCard() {
      if (cards.length === 0) return;
      // Place disclosure as a small card near the most recent card
      const lastCard = cards[cards.length - 1];
      const el = document.createElement('div');
      el.className = 'disclosure-card';
      el.style.left = (lastCard.x + 600) + 'px';
      el.style.top = lastCard.y + 'px';
      el.textContent = "Reminder: You are chatting with StudyFlow AI, an artificial intelligence assistant. My responses are machine-generated and may contain inaccuracies. Always verify important information independently.";
      world.appendChild(el);
    }

    function injectInitiationDisclosure() {
      // Place at top of canvas
      const el = document.createElement('div');
      el.className = 'disclosure-card';
      el.style.left = '-350px';
      el.style.top = '-60px';
      el.textContent = "You are chatting with StudyFlow AI, an artificial intelligence assistant powered by Gemini 3 Flash Lite. I am not a human. My responses are machine-generated and may contain inaccuracies. Please verify important information independently.";
      world.appendChild(el);
    }

    // ============ CONTEXT MENU ============
    const ctxMenu = document.getElementById('ctxMenu');
    let ctxWorldX = 0, ctxWorldY = 0; // Where the right-click happened in world coords

    viewport.addEventListener('contextmenu', (e) => {
      // Only show on canvas background, not on cards
      if (e.target.closest('.canvas-card') || e.target.closest('.followup-bubble') || e.target.closest('.followup-input-bubble') || e.target.closest('.sticky-note')) return;
      e.preventDefault();

      // Convert screen coords to world coords
      ctxWorldX = (e.clientX - panX) / scale;
      ctxWorldY = (e.clientY - panY) / scale;

      // Position menu at cursor
      ctxMenu.style.left = e.clientX + 'px';
      ctxMenu.style.top = e.clientY + 'px';
      ctxMenu.classList.add('active');
    });

    // Close on any click
    document.addEventListener('click', () => ctxMenu.classList.remove('active'));
    document.addEventListener('contextmenu', (e) => {
      if (!viewport.contains(e.target)) ctxMenu.classList.remove('active');
    });

    // New question at right-click position
    document.getElementById('ctxNewCard').addEventListener('click', () => {
      ctxMenu.classList.remove('active');
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.querySelector('.input-bar').style.display = 'none';

      // Create an input card at the right-click position
      const inputEl = document.createElement('div');
      inputEl.className = 'followup-input-bubble';
      inputEl.style.position = 'absolute';
      inputEl.style.left = ctxWorldX + 'px';
      inputEl.style.top = ctxWorldY + 'px';
      inputEl.style.opacity = '1';
      inputEl.style.width = '280px';
      inputEl.innerHTML = `
        <input type="text" placeholder="Type your question..." style="width:240px;" />
        <button>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      `;
      world.appendChild(inputEl);

      const inp = inputEl.querySelector('input');
      const btn = inputEl.querySelector('button');
      inp.focus();

      function submit() {
        const val = inp.value.trim();
        if (!val) return;
        inputEl.remove();
        sendMessage(val);
      }

      btn.addEventListener('click', (e) => { e.stopPropagation(); submit(); });
      inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
      inp.addEventListener('click', (e) => e.stopPropagation());

      // Remove if clicking elsewhere
      const removeHandler = (e) => {
        if (!inputEl.contains(e.target)) {
          inputEl.remove();
          document.removeEventListener('mousedown', removeHandler);
        }
      };
      setTimeout(() => document.addEventListener('mousedown', removeHandler), 100);
    });

    // Sticky note
    let stickyNotes = [];

    document.getElementById('ctxSticky').addEventListener('click', () => {
      ctxMenu.classList.remove('active');
      createStickyNote(ctxWorldX, ctxWorldY);
    });

    function createStickyNote(x, y, text = '') {
      const note = document.createElement('div');
      note.className = 'sticky-note';
      note.style.left = x + 'px';
      note.style.top = y + 'px';

      note.innerHTML = `
        <div class="sticky-note-header">
          <button class="sticky-note-delete" title="Delete">&times;</button>
        </div>
        <textarea placeholder="Write a note...">${text}</textarea>
      `;

      // Drag from header area
      let dragState = null;
      note.addEventListener('mousedown', (e) => {
        if (e.target.closest('textarea') || e.target.closest('button')) return;
        e.preventDefault();
        e.stopPropagation();
        const rect = { x: parseFloat(note.style.left), y: parseFloat(note.style.top) };
        dragState = { startX: e.clientX, startY: e.clientY, origX: rect.x, origY: rect.y };
      });

      window.addEventListener('mousemove', (e) => {
        if (!dragState) return;
        const dx = (e.clientX - dragState.startX) / scale;
        const dy = (e.clientY - dragState.startY) / scale;
        note.style.left = (dragState.origX + dx) + 'px';
        note.style.top = (dragState.origY + dy) + 'px';
      });

      window.addEventListener('mouseup', () => { dragState = null; });

      // Delete
      note.querySelector('.sticky-note-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        note.remove();
        stickyNotes = stickyNotes.filter(n => n.element !== note);
      });

      world.appendChild(note);
      stickyNotes.push({ element: note, x, y });

      // Focus textarea
      setTimeout(() => note.querySelector('textarea').focus(), 100);
    }

    // Context menu shortcuts
    document.getElementById('ctxFitAll').addEventListener('click', () => { ctxMenu.classList.remove('active'); fitAll(); });
    document.getElementById('ctxNewChat').addEventListener('click', () => { ctxMenu.classList.remove('active'); startNewChat(); });

    // ============ UI HANDLERS ============
    const chatInput = document.getElementById('chatInput');
    const sendBtnEl = document.getElementById('sendBtn');
    const sidebar = document.getElementById('sidebar');

    chatInput.addEventListener('input', () => {
      sendBtnEl.disabled = !chatInput.value.trim();
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    });

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (chatInput.value.trim()) {
          sendMessage(chatInput.value.trim());
          chatInput.value = '';
          chatInput.style.height = 'auto';
          sendBtnEl.disabled = true;
        }
      }
    });

    sendBtnEl.addEventListener('click', () => {
      if (chatInput.value.trim()) {
        sendMessage(chatInput.value.trim());
        chatInput.value = '';
        chatInput.style.height = 'auto';
        sendBtnEl.disabled = true;
      }
    });

    document.getElementById('menuBtn').addEventListener('click', () => sidebar.classList.toggle('active'));
    document.getElementById('newChatBtn').addEventListener('click', startNewChat);
    document.getElementById('logoutBtn').addEventListener('click', async () => { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; });

    // Nav drawer
    document.getElementById('navBtn').addEventListener('click', () => {
      document.getElementById('navOverlay').classList.add('active');
      document.getElementById('navDrawer').classList.add('active');
    });
    document.getElementById('navOverlay').addEventListener('click', () => {
      document.getElementById('navOverlay').classList.remove('active');
      document.getElementById('navDrawer').classList.remove('active');
    });

    // Close sidebar on outside click
    document.addEventListener('click', (e) => {
      if (sidebar.classList.contains('active') && !sidebar.contains(e.target) && !document.getElementById('menuBtn').contains(e.target))
        sidebar.classList.remove('active');
    });

    // Settings (minimal - just theme info for now)
    document.getElementById('settingsBtn').addEventListener('click', () => {
      // Toggle through to dashboard settings
      window.location.href = 'account.html';
    });

    // ============ HELPERS ============
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============ AUTH & INIT ============
    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }

      currentUser = session.user;
      authToken = session.access_token;
      document.getElementById('userEmail').textContent = currentUser.email;

      // Check account verification
      try {
        const vRes = await fetch(`${BACKEND_URL}/api/user/verification-status`, { headers: { 'Authorization': `Bearer ${authToken}` } });
        if (vRes.ok) {
          const vs = await vRes.json();
          if (vs.account_frozen || vs.needs_reverification) { window.location.href = 'verify-age.html'; return; }
        }
      } catch (e) {}

      // Load user profile for edu verification status
      try {
        const pRes = await fetch(`${BACKEND_URL}/api/current-user`, { headers: { 'Authorization': `Bearer ${authToken}` } });
        if (pRes.ok) userProfile = await pRes.json();
      } catch (e) {}

      await loadConversations();
      fetchNotifications();

      // Auto-load conversation from URL param, or most recent
      const urlParams = new URLSearchParams(window.location.search);
      const convParam = urlParams.get('c');
      if (convParam) {
        loadConversation(convParam);
      } else {
        // Check if there's a most recent conversation to resume
        const firstConv = document.querySelector('.conversation-item');
        if (firstConv) {
          loadConversation(firstConv.dataset.id);
        } else {
          chatInput.focus();
        }
      }
    }

    init();
  </script>
</body>
</html>
