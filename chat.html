<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow - StudyFlowSuite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f5f3f0 0%, #ebe8e3 100%);
      height: 100vh;
      overflow: hidden;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      margin: 0;
      padding: 0;
      color: #2d2d2d;
    }

    body.chat-started {
      background: linear-gradient(180deg, #f8f6f3 0%, #f0ede8 100%);
    }

    /* Dark Mode Theme - Warm Charcoal */
    body.dark-mode {
      background: linear-gradient(180deg, #2d2d2d 0%, #1a1a1a 100%);
      color: #e8e6e3;
    }

    body.dark-mode.chat-started {
      background: linear-gradient(180deg, #282828 0%, #1f1f1f 100%);
    }

    body.dark-mode .sidebar {
      background: rgba(30, 30, 30, 0.98);
      border-right: 1px solid rgba(212, 165, 116, 0.1);
      box-shadow: 8px 0 40px rgba(0, 0, 0, 0.5);
    }

    body.dark-mode .search-input {
      background: rgba(50, 50, 50, 0.9);
      border: 1px solid rgba(212, 165, 116, 0.15);
      color: #e8e6e3;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    body.dark-mode .search-input::placeholder {
      color: rgba(232, 230, 227, 0.3);
    }

    body.dark-mode .search-input:focus {
      background: rgba(60, 60, 60, 0.95);
      border-color: rgba(212, 165, 116, 0.3);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    body.dark-mode .message-content {
      background: rgba(50, 50, 50, 0.9);
      color: #e8e6e3;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.3),
                  0 8px 32px rgba(0, 0, 0, 0.2);
    }

    body.dark-mode .message.user .message-content {
      box-shadow: 0 2px 16px rgba(212, 165, 116, 0.2),
                  0 8px 32px rgba(212, 165, 116, 0.1);
    }

    body.dark-mode .message.assistant .message-content {
      border-left-color: rgba(232, 230, 227, 0.1);
    }

    body.dark-mode .message.assistant::before {
      color: rgba(232, 230, 227, 0.3);
    }

    body.dark-mode .menu-btn {
      background: rgba(70, 70, 70, 0.8);
      border: 1px solid rgba(212, 165, 116, 0.15);
      color: rgba(232, 230, 227, 0.6);
    }

    body.dark-mode .menu-btn:hover {
      background: rgba(80, 80, 80, 0.95);
      border-color: rgba(212, 165, 116, 0.3);
      color: #e8e6e3;
    }

    body.light-mode .welcome-hint h1 {
      color: #1a1a1a;
    }

    body.light-mode .welcome-hint p {
      color: rgba(0, 0, 0, 0.4);
    }

    body.light-mode .sidebar-header {
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      background: rgba(0, 0, 0, 0.02);
    }

    body.light-mode .logo-text {
      color: #1a202c;
    }

    body.light-mode .icon-btn {
      color: #4a5568;
    }

    body.light-mode .icon-btn:hover {
      background: rgba(102, 126, 234, 0.08);
      color: #1a202c;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
    }

    body.light-mode .delete-chat-btn {
      color: #4a5568;
    }

    body.light-mode .delete-chat-btn:hover {
      background: #fff5f5;
      color: #e53e3e;
    }

    body.light-mode .new-chat-btn {
      color: #2d3748;
      background: linear-gradient(135deg, #ececed 0%, #e0e2e5 100%);
      border: 1px solid #d1d5db;
    }

    body.light-mode .new-chat-btn:hover {
      background: linear-gradient(135deg, #e0e2e5 0%, #d6d9dd 100%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    body.light-mode .conversation-item {
      color: #2d3748;
    }

    body.light-mode .conversation-item:hover {
      background: #ececed;
    }

    body.light-mode .conversation-item.active {
      background: linear-gradient(135deg, #e0e2e5 0%, #d6d9dd 100%);
      color: #1a202c;
      border-left: 3px solid #667eea;
    }

    body.light-mode .sidebar-footer {
      border-top: 1px solid #e0e4e8;
    }

    body.light-mode .user-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body.light-mode .user-email {
      color: #4a5568;
    }

    body.light-mode .logout-btn {
      color: #e53e3e;
    }

    body.light-mode .logout-btn:hover {
      background: #fff5f5;
    }

    body.light-mode .chat-container {
      background: linear-gradient(135deg, #e8eaed 0%, #d6d9dd 100%);
    }

    body.light-mode .chat-header {
      border-bottom: 1px solid #d1d5db;
      background: rgba(245, 246, 247, 0.8);
      backdrop-filter: blur(10px);
    }

    body.light-mode .chat-title {
      color: #1a202c;
    }

    body.light-mode .welcome-greeting {
      color: rgba(0, 0, 0, 0.4);
    }

    body.light-mode .welcome-title {
      color: #1a202c;
    }

    body.light-mode .prompt-chip {
      background: transparent;
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: rgba(0, 0, 0, 0.5);
    }

    body.light-mode .prompt-chip:hover {
      background: rgba(102, 126, 234, 0.08);
      border-color: rgba(102, 126, 234, 0.3);
      color: rgba(0, 0, 0, 0.9);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
    }

    body.dark-mode .input-box {
      background: rgba(50, 50, 50, 0.95);
      color: #e8e6e3;
      border: 1px solid rgba(212, 165, 116, 0.15);
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.4);
    }

    body.dark-mode .input-box::placeholder {
      color: rgba(232, 230, 227, 0.3);
    }

    body.dark-mode .input-box:focus {
      border-color: rgba(212, 165, 116, 0.3);
      background: rgba(60, 60, 60, 0.98);
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5);
    }

    body.dark-mode .welcome-hint h1 {
      color: #e8e6e3;
    }

    body.dark-mode .welcome-hint p {
      color: rgba(232, 230, 227, 0.4);
    }

    body.light-mode .message.user::before {
      color: #667eea;
      opacity: 0.8;
    }

    body.light-mode .message.assistant::before {
      color: rgba(0, 0, 0, 0.4);
    }

    body.light-mode .typing-dot {
      background: #667eea;
    }

    body.light-mode .input-container {
      border-top: 1px solid #d1d5db;
      background: rgba(245, 246, 247, 0.8);
      backdrop-filter: blur(10px);
    }

    body.light-mode .settings-popup {
      background: #f5f6f7;
      border: 1px solid #d1d5db;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    body.light-mode .settings-popup-header {
      color: #1a202c;
      border-bottom: 1px solid #d1d5db;
    }

    body.light-mode .settings-option-label {
      color: #2d3748;
    }

    body.light-mode .settings-option-description {
      color: #4a5568;
    }

    body.light-mode .error-message {
      background: #fef0f0;
      color: #e53e3e;
      border: 1px solid #f8b4b4;
    }

    /* Main Layout */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* Welcome screen - centered search bar */
    .search-bar-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 680px;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 50;
    }

    body.chat-started .search-bar-container {
      display: none;
    }

    .search-bar-wrapper {
      position: relative;
      width: 100%;
    }

    /* Sidebar - Shoji Door Effect */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 320px;
      height: 100vh;
      background: rgba(245, 243, 240, 0.98);
      backdrop-filter: blur(60px);
      -webkit-backdrop-filter: blur(60px);
      border-right: 1px solid rgba(212, 165, 116, 0.15);
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 12px 0 60px rgba(45, 45, 45, 0.08);
      z-index: 1000;
      opacity: 0;
    }

    body.chat-started .sidebar {
      opacity: 1;
    }

    .sidebar.active {
      transform: translateX(0);
    }

    /* Menu button - Gentle appearance */
    .menu-btn {
      position: fixed;
      top: 28px;
      left: 28px;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(212, 165, 116, 0.2);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 99;
      color: rgba(45, 45, 45, 0.6);
      font-size: 18px;
      box-shadow: 0 4px 20px rgba(45, 45, 45, 0.06);
    }

    body.chat-started .menu-btn {
      display: flex;
      animation: gentleFadeIn 0.8s ease 0.4s forwards;
      opacity: 0;
    }

    @keyframes gentleFadeIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .menu-btn:hover {
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 6px 30px rgba(45, 45, 45, 0.12);
      transform: translateY(-2px);
      border-color: rgba(212, 165, 116, 0.3);
    }

    .sidebar-header {
      padding: 20px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: #e5e7eb;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 10px;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
      transform: translateY(-1px);
    }

    .delete-chat-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 8px;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .delete-chat-btn:hover {
      background: #3a1a1a;
      color: #fca5a5;
    }

    .new-chat-btn {
      margin: 16px;
      padding: 14px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      color: #e5e7eb;
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .new-chat-btn:hover {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
      transform: translateY(-2px);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      padding: 12px 14px;
      margin-bottom: 6px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #d1d5db;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid transparent;
      position: relative;
    }

    .conversation-item:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateX(4px);
      border-color: rgba(102, 126, 234, 0.2);
    }

    .conversation-item.active {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
      color: #fff;
      font-weight: 600;
      border-color: rgba(102, 126, 234, 0.4);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.2);
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.02);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-email {
      font-size: 13px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      background: transparent;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: #2d1f1f;
    }

    /* Main Chat Area - Full width, centered */
    .chat-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: transparent;
    }

    /* No header - clean and minimal */
    .chat-header {
      display: none;
    }

    .chat-title {
      font-size: 18px;
      font-weight: 600;
      color: #e5e7eb;
    }

    /* Messages Container - Lots of breathing room */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 80px 40px 160px 40px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .messages-container::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Welcome hint text - above search bar */
    .welcome-hint {
      text-align: center;
      margin-bottom: 40px;
      animation: welcomeAppear 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes welcomeAppear {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-hint h1 {
      font-size: 48px;
      font-weight: 400;
      color: #2d2d2d;
      margin: 0 0 12px 0;
      letter-spacing: -0.01em;
      font-family: 'Lora', Georgia, serif;
    }

    .welcome-hint p {
      font-size: 16px;
      font-weight: 400;
      color: rgba(45, 45, 45, 0.45);
      margin: 0;
      font-style: italic;
    }

    body.chat-started .welcome-hint {
      animation: welcomeFade 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes welcomeFade {
      to {
        opacity: 0;
        transform: translateY(-20px);
        pointer-events: none;
      }
    }

    /* Hide welcome screen elements */
    .welcome-screen {
      display: none;
    }

    .welcome-greeting,
    .welcome-title {
      display: none;
    }

    /* Suggested prompts - hidden */
    .suggested-prompts {
      display: none;
    }

    .prompt-chip {
      display: none;
    }

    /* Welcome input - hidden, using floating input instead */
    .welcome-input-container {
      display: none;
    }

    .welcome-input-wrapper {
      display: none;
    }

    .welcome-input-box {
      display: none;
    }

    .welcome-send-btn {
      display: none;
    }

    .welcome-send-btn:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .welcome-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Hide old elements */
    .floating-chats-btn {
      display: none;
    }

    .sidebar-trigger {
      display: none;
    }

    .chat-header {
      display: none !important;
    }

    .input-container.hidden {
      display: none;
    }

    /* Messages Container - Cards layout */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: none;
    }

    body.chat-started .messages-container {
      display: block;
      padding: 80px 24px 180px 24px;
    }

    .messages-container::-webkit-scrollbar {
      width: 6px;
    }

    .messages-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    .messages-container::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Paper Card Messages - Like notes on a desk */
    .message {
      max-width: 600px;
      margin: 0 auto 56px auto;
      position: relative;
      animation: messageBreathe 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      animation-fill-mode: forwards;
    }

    @keyframes messageBreathe {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Role label - Subtle ink stamp */
    .message::before {
      content: attr(data-role);
      display: block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
      opacity: 0.35;
      font-family: 'Inter', sans-serif;
    }

    .message.user::before {
      content: "You";
      color: #c49563;
    }

    .message.assistant::before {
      content: "StudyFlow";
      color: rgba(45, 45, 45, 0.4);
    }

    /* Paper card with ribbon bookmark */
    .message-content {
      position: relative;
      padding: 24px 28px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.9;
      color: #2d2d2d;
      font-family: 'Lora', Georgia, serif;
      font-weight: 400;
      letter-spacing: 0.01em;
      box-shadow: 0 2px 16px rgba(45, 45, 45, 0.06),
                  0 8px 32px rgba(45, 45, 45, 0.04);
      border-left: 4px solid transparent;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .message.user .message-content {
      border-left-color: #d4a574;
      box-shadow: 0 2px 16px rgba(212, 165, 116, 0.15),
                  0 8px 32px rgba(212, 165, 116, 0.08);
    }

    .message.assistant .message-content {
      border-left-color: rgba(45, 45, 45, 0.15);
    }

    .message-content:hover {
      box-shadow: 0 4px 24px rgba(45, 45, 45, 0.1),
                  0 12px 48px rgba(45, 45, 45, 0.06);
      transform: translateY(-2px);
    }

    .message.user .message-content:hover {
      box-shadow: 0 4px 24px rgba(212, 165, 116, 0.2),
                  0 12px 48px rgba(212, 165, 116, 0.12);
    }

    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: 0;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d4a574;
      animation: breathe 2s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.3s; }
    .typing-dot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes breathe {
      0%, 100% {
        opacity: 0.3;
        transform: scale(0.9);
      }
      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    /* Search input - looks like Google search */
    .search-input {
      width: 100%;
      padding: 18px 64px 18px 28px;
      border: 1px solid rgba(212, 165, 116, 0.2);
      border-radius: 16px;
      font-size: 17px;
      font-family: 'Lora', Georgia, serif;
      font-weight: 400;
      resize: none;
      min-height: 64px;
      max-height: 64px;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);

  <script>
    // Configuration
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    // Theme Management
    function loadTheme() {
      const savedTheme = localStorage.getItem('studyflow-theme');
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        themeToggle.classList.add('active');
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('studyflow-theme', isLight ? 'light' : 'dark');
      themeToggle.classList.toggle('active', isLight);
    }

    // Initialize
    async function init() {
      // Load theme preference
      loadTheme();
      // Check authentication
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = session.user;
      authToken = session.access_token;

      // Fetch user profile from backend to get their name
      try {
        const profileResponse = await fetch(`${BACKEND_URL}/api/current-user`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (profileResponse.ok) {
          userProfile = await profileResponse.json();
        }
      } catch (error) {
        console.error('Error fetching user profile:', error);
      }

      // Update UI with user info
      userEmail.textContent = currentUser.email;

      // Get user's actual name from profile, or fall back to email
      const userName = userProfile?.name || currentUser.email.split('@')[0];
      const firstName = userName.split(' ')[0];
      const capitalizedName = firstName.charAt(0).toUpperCase() + firstName.slice(1);

      userAvatar.textContent = capitalizedName.charAt(0).toUpperCase();

      // Load conversation history
      await loadConversations();

      // Enable search input
      searchInput.disabled = false;
    }

    // Load Conversations List
    async function loadConversations() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/conversations`, {
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        displayConversations(data.conversations || []);

      } catch (error) {
        console.error('Error loading conversations:', error);
      }
    }

    // Display Conversations in Sidebar
    function displayConversations(conversations) {
      conversationList.innerHTML = '';

      if (conversations.length === 0) {
        conversationList.innerHTML = '<div style="padding: 12px; color: #6b7280; font-size: 13px; text-align: center;">No conversations yet</div>';
        return;
      }

      conversations.forEach(conv => {
        const item = document.createElement('div');
        item.className = 'conversation-item';
        item.setAttribute('data-conversation-id', conv.id);
        if (conv.id === conversationId) {
          item.classList.add('active');
        }

        const title = conv.title || 'New conversation';
        item.textContent = title.length > 40 ? title.substring(0, 40) + '...' : title;
        item.title = title;

        item.addEventListener('click', (e) => loadConversation(conv.id, e.currentTarget));

        conversationList.appendChild(item);
      });
    }

    // Load Specific Conversation
    async function loadConversation(convId, clickedElement) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/conversations/${convId}/messages`, {
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        // Clear current messages
        messagesContainer.innerHTML = '';

        // Transform to chat mode
        document.body.classList.add('chat-started');
        enableMouseProximity();

        // Display all messages
        data.messages.forEach(msg => {
          addMessage(msg.content, msg.role);
        });

        // Set active conversation
        conversationId = convId;

        // Update active state in sidebar
        document.querySelectorAll('.conversation-item').forEach(item => {
          item.classList.remove('active');
        });
        if (clickedElement) {
          clickedElement.classList.add('active');
        }

      } catch (error) {
        console.error('Error loading conversation:', error);
      }
    }

    async function deleteCurrentConversation() {
      if (!conversationId) return;

      if (!confirm('Are you sure you want to delete this chat?')) {
        return;
      }

      try {
        const response = await fetch(`${BACKEND_URL}/api/conversations/${conversationId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        // Remove conversation from sidebar
        const conversationElement = document.querySelector(`.conversation-item[data-conversation-id="${conversationId}"]`);
        if (conversationElement) {
          conversationElement.remove();
        }

        // Start a new chat
        startNewChat();

        // Hide delete button
        const deleteBtn = document.getElementById('deleteChatBtn');
        if (deleteBtn) {
          deleteBtn.style.display = 'none';
        }

      } catch (error) {
        console.error('Error deleting conversation:', error);
        alert('Failed to delete conversation. Please try again.');
      }

    const academicQuestions = [

    // Get random academic questions
    function getRandomQuestions(count = 5) {
      const shuffled = [...academicQuestions].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count);
    }

    // Populate suggested prompts
    function populateSuggestedPrompts() {
      const promptsContainer = document.getElementById('suggestedPrompts');
      if (!promptsContainer) return;

      const randomQuestions = getRandomQuestions(5);
      promptsContainer.innerHTML = randomQuestions.map(q =>
        `<div class="prompt-chip" onclick="sendPrompt('${q.replace(/'/g, "\\'")}')">${q}</div>`
      ).join('');
    }

    // Send suggested prompt
    function sendPrompt(prompt) {
      // Use the welcome input if it's visible, otherwise use bottom input
      const welcomeInputElement = document.getElementById('welcomeMessageInput');
      if (welcomeInputElement && !bottomInputContainer.classList.contains('hidden') === false) {
        welcomeInputElement.value = prompt;
      } else {
        messageInput.value = prompt;
      }
      sendMessage(prompt);
    }

    // Send Message
    async function sendMessage(messageText = null) {
      const message = messageText || searchInput.value.trim();
      if (!message) return;

      // Transform to chat mode on first message
      if (!document.body.classList.contains('chat-started')) {
        document.body.classList.add('chat-started');
        enableMouseProximity();
      }

      // Clear and disable input
      searchInput.value = '';
      searchInput.disabled = true;
      searchBtn.disabled = true;

      // Add user message
      addMessage(message, 'user');

      // Show typing indicator
      const typingId = addTypingIndicator();

      try {
        // Call backend
        const requestBody = { message };
        if (conversationId) {
          requestBody.conversation_id = conversationId;
        }

        const response = await fetch(`${BACKEND_URL}/api/notes/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        // Remove typing indicator
        removeTypingIndicator(typingId);

        // Store conversation ID
        if (data.conversation_id) {
          conversationId = data.conversation_id;
        }

        // Add AI response
        addMessage(data.response || 'Sorry, I couldn\'t generate a response.', 'assistant');

        // Refresh conversation list (to show new chat or updated title)
        await loadConversations();

      } catch (error) {
        console.error('Error sending message:', error);
        removeTypingIndicator(typingId);
        addMessage('Sorry, something went wrong. Please try again.', 'assistant');
      } finally {
        // Re-enable search input
        searchInput.disabled = false;
        searchInput.focus();
      }
    }

    async function sendMessageFromBottom() {
      const message = bottomInput.value.trim();
      if (!message) return;

      // Clear and disable bottom input
      bottomInput.value = '';
      bottomInput.disabled = true;
      bottomSendBtn.disabled = true;

      // Add user message
      addMessage(message, 'user');

      // Show typing indicator
      const typingId = addTypingIndicator();

      try {
        // Call backend
        const requestBody = { message };
        if (conversationId) {
          requestBody.conversation_id = conversationId;
        }

        const response = await fetch(`${BACKEND_URL}/api/notes/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        // Remove typing indicator
        removeTypingIndicator(typingId);

        // Store conversation ID
        if (data.conversation_id) {
          conversationId = data.conversation_id;
        }

        // Add AI response
        addMessage(data.response || 'Sorry, I couldn\'t generate a response.', 'assistant');

        // Refresh conversation list (to show new chat or updated title)
        await loadConversations();

      } catch (error) {
        console.error('Error sending message:', error);
        removeTypingIndicator(typingId);
        addMessage('Sorry, something went wrong. Please try again.', 'assistant');
      } finally {
        // Re-enable bottom input
        bottomInput.disabled = false;
        bottomInput.focus();
      }
    }

    // Add Message to UI
    function addMessage(content, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = content;

      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Typing Indicator
    function addTypingIndicator() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message assistant';
      messageDiv.id = 'typing-indicator';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';

      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      contentDiv.appendChild(typingDiv);
      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      return 'typing-indicator';
    }

    function removeTypingIndicator(id) {
      const indicator = document.getElementById(id);
      if (indicator) {
        indicator.remove();
      }
    }

    // New Chat - Reset to search engine state
    function startNewChat() {
      conversationId = null;
      messagesContainer.innerHTML = '';

      // Reset to initial state
      document.body.classList.remove('chat-started');

      // Remove active state from all conversations
      document.querySelectorAll('.conversation-item').forEach(item => {
        item.classList.remove('active');
      });

      // Close sidebar
      sidebar.classList.remove('active');

      // Clear and focus search input
      searchInput.value = '';
      searchInput.focus();
    }

    // Event Listeners
    searchBtn.addEventListener('click', sendMessage);

    searchInput.addEventListener('input', () => {
      searchBtn.disabled = !searchInput.value.trim();
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (searchInput.value.trim()) {
          sendMessage();
        }
      }
    });

    // Bottom input handlers
    bottomInput.addEventListener('input', () => {
      bottomSendBtn.disabled = !bottomInput.value.trim();
    });

    bottomInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (bottomInput.value.trim()) {
          sendMessageFromBottom();
        }
      }
    });

    bottomSendBtn.addEventListener('click', () => {
      if (bottomInput.value.trim()) {
        sendMessageFromBottom();
      }
    });

    // Menu button - toggle sidebar
    menuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    // Auto-open sidebar when mouse approaches left edge
    let sidebarAutoOpened = false;
    let mouseProximityEnabled = false;

    // Wait for chat to start before enabling proximity detection
    const enableMouseProximity = () => {
      mouseProximityEnabled = true;
    };

    document.addEventListener('mousemove', (e) => {
      if (!mouseProximityEnabled) return;

      const edgeThreshold = 80; // pixels from left edge (increased from 50)
      const isNearEdge = e.clientX <= edgeThreshold;

      if (isNearEdge && !sidebar.classList.contains('active')) {
        console.log('Opening sidebar - mouse at x:', e.clientX);
        sidebar.classList.add('active');
        sidebarAutoOpened = true;
      } else if (!isNearEdge && sidebarAutoOpened && sidebar.classList.contains('active')) {
        // Only auto-close if it was auto-opened (not manually clicked)
        const sidebarRect = sidebar.getBoundingClientRect();
        const isOverSidebar = e.clientX <= sidebarRect.right;

        if (!isOverSidebar) {
          console.log('Closing sidebar - mouse moved away');
          sidebar.classList.remove('active');
          sidebarAutoOpened = false;
        }
      }
    });

    // Close sidebar when clicking outside of it
    document.addEventListener('click', (e) => {
      if (sidebar.classList.contains('active')) {
        const sidebarRect = sidebar.getBoundingClientRect();
        const isClickInSidebar = e.clientX <= sidebarRect.right;
        const isMenuBtn = e.target.closest('#menuBtn');

        if (!isClickInSidebar && !isMenuBtn) {
          sidebar.classList.remove('active');
          sidebarAutoOpened = false;
        }
      }
    });

    newChatBtn.addEventListener('click', startNewChat);

    const deleteChatBtn = document.getElementById('deleteChatBtn');
    if (deleteChatBtn) {
      deleteChatBtn.addEventListener('click', deleteCurrentConversation);
    }

    logoutBtn.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    });

    mobileMenuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    // Settings popup toggle
    settingsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      settingsPopup.classList.toggle('active');
    });

    // Upload button - navigate to upload page
    uploadBtn.addEventListener('click', () => {
      window.location.href = 'upload.html';
    });

    // My Notes button - navigate to notes page
    myNotesBtn.addEventListener('click', () => {
      window.location.href = 'notes.html';
    });

    // Theme toggle
    themeToggle.addEventListener('click', toggleTheme);

    // Collective Brain toggle
    collectiveBrainToggle.addEventListener('click', () => {
      collectiveBrainEnabled = !collectiveBrainEnabled;
      collectiveBrainToggle.classList.toggle('active');
      console.log('Collective Brain:', collectiveBrainEnabled ? 'Enabled' : 'Disabled');
    });

    // Close sidebar when clicking outside
    document.addEventListener('click', (e) => {
      if (sidebar.classList.contains('active') &&
          !sidebar.contains(e.target) &&
          !menuBtn.contains(e.target)) {
        sidebar.classList.remove('active');
      }
    });

    // Close settings popup when clicking outside
    document.addEventListener('click', (e) => {
      if (!settingsPopup.contains(e.target) && !settingsBtn.contains(e.target)) {
        settingsPopup.classList.remove('active');
      }
    });

    // Initialize on load
    init();
  </script>
</body>
</html>
