<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteFlow Chat - StudyFlowSuite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1419;
      height: 100vh;
      overflow: hidden;
    }

    /* Main Layout */
    .app-container {
      display: flex;
      height: 100vh;
    }

    /* Left Sidebar */
    .sidebar {
      width: 280px;
      background: #1a1f2e;
      border-right: 1px solid #2d3748;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .settings-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      color: #9ca3af;
      font-size: 20px;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      background: #2d3748;
    }

    .new-chat-btn {
      margin: 16px;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .new-chat-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conversation-item {
      padding: 12px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      color: #d1d5db;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-item:hover {
      background: #2d3748;
    }

    .conversation-item.active {
      background: #312e81;
      color: #a5b4fc;
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid #2d3748;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 14px;
    }

    .user-details {
      flex: 1;
      min-width: 0;
    }

    .user-email {
      font-size: 13px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      background: transparent;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .logout-btn:hover {
      background: #2d1f1f;
    }

    /* Main Chat Area */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0f1419;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-title {
      font-size: 18px;
      font-weight: 600;
      color: #e5e7eb;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #9ca3af;
      padding: 40px;
    }

    .welcome-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .welcome-title {
      font-size: 28px;
      font-weight: 700;
      color: #e5e7eb;
      margin-bottom: 8px;
    }

    .welcome-subtitle {
      font-size: 16px;
      color: #9ca3af;
      max-width: 500px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 800px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      margin-left: auto;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .message-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .message.assistant .message-avatar {
      background: #2d3748;
      color: #9ca3af;
    }

    .message-content {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .message.assistant .message-content {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      color: #e5e7eb;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    /* Input Area */
    .input-container {
      padding: 24px;
      border-top: 1px solid #2d3748;
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    .input-box {
      width: 100%;
      padding: 14px 56px 14px 16px;
      border: 2px solid #2d3748;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      resize: none;
      min-height: 52px;
      max-height: 200px;
      transition: border-color 0.2s;
      background: #1a1f2e;
      color: #e5e7eb;
    }

    .input-box:focus {
      outline: none;
      border-color: #667eea;
    }

    .send-btn {
      position: absolute;
      right: 8px;
      bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, opacity 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Mobile Menu Toggle */
    .mobile-menu-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      color: #e5e7eb;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 999;
        transform: translateX(-100%);
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .mobile-menu-toggle {
        display: block;
      }

      .chat-header {
        padding-left: 64px;
      }
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
    }

    .error-message {
      background: #2d1f1f;
      color: #f87171;
      border: 1px solid #3f1f1f;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 16px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>

    <!-- Left Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-section">
          <span class="logo-text">NoteFlow</span>
        </div>
        <button class="settings-btn" id="settingsBtn" title="Settings">⚙️</button>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <span>✨</span>
        <span>New Chat</span>
      </button>

      <div class="conversation-list" id="conversationList">
        <!-- Conversations will be loaded here -->
      </div>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-details">
            <div class="user-email" id="userEmail">Loading...</div>
            <button class="logout-btn" id="logoutBtn">Sign out</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-container">
      <header class="chat-header">
        <h1 class="chat-title">NoteFlow Chat</h1>
      </header>

      <div class="messages-container" id="messagesContainer">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">💬</div>
          <h2 class="welcome-title">Welcome to NoteFlow</h2>
          <p class="welcome-subtitle">
            Ask me anything about your notes! I can help you study, explain concepts, and answer questions based on your uploaded materials.
          </p>
        </div>
      </div>

      <div class="input-container">
        <div class="input-wrapper">
          <textarea
            class="input-box"
            id="messageInput"
            placeholder="Ask a question about your notes..."
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Configuration
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    // Initialize Supabase
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // State
    let currentUser = null;
    let authToken = null;
    let conversationId = null;
    let conversations = [];

    // DOM Elements
    const messagesContainer = document.getElementById('messagesContainer');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const conversationList = document.getElementById('conversationList');
    const userEmail = document.getElementById('userEmail');
    const userAvatar = document.getElementById('userAvatar');
    const logoutBtn = document.getElementById('logoutBtn');
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const sidebar = document.getElementById('sidebar');

    // Initialize
    async function init() {
      // Check authentication
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = session.user;
      authToken = session.access_token;

      // Update UI with user info
      userEmail.textContent = currentUser.email;
      userAvatar.textContent = currentUser.email.charAt(0).toUpperCase();

      // Enable input
      messageInput.disabled = false;
    }

    // Send Message
    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      // Clear input and disable
      messageInput.value = '';
      messageInput.disabled = true;
      sendBtn.disabled = true;

      // Hide welcome screen
      if (welcomeScreen) {
        welcomeScreen.style.display = 'none';
      }

      // Add user message
      addMessage(message, 'user');

      // Show typing indicator
      const typingId = addTypingIndicator();

      try {
        // Call backend
        const requestBody = { message };
        if (conversationId) {
          requestBody.conversation_id = conversationId;
        }

        const response = await fetch(`${BACKEND_URL}/api/notes/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        // Remove typing indicator
        removeTypingIndicator(typingId);

        // Store conversation ID
        if (data.conversation_id) {
          conversationId = data.conversation_id;
        }

        // Add AI response
        addMessage(data.response || 'Sorry, I couldn\'t generate a response.', 'assistant');

      } catch (error) {
        console.error('Error sending message:', error);
        removeTypingIndicator(typingId);
        addMessage('Sorry, something went wrong. Please try again.', 'assistant');
      } finally {
        // Re-enable input
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    // Add Message to UI
    function addMessage(content, role) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'user' ? currentUser.email.charAt(0).toUpperCase() : 'AI';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = content;

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Typing Indicator
    function addTypingIndicator() {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message assistant';
      messageDiv.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = 'AI';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';

      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      contentDiv.appendChild(typingDiv);
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(contentDiv);

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      return 'typing-indicator';
    }

    function removeTypingIndicator(id) {
      const indicator = document.getElementById(id);
      if (indicator) {
        indicator.remove();
      }
    }

    // New Chat
    function startNewChat() {
      conversationId = null;
      messagesContainer.innerHTML = '';

      const welcomeDiv = document.createElement('div');
      welcomeDiv.className = 'welcome-screen';
      welcomeDiv.id = 'welcomeScreen';
      welcomeDiv.innerHTML = `
        <div class="welcome-icon">💬</div>
        <h2 class="welcome-title">New Conversation</h2>
        <p class="welcome-subtitle">
          Ask me anything about your notes! I can help you study, explain concepts, and answer questions.
        </p>
      `;
      messagesContainer.appendChild(welcomeDiv);
      messageInput.focus();
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('input', () => {
      sendBtn.disabled = !messageInput.value.trim();

      // Auto-resize textarea
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (messageInput.value.trim()) {
          sendMessage();
        }
      }
    });

    newChatBtn.addEventListener('click', startNewChat);

    logoutBtn.addEventListener('click', async () => {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    });

    mobileMenuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('active');
    });

    // Initialize on load
    init();
  </script>
</body>
</html>
