<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your StudyFlow Suite account. Sign up to access AI-powered study tools for Canvas LMS.">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Sign Up - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e8e3d8;
      min-height: 100vh;
      color: #2d2d2d;
      overflow-x: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(124, 152, 133, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(232, 155, 95, 0.05) 0%, transparent 40%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: multiply;
      opacity: 0.8;
    }

    .signup-container {
      background: rgba(235, 230, 219, 0.6);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      max-width: 920px;
      width: 100%;
      padding: 40px 48px 36px;
      position: relative;
      z-index: 1;
      border: 2px solid rgba(124, 152, 133, 0.2);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-section h1 {
      font-family: 'Lora', serif;
      font-size: 30px;
      font-weight: 400;
      background: linear-gradient(135deg, #7c9885 0%, #6b8575 50%, #e89b5f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }

    .logo-section p {
      color: #6b8575;
      font-size: 13px;
      font-weight: 500;
    }

    .error-message, .success-message {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 13px;
      display: none;
    }

    .error-message {
      background: rgba(232, 155, 95, 0.1);
      color: #c45a2a;
      border: 2px solid rgba(232, 155, 95, 0.3);
    }

    .success-message {
      background: rgba(124, 152, 133, 0.1);
      color: #4a7456;
      border: 2px solid rgba(124, 152, 133, 0.3);
    }

    /* Two-column layout */
    .form-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 36px;
      align-items: start;
    }

    .form-left {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-right {
      display: flex;
      flex-direction: column;
    }

    /* Form fields */
    .form-group {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #2d2d2d;
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.7);
      color: #2d2d2d;
    }

    .form-group input:focus {
      outline: none;
      border-color: rgba(124, 152, 133, 0.5);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 2px 12px rgba(124, 152, 133, 0.12);
    }

    .form-group input::placeholder {
      color: #9a9a9a;
    }

    .form-hint {
      font-size: 11px;
      color: #8a8a8a;
      margin-top: 4px;
      line-height: 1.4;
    }

    .form-hint a {
      color: #7c9885;
      font-weight: 600;
      text-decoration: none;
    }

    .form-hint a:hover {
      color: #e89b5f;
    }

    /* Two small fields in a row */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .password-strength {
      height: 2px;
      background: rgba(124, 152, 133, 0.1);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      transition: all 0.3s;
      width: 0%;
    }

    .password-strength-bar.weak { width: 33%; background: #e89b5f; }
    .password-strength-bar.medium { width: 66%; background: #d4a574; }
    .password-strength-bar.strong { width: 100%; background: #7c9885; }

    /* Right column: legal */
    .legal-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #6b8575;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .terms-checkbox {
      display: flex;
      align-items: start;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #5a5a5a;
      line-height: 1.5;
    }

    .terms-checkbox:last-child {
      margin-bottom: 0;
    }

    .terms-checkbox input[type="checkbox"] {
      margin-top: 1px;
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #7c9885;
      flex-shrink: 0;
    }

    .terms-checkbox label {
      margin-bottom: 0;
      cursor: pointer;
    }

    .terms-checkbox a {
      color: #7c9885;
      text-decoration: none;
      font-weight: 600;
    }

    .terms-checkbox a:hover {
      color: #e89b5f;
    }

    .checkbox-highlight {
      font-weight: 600;
      color: #6b8575;
    }

    /* Divider between columns */
    .form-right {
      border-left: 1px solid rgba(124, 152, 133, 0.15);
      padding-left: 36px;
    }

    /* Bottom section */
    .form-bottom {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .btn-primary {
      padding: 13px 48px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.95) 0%, rgba(232, 155, 95, 0.95) 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.25);
      white-space: nowrap;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(124, 152, 133, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-footer {
      color: #8a8a8a;
      font-size: 13px;
    }

    .auth-footer a {
      color: #7c9885;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-footer a:hover {
      color: #e89b5f;
    }

    /* Age Verification Notice */
    .age-notice {
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.08) 0%, rgba(124, 152, 133, 0.04) 100%);
      border: 1px solid rgba(124, 152, 133, 0.2);
      border-left: 3px solid #7c9885;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1.6;
      color: #5a5a5a;
    }

    .age-notice strong {
      color: #6b8575;
      font-weight: 600;
    }

    /* Mobile: stack columns */
    @media (max-width: 768px) {
      body {
        padding: 16px 12px;
        align-items: flex-start;
      }

      body::before, body::after {
        opacity: 0.3;
      }

      .signup-container {
        padding: 28px 20px 24px;
        border-radius: 16px;
      }

      .logo-section {
        margin-bottom: 20px;
      }

      .logo-section h1 {
        font-size: 24px;
      }

      .logo-section p {
        font-size: 12px;
      }

      .form-columns {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .form-left {
        gap: 10px;
      }

      .form-right {
        border-left: none;
        padding-left: 0;
        border-top: 1px solid rgba(124, 152, 133, 0.15);
        padding-top: 16px;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .form-group input,
      .form-group select {
        font-size: 16px; /* prevents iOS auto-zoom */
        padding: 12px 14px;
        min-height: 46px;
      }

      .form-group label {
        font-size: 13px;
        margin-bottom: 4px;
      }

      .age-notice {
        font-size: 12px;
        padding: 12px 14px;
        margin-bottom: 14px;
      }

      .terms-checkbox {
        font-size: 12px;
        gap: 10px;
        margin-bottom: 12px;
      }

      .terms-checkbox input[type="checkbox"] {
        width: 20px;
        height: 20px;
        margin-top: 0;
      }

      .legal-section-title {
        font-size: 12px;
        margin-bottom: 10px;
      }

      .form-bottom {
        flex-direction: column;
        gap: 12px;
        margin-top: 20px;
      }

      .btn-primary {
        width: 100%;
        min-height: 48px;
        font-size: 15px;
        border-radius: 12px;
      }

      .auth-footer {
        text-align: center;
        font-size: 13px;
      }

      .error-message, .success-message {
        font-size: 12px;
        padding: 10px 14px;
      }
    }

    /* Extra small */
    @media (max-width: 480px) {
      body {
        padding: 8px;
      }

      .signup-container {
        padding: 24px 16px 20px;
      }
    }
  </style>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="university-data.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1266375537905101" crossorigin="anonymous"></script>
</head>
<body>
  <div class="signup-container">
    <div class="logo-section">
      <h1>StudyFlow Suite</h1>
      <p>Create your account</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="signupForm">
      <div class="form-columns">
        <!-- Left: Account Details -->
        <div class="form-left">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" id="firstName" placeholder="Jane" required>
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" id="lastName" placeholder="Doe" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group" style="flex:1;">
              <label for="username">Username</label>
              <input type="text" id="username" placeholder="StudyBuddy" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]{3,20}">
              <div class="form-hint">Your public identity on StudyFlow</div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="you@example.com" required>
              <div class="form-hint">.edu email needed later for <a href="age-safety.html" target="_blank">Nexus access</a></div>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="8+ characters" required minlength="8">
              <div class="password-strength">
                <div class="password-strength-bar" id="passwordStrength"></div>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="university">University (optional)</label>
            <div style="position:relative;">
              <input type="text" id="university" placeholder="Start typing your university..." autocomplete="off">
              <div id="universityDropdown" style="position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid rgba(124,152,133,0.2);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.1);margin-top:4px;max-height:180px;overflow-y:auto;display:none;z-index:10;"></div>
            </div>
            <div class="form-hint">Select your university for personalized features</div>
          </div>
        </div>

        <!-- Right: Legal Certifications -->
        <div class="form-right">
          <div class="legal-section-title">Required Certifications</div>

          <div class="terms-checkbox">
            <input type="checkbox" id="ageGate" required>
            <label for="ageGate">
              I certify that I am <a href="age-safety.html" target="_blank">18 years of age or older</a>.
            </label>
          </div>

          <div class="terms-checkbox">
            <input type="checkbox" id="aiTransparency" required>
            <label for="aiTransparency">
              I understand that StudyFlow Suite uses <a href="ai-transparency.html" target="_blank">Artificial Intelligence (Gemini 3 Flash Lite)</a> to generate study aids and that outputs may contain inaccuracies.
            </label>
          </div>

          <div class="terms-checkbox">
            <input type="checkbox" id="noteLicense" required>
            <label for="noteLicense">
              I grant StudyFlow Suite LLC a <span class="checkbox-highlight">non-exclusive, perpetual license</span> to anonymize and use my uploaded notes to improve the Nexus.
            </label>
          </div>

          <div class="terms-checkbox">
            <input type="checkbox" id="academicIntegrity" required>
            <label for="academicIntegrity">
              I agree to use StudyFlow Suite as a <a href="academic-integrity.html" target="_blank">supplemental study tool</a> and will not use it to violate my institution's academic integrity policies.
            </label>
          </div>

          <div class="terms-checkbox">
            <input type="checkbox" id="terms" required>
            <label for="terms">
              I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>.
            </label>
          </div>
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="form-bottom">
        <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
        <div class="auth-footer">
          Already have an account? <a href="mobile.html">Sign in</a>
        </div>
      </div>
    </form>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://mxddgbpxjoltaimftpmn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI'
    );

    // If already logged in, go straight to social
    (async () => {
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) { window.location.replace('social.html'); }
      } catch {}
    })();

    // Password strength indicator
    document.getElementById('password').addEventListener('input', (e) => {
      const password = e.target.value;
      const strengthBar = document.getElementById('passwordStrength');

      if (password.length === 0) {
        strengthBar.className = 'password-strength-bar';
        return;
      }

      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
      if (password.match(/[0-9]/)) strength++;
      if (password.match(/[^a-zA-Z0-9]/)) strength++;

      if (strength <= 1) {
        strengthBar.className = 'password-strength-bar weak';
      } else if (strength <= 3) {
        strengthBar.className = 'password-strength-bar medium';
      } else {
        strengthBar.className = 'password-strength-bar strong';
      }
    });

    const signupForm = document.getElementById('signupForm');
    const firstNameInput = document.getElementById('firstName');
    const lastNameInput = document.getElementById('lastName');
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const termsInput = document.getElementById('terms');
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      successMessage.style.display = 'none';
      errorMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.style.display = 'block';
      errorMessage.style.display = 'none';
    }

    function hideMessages() {
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';
    }

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const firstName = firstNameInput.value.trim();
      const lastName = lastNameInput.value.trim();
      const fullName = `${firstName} ${lastName}`.trim();
      const username = usernameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const university = document.getElementById('university').value.trim();
      const ageGate = document.getElementById('ageGate').checked;
      const aiTransparency = document.getElementById('aiTransparency').checked;
      const noteLicense = document.getElementById('noteLicense').checked;
      const academicIntegrity = document.getElementById('academicIntegrity').checked;
      const terms = termsInput.checked;

      if (!firstName || !lastName || !username || !email || !password) {
        showError('Please fill in all fields');
        return;
      }

      // Validate username format
      if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
        showError('Username must be 3-20 characters (letters, numbers, underscores only)');
        return;
      }

      if (!ageGate) {
        showError('You must certify that you are 18 years of age or older');
        return;
      }

      if (!aiTransparency) {
        showError('You must acknowledge that StudyFlow uses AI');
        return;
      }

      if (!noteLicense) {
        showError('You must grant permission to use your notes for the Nexus');
        return;
      }

      if (!academicIntegrity) {
        showError('You must agree to use StudyFlow as a supplemental study tool');
        return;
      }

      if (!terms) {
        showError('You must agree to the Terms of Service and Privacy Policy');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        // Sign up with Supabase
        const { data, error } = await supabaseClient.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              full_name: fullName,
              first_name: firstName,
              last_name: lastName,
              username: username,
              university: university || null
            }
          }
        });

        if (error) throw error;

        // Pre-warm caches
        try {
          fetch('https://studyflowsuite.onrender.com/api/warmup', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + data.session.access_token }
          });
        } catch (e) {}

        // Store signup flag for post-signup onboarding
        localStorage.setItem('sf-just-signed-up', 'true');
        localStorage.setItem('sf-new-user-name', firstName);

        showSuccess('Account created! Setting up your profile...');
        setTimeout(() => {
          window.location.href = 'social.html';
        }, 1200);

      } catch (error) {
        console.error('Signup error:', error);
        showError(error.message || 'Signup failed. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });

    // University autocomplete
    const uniInput = document.getElementById('university');
    const uniDropdown = document.getElementById('universityDropdown');
    let uniTimer = null;

    uniInput.addEventListener('input', () => {
      clearTimeout(uniTimer);
      uniTimer = setTimeout(() => {
        const q = uniInput.value.trim();
        if (q.length < 2) { uniDropdown.style.display = 'none'; return; }
        const results = (typeof searchUniversities === 'function') ? searchUniversities(q).slice(0, 8) : [];
        if (!results.length) { uniDropdown.style.display = 'none'; return; }
        uniDropdown.innerHTML = results.map(u =>
          '<div style="padding:9px 14px;cursor:pointer;font-size:13px;color:#2d2d2d;transition:background 0.1s;" onmouseenter="this.style.background=\'rgba(124,152,133,0.06)\'" onmouseleave="this.style.background=\'transparent\'" onclick="document.getElementById(\'university\').value=this.textContent;document.getElementById(\'universityDropdown\').style.display=\'none\'">' + u + '</div>'
        ).join('');
        uniDropdown.style.display = 'block';
      }, 200);
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#university') && !e.target.closest('#universityDropdown')) {
        uniDropdown.style.display = 'none';
      }
    });

  </script>
</body>
</html>
