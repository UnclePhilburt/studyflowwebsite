<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - StudyFlowSuite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e8e3d8;
      min-height: 100vh;
      color: #2d2d2d;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(124, 152, 133, 0.06) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(232, 155, 95, 0.05) 0%, transparent 40%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: multiply;
      opacity: 0.8;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(0deg, transparent 0px, rgba(107, 133, 117, 0.02) 1px, transparent 2px, transparent 3px),
        repeating-linear-gradient(90deg, transparent 0px, rgba(232, 155, 95, 0.015) 1px, transparent 2px, transparent 5px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.7;
    }

    .signup-container {
      background: rgba(235, 230, 219, 0.6);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      max-width: 480px;
      width: 100%;
      padding: 50px 45px;
      position: relative;
      z-index: 1;
      border: 2px solid rgba(124, 152, 133, 0.2);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 35px;
    }

    .logo-section h1 {
      font-family: 'Lora', serif;
      font-size: 32px;
      font-weight: 400;
      background: linear-gradient(135deg, #7c9885 0%, #6b8575 50%, #e89b5f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .logo-section p {
      color: #6b8575;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #2d2d2d;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.2) 100%) 1;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.7);
      color: #2d2d2d;
    }

    .form-group input:focus {
      outline: none;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.5) 0%, rgba(232, 155, 95, 0.5) 100%) 1;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 20px rgba(124, 152, 133, 0.15);
    }

    .form-group input::placeholder {
      color: #9a9a9a;
    }

    .password-strength {
      height: 3px;
      background: rgba(124, 152, 133, 0.1);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      transition: all 0.3s;
      width: 0%;
    }

    .password-strength-bar.weak {
      width: 33%;
      background: #e89b5f;
    }

    .password-strength-bar.medium {
      width: 66%;
      background: #d4a574;
    }

    .password-strength-bar.strong {
      width: 100%;
      background: #7c9885;
    }

    .legal-section {
      margin-bottom: 24px;
    }

    .legal-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #6b8575;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .terms-checkbox {
      display: flex;
      align-items: start;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 13px;
      color: #5a5a5a;
      line-height: 1.5;
    }

    .terms-checkbox:last-child {
      margin-bottom: 0;
    }

    .terms-checkbox input[type="checkbox"] {
      margin-top: 2px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #7c9885;
      flex-shrink: 0;
    }

    .terms-checkbox label {
      margin-bottom: 0;
    }

    .terms-checkbox a {
      color: #7c9885;
      text-decoration: none;
      font-weight: 600;
    }

    .terms-checkbox a:hover {
      color: #e89b5f;
    }

    .checkbox-highlight {
      font-weight: 600;
      color: #6b8575;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.95) 0%, rgba(232, 155, 95, 0.95) 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 24px rgba(124, 152, 133, 0.25);
      margin-top: 10px;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(124, 152, 133, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .auth-divider {
      text-align: center;
      margin: 28px 0;
      color: #8a8a8a;
      font-size: 14px;
      position: relative;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: linear-gradient(to right, rgba(124, 152, 133, 0.2), rgba(232, 155, 95, 0.2));
    }

    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: #5a5a5a;
      font-size: 14px;
    }

    .auth-footer a {
      color: #7c9885;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .auth-footer a:hover {
      color: #e89b5f;
    }

    .error-message, .success-message {
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error-message {
      background: rgba(232, 155, 95, 0.1);
      color: #c45a2a;
      border: 2px solid rgba(232, 155, 95, 0.3);
    }

    .success-message {
      background: rgba(124, 152, 133, 0.1);
      color: #4a7456;
      border: 2px solid rgba(124, 152, 133, 0.3);
    }

    @media (max-width: 600px) {
      .signup-container {
        padding: 40px 30px;
      }

      .logo-section h1 {
        font-size: 28px;
      }
    }
  </style>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="signup-container">
    <div class="logo-section">
      <h1>StudyFlow Suite</h1>
      <p>Create your account</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="signupForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>
      </div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="OzarkCoder" required minlength="3" maxlength="20" pattern="[a-zA-Z0-9_]{3,20}">
        <div style="font-size: 12px; color: #6b8575; margin-top: 6px;">
          3-20 characters, letters, numbers, and underscores only. This will be shown when you contribute to the Nexus!
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
        <div class="password-strength">
          <div class="password-strength-bar" id="passwordStrength"></div>
        </div>
      </div>

      <div class="legal-section">
        <div class="legal-section-title">Required Certifications</div>

        <div class="terms-checkbox">
          <input type="checkbox" id="ageGate" required>
          <label for="ageGate">
            I certify that I am <span class="checkbox-highlight">18 years of age or older</span>.
          </label>
        </div>

        <div class="terms-checkbox">
          <input type="checkbox" id="aiTransparency" required>
          <label for="aiTransparency">
            I understand that StudyFlow Suite uses <span class="checkbox-highlight">Artificial Intelligence (Gemini 1.5 Flash)</span> to generate study aids and that outputs may contain inaccuracies.
          </label>
        </div>

        <div class="terms-checkbox">
          <input type="checkbox" id="noteLicense" required>
          <label for="noteLicense">
            I grant StudyFlow LLC a <span class="checkbox-highlight">non-exclusive, perpetual license</span> to anonymize and use my uploaded notes to improve the Nexus.
          </label>
        </div>

        <div class="terms-checkbox">
          <input type="checkbox" id="academicIntegrity" required>
          <label for="academicIntegrity">
            I agree to use StudyFlow Suite as a <span class="checkbox-highlight">supplemental study tool</span> and will not use it to violate my institution's academic integrity policies.
          </label>
        </div>

        <div class="terms-checkbox">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>.
          </label>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">
        Create Account
      </button>
    </form>

    <div class="auth-divider">or</div>

    <div class="auth-footer">
      Already have an account? <a href="index.html">Sign in</a>
    </div>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://mxddgbpxjoltaimftpmn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI'
    );

    // Password strength indicator
    document.getElementById('password').addEventListener('input', (e) => {
      const password = e.target.value;
      const strengthBar = document.getElementById('passwordStrength');

      if (password.length === 0) {
        strengthBar.className = 'password-strength-bar';
        return;
      }

      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
      if (password.match(/[0-9]/)) strength++;
      if (password.match(/[^a-zA-Z0-9]/)) strength++;

      if (strength <= 1) {
        strengthBar.className = 'password-strength-bar weak';
      } else if (strength <= 3) {
        strengthBar.className = 'password-strength-bar medium';
      } else {
        strengthBar.className = 'password-strength-bar strong';
      }
    });

    const signupForm = document.getElementById('signupForm');
    const nameInput = document.getElementById('name');
    const usernameInput = document.getElementById('username');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const termsInput = document.getElementById('terms');
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      successMessage.style.display = 'none';
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.style.display = 'block';
      errorMessage.style.display = 'none';
    }

    function hideMessages() {
      errorMessage.style.display = 'none';
      successMessage.style.display = 'none';
    }

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const name = nameInput.value.trim();
      const username = usernameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const ageGate = document.getElementById('ageGate').checked;
      const aiTransparency = document.getElementById('aiTransparency').checked;
      const noteLicense = document.getElementById('noteLicense').checked;
      const academicIntegrity = document.getElementById('academicIntegrity').checked;
      const terms = termsInput.checked;

      if (!name || !username || !email || !password) {
        showError('Please fill in all fields');
        return;
      }

      // Validate username format
      if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
        showError('Username must be 3-20 characters (letters, numbers, underscores only)');
        return;
      }

      if (!ageGate) {
        showError('You must certify that you are 18 years of age or older');
        return;
      }

      if (!aiTransparency) {
        showError('You must acknowledge that StudyFlow uses AI');
        return;
      }

      if (!noteLicense) {
        showError('You must grant permission to use your notes for the Nexus');
        return;
      }

      if (!academicIntegrity) {
        showError('You must agree to use StudyFlow as a supplemental study tool');
        return;
      }

      if (!terms) {
        showError('You must agree to the Terms of Service and Privacy Policy');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        // Sign up with Supabase
        const { data, error } = await supabaseClient.auth.signUp({
          email: email,
          password: password,
          options: {
            data: {
              full_name: name,
              username: username
            }
          }
        });

        if (error) throw error;

        showSuccess('Account created! Redirecting to login...');
        setTimeout(() => {
          window.location.href = 'index.html?email=' + encodeURIComponent(email);
        }, 1500);

      } catch (error) {
        console.error('Signup error:', error);
        showError(error.message || 'Signup failed. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
