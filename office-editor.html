<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor - StudyFlow Office</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* Theme Variables */
    :root {
      --bg-primary: #FAF8F5;
      --bg-secondary: rgba(255, 255, 255, 0.6);
      --bg-tertiary: rgba(255, 255, 255, 0.9);
      --text-primary: #2C2C2C;
      --text-secondary: #8B7E73;
      --text-muted: #9B8B7E;
      --accent-primary: #8B9D83;
      --accent-secondary: #7A8C73;
      --shadow: rgba(0, 0, 0, 0.04);
    }

    body[data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: rgba(40, 40, 40, 0.8);
      --bg-tertiary: rgba(50, 50, 50, 0.9);
      --text-primary: #f5f5f5;
      --text-secondary: #d0d0d0;
      --text-muted: #a0a0a0;
      --accent-primary: #7c9885;
      --accent-secondary: #6a8573;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    body[data-theme="ocean"] {
      --bg-primary: #F0F8FF;
      --text-primary: #1e3a5f;
      --text-secondary: #4a6b8a;
      --text-muted: #7a9cb8;
      --accent-primary: #4a90a4;
      --accent-secondary: #3a7a8e;
      --shadow: rgba(0, 0, 0, 0.04);
    }

    body[data-theme="sunset"] {
      --bg-primary: #FFF5F0;
      --text-primary: #4a2c2a;
      --text-secondary: #8a5a4a;
      --text-muted: #b88a7a;
      --accent-primary: #d17a5f;
      --accent-secondary: #b86a4f;
      --shadow: rgba(0, 0, 0, 0.04);
    }

    body[data-theme="minimal"] {
      --bg-primary: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --accent-primary: #4a4a4a;
      --accent-secondary: #3a3a3a;
      --shadow: rgba(0, 0, 0, 0.04);
    }

    body[data-theme="forest"] {
      --bg-primary: #F5F9F5;
      --text-primary: #2a3a2a;
      --text-secondary: #4a6a4a;
      --text-muted: #7a9a7a;
      --accent-primary: #5a8a5a;
      --accent-secondary: #4a7a4a;
      --shadow: rgba(0, 0, 0, 0.04);
    }

    body[data-theme="lavender"] {
      --bg-primary: #F8F5FF;
      --text-primary: #3a2a4a;
      --text-secondary: #6a5a8a;
      --text-muted: #9a8ab8;
      --accent-primary: #8a7aa4;
      --accent-secondary: #7a6a94;
      --shadow: rgba(0, 0, 0, 0.04);
    }

    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      overflow: hidden;
    }

    #editorContainer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100vw;
      height: 100vh;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .loading-overlay .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--bg-secondary);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 16px;
    }

    .loading-overlay p {
      color: var(--text-muted);
      font-size: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error Overlay */
    .error-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-primary);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      text-align: center;
      padding: 32px;
    }

    .error-overlay h3 {
      color: #dc2626;
      font-size: 1.2rem;
      margin-bottom: 8px;
    }

    .error-overlay p {
      color: var(--text-muted);
      font-size: 14px;
      max-width: 400px;
      margin-bottom: 20px;
    }

    .error-overlay a {
      color: var(--accent-primary);
      font-weight: 600;
      text-decoration: none;
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1266375537905101" crossorigin="anonymous"></script>
</head>
<body>

  <div id="editorContainer"></div>

  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>Loading editor...</p>
  </div>

  <div id="errorOverlay" class="error-overlay">
    <h3>Failed to load editor</h3>
    <p id="errorMessage">Something went wrong.</p>
    <a href="office.html">Back to Office</a>
  </div>

<script>
  const BACKEND_URL = 'https://studyflowsuite.onrender.com';
  const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Load saved theme from localStorage
  function loadSavedTheme() {
    const savedTheme = localStorage.getItem('dashboard-theme') || 'default';
    document.body.setAttribute('data-theme', savedTheme);
  }

  // Apply theme immediately (before DOM ready)
  loadSavedTheme();

  function showError(msg) {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('errorMessage').textContent = msg;
    document.getElementById('errorOverlay').style.display = 'flex';
  }

  async function init() {
    // Auth check
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'mobile.html';
      return;
    }

    const authToken = session.access_token;

    // Token relay for StudyFlow Assistant plugin (postMessage across iframe boundaries)
    window.addEventListener('message', async function(event) {
      if (event.data && event.data.type === 'REQUEST_SF_TOKEN') {
        // Refresh session to ensure token is fresh
        const { data: { session: freshSession } } = await supabaseClient.auth.getSession();
        if (freshSession && event.source) {
          event.source.postMessage({
            type: 'SF_TOKEN',
            token: freshSession.access_token,
            backendUrl: BACKEND_URL
          }, '*');
        }
      }
    });

    // Get doc ID from URL
    const params = new URLSearchParams(window.location.search);
    const docId = params.get('id');
    if (!docId) {
      showError('No document ID provided.');
      return;
    }

    // Fetch editor config
    let config, docServerUrl;
    try {
      const resp = await fetch(`${BACKEND_URL}/api/office/${docId}/editor-config`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });

      if (!resp.ok) {
        const err = await resp.json();
        showError(err.error || `Server error (${resp.status})`);
        return;
      }

      const data = await resp.json();
      config = data.config;
      docServerUrl = data.docServerUrl;
    } catch (err) {
      showError('Failed to fetch editor configuration.');
      return;
    }

    if (!docServerUrl) {
      showError('Document server URL is not configured.');
      return;
    }

    // Add event handlers to config
    config.events = {
      onDocumentReady: function () {
        document.getElementById('loadingOverlay').style.display = 'none';
      },
      onError: function (event) {
        console.error('ONLYOFFICE error:', event);
      }
    };

    // Dynamically load ONLYOFFICE API script and init editor
    const script = document.createElement('script');
    script.src = `${docServerUrl}/web-apps/apps/api/documents/api.js`;
    script.onload = function () {
      try {
        new DocsAPI.DocEditor('editorContainer', config);
      } catch (err) {
        console.error('Editor init error:', err);
        showError('Failed to initialize the document editor.');
      }
    };
    script.onerror = function () {
      showError('Could not connect to the document server. Please check that it is running.');
    };
    document.head.appendChild(script);
  }

  init();
</script>
</body>
</html>
