<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - StudyFlow Suite</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #fafafa;
      --bg-secondary: rgba(255, 255, 255, 0.6);
      --bg-tertiary: rgba(255, 255, 255, 0.9);
      --text-primary: #262626;
      --text-secondary: #737373;
      --text-muted: #a3a3a3;
      --accent-primary: #8B9D83;
      --accent-secondary: #7A8C73;
      --border-color: #dbdbdb;
      --hover-bg: rgba(139, 157, 131, 0.06);
      --shadow: rgba(0, 0, 0, 0.04);
      --card-bg: white;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding: 0;
      margin: 0;
      overflow-x: hidden;
      padding-bottom: 80px;
    }

    html {
      overflow-x: hidden;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 0;
      padding: 16px 0;
    }

    .header-inner {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      background: linear-gradient(135deg, #8B9D83, #5a7a5a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.8px;
      font-family: 'Inter', sans-serif;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin: 24px 0 8px 0;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .clear-all-btn {
      background: none;
      border: none;
      color: var(--accent-primary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 0;
      margin-bottom: 16px;
    }

    .notif-item {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: all 0.2s;
    }

    .notif-item:hover {
      background: var(--hover-bg);
    }

    .notif-item.unread {
      border-color: var(--accent-primary);
      background: rgba(139, 157, 131, 0.03);
    }

    .notif-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
    }

    .notif-content {
      flex: 1;
    }

    .notif-text {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .notif-text strong {
      font-weight: 600;
      color: var(--text-primary);
    }

    .notif-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .header-inner {
        padding: 0 12px;
      }

      .container {
        padding: 0 12px;
      }

      .page-title {
        font-size: 24px;
      }

      .notif-item {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <button class="back-btn" onclick="history.back()">←</button>
      <a href="index.html" style="text-decoration:none;"><h1>StudyFlow</h1></a>
      <div style="width:28px;"></div>
    </div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <h2 class="page-title">Notifications</h2>
    <p class="page-subtitle">Stay updated with your latest activity</p>

    <button class="clear-all-btn" onclick="clearAllNotifs()" id="clearBtn" style="display:none;">Clear all</button>

    <div id="notifList">
      <div class="loading">Loading notifications...</div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    let authToken = localStorage.getItem('sf-auth-token');

    async function loadNotifications() {
      const list = document.getElementById('notifList');

      if (!authToken) {
        list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><p>Please log in to view notifications</p></div>';
        return;
      }

      let items = [];

      try {
        const res = await fetch(`${BACKEND_URL}/api/social/activity`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (res.ok) {
          const data = await res.json();
          items = (data.activities || []);
        }
      } catch {}

      try {
        const res = await fetch(`${BACKEND_URL}/api/notifications`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (res.ok) {
          const data = await res.json();
          (data.notifications || data || []).forEach(n => {
            items.push({
              type: 'study',
              username: 'StudyFlow',
              detail: n.message || n.title,
              created_at: n.created_at
            });
          });
        }
      } catch {}

      items.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><p>No notifications yet</p></div>';
        document.getElementById('clearBtn').style.display = 'none';
      } else {
        document.getElementById('clearBtn').style.display = 'block';
        list.innerHTML = items.map(item => {
          const timeAgo = getTimeAgo(item.created_at);
          const initial = item.username.charAt(0).toUpperCase();

          let text = '';
          if (item.type === 'upvote') text = `<strong>${item.username}</strong> upvoted your post`;
          else if (item.type === 'comment') text = `<strong>${item.username}</strong> commented on your post: "${item.detail}"`;
          else if (item.type === 'follow') text = `<strong>${item.username}</strong> started following you`;
          else if (item.type === 'mention') text = `<strong>${item.username}</strong> mentioned you: "${item.detail}"`;
          else text = `<strong>${item.username}</strong>: ${item.detail}`;

          return `
            <div class="notif-item">
              <div class="notif-avatar">${initial}</div>
              <div class="notif-content">
                <div class="notif-text">${text}</div>
                <div class="notif-time">${timeAgo}</div>
              </div>
            </div>
          `;
        }).join('');
      }
    }

    async function clearAllNotifs() {
      try {
        await fetch(`${BACKEND_URL}/api/notifications/read`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
      } catch {}

      document.getElementById('notifList').innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><p>All notifications cleared</p></div>';
      document.getElementById('clearBtn').style.display = 'none';
    }

    function getTimeAgo(dateString) {
      const now = Date.now();
      const then = new Date(dateString).getTime();
      const diff = now - then;
      const seconds = Math.floor(diff / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);

      if (seconds < 60) return 'just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return new Date(then).toLocaleDateString();
    }

    loadNotifications();
  </script>
</body>
</html>
