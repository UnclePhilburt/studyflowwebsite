<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Office - StudyFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f4f0 0%, #ede9e4 100%);
      color: #2d2d2d;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .header-left h1 {
      font-family: 'Lora', Georgia, serif;
      font-size: 2rem;
      font-weight: 700;
      color: #2d2d2d;
    }

    .header-left p {
      color: #9ca3af;
      font-size: 14px;
      margin-top: 4px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      padding: 0 32px 16px;
      max-width: 1200px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: #7c9885;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .toolbar-btn:hover { background: #6a8a73; }
    .toolbar-btn:active { transform: scale(0.97); }

    .toolbar-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      padding: 16px 32px 100px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .doc-card {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(124, 152, 133, 0.15);
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .doc-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .doc-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .doc-card-icon.docx { background: #4285f4; }
    .doc-card-icon.xlsx { background: #34a853; }
    .doc-card-icon.pptx { background: #ea4335; }

    .doc-card-title {
      font-weight: 600;
      font-size: 15px;
      color: #2d2d2d;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .doc-card-meta {
      font-size: 12px;
      color: #9ca3af;
    }

    .doc-card-delete {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: none;
      background: rgba(220, 38, 38, 0.08);
      color: #dc2626;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .doc-card:hover .doc-card-delete { opacity: 1; }

    .doc-card-delete svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Loading & Empty States */
    .state-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
      text-align: center;
    }

    .state-container svg {
      width: 64px;
      height: 64px;
      stroke: #b0b0b0;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      margin-bottom: 16px;
    }

    .state-container h3 {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.3rem;
      color: #2d2d2d;
      margin-bottom: 8px;
    }

    .state-container p {
      color: #9ca3af;
      font-size: 14px;
      max-width: 340px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(124, 152, 133, 0.2);
      border-top-color: #7c9885;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Top Navigation (Desktop) */
    .top-nav {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 1000;
    }

    .nav-link {
      color: #5d5d5d;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 8px 16px;
      border-radius: 8px;
    }

    .nav-link:hover {
      color: #7c9885;
      background: rgba(124, 152, 133, 0.08);
    }

    .nav-link.active {
      color: #7c9885;
      background: rgba(124, 152, 133, 0.1);
    }

    /* Bottom Tab Bar */
    .bottom-tab-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(124, 152, 133, 0.15);
      justify-content: space-around;
      align-items: center;
      z-index: 9999;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #9ca3af;
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      flex: 1;
      height: 100%;
      transition: color 0.2s;
    }

    .tab-item svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-item.active { color: #7c9885; }

    @media (max-width: 768px) {
      .top-nav { display: none; }
      .bottom-tab-bar { display: flex; }
      body { padding-bottom: 56px; }
      .header { padding: 16px; }
      .toolbar { padding: 0 16px 12px; }
      .doc-grid { padding: 12px 16px 80px; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- Top Navigation -->
  <div class="top-nav">
    <a href="chat.html" class="nav-link">Chat</a>
    <a href="upload.html" class="nav-link">Upload</a>
    <a href="notes.html" class="nav-link">Notes</a>
    <a href="office.html" class="nav-link active">Office</a>
    <a href="browse.html" class="nav-link">Nexus</a>
    <a href="calendar.html" class="nav-link">Calendar</a>
  </div>

  <div class="header">
    <div class="header-left">
      <h1>Private Office</h1>
      <p>Create and edit documents, spreadsheets, and presentations</p>
    </div>
  </div>

  <div class="toolbar">
    <button class="toolbar-btn" onclick="createDocument('docx')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      New Document
    </button>
    <button class="toolbar-btn" onclick="createDocument('xlsx')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
      New Spreadsheet
    </button>
    <button class="toolbar-btn" onclick="createDocument('pptx')">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      New Presentation
    </button>
  </div>

  <div id="loadingState" class="state-container">
    <div class="spinner"></div>
    <p>Loading documents...</p>
  </div>

  <div id="emptyState" class="state-container" style="display: none;">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <h3>No documents yet</h3>
    <p>Create a document, spreadsheet, or presentation to get started.</p>
  </div>

  <div id="docGrid" class="doc-grid" style="display: none;"></div>

  <nav class="bottom-tab-bar">
    <a href="chat.html" class="tab-item"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Chat</span></a>
    <a href="upload.html" class="tab-item"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>Upload</span></a>
    <a href="notes.html" class="tab-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Notes</span></a>
    <a href="office.html" class="tab-item active"><svg viewBox="0 0 24 24"><path d="M4 4a2 2 0 0 1 2-2h8l6 6v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg><span>Office</span></a>
    <a href="browse.html" class="tab-item"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>Nexus</span></a>
    <a href="calendar.html" class="tab-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Calendar</span></a>
    <a href="account.html" class="tab-item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Account</span></a>
  </nav>

<script>
  const BACKEND_URL = 'https://studyflowsuite.onrender.com';
  const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let authToken = null;

  async function checkAuth() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'index.html';
      return;
    }
    authToken = session.access_token;
    await loadDocuments();
  }

  async function loadDocuments() {
    const loadingEl = document.getElementById('loadingState');
    const emptyEl = document.getElementById('emptyState');
    const gridEl = document.getElementById('docGrid');

    try {
      const resp = await fetch(`${BACKEND_URL}/api/office/list`, {
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      const data = await resp.json();

      loadingEl.style.display = 'none';

      if (!data.documents || data.documents.length === 0) {
        emptyEl.style.display = 'flex';
        gridEl.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';
      gridEl.style.display = 'grid';
      gridEl.innerHTML = '';

      data.documents.forEach(doc => {
        const card = document.createElement('div');
        card.className = 'doc-card';
        card.onclick = (e) => {
          if (e.target.closest('.doc-card-delete')) return;
          window.location.href = `office-editor.html?id=${doc.id}`;
        };

        const date = doc.created_at ? new Date(doc.created_at).toLocaleDateString() : '';
        const sizeKB = doc.size ? Math.round(doc.size / 1024) : 0;
        const typeLabel = { docx: 'DOCX', xlsx: 'XLSX', pptx: 'PPTX' }[doc.type] || doc.type;

        card.innerHTML = `
          <div class="doc-card-icon ${doc.type}">${typeLabel}</div>
          <div class="doc-card-title" title="${doc.title}">${doc.title}</div>
          <div class="doc-card-meta">${typeLabel} -- ${sizeKB} KB -- ${date}</div>
          <button class="doc-card-delete" onclick="deleteDocument('${doc.id}', event)" title="Delete">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          </button>
        `;

        gridEl.appendChild(card);
      });
    } catch (err) {
      console.error('Failed to load documents:', err);
      loadingEl.style.display = 'none';
      emptyEl.style.display = 'flex';
    }
  }

  async function createDocument(type) {
    const typeNames = { docx: 'Document', xlsx: 'Spreadsheet', pptx: 'Presentation' };
    const title = prompt(`Name your new ${typeNames[type] || type}:`, `Untitled ${typeNames[type]}`);
    if (!title) return;

    try {
      const resp = await fetch(`${BACKEND_URL}/api/office/create`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${authToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ title, type })
      });
      const data = await resp.json();
      if (data.success && data.doc_id) {
        window.location.href = `office-editor.html?id=${data.doc_id}`;
      } else {
        alert(data.error || 'Failed to create document');
      }
    } catch (err) {
      console.error('Create error:', err);
      alert('Failed to create document. Please try again.');
    }
  }

  async function deleteDocument(docId, event) {
    event.stopPropagation();
    if (!confirm('Delete this document? This cannot be undone.')) return;

    try {
      const resp = await fetch(`${BACKEND_URL}/api/office/${docId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${authToken}` }
      });
      const data = await resp.json();
      if (data.success) {
        await loadDocuments();
      } else {
        alert(data.error || 'Failed to delete');
      }
    } catch (err) {
      console.error('Delete error:', err);
      alert('Failed to delete document.');
    }
  }

  // Init
  checkAuth();
</script>
</body>
</html>
