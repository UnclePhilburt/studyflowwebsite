<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library - StudyFlowSuite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f5f4f0 0%, #ede9e4 100%);
      min-height: 100vh;
      color: #2d2d2d;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 20%, rgba(124, 152, 133, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(232, 155, 95, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInDown 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 42px;
      font-weight: 500;
      color: #2d2d2d;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #7c9885 0%, #e89b5f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-subtitle {
      font-size: 16px;
      color: #5d5d5d;
      font-weight: 400;
    }

    /* Top Navigation */
    .top-nav {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 1000;
    }

    .nav-link {
      color: #5d5d5d;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 8px 16px;
      border-radius: 8px;
    }

    .nav-link:hover {
      color: #7c9885;
      background: rgba(124, 152, 133, 0.08);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c9885 0%, #6b8575 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(124, 152, 133, 0.2);
    }

    .user-avatar:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.3);
    }

    /* Search Bar */
    .search-container {
      margin-bottom: 40px;
      animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.2s backwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .search-input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid rgba(124, 152, 133, 0.15);
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #2d2d2d;
    }

    .search-input:focus {
      outline: none;
      border-color: rgba(124, 152, 133, 0.4);
      background: rgba(255, 255, 255, 1);
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.1);
    }

    .search-input::placeholder {
      color: #9ca3af;
    }

    /* Notes List */
    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.4s backwards;
    }

    .note-card {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.95) 0%, rgba(248, 246, 243, 0.9) 100%);
      border: 2px solid rgba(124, 152, 133, 0.12);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      cursor: pointer;
      animation: floatIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) backwards;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .note-card:hover {
      border-color: rgba(124, 152, 133, 0.3);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(124, 152, 133, 0.15);
    }

    .note-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.15) 0%, rgba(232, 155, 95, 0.1) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #7c9885;
      flex-shrink: 0;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .note-card:hover .note-icon {
      transform: rotate(5deg) scale(1.1);
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.15) 100%);
    }

    .note-info {
      flex: 1;
    }

    .note-name {
      font-weight: 600;
      color: #2d2d2d;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .note-course {
      color: #7c9885;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .note-meta {
      font-size: 13px;
      color: #9ca3af;
    }

    /* Delete Stone */
    .delete-stone {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(245, 240, 235, 0.8) 100%);
      border: 2px solid rgba(220, 100, 80, 0.3);
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .note-card:hover .delete-stone {
      opacity: 1;
      pointer-events: auto;
    }

    .delete-stone:hover {
      background: linear-gradient(135deg, rgba(220, 100, 80, 0.15) 0%, rgba(220, 100, 80, 0.1) 100%);
      border-color: rgba(220, 100, 80, 0.6);
      transform: translateY(-50%) scale(1.15);
      box-shadow: 0 4px 16px rgba(220, 100, 80, 0.2);
    }

    .delete-stone svg {
      width: 16px;
      height: 16px;
      stroke: #dc6450;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.08) 0%, rgba(232, 155, 95, 0.05) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
    }

    .empty-icon svg {
      width: 50px;
      height: 50px;
      stroke: #7c9885;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 15px;
      color: #9ca3af;
      font-family: 'Lora', Georgia, serif;
      margin-bottom: 24px;
    }

    .upload-link {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.15) 0%, rgba(232, 155, 95, 0.1) 100%);
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.4) 0%, rgba(232, 155, 95, 0.3) 100%) 1;
      border-radius: 12px;
      color: #2d2d2d;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', sans-serif;
    }

    .upload-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124, 152, 133, 0.2);
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.15) 100%);
    }

    /* Loading State */
    .loading-state {
      text-align: center;
      padding: 80px 20px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(124, 152, 133, 0.15);
      border-top-color: #7c9885;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 15px;
      color: #9ca3af;
      font-family: 'Lora', Georgia, serif;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 40px 20px;
      }

      .header-title {
        font-size: 32px;
      }

      .top-nav {
        top: 16px;
        right: 16px;
      }
    }
  </style>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Top Navigation -->
  <div class="top-nav">
    <a href="chat.html" class="nav-link">Chat</a>
    <a href="upload.html" class="nav-link">Upload</a>
    <div class="user-avatar" id="userAvatar" onclick="logout()"></div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1 class="header-title">My Library</h1>
      <p class="header-subtitle">All your study materials in one place</p>
    </div>

    <!-- Search -->
    <div class="search-container">
      <input type="text" class="search-input" id="search-input" placeholder="Search your library...">
    </div>

    <!-- Notes List -->
    <div id="notes-container">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading your library...</div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allNotes = [];
    let authToken = null;

    // Check authentication
    async function checkAuth() {
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      authToken = session.access_token;

      // Set user avatar
      const userAvatar = document.getElementById('userAvatar');
      if (session.user.email) {
        userAvatar.textContent = session.user.email.charAt(0).toUpperCase();
      }

      loadNotes();
    }

    // Load notes
    async function loadNotes() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/list`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.status === 401) {
          await supabaseClient.auth.signOut();
          window.location.href = 'index.html';
          return;
        }

        if (!response.ok) throw new Error('Failed to load notes');

        allNotes = await response.json();

        // Sort by date, newest first
        allNotes.sort((a, b) => new Date(b.uploaded_at) - new Date(a.uploaded_at));

        displayNotes(allNotes);
      } catch (error) {
        console.error('Load error:', error);
        displayNotes([]);
      }
    }

    // Display notes
    function displayNotes(notes) {
      const container = document.getElementById('notes-container');

      if (notes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
              </svg>
            </div>
            <p class="empty-text">Your library is empty</p>
            <a href="upload.html" class="upload-link">Upload Notes</a>
          </div>
        `;
        return;
      }

      const notesHTML = notes.map((note, index) => {
        const icon = getFileIcon(note.filename);
        const date = formatDate(note.uploaded_at);
        const courseInfo = [];
        if (note.university) courseInfo.push(note.university);
        if (note.course_code) courseInfo.push(note.course_code);
        const courseLine = courseInfo.length > 0 ? `<div class="note-course">${courseInfo.join(' - ')}</div>` : '';

        return `
          <div class="note-card" style="animation-delay: ${index * 0.05}s" onclick="downloadNote('${note.id}', '${escapeQuotes(note.filename)}')">
            <div class="note-icon">${icon}</div>
            <div class="note-info">
              <div class="note-name">${escapeHtml(note.filename)}</div>
              ${courseLine}
              <div class="note-meta">${date} • ${note.pages || '?'} pages</div>
            </div>
            <div class="delete-stone" onclick="event.stopPropagation(); deleteNote('${note.id}', '${escapeQuotes(note.filename)}')">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </div>
          </div>
        `;
      }).join('');

      container.innerHTML = `<div class="notes-list">${notesHTML}</div>`;
    }

    // Download note
    async function downloadNote(noteId, filename) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/${noteId}/download`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Download failed');

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
      } catch (error) {
        console.error('Download error:', error);
      }
    }

    // Delete note
    async function deleteNote(noteId, filename) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/${noteId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Delete failed');

        // Reload notes
        loadNotes();
      } catch (error) {
        console.error('Delete error:', error);
      }
    }

    // Search functionality
    document.getElementById('search-input').addEventListener('input', (e) => {
      const searchTerm = e.target.value.toLowerCase();

      if (!searchTerm) {
        displayNotes(allNotes);
        return;
      }

      const filtered = allNotes.filter(note => {
        return note.filename.toLowerCase().includes(searchTerm) ||
               (note.university && note.university.toLowerCase().includes(searchTerm)) ||
               (note.course_code && note.course_code.toLowerCase().includes(searchTerm));
      });

      displayNotes(filtered);
    });

    // Utility functions
    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      if (ext === 'pdf') return 'PDF';
      if (['jpg', 'jpeg', 'png'].includes(ext)) return 'IMG';
      if (['doc', 'docx'].includes(ext)) return 'DOC';
      if (ext === 'txt') return 'TXT';
      return 'FILE';
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diffMs = now - date;
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7) return `${diffDays} days ago`;

      return date.toLocaleDateString();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeQuotes(text) {
      return text.replace(/'/g, "\\'");
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    }

    // Initialize
    checkAuth();
  </script>
</body>
</html>
