<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library - StudyFlowSuite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f5f4f0 0%, #ede9e4 100%);
      min-height: 100vh;
      color: #2d2d2d;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 20%, rgba(124, 152, 133, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(232, 155, 95, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
      min-height: 100vh;
    }

    /* Top Navigation */
    .top-nav {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 1000;
    }

    .nav-link {
      color: #5d5d5d;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 8px 16px;
      border-radius: 8px;
    }

    .nav-link:hover {
      color: #7c9885;
      background: rgba(124, 152, 133, 0.08);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c9885 0%, #6b8575 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(124, 152, 133, 0.2);
    }

    .user-avatar:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.3);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.7) 0%, rgba(248, 246, 243, 0.6) 100%);
      border-radius: 12px;
      border: 2px solid rgba(124, 152, 133, 0.1);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      color: #5d5d5d;
    }

    .breadcrumb-item {
      cursor: pointer;
      transition: color 0.3s;
    }

    .breadcrumb-item:hover {
      color: #7c9885;
    }

    .breadcrumb-separator {
      color: #9ca3af;
    }

    .toolbar-actions {
      display: flex;
      gap: 12px;
    }

    .toolbar-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.15) 0%, rgba(232, 155, 95, 0.1) 100%);
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.2) 100%) 1;
      border-radius: 8px;
      color: #2d2d2d;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', sans-serif;
    }

    .toolbar-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 152, 133, 0.2);
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.15) 100%);
    }

    /* Desktop Grid */
    .desktop {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 24px;
      padding: 20px;
      min-height: 500px;
      position: relative;
    }

    .desktop.free-mode {
      display: block;
      min-height: 600px;
    }

    /* Folder Item */
    .folder-item, .note-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      position: relative;
    }

    .desktop.free-mode .folder-item,
    .desktop.free-mode .note-item {
      position: absolute;
      cursor: move;
    }

    .folder-item:hover, .note-item:hover {
      background: rgba(124, 152, 133, 0.08);
      transform: translateY(-4px);
    }

    .folder-item.dragging, .note-item.dragging {
      opacity: 0.5;
    }

    .folder-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.15) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 4px 12px rgba(124, 152, 133, 0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .folder-item:hover .folder-icon {
      box-shadow: 0 8px 24px rgba(124, 152, 133, 0.25);
      transform: scale(1.05);
    }

    .folder-icon::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 8px;
      right: 20px;
      height: 8px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.2) 100%);
      border-radius: 4px 4px 0 0;
    }

    .folder-icon svg {
      width: 40px;
      height: 40px;
      stroke: #7c9885;
    }

    .note-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 246, 243, 0.8) 100%);
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #7c9885;
      box-shadow: 0 4px 12px rgba(124, 152, 133, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .note-item:hover .note-icon {
      box-shadow: 0 8px 24px rgba(124, 152, 133, 0.2);
      transform: scale(1.05);
    }

    .item-name {
      font-size: 13px;
      font-weight: 500;
      color: #2d2d2d;
      text-align: center;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-meta {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }

    /* Context Menu */
    .context-menu {
      position: fixed;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.98) 0%, rgba(248, 246, 243, 0.98) 100%);
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 12px 32px rgba(45, 45, 45, 0.2);
      z-index: 10000;
      display: none;
      min-width: 180px;
    }

    .context-menu.active {
      display: block;
    }

    .context-menu-item {
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      color: #2d2d2d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .context-menu-item:hover {
      background: rgba(124, 152, 133, 0.15);
    }

    .context-menu-item.danger:hover {
      background: rgba(220, 100, 80, 0.1);
      color: #dc6450;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(45, 45, 45, 0.4);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.98) 0%, rgba(248, 246, 243, 0.98) 100%);
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.3) 100%) 1;
      box-shadow: 0 20px 60px rgba(45, 45, 45, 0.2);
      transform: scale(0.9);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 500;
      font-family: 'Lora', Georgia, serif;
      color: #2d2d2d;
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.8);
      margin-bottom: 24px;
      color: #2d2d2d;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-input:focus {
      outline: none;
      border-color: rgba(124, 152, 133, 0.5);
      background: white;
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.1);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-btn {
      padding: 12px 28px;
      border-radius: 10px;
      border: 2px solid transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', sans-serif;
    }

    .modal-btn.cancel {
      background: rgba(124, 152, 133, 0.1);
      color: #7c9885;
      border-color: rgba(124, 152, 133, 0.3);
    }

    .modal-btn.cancel:hover {
      background: rgba(124, 152, 133, 0.2);
      transform: translateY(-2px);
    }

    .modal-btn.confirm {
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.15) 100%);
      color: #2d2d2d;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.4) 0%, rgba(232, 155, 95, 0.3) 100%) 1;
    }

    .modal-btn.confirm:hover {
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.2) 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.2);
    }

    /* Drop zone highlight */
    .folder-item.drop-target {
      background: rgba(124, 152, 133, 0.2);
      border: 2px dashed #7c9885;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
    }

    .empty-text {
      font-size: 15px;
      color: #9ca3af;
      font-family: 'Lora', Georgia, serif;
      margin-bottom: 24px;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(124, 152, 133, 0.15);
      border-top-color: #7c9885;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 15px;
      color: #9ca3af;
      font-family: 'Lora', Georgia, serif;
    }

    /* Preview Panel */
    .preview-panel {
      position: fixed;
      top: 0;
      right: -600px;
      width: 600px;
      height: 100vh;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.98) 0%, rgba(248, 246, 243, 0.98) 100%);
      border-left: 2px solid rgba(124, 152, 133, 0.2);
      box-shadow: -8px 0 32px rgba(45, 45, 45, 0.15);
      z-index: 9999;
      transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-panel.active {
      right: 0;
    }

    .preview-header {
      padding: 24px;
      border-bottom: 2px solid rgba(124, 152, 133, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .preview-info {
      flex: 1;
      min-width: 0;
    }

    .preview-title {
      font-size: 18px;
      font-weight: 600;
      font-family: 'Lora', Georgia, serif;
      color: #2d2d2d;
      margin-bottom: 12px;
      word-wrap: break-word;
    }

    .preview-meta-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 16px;
      font-size: 13px;
    }

    .preview-meta-label {
      color: #9ca3af;
      font-weight: 500;
    }

    .preview-meta-value {
      color: #2d2d2d;
    }

    .preview-close {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(124, 152, 133, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }

    .preview-close:hover {
      background: rgba(124, 152, 133, 0.2);
      transform: scale(1.05);
    }

    .preview-close svg {
      width: 20px;
      height: 20px;
      stroke: #7c9885;
    }

    .preview-content {
      flex: 1;
      padding: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .preview-viewer {
      flex: 1;
      background: white;
      border-radius: 12px;
      border: 2px solid rgba(124, 152, 133, 0.15);
      overflow: hidden;
      position: relative;
    }

    .preview-viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .preview-actions {
      display: flex;
      gap: 12px;
    }

    .preview-btn {
      flex: 1;
      padding: 12px 20px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.15) 0%, rgba(232, 155, 95, 0.1) 100%);
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.2) 100%) 1;
      border-radius: 8px;
      color: #2d2d2d;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', sans-serif;
    }

    .preview-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 152, 133, 0.2);
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.15) 100%);
    }

    .preview-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Adjust container when preview is open */
    .container.preview-open {
      margin-right: 600px;
    }

    /* Selected state for items */
    .folder-item.selected, .note-item.selected {
      background: rgba(124, 152, 133, 0.15);
      border: 2px solid rgba(124, 152, 133, 0.4);
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Top Navigation -->
  <div class="top-nav">
    <a href="chat.html" class="nav-link">Chat</a>
    <a href="upload.html" class="nav-link">Upload</a>
    <div class="user-avatar" id="userAvatar" onclick="logout()"></div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-item" onclick="navigateToRoot()">My Library</span>
      </div>
      <div class="toolbar-actions">
        <button class="toolbar-btn" id="gridToggle" onclick="toggleGridMode()">Grid: On</button>
        <button class="toolbar-btn" onclick="showNewFolderModal()">New Folder</button>
      </div>
    </div>

    <!-- Desktop -->
    <div class="desktop" id="desktop">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading your library...</div>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" id="contextRename">Rename</div>
    <div class="context-menu-item" id="contextDownload">Download</div>
    <div class="context-menu-item danger" id="contextDelete">Delete</div>
  </div>

  <!-- New Folder Modal -->
  <div class="modal-overlay" id="newFolderModal">
    <div class="modal">
      <div class="modal-title">Create New Folder</div>
      <input type="text" class="modal-input" id="folderNameInput" placeholder="Folder name">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeNewFolderModal()">Cancel</button>
        <button class="modal-btn confirm" onclick="createFolder()">Create</button>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div class="modal-overlay" id="renameModal">
    <div class="modal">
      <div class="modal-title">Rename</div>
      <input type="text" class="modal-input" id="renameInput" placeholder="New name">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeRenameModal()">Cancel</button>
        <button class="modal-btn confirm" onclick="confirmRename()">Rename</button>
      </div>
    </div>
  </div>

  <!-- Preview Panel -->
  <div class="preview-panel" id="previewPanel">
    <div class="preview-header">
      <div class="preview-info">
        <div class="preview-title" id="previewTitle">Note Title</div>
        <div class="preview-meta-grid">
          <span class="preview-meta-label">Pages:</span>
          <span class="preview-meta-value" id="previewPages">-</span>
          <span class="preview-meta-label">Uploaded:</span>
          <span class="preview-meta-value" id="previewDate">-</span>
          <span class="preview-meta-label">Type:</span>
          <span class="preview-meta-value" id="previewType">-</span>
        </div>
      </div>
      <button class="preview-close" onclick="closePreview()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="preview-content">
      <div class="preview-viewer" id="previewViewer">
        <div class="preview-loading">
          <div class="loading-spinner"></div>
        </div>
      </div>
      <div class="preview-actions">
        <button class="preview-btn" onclick="downloadPreviewedNote()">Download</button>
        <button class="preview-btn" onclick="deletePreviewedNote()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allNotes = [];
    let folders = [];
    let currentFolder = null;
    let authToken = null;
    let contextMenuItem = null;
    let renameTarget = null;
    let draggedItem = null;
    let isGridMode = true;
    let isDraggingFreeForm = false;
    let dragOffset = { x: 0, y: 0 };
    let previewedNote = null;
    let mouseDownPos = { x: 0, y: 0 };
    let hasMoved = false;

    // Check authentication
    async function checkAuth() {
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      authToken = session.access_token;

      const userAvatar = document.getElementById('userAvatar');
      if (session.user.email) {
        userAvatar.textContent = session.user.email.charAt(0).toUpperCase();
      }

      loadFolders();
      loadNotes();
    }

    // Load folders from localStorage
    function loadFolders() {
      const stored = localStorage.getItem('studyflow_folders');
      folders = stored ? JSON.parse(stored) : [];
    }

    // Save folders to localStorage
    function saveFolders() {
      localStorage.setItem('studyflow_folders', JSON.stringify(folders));
    }

    // Load notes
    async function loadNotes() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/list`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.status === 401) {
          await supabaseClient.auth.signOut();
          window.location.href = 'index.html';
          return;
        }

        if (!response.ok) throw new Error('Failed to load notes');

        allNotes = await response.json();
        allNotes.sort((a, b) => new Date(b.uploaded_at) - new Date(a.uploaded_at));

        renderDesktop();
      } catch (error) {
        console.error('Load error:', error);
        renderDesktop();
      }
    }

    // Render desktop
    function renderDesktop() {
      const desktop = document.getElementById('desktop');

      // Get items in current folder
      const currentFolders = folders.filter(f => f.parentId === currentFolder);
      const currentNotes = allNotes.filter(note => {
        const noteFolder = localStorage.getItem(`note_folder_${note.id}`);

        // At root level, show notes without a folder or explicitly assigned to root
        if (currentFolder === null) {
          return noteFolder === null || noteFolder === 'root';
        }

        // Inside a folder, only show notes assigned to this folder
        return noteFolder === currentFolder;
      });

      if (currentFolders.length === 0 && currentNotes.length === 0) {
        desktop.innerHTML = `
          <div class="empty-state">
            <p class="empty-text">This folder is empty</p>
          </div>
        `;
        return;
      }

      let html = '';
      let itemIndex = 0;

      // Render folders
      currentFolders.forEach(folder => {
        const posKey = `folder_${folder.id}_position_${currentFolder || 'root'}`;
        const savedPos = localStorage.getItem(posKey);
        const position = savedPos ? JSON.parse(savedPos) : { x: (itemIndex % 6) * 160 + 20, y: Math.floor(itemIndex / 6) * 160 + 20 };

        const style = isGridMode ? '' : `style="left: ${position.x}px; top: ${position.y}px;"`;

        html += `
          <div class="folder-item"
               data-id="${folder.id}"
               data-type="folder"
               draggable="${isGridMode}"
               ondblclick="openFolder('${folder.id}')"
               oncontextmenu="showContextMenu(event, '${folder.id}', 'folder')"
               ${isGridMode ? 'ondragstart="handleDragStart(event)" ondragover="handleDragOver(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave(event)"' : ''}
               ${style}>
            <div class="folder-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              </svg>
            </div>
            <div class="item-name">${escapeHtml(folder.name)}</div>
          </div>
        `;
        itemIndex++;
      });

      // Render notes
      currentNotes.forEach(note => {
        const icon = getFileIcon(note.filename);
        const posKey = `note_${note.id}_position_${currentFolder || 'root'}`;
        const savedPos = localStorage.getItem(posKey);
        const position = savedPos ? JSON.parse(savedPos) : { x: (itemIndex % 6) * 160 + 20, y: Math.floor(itemIndex / 6) * 160 + 20 };

        const style = isGridMode ? '' : `style="left: ${position.x}px; top: ${position.y}px;"`;

        html += `
          <div class="note-item"
               data-id="${note.id}"
               data-type="note"
               data-filename="${escapeQuotes(note.filename)}"
               draggable="${isGridMode}"
               oncontextmenu="showContextMenu(event, '${note.id}', 'note')"
               ${isGridMode ? 'ondragstart="handleDragStart(event)"' : ''}
               ${style}>
            <div class="note-icon">${icon}</div>
            <div class="item-name">${escapeHtml(note.filename)}</div>
            <div class="item-meta">${note.pages || '?'} pages</div>
          </div>
        `;
        itemIndex++;
      });

      desktop.innerHTML = html;

      // Add event listeners to notes and folders
      const noteItems = desktop.querySelectorAll('.note-item');
      noteItems.forEach(item => {
        // Single click for preview (only in grid mode, free-form handles in mouseup)
        if (isGridMode) {
          item.addEventListener('click', () => {
            showPreview(item.dataset.id);
          });
        }
      });

      // Add double-click to folders in free-form mode
      if (!isGridMode) {
        const folderItems = desktop.querySelectorAll('.folder-item');
        folderItems.forEach(item => {
          item.addEventListener('dblclick', () => {
            openFolder(item.dataset.id);
          });
        });
      }

      // Add free-form drag listeners in free mode
      if (!isGridMode) {
        const items = desktop.querySelectorAll('.folder-item, .note-item');
        items.forEach(item => {
          item.addEventListener('mousedown', (e) => handleFreeFormMouseDown(e, item));
        });
      }
    }

    // Folder operations
    function showNewFolderModal() {
      document.getElementById('newFolderModal').classList.add('active');
      document.getElementById('folderNameInput').value = '';
      document.getElementById('folderNameInput').focus();
    }

    function closeNewFolderModal() {
      document.getElementById('newFolderModal').classList.remove('active');
    }

    function createFolder() {
      const name = document.getElementById('folderNameInput').value.trim();
      if (!name) return;

      const folder = {
        id: Date.now().toString(),
        name: name,
        parentId: currentFolder,
        createdAt: new Date().toISOString()
      };

      folders.push(folder);
      saveFolders();
      closeNewFolderModal();
      renderDesktop();
    }

    function openFolder(folderId) {
      currentFolder = folderId;
      updateBreadcrumb();
      renderDesktop();
    }

    function navigateToRoot() {
      currentFolder = null;
      updateBreadcrumb();
      renderDesktop();
    }

    function updateBreadcrumb() {
      const breadcrumb = document.getElementById('breadcrumb');

      if (!currentFolder) {
        breadcrumb.innerHTML = '<span class="breadcrumb-item">My Library</span>';
        return;
      }

      const path = [];
      let folderId = currentFolder;

      while (folderId) {
        const folder = folders.find(f => f.id === folderId);
        if (!folder) break;
        path.unshift(folder);
        folderId = folder.parentId;
      }

      let html = '<span class="breadcrumb-item" onclick="navigateToRoot()">My Library</span>';

      path.forEach((folder, index) => {
        html += ' <span class="breadcrumb-separator">/</span> ';
        if (index === path.length - 1) {
          html += `<span class="breadcrumb-item">${escapeHtml(folder.name)}</span>`;
        } else {
          html += `<span class="breadcrumb-item" onclick="openFolder('${folder.id}')">${escapeHtml(folder.name)}</span>`;
        }
      });

      breadcrumb.innerHTML = html;
    }

    // Context menu
    function showContextMenu(event, id, type) {
      event.preventDefault();
      event.stopPropagation();

      contextMenuItem = { id, type };

      const menu = document.getElementById('contextMenu');
      menu.classList.add('active');
      menu.style.left = event.pageX + 'px';
      menu.style.top = event.pageY + 'px';
    }

    function renameItem() {
      if (!contextMenuItem) return;

      renameTarget = contextMenuItem;
      closeContextMenu();

      const modal = document.getElementById('renameModal');
      const input = document.getElementById('renameInput');

      if (renameTarget.type === 'folder') {
        const folder = folders.find(f => f.id === renameTarget.id);
        input.value = folder ? folder.name : '';
      } else {
        const note = allNotes.find(n => n.id === renameTarget.id);
        input.value = note ? note.filename : '';
      }

      modal.classList.add('active');
      input.focus();
    }

    function closeRenameModal() {
      document.getElementById('renameModal').classList.remove('active');
      renameTarget = null;
    }

    async function confirmRename() {
      if (!renameTarget) return;

      const newName = document.getElementById('renameInput').value.trim();
      if (!newName) return;

      if (renameTarget.type === 'folder') {
        const folder = folders.find(f => f.id === renameTarget.id);
        if (folder) {
          console.log('Renaming folder from', folder.name, 'to', newName);
          folder.name = newName;
          saveFolders();
          console.log('Saved folders:', folders);
          closeRenameModal();
          updateBreadcrumb(); // Update breadcrumb if we're inside the renamed folder
          renderDesktop();
        } else {
          console.error('Folder not found:', renameTarget.id);
        }
      } else if (renameTarget.type === 'note') {
        try {
          const response = await fetch(`${BACKEND_URL}/api/notes/${renameTarget.id}/rename`, {
            method: 'PATCH',
            headers: {
              'Authorization': `Bearer ${authToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ filename: newName })
          });

          if (response.ok) {
            const note = allNotes.find(n => n.id === renameTarget.id);
            if (note) {
              note.filename = newName;
            }
            closeRenameModal();
            renderDesktop();
          } else {
            const error = await response.json();
            alert('Failed to rename note: ' + (error.error || 'Unknown error'));
          }
        } catch (error) {
          console.error('Rename error:', error);
          alert('Failed to rename note');
        }
      }
    }

    async function downloadItem() {
      if (!contextMenuItem || contextMenuItem.type !== 'note') return;
      closeContextMenu();

      const note = allNotes.find(n => n.id === contextMenuItem.id);
      if (note) {
        await downloadNote(note.id, note.filename);
      }
    }

    async function deleteItem() {
      if (!contextMenuItem) return;
      closeContextMenu();

      if (contextMenuItem.type === 'folder') {
        // Delete folder
        folders = folders.filter(f => f.id !== contextMenuItem.id);
        saveFolders();
        renderDesktop();
      } else {
        // Delete note
        try {
          const response = await fetch(`${BACKEND_URL}/api/notes/${contextMenuItem.id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${authToken}` }
          });

          if (response.ok) {
            localStorage.removeItem(`note_folder_${contextMenuItem.id}`);
            loadNotes();
          }
        } catch (error) {
          console.error('Delete error:', error);
        }
      }
    }

    function closeContextMenu(event) {
      // Don't close if clicking inside the context menu
      const menu = document.getElementById('contextMenu');
      if (event && menu.contains(event.target)) {
        return;
      }

      menu.classList.remove('active');
      contextMenuItem = null;
    }

    // Grid mode toggle
    function toggleGridMode() {
      isGridMode = !isGridMode;
      const desktop = document.getElementById('desktop');
      const toggleBtn = document.getElementById('gridToggle');

      if (isGridMode) {
        desktop.classList.remove('free-mode');
        toggleBtn.textContent = 'Grid: On';
      } else {
        desktop.classList.add('free-mode');
        toggleBtn.textContent = 'Grid: Off';
      }

      localStorage.setItem('studyflow_grid_mode', isGridMode);
      renderDesktop();
    }

    // Free-form drag handlers
    function handleFreeFormMouseDown(event, element) {
      if (!isGridMode && event.button === 0) { // Only left click
        // Track initial mouse position
        mouseDownPos = { x: event.clientX, y: event.clientY };
        hasMoved = false;

        draggedItem = {
          element: element,
          id: element.dataset.id,
          type: element.dataset.type
        };

        const rect = element.getBoundingClientRect();
        const desktopRect = document.getElementById('desktop').getBoundingClientRect();

        dragOffset.x = event.clientX - rect.left;
        dragOffset.y = event.clientY - rect.top;

        event.preventDefault();
      }
    }

    function handleFreeFormMouseMove(event) {
      if (draggedItem && draggedItem.element && !isGridMode) {
        // Check if mouse has moved enough to start dragging (5px threshold)
        const dx = event.clientX - mouseDownPos.x;
        const dy = event.clientY - mouseDownPos.y;
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance > 5) {
          hasMoved = true;

          // Start visual drag
          if (!isDraggingFreeForm) {
            isDraggingFreeForm = true;
            draggedItem.element.style.zIndex = '1000';
            draggedItem.element.style.cursor = 'grabbing';
          }

          const desktop = document.getElementById('desktop');
          const desktopRect = desktop.getBoundingClientRect();

          let x = event.clientX - desktopRect.left - dragOffset.x;
          let y = event.clientY - desktopRect.top - dragOffset.y;

          // Keep within bounds
          x = Math.max(0, Math.min(x, desktopRect.width - 140));
          y = Math.max(0, Math.min(y, desktopRect.height - 140));

          draggedItem.element.style.left = x + 'px';
          draggedItem.element.style.top = y + 'px';
        }
      }
    }

    function handleFreeFormMouseUp(event) {
      if (draggedItem && !isGridMode) {
        if (hasMoved && isDraggingFreeForm) {
          // This was a drag - save position
          draggedItem.element.style.zIndex = '';
          draggedItem.element.style.cursor = 'move';

          const rect = draggedItem.element.getBoundingClientRect();
          const desktopRect = document.getElementById('desktop').getBoundingClientRect();

          const position = {
            x: rect.left - desktopRect.left,
            y: rect.top - desktopRect.top
          };

          const posKey = `${draggedItem.type}_${draggedItem.id}_position_${currentFolder || 'root'}`;
          localStorage.setItem(posKey, JSON.stringify(position));

          isDraggingFreeForm = false;
        } else {
          // This was a click - trigger preview for notes
          if (draggedItem.type === 'note') {
            showPreview(draggedItem.id);
          }
        }

        draggedItem = null;
        hasMoved = false;
      }
    }

    // Drag and drop (grid mode)
    function handleDragStart(event) {
      draggedItem = {
        id: event.target.dataset.id,
        type: event.target.dataset.type
      };
      event.target.classList.add('dragging');
    }

    function handleDragOver(event) {
      event.preventDefault();
      const target = event.target.closest('.folder-item');
      if (target && draggedItem && draggedItem.type === 'note') {
        target.classList.add('drop-target');
      }
    }

    function handleDragLeave(event) {
      const target = event.target.closest('.folder-item');
      if (target) {
        target.classList.remove('drop-target');
      }
    }

    function handleDrop(event) {
      event.preventDefault();
      const target = event.target.closest('.folder-item');

      if (target) {
        target.classList.remove('drop-target');

        if (draggedItem && draggedItem.type === 'note') {
          const folderId = target.dataset.id;
          localStorage.setItem(`note_folder_${draggedItem.id}`, folderId);
          renderDesktop();
        }
      }

      document.querySelectorAll('.dragging').forEach(el => {
        el.classList.remove('dragging');
      });

      draggedItem = null;
    }

    // Download note
    async function downloadNote(noteId, filename) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/${noteId}/download`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Download failed');

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
      } catch (error) {
        console.error('Download error:', error);
      }
    }

    // Preview note
    async function showPreview(noteId) {
      const note = allNotes.find(n => n.id === noteId);
      if (!note) return;

      previewedNote = note;

      // Update preview info
      document.getElementById('previewTitle').textContent = note.filename;
      document.getElementById('previewPages').textContent = note.pages || '?';
      document.getElementById('previewDate').textContent = new Date(note.uploaded_at).toLocaleDateString();
      document.getElementById('previewType').textContent = note.filename.split('.').pop().toUpperCase();

      // Show loading state
      const viewer = document.getElementById('previewViewer');
      viewer.innerHTML = `
        <div class="preview-loading">
          <div class="loading-spinner"></div>
        </div>
      `;

      // Show preview panel
      document.getElementById('previewPanel').classList.add('active');
      document.querySelector('.container').classList.add('preview-open');

      // Highlight selected item
      document.querySelectorAll('.note-item').forEach(item => {
        if (item.dataset.id === noteId) {
          item.classList.add('selected');
        } else {
          item.classList.remove('selected');
        }
      });

      // Fetch PDF with authorization header
      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/${note.id}/download`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Failed to load preview');

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        // Display in iframe
        viewer.innerHTML = `<iframe src="${url}#toolbar=0"></iframe>`;

        // Clean up object URL when preview is closed
        viewer.dataset.blobUrl = url;
      } catch (error) {
        console.error('Preview error:', error);
        viewer.innerHTML = `
          <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #9ca3af; font-size: 14px;">
            Failed to load preview
          </div>
        `;
      }
    }

    function closePreview() {
      // Clean up blob URL to prevent memory leaks
      const viewer = document.getElementById('previewViewer');
      if (viewer.dataset.blobUrl) {
        window.URL.revokeObjectURL(viewer.dataset.blobUrl);
        delete viewer.dataset.blobUrl;
      }

      document.getElementById('previewPanel').classList.remove('active');
      document.querySelector('.container').classList.remove('preview-open');
      document.querySelectorAll('.note-item').forEach(item => {
        item.classList.remove('selected');
      });
      previewedNote = null;
    }

    async function downloadPreviewedNote() {
      if (previewedNote) {
        await downloadNote(previewedNote.id, previewedNote.filename);
      }
    }

    async function deletePreviewedNote() {
      if (!previewedNote) return;

      const noteId = previewedNote.id;
      closePreview();

      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/${noteId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
          localStorage.removeItem(`note_folder_${noteId}`);
          loadNotes();
        }
      } catch (error) {
        console.error('Delete error:', error);
      }
    }

    // Utilities
    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      if (ext === 'pdf') return 'PDF';
      if (['jpg', 'jpeg', 'png'].includes(ext)) return 'IMG';
      if (['doc', 'docx'].includes(ext)) return 'DOC';
      if (ext === 'txt') return 'TXT';
      return 'FILE';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeQuotes(text) {
      return text.replace(/'/g, "\\'");
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    }

    // Context menu item event listeners
    document.getElementById('contextRename').addEventListener('click', (e) => {
      e.stopPropagation();
      renameItem();
    });

    document.getElementById('contextDownload').addEventListener('click', (e) => {
      e.stopPropagation();
      downloadItem();
    });

    document.getElementById('contextDelete').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteItem();
    });

    // Close context menu when clicking elsewhere
    document.addEventListener('click', closeContextMenu);

    // Document-level event listeners for free-form dragging
    document.addEventListener('mousemove', handleFreeFormMouseMove);
    document.addEventListener('mouseup', handleFreeFormMouseUp);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (document.getElementById('previewPanel').classList.contains('active')) {
          closePreview();
        }
      }
    });

    // Close modals when clicking overlay
    document.getElementById('newFolderModal').addEventListener('click', (e) => {
      if (e.target.id === 'newFolderModal') closeNewFolderModal();
    });

    document.getElementById('renameModal').addEventListener('click', (e) => {
      if (e.target.id === 'renameModal') closeRenameModal();
    });

    // Enter key shortcuts
    document.getElementById('folderNameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') createFolder();
    });

    document.getElementById('renameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') confirmRename();
    });

    // Load saved grid mode preference
    function loadGridModePreference() {
      const savedMode = localStorage.getItem('studyflow_grid_mode');
      if (savedMode !== null) {
        isGridMode = savedMode === 'true';
        const desktop = document.getElementById('desktop');
        const toggleBtn = document.getElementById('gridToggle');

        if (isGridMode) {
          desktop.classList.remove('free-mode');
          toggleBtn.textContent = 'Grid: On';
        } else {
          desktop.classList.add('free-mode');
          toggleBtn.textContent = 'Grid: Off';
        }
      }
    }

    // Initialize
    loadGridModePreference();
    checkAuth();
  </script>
