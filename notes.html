<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library - StudyFlowSuite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f5f4f0 0%, #ede9e4 100%);
      min-height: 100vh;
      color: #2d2d2d;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 20%, rgba(124, 152, 133, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(232, 155, 95, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px;
      min-height: 100vh;
    }

    /* Top Navigation */
    .top-nav {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 1000;
    }

    .nav-link {
      color: #5d5d5d;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 8px 16px;
      border-radius: 8px;
    }

    .nav-link:hover {
      color: #7c9885;
      background: rgba(124, 152, 133, 0.08);
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c9885 0%, #6b8575 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(124, 152, 133, 0.2);
    }

    .user-avatar:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.3);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.7) 0%, rgba(248, 246, 243, 0.6) 100%);
      border-radius: 12px;
      border: 2px solid rgba(124, 152, 133, 0.1);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      color: #5d5d5d;
    }

    .breadcrumb-item {
      cursor: pointer;
      transition: color 0.3s;
    }

    .breadcrumb-item:hover {
      color: #7c9885;
    }

    .breadcrumb-separator {
      color: #9ca3af;
    }

    .toolbar-actions {
      display: flex;
      gap: 12px;
    }

    .toolbar-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.15) 0%, rgba(232, 155, 95, 0.1) 100%);
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.2) 100%) 1;
      border-radius: 8px;
      color: #2d2d2d;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', sans-serif;
    }

    .toolbar-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 152, 133, 0.2);
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.15) 100%);
    }

    /* Desktop Grid */
    .desktop {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 24px;
      padding: 20px;
      min-height: 500px;
    }

    /* Folder Item */
    .folder-item, .note-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      position: relative;
    }

    .folder-item:hover, .note-item:hover {
      background: rgba(124, 152, 133, 0.08);
      transform: translateY(-4px);
    }

    .folder-item.dragging, .note-item.dragging {
      opacity: 0.5;
    }

    .folder-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.15) 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 4px 12px rgba(124, 152, 133, 0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .folder-item:hover .folder-icon {
      box-shadow: 0 8px 24px rgba(124, 152, 133, 0.25);
      transform: scale(1.05);
    }

    .folder-icon::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 8px;
      right: 20px;
      height: 8px;
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.2) 100%);
      border-radius: 4px 4px 0 0;
    }

    .folder-icon svg {
      width: 40px;
      height: 40px;
      stroke: #7c9885;
    }

    .note-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(248, 246, 243, 0.8) 100%);
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #7c9885;
      box-shadow: 0 4px 12px rgba(124, 152, 133, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .note-item:hover .note-icon {
      box-shadow: 0 8px 24px rgba(124, 152, 133, 0.2);
      transform: scale(1.05);
    }

    .item-name {
      font-size: 13px;
      font-weight: 500;
      color: #2d2d2d;
      text-align: center;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-meta {
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }

    /* Context Menu */
    .context-menu {
      position: fixed;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.98) 0%, rgba(248, 246, 243, 0.98) 100%);
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 12px 32px rgba(45, 45, 45, 0.2);
      z-index: 10000;
      display: none;
      min-width: 180px;
    }

    .context-menu.active {
      display: block;
    }

    .context-menu-item {
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
      color: #2d2d2d;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .context-menu-item:hover {
      background: rgba(124, 152, 133, 0.15);
    }

    .context-menu-item.danger:hover {
      background: rgba(220, 100, 80, 0.1);
      color: #dc6450;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(45, 45, 45, 0.4);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.active {
      display: flex;
      opacity: 1;
    }

    .modal {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.98) 0%, rgba(248, 246, 243, 0.98) 100%);
      border-radius: 16px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.3) 100%) 1;
      box-shadow: 0 20px 60px rgba(45, 45, 45, 0.2);
      transform: scale(0.9);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 500;
      font-family: 'Lora', Georgia, serif;
      color: #2d2d2d;
      margin-bottom: 20px;
      text-align: center;
    }

    .modal-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.8);
      margin-bottom: 24px;
      color: #2d2d2d;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-input:focus {
      outline: none;
      border-color: rgba(124, 152, 133, 0.5);
      background: white;
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.1);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-btn {
      padding: 12px 28px;
      border-radius: 10px;
      border: 2px solid transparent;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', sans-serif;
    }

    .modal-btn.cancel {
      background: rgba(124, 152, 133, 0.1);
      color: #7c9885;
      border-color: rgba(124, 152, 133, 0.3);
    }

    .modal-btn.cancel:hover {
      background: rgba(124, 152, 133, 0.2);
      transform: translateY(-2px);
    }

    .modal-btn.confirm {
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.2) 0%, rgba(232, 155, 95, 0.15) 100%);
      color: #2d2d2d;
      border-image: linear-gradient(135deg, rgba(124, 152, 133, 0.4) 0%, rgba(232, 155, 95, 0.3) 100%) 1;
    }

    .modal-btn.confirm:hover {
      background: linear-gradient(135deg, rgba(124, 152, 133, 0.3) 0%, rgba(232, 155, 95, 0.2) 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.2);
    }

    /* Drop zone highlight */
    .folder-item.drop-target {
      background: rgba(124, 152, 133, 0.2);
      border: 2px dashed #7c9885;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
    }

    .empty-text {
      font-size: 15px;
      color: #9ca3af;
      font-family: 'Lora', Georgia, serif;
      margin-bottom: 24px;
    }

    /* Loading */
    .loading-state {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(124, 152, 133, 0.15);
      border-top-color: #7c9885;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 15px;
      color: #9ca3af;
      font-family: 'Lora', Georgia, serif;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Top Navigation -->
  <div class="top-nav">
    <a href="chat.html" class="nav-link">Chat</a>
    <a href="upload.html" class="nav-link">Upload</a>
    <div class="user-avatar" id="userAvatar" onclick="logout()"></div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <!-- Toolbar -->
    <div class="toolbar">
      <div class="breadcrumb" id="breadcrumb">
        <span class="breadcrumb-item" onclick="navigateToRoot()">My Library</span>
      </div>
      <div class="toolbar-actions">
        <button class="toolbar-btn" onclick="showNewFolderModal()">New Folder</button>
      </div>
    </div>

    <!-- Desktop -->
    <div class="desktop" id="desktop">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading your library...</div>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" onclick="renameItem()">Rename</div>
    <div class="context-menu-item" onclick="downloadItem()">Download</div>
    <div class="context-menu-item danger" onclick="deleteItem()">Delete</div>
  </div>

  <!-- New Folder Modal -->
  <div class="modal-overlay" id="newFolderModal">
    <div class="modal">
      <div class="modal-title">Create New Folder</div>
      <input type="text" class="modal-input" id="folderNameInput" placeholder="Folder name">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeNewFolderModal()">Cancel</button>
        <button class="modal-btn confirm" onclick="createFolder()">Create</button>
      </div>
    </div>
  </div>

  <!-- Rename Modal -->
  <div class="modal-overlay" id="renameModal">
    <div class="modal">
      <div class="modal-title">Rename</div>
      <input type="text" class="modal-input" id="renameInput" placeholder="New name">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeRenameModal()">Cancel</button>
        <button class="modal-btn confirm" onclick="confirmRename()">Rename</button>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let allNotes = [];
    let folders = [];
    let currentFolder = null;
    let authToken = null;
    let contextMenuItem = null;
    let renameTarget = null;
    let draggedItem = null;

    // Check authentication
    async function checkAuth() {
      const { data: { session } } = await supabaseClient.auth.getSession();

      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      authToken = session.access_token;

      const userAvatar = document.getElementById('userAvatar');
      if (session.user.email) {
        userAvatar.textContent = session.user.email.charAt(0).toUpperCase();
      }

      loadFolders();
      loadNotes();
    }

    // Load folders from localStorage
    function loadFolders() {
      const stored = localStorage.getItem('studyflow_folders');
      folders = stored ? JSON.parse(stored) : [];
    }

    // Save folders to localStorage
    function saveFolders() {
      localStorage.setItem('studyflow_folders', JSON.stringify(folders));
    }

    // Load notes
    async function loadNotes() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/list`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.status === 401) {
          await supabaseClient.auth.signOut();
          window.location.href = 'index.html';
          return;
        }

        if (!response.ok) throw new Error('Failed to load notes');

        allNotes = await response.json();
        allNotes.sort((a, b) => new Date(b.uploaded_at) - new Date(a.uploaded_at));

        renderDesktop();
      } catch (error) {
        console.error('Load error:', error);
        renderDesktop();
      }
    }

    // Render desktop
    function renderDesktop() {
      const desktop = document.getElementById('desktop');

      // Get items in current folder
      const currentFolders = folders.filter(f => f.parentId === currentFolder);
      const currentNotes = allNotes.filter(note => {
        const noteFolder = localStorage.getItem(`note_folder_${note.id}`);

        // At root level, show notes without a folder or explicitly assigned to root
        if (currentFolder === null) {
          return noteFolder === null || noteFolder === 'root';
        }

        // Inside a folder, only show notes assigned to this folder
        return noteFolder === currentFolder;
      });

      if (currentFolders.length === 0 && currentNotes.length === 0) {
        desktop.innerHTML = `
          <div class="empty-state">
            <p class="empty-text">This folder is empty</p>
          </div>
        `;
        return;
      }

      let html = '';

      // Render folders
      currentFolders.forEach(folder => {
        html += `
          <div class="folder-item"
               data-id="${folder.id}"
               data-type="folder"
               draggable="true"
               ondblclick="openFolder('${folder.id}')"
               oncontextmenu="showContextMenu(event, '${folder.id}', 'folder')"
               ondragstart="handleDragStart(event)"
               ondragover="handleDragOver(event)"
               ondrop="handleDrop(event)"
               ondragleave="handleDragLeave(event)">
            <div class="folder-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              </svg>
            </div>
            <div class="item-name">${escapeHtml(folder.name)}</div>
          </div>
        `;
      });

      // Render notes
      currentNotes.forEach(note => {
        const icon = getFileIcon(note.filename);
        html += `
          <div class="note-item"
               data-id="${note.id}"
               data-type="note"
               draggable="true"
               ondblclick="downloadNote('${note.id}', '${escapeQuotes(note.filename)}')"
               oncontextmenu="showContextMenu(event, '${note.id}', 'note')"
               ondragstart="handleDragStart(event)">
            <div class="note-icon">${icon}</div>
            <div class="item-name">${escapeHtml(note.filename)}</div>
            <div class="item-meta">${note.pages || '?'} pages</div>
          </div>
        `;
      });

      desktop.innerHTML = html;
    }

    // Folder operations
    function showNewFolderModal() {
      document.getElementById('newFolderModal').classList.add('active');
      document.getElementById('folderNameInput').value = '';
      document.getElementById('folderNameInput').focus();
    }

    function closeNewFolderModal() {
      document.getElementById('newFolderModal').classList.remove('active');
    }

    function createFolder() {
      const name = document.getElementById('folderNameInput').value.trim();
      if (!name) return;

      const folder = {
        id: Date.now().toString(),
        name: name,
        parentId: currentFolder,
        createdAt: new Date().toISOString()
      };

      folders.push(folder);
      saveFolders();
      closeNewFolderModal();
      renderDesktop();
    }

    function openFolder(folderId) {
      currentFolder = folderId;
      updateBreadcrumb();
      renderDesktop();
    }

    function navigateToRoot() {
      currentFolder = null;
      updateBreadcrumb();
      renderDesktop();
    }

    function updateBreadcrumb() {
      const breadcrumb = document.getElementById('breadcrumb');

      if (!currentFolder) {
        breadcrumb.innerHTML = '<span class="breadcrumb-item">My Library</span>';
        return;
      }

      const path = [];
      let folderId = currentFolder;

      while (folderId) {
        const folder = folders.find(f => f.id === folderId);
        if (!folder) break;
        path.unshift(folder);
        folderId = folder.parentId;
      }

      let html = '<span class="breadcrumb-item" onclick="navigateToRoot()">My Library</span>';

      path.forEach((folder, index) => {
        html += ' <span class="breadcrumb-separator">/</span> ';
        if (index === path.length - 1) {
          html += `<span class="breadcrumb-item">${escapeHtml(folder.name)}</span>`;
        } else {
          html += `<span class="breadcrumb-item" onclick="openFolder('${folder.id}')">${escapeHtml(folder.name)}</span>`;
        }
      });

      breadcrumb.innerHTML = html;
    }

    // Context menu
    function showContextMenu(event, id, type) {
      event.preventDefault();
      event.stopPropagation();

      contextMenuItem = { id, type };

      const menu = document.getElementById('contextMenu');
      menu.classList.add('active');
      menu.style.left = event.pageX + 'px';
      menu.style.top = event.pageY + 'px';
    }

    function renameItem() {
      if (!contextMenuItem) return;

      renameTarget = contextMenuItem;
      closeContextMenu();

      const modal = document.getElementById('renameModal');
      const input = document.getElementById('renameInput');

      if (contextMenuItem.type === 'folder') {
        const folder = folders.find(f => f.id === contextMenuItem.id);
        input.value = folder ? folder.name : '';
      } else {
        const note = allNotes.find(n => n.id === contextMenuItem.id);
        input.value = note ? note.filename : '';
      }

      modal.classList.add('active');
      input.focus();
    }

    function closeRenameModal() {
      document.getElementById('renameModal').classList.remove('active');
      renameTarget = null;
    }

    function confirmRename() {
      if (!renameTarget) return;

      const newName = document.getElementById('renameInput').value.trim();
      if (!newName) return;

      if (renameTarget.type === 'folder') {
        const folder = folders.find(f => f.id === renameTarget.id);
        if (folder) {
          folder.name = newName;
          saveFolders();
        }
      }
      // Note: For notes, we'd need a backend API to rename files

      closeRenameModal();
      renderDesktop();
    }

    async function downloadItem() {
      if (!contextMenuItem || contextMenuItem.type !== 'note') return;
      closeContextMenu();

      const note = allNotes.find(n => n.id === contextMenuItem.id);
      if (note) {
        await downloadNote(note.id, note.filename);
      }
    }

    async function deleteItem() {
      if (!contextMenuItem) return;
      closeContextMenu();

      if (contextMenuItem.type === 'folder') {
        // Delete folder
        folders = folders.filter(f => f.id !== contextMenuItem.id);
        saveFolders();
        renderDesktop();
      } else {
        // Delete note
        try {
          const response = await fetch(`${BACKEND_URL}/api/notes/${contextMenuItem.id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${authToken}` }
          });

          if (response.ok) {
            localStorage.removeItem(`note_folder_${contextMenuItem.id}`);
            loadNotes();
          }
        } catch (error) {
          console.error('Delete error:', error);
        }
      }
    }

    function closeContextMenu() {
      document.getElementById('contextMenu').classList.remove('active');
      contextMenuItem = null;
    }

    // Drag and drop
    function handleDragStart(event) {
      draggedItem = {
        id: event.target.dataset.id,
        type: event.target.dataset.type
      };
      event.target.classList.add('dragging');
    }

    function handleDragOver(event) {
      event.preventDefault();
      const target = event.target.closest('.folder-item');
      if (target && draggedItem && draggedItem.type === 'note') {
        target.classList.add('drop-target');
      }
    }

    function handleDragLeave(event) {
      const target = event.target.closest('.folder-item');
      if (target) {
        target.classList.remove('drop-target');
      }
    }

    function handleDrop(event) {
      event.preventDefault();
      const target = event.target.closest('.folder-item');

      if (target) {
        target.classList.remove('drop-target');

        if (draggedItem && draggedItem.type === 'note') {
          const folderId = target.dataset.id;
          localStorage.setItem(`note_folder_${draggedItem.id}`, folderId);
          renderDesktop();
        }
      }

      document.querySelectorAll('.dragging').forEach(el => {
        el.classList.remove('dragging');
      });

      draggedItem = null;
    }

    // Download note
    async function downloadNote(noteId, filename) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/${noteId}/download`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Download failed');

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
      } catch (error) {
        console.error('Download error:', error);
      }
    }

    // Utilities
    function getFileIcon(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      if (ext === 'pdf') return 'PDF';
      if (['jpg', 'jpeg', 'png'].includes(ext)) return 'IMG';
      if (['doc', 'docx'].includes(ext)) return 'DOC';
      if (ext === 'txt') return 'TXT';
      return 'FILE';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeQuotes(text) {
      return text.replace(/'/g, "\\'");
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    }

    // Close context menu when clicking elsewhere
    document.addEventListener('click', closeContextMenu);

    // Close modals when clicking overlay
    document.getElementById('newFolderModal').addEventListener('click', (e) => {
      if (e.target.id === 'newFolderModal') closeNewFolderModal();
    });

    document.getElementById('renameModal').addEventListener('click', (e) => {
      if (e.target.id === 'renameModal') closeRenameModal();
    });

    // Enter key shortcuts
    document.getElementById('folderNameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') createFolder();
    });

    document.getElementById('renameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') confirmRename();
    });

    // Initialize
    checkAuth();
  </script>
</body>
</html>
