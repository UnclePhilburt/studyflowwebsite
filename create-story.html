<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Create Story - StudyFlow</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #000;
      --card: #1a1a1a;
      --text: #fff;
      --text-dim: rgba(255,255,255,0.5);
      --accent: #8B9D83;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Full-screen layout */
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* Top bar - minimal */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none;
      color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:active { background: rgba(255,255,255,0.2); }
    .top-bar-title {
      font-size: 17px; font-weight: 600;
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .share-btn {
      padding: 10px 28px; border-radius: 24px; border: none;
      background: var(--accent); color: white;
      font-size: 15px; font-weight: 700; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .share-btn:active { opacity: 0.8; }
    .share-btn:disabled { opacity: 0.35; }

    /* Preview area - takes remaining space */
    .preview-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      min-height: 0;
      position: relative;
    }
    .story-canvas {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 9/16;
      max-height: 100%;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #667eea, #764ba2);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .story-canvas img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .text-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 20px;
      z-index: 2;
    }
    .text-overlay textarea {
      background: none; border: none; color: white;
      font-size: 28px; font-weight: 800; text-align: center;
      width: 100%; resize: none; outline: none;
      text-shadow: 0 2px 12px rgba(0,0,0,0.7);
      font-family: inherit;
      line-height: 1.3;
    }
    .text-overlay textarea::placeholder {
      color: rgba(255,255,255,0.35);
    }

    /* Remove photo button */
    .remove-photo {
      position: absolute; top: 12px; right: 12px; z-index: 5;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
      border: none; color: white; font-size: 18px;
      cursor: pointer; display: none;
      align-items: center; justify-content: center;
    }

    /* Upload progress */
    .upload-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; background: rgba(255,255,255,0.1);
      z-index: 5; display: none;
    }
    .upload-bar-fill {
      height: 100%; width: 0%;
      background: var(--accent);
      transition: width 0.3s;
      animation: uploadPulse 1.5s infinite;
    }
    @keyframes uploadPulse {
      0%, 100% { width: 30%; }
      50% { width: 70%; }
    }

    /* Bottom toolbar */
    .toolbar {
      flex-shrink: 0;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Text input for text-only stories */
    .text-input {
      width: 100%; padding: 14px 16px;
      border-radius: 14px; border: none;
      background: rgba(255,255,255,0.08);
      color: white; font-size: 16px; font-family: inherit;
      resize: none; outline: none;
      max-height: 80px;
      display: none;
    }
    .text-input::placeholder { color: var(--text-dim); }

    /* Background picker */
    .bg-row {
      display: flex; gap: 10px; align-items: center;
      overflow-x: auto; scrollbar-width: none;
      padding: 4px 0;
      -webkit-overflow-scrolling: touch;
    }
    .bg-row::-webkit-scrollbar { display: none; }
    .bg-dot {
      width: 36px; height: 36px; border-radius: 50%;
      flex-shrink: 0; cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .bg-dot:active { transform: scale(0.9); }
    .bg-dot.active { border-color: white; transform: scale(1.1); }

    /* Action buttons */
    .actions {
      display: flex; gap: 8px;
    }
    .tool-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px; border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: none; color: white;
      font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .tool-btn:active { background: rgba(255,255,255,0.15); }
    .tool-btn svg { flex-shrink: 0; }

    /* Mode toggle */
    .mode-toggle {
      display: flex; background: rgba(255,255,255,0.06);
      border-radius: 12px; padding: 3px; gap: 2px;
    }
    .mode-btn {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      background: none; color: var(--text-dim);
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    /* Safe area for notched phones */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .toolbar { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
      .top-bar { padding-top: calc(8px + env(safe-area-inset-top)); }
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1266375537905101" crossorigin="anonymous"></script>
</head>
<body>
  <div class="page">
    <!-- Top -->
    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href='social.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="top-bar-title">Story</span>
      <button class="share-btn" id="shareBtn" onclick="submitStory()" disabled>Share</button>
    </div>

    <!-- Canvas -->
    <div class="preview-wrap">
      <div class="story-canvas" id="canvas">
        <img id="previewImg">
        <button class="remove-photo" id="removeBtn" onclick="removePhoto()">&times;</button>
        <div class="text-overlay">
          <textarea id="overlayText" placeholder="Tap to type..." rows="4" oninput="updateShareBtn()"></textarea>
        </div>
        <div class="upload-bar" id="uploadBar"><div class="upload-bar-fill"></div></div>
      </div>
    </div>

    <!-- Bottom -->
    <div class="toolbar">
      <!-- Mode toggle -->
      <div class="mode-toggle">
        <button class="mode-btn active" id="modeText" onclick="setMode('text')">Text</button>
        <button class="mode-btn" id="modePhoto" onclick="setMode('photo')">Photo</button>
      </div>

      <!-- Backgrounds (text mode) -->
      <div class="bg-row" id="bgRow">
        <div class="bg-dot active" style="background:linear-gradient(135deg,#667eea,#764ba2);" onclick="pickBg('linear-gradient(135deg,#667eea,#764ba2)',this)"></div>
        <div class="bg-dot" style="background:linear-gradient(135deg,#f093fb,#f5576c);" onclick="pickBg('linear-gradient(135deg,#f093fb,#f5576c)',this)"></div>
        <div class="bg-dot" style="background:linear-gradient(135deg,#4facfe,#00f2fe);" onclick="pickBg('linear-gradient(135deg,#4facfe,#00f2fe)',this)"></div>
        <div class="bg-dot" style="background:linear-gradient(135deg,#43e97b,#38f9d7);" onclick="pickBg('linear-gradient(135deg,#43e97b,#38f9d7)',this)"></div>
        <div class="bg-dot" style="background:linear-gradient(135deg,#fa709a,#fee140);" onclick="pickBg('linear-gradient(135deg,#fa709a,#fee140)',this)"></div>
        <div class="bg-dot" style="background:linear-gradient(135deg,#ff6a00,#ee0979);" onclick="pickBg('linear-gradient(135deg,#ff6a00,#ee0979)',this)"></div>
        <div class="bg-dot" style="background:linear-gradient(135deg,#8B9D83,#5a7a5a);" onclick="pickBg('linear-gradient(135deg,#8B9D83,#5a7a5a)',this)"></div>
        <div class="bg-dot" style="background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);" onclick="pickBg('linear-gradient(135deg,#0f0c29,#302b63,#24243e)',this)"></div>
        <div class="bg-dot" style="background:#111;" onclick="pickBg('#111',this)"></div>
      </div>

      <!-- Photo action (photo mode) -->
      <div class="actions" id="photoActions" style="display:none;">
        <button class="tool-btn" onclick="document.getElementById('imageInput').click()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Choose Photo
        </button>
        <button class="tool-btn" onclick="document.getElementById('cameraInput').click()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Camera
        </button>
      </div>

      <input type="file" id="imageInput" accept="image/*" style="display:none;">
      <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
    </div>
  </div>

  <script>
    var BACKEND = 'https://studyflowsuite.onrender.com';
    var sb = window.supabase.createClient(
      'https://mxddgbpxjoltaimftpmn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI'
    );

    var token = null;
    var imageUrl = null;
    var uploading = false;
    var bg = 'linear-gradient(135deg,#667eea,#764ba2)';
    var hasPhoto = false;
    var mode = 'text'; // 'text' or 'photo'

    sb.auth.getSession().then(function(r) {
      if (!r.data.session) { location.href = 'mobile.html'; return; }
      token = r.data.session.access_token;
    });

    function setMode(m) {
      mode = m;
      document.getElementById('modeText').classList.toggle('active', m === 'text');
      document.getElementById('modePhoto').classList.toggle('active', m === 'photo');
      document.getElementById('bgRow').style.display = m === 'text' ? 'flex' : 'none';
      document.getElementById('photoActions').style.display = m === 'photo' ? 'flex' : 'none';

      if (m === 'text' && !hasPhoto) {
        document.getElementById('canvas').style.background = bg;
        document.getElementById('overlayText').placeholder = 'Tap to type...';
      }
      if (m === 'photo' && !hasPhoto) {
        document.getElementById('canvas').style.background = '#111';
        document.getElementById('overlayText').placeholder = '';
      }
    }

    function pickBg(val, el) {
      bg = val;
      document.querySelectorAll('.bg-dot').forEach(function(d) { d.classList.remove('active'); });
      el.classList.add('active');
      if (!hasPhoto) document.getElementById('canvas').style.background = val;
    }

    function handleFile(file) {
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) { alert('Max 10MB'); return; }

      hasPhoto = true;
      var img = document.getElementById('previewImg');
      document.getElementById('removeBtn').style.display = 'flex';
      document.getElementById('canvas').style.background = '#000';
      document.getElementById('overlayText').placeholder = 'Add text...';
      document.getElementById('bgRow').style.display = 'none';

      // Try to show local preview (won't work for HEIC)
      var localUrl = URL.createObjectURL(file);
      img.src = localUrl;
      img.style.display = 'block';
      img.onerror = function() {
        // HEIC or unsupported format — show placeholder until upload finishes
        img.style.display = 'none';
        document.getElementById('canvas').style.background = 'linear-gradient(135deg, #2d2d3d, #1a1a2e)';
      };

      // Upload
      uploading = true;
      imageUrl = null;
      document.getElementById('uploadBar').style.display = 'block';
      updateShareBtn();

      var fd = new FormData();
      fd.append('files', file);
      fetch(BACKEND + '/api/social/upload-images', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: fd
      }).then(function(r) { return r.json(); }).then(function(d) {
        imageUrl = (d.urls || [])[0] || null;
        uploading = false;
        document.getElementById('uploadBar').style.display = 'none';
        // Show server-converted JPEG in preview (works for HEIC)
        if (imageUrl) {
          img.src = imageUrl;
          img.style.display = 'block';
          document.getElementById('canvas').style.background = '#000';
        }
        updateShareBtn();
      }).catch(function() {
        uploading = false;
        document.getElementById('uploadBar').style.display = 'none';
        alert('Upload failed. Try again.');
      });
    }

    document.getElementById('imageInput').addEventListener('change', function(e) {
      handleFile(e.target.files[0]);
    });
    document.getElementById('cameraInput').addEventListener('change', function(e) {
      handleFile(e.target.files[0]);
    });

    function removePhoto() {
      hasPhoto = false;
      imageUrl = null;
      var img = document.getElementById('previewImg');
      img.src = '';
      img.style.display = 'none';
      document.getElementById('removeBtn').style.display = 'none';
      document.getElementById('canvas').style.background = mode === 'text' ? bg : '#111';
      document.getElementById('overlayText').placeholder = mode === 'text' ? 'Tap to type...' : '';
      document.getElementById('bgRow').style.display = mode === 'text' ? 'flex' : 'none';
      document.getElementById('imageInput').value = '';
      document.getElementById('cameraInput').value = '';
      updateShareBtn();
    }

    function updateShareBtn() {
      var text = document.getElementById('overlayText').value.trim();
      document.getElementById('shareBtn').disabled = (!text && !hasPhoto) || uploading;
    }

    function submitStory() {
      if (uploading) return;
      if (hasPhoto && !imageUrl) { alert('Upload failed. Try again.'); return; }

      var text = document.getElementById('overlayText').value.trim() || null;
      if (!text && !imageUrl) return;

      var btn = document.getElementById('shareBtn');
      btn.disabled = true;
      btn.textContent = 'Sharing...';

      var body = { text: text };
      if (imageUrl) body.image_url = imageUrl;
      if (!hasPhoto) body.bg = bg;

      fetch(BACKEND + '/api/social/stories', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(function(r) {
        if (r.ok) { location.href = 'social.html'; }
        else { r.json().then(function(e) { alert(e.error || 'Failed'); }); }
      }).catch(function() {
        alert('Failed to share');
      }).finally(function() {
        btn.disabled = false;
        btn.textContent = 'Share';
      });
    }
  </script>
</body>
</html>
