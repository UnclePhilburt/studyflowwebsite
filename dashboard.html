<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow Suite Dashboard - Your study hub">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Dashboard - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #FAF8F5;
      min-height: 100vh;
      color: #2C2C2C;
      overflow: hidden;
    }

    /* Subtle texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(139, 157, 131, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(212, 196, 176, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Top right user menu */
    .top-nav {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 100;
    }

    .nav-bell {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8B7E73;
      position: relative;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .nav-bell:hover {
      background: rgba(255, 255, 255, 0.9);
      color: #8B9D83;
      transform: translateY(-2px);
    }

    .nav-bell svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .nav-bell-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D4A574;
      display: none;
    }

    .nav-bell-badge.visible {
      display: block;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #8B9D83, #7A8C73);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(139, 157, 131, 0.2);
    }

    .user-avatar:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(139, 157, 131, 0.3);
    }

    .user-menu {
      position: absolute;
      top: 56px;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(139, 126, 115, 0.1);
      min-width: 200px;
      padding: 8px;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 101;
    }

    .user-menu.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .user-menu-email {
      padding: 10px 14px;
      font-size: 12px;
      color: #8B7E73;
      border-bottom: 1px solid rgba(139, 126, 115, 0.08);
      margin-bottom: 6px;
      font-weight: 300;
    }

    .user-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: #2C2C2C;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      transition: background 0.2s;
    }

    .user-menu-item:hover {
      background: rgba(139, 157, 131, 0.06);
    }

    .user-menu-item.logout {
      color: #C97A7A;
    }

    .user-menu-item svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    /* Notification dropdown */
    .notif-dropdown {
      position: absolute;
      top: 56px;
      right: 56px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(139, 126, 115, 0.1);
      width: 360px;
      max-height: 420px;
      overflow-y: auto;
      padding: 12px;
      display: none;
      z-index: 101;
    }

    .notif-dropdown.active {
      display: block;
    }

    .notif-dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 8px;
    }

    .notif-dropdown-header h3 {
      font-size: 15px;
      font-weight: 500;
      color: #2C2C2C;
    }

    .notif-mark-all {
      background: none;
      border: none;
      color: #8B9D83;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 400;
    }

    .notif-item {
      padding: 12px;
      border-radius: 12px;
      display: flex;
      gap: 12px;
      transition: background 0.2s;
      margin-bottom: 4px;
    }

    .notif-item:hover {
      background: rgba(139, 157, 131, 0.04);
    }

    .notif-item.unread {
      background: rgba(139, 157, 131, 0.06);
    }

    .notif-item-msg {
      font-size: 13px;
      color: #2C2C2C;
      line-height: 1.5;
    }

    .notif-item-time {
      font-size: 11px;
      color: #9B8B7E;
      margin-top: 4px;
    }

    .notif-empty {
      padding: 32px;
      text-align: center;
      color: #9B8B7E;
      font-size: 13px;
      font-weight: 300;
    }

    /* Main empty canvas */
    .canvas {
      position: relative;
      min-height: calc(100vh - 120px);
      padding: 80px 40px 120px;
      z-index: 1;
    }

    /* Mac-style dock */
    .dock {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(139, 126, 115, 0.12);
      border-radius: 24px;
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
      z-index: 1000;
    }

    .dock-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .dock-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
      border: 1px solid rgba(139, 157, 131, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .dock-item:hover .dock-icon {
      transform: translateY(-12px) scale(1.1);
      background: linear-gradient(135deg, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0.9));
      border-color: rgba(139, 157, 131, 0.25);
      box-shadow: 0 8px 24px rgba(139, 157, 131, 0.15);
    }

    .dock-icon svg {
      width: 26px;
      height: 26px;
      stroke: #8B9D83;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all 0.3s ease;
    }

    .dock-item:hover .dock-icon svg {
      stroke: #7A8C73;
    }

    .dock-label {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 400;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .dock-item:hover .dock-label {
      opacity: 1;
    }

    /* Divider in dock */
    .dock-divider {
      width: 1px;
      height: 48px;
      background: rgba(139, 126, 115, 0.15);
      margin: 0 4px;
      align-self: center;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .top-nav {
        top: 16px;
        right: 16px;
        gap: 8px;
      }

      .nav-bell,
      .user-avatar {
        width: 40px;
        height: 40px;
      }

      .dock {
        bottom: 12px;
        padding: 10px 16px;
        gap: 6px;
        border-radius: 20px;
      }

      .dock-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
      }

      .dock-icon svg {
        width: 22px;
        height: 22px;
      }

      .notif-dropdown {
        right: 8px;
        width: calc(100vw - 16px);
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Top nav -->
  <div class="top-nav">
    <button class="nav-bell" id="notifBell" title="Notifications">
      <svg viewBox="0 0 24 24">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <div class="nav-bell-badge" id="notifBadge"></div>
    </button>
    <div style="position:relative;">
      <div class="user-avatar" id="userAvatar" onclick="toggleUserMenu()"></div>
      <div class="user-menu" id="userMenu">
        <div class="user-menu-email" id="menuEmail">Loading...</div>
        <a href="account.html" class="user-menu-item">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Account
        </a>
        <button class="user-menu-item logout" onclick="logout()">
          <svg viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </div>

    <!-- Notification dropdown -->
    <div class="notif-dropdown" id="notifDropdown">
      <div class="notif-dropdown-header">
        <h3>Notifications</h3>
        <button class="notif-mark-all" id="notifMarkAll">Mark all read</button>
      </div>
      <div id="notifList">
        <div class="notif-empty">No notifications</div>
      </div>
    </div>
  </div>

  <!-- Empty canvas for widgets -->
  <div class="canvas" id="canvas">
    <!-- Widgets will go here -->
  </div>

  <!-- Mac-style dock -->
  <div class="dock">
    <a href="chat.html" class="dock-item">
      <div class="dock-icon">
        <svg viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="dock-label">Chat</span>
    </a>

    <a href="upload.html" class="dock-item">
      <div class="dock-icon">
        <svg viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <span class="dock-label">Upload</span>
    </a>

    <a href="notes.html" class="dock-item">
      <div class="dock-icon">
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <span class="dock-label">Notes</span>
    </a>

    <a href="office.html" class="dock-item">
      <div class="dock-icon">
        <svg viewBox="0 0 24 24">
          <path d="M4 4a2 2 0 0 1 2-2h8l6 6v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="12" y2="17"/>
        </svg>
      </div>
      <span class="dock-label">Office</span>
    </a>

    <div class="dock-divider"></div>

    <a href="study-groups.html" class="dock-item">
      <div class="dock-icon">
        <svg viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <span class="dock-label">Groups</span>
    </a>

    <a href="flashcards.html" class="dock-item">
      <div class="dock-icon">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="2"/>
          <path d="M8 6h8"/>
          <path d="M8 10h8"/>
          <path d="M8 14h4"/>
        </svg>
      </div>
      <span class="dock-label">Flashcards</span>
    </a>

    <a href="browse.html" class="dock-item">
      <div class="dock-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <span class="dock-label">Nexus</span>
    </a>

    <a href="calendar.html" class="dock-item">
      <div class="dock-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="dock-label">Calendar</span>
    </a>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let authToken = '';
    let currentUser = null;

    // Auth check
    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = session.user;
      authToken = session.access_token;

      document.getElementById('userAvatar').textContent = (currentUser.email || 'U').charAt(0).toUpperCase();
      document.getElementById('menuEmail').textContent = currentUser.email;

      loadNotifications();
    }

    // Notifications
    let notifData = [];
    let pendingInvites = [];

    async function loadNotifications() {
      try {
        const [notifRes, inviteRes] = await Promise.all([
          fetch(BACKEND_URL + '/api/notifications', { headers: { 'Authorization': 'Bearer ' + authToken } }),
          fetch(BACKEND_URL + '/api/groups/invites', { headers: { 'Authorization': 'Bearer ' + authToken } })
        ]);

        if (notifRes.ok) {
          const d = await notifRes.json();
          notifData = d.notifications || [];
        }
        if (inviteRes.ok) {
          const d = await inviteRes.json();
          pendingInvites = d.invites || [];
        }
        renderNotifications();
      } catch (e) {
        console.error('Load notifications error:', e);
      }
    }

    function timeAgo(dateStr) {
      const now = new Date();
      const d = new Date(dateStr);
      const secs = Math.floor((now - d) / 1000);
      if (secs < 60) return 'just now';
      const mins = Math.floor(secs / 60);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 7) return days + 'd ago';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function renderNotifications() {
      const list = document.getElementById('notifList');
      const badge = document.getElementById('notifBadge');
      const items = [];

      pendingInvites.forEach(inv => {
        items.push(`<div class="notif-item unread">
          <div style="flex:1;">
            <div class="notif-item-msg">@${inv.invited_by} invited you to '${inv.group_name}'</div>
            <div class="notif-item-time">${timeAgo(inv.created_at)}</div>
            <div style="display:flex;gap:8px;margin-top:8px;">
              <button onclick="respondInvite('${inv.id}','accept')" style="flex:1;padding:8px;background:linear-gradient(135deg,#8B9D83,#7A8C73);color:white;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;">Accept</button>
              <button onclick="respondInvite('${inv.id}','decline')" style="flex:1;padding:8px;background:none;border:1px solid rgba(155,139,126,0.3);color:#9B8B7E;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;">Decline</button>
            </div>
          </div>
        </div>`);
      });

      notifData.filter(n => n.type !== 'group_invite').slice(0, 8).forEach(n => {
        items.push(`<div class="notif-item ${n.is_read ? '' : 'unread'}">
          <div>
            <div class="notif-item-msg">${n.message || n.title}</div>
            <div class="notif-item-time">${timeAgo(n.created_at)}</div>
          </div>
        </div>`);
      });

      if (!items.length) {
        list.innerHTML = '<div class="notif-empty">No notifications</div>';
        badge.classList.remove('visible');
      } else {
        list.innerHTML = items.join('');
        const unread = notifData.filter(n => !n.is_read).length + pendingInvites.length;
        if (unread > 0) badge.classList.add('visible');
        else badge.classList.remove('visible');
      }
    }

    async function respondInvite(inviteId, action) {
      try {
        await fetch(`${BACKEND_URL}/api/groups/invites/${inviteId}/${action}`, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        pendingInvites = pendingInvites.filter(i => i.id !== inviteId);
        renderNotifications();
      } catch (e) {
        console.error('Respond invite error:', e);
      }
    }

    async function markAllRead() {
      try {
        await fetch(BACKEND_URL + '/api/notifications/read', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + authToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ all: true })
        });
        notifData.forEach(n => n.is_read = true);
        renderNotifications();
      } catch (e) {
        console.error('Mark all read error:', e);
      }
    }

    // UI interactions
    function toggleUserMenu() {
      document.getElementById('userMenu').classList.toggle('show');
      document.getElementById('notifDropdown').classList.remove('active');
    }

    document.getElementById('notifBell').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('notifDropdown').classList.toggle('active');
      document.getElementById('userMenu').classList.remove('show');
    });

    document.getElementById('notifMarkAll').addEventListener('click', (e) => {
      e.stopPropagation();
      markAllRead();
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#userMenu') && !e.target.closest('#userAvatar')) {
        document.getElementById('userMenu').classList.remove('show');
      }
      if (!e.target.closest('#notifDropdown') && !e.target.closest('#notifBell')) {
        document.getElementById('notifDropdown').classList.remove('active');
      }
    });

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
