<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow Suite Dashboard - Your study hub">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Dashboard - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #FAF8F5;
      min-height: 100vh;
      color: #2C2C2C;
      overflow: hidden;
    }

    /* Subtle texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(139, 157, 131, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(212, 196, 176, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Top right user menu */
    .top-nav {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 100;
    }

    .nav-bell {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8B7E73;
      position: relative;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .nav-bell:hover {
      background: rgba(255, 255, 255, 0.9);
      color: #8B9D83;
      transform: translateY(-2px);
    }

    .nav-bell svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .nav-bell-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D4A574;
      display: none;
    }

    .nav-bell-badge.visible {
      display: block;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #8B9D83, #7A8C73);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(139, 157, 131, 0.2);
    }

    .user-avatar:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(139, 157, 131, 0.3);
    }

    .user-menu {
      position: absolute;
      top: 56px;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(139, 126, 115, 0.1);
      min-width: 200px;
      padding: 8px;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 101;
    }

    .user-menu.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .user-menu-email {
      padding: 10px 14px;
      font-size: 12px;
      color: #8B7E73;
      border-bottom: 1px solid rgba(139, 126, 115, 0.08);
      margin-bottom: 6px;
      font-weight: 300;
    }

    .user-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: #2C2C2C;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      transition: background 0.2s;
    }

    .user-menu-item:hover {
      background: rgba(139, 157, 131, 0.06);
    }

    .user-menu-item.logout {
      color: #C97A7A;
    }

    .user-menu-item svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    /* Notification dropdown */
    .notif-dropdown {
      position: absolute;
      top: 56px;
      right: 56px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(139, 126, 115, 0.1);
      width: 360px;
      max-height: 420px;
      overflow-y: auto;
      padding: 12px;
      display: none;
      z-index: 101;
    }

    .notif-dropdown.active {
      display: block;
    }

    .notif-dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 8px;
    }

    .notif-dropdown-header h3 {
      font-size: 15px;
      font-weight: 500;
      color: #2C2C2C;
    }

    .notif-mark-all {
      background: none;
      border: none;
      color: #8B9D83;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 400;
    }

    .notif-item {
      padding: 12px;
      border-radius: 12px;
      display: flex;
      gap: 12px;
      transition: background 0.2s;
      margin-bottom: 4px;
    }

    .notif-item:hover {
      background: rgba(139, 157, 131, 0.04);
    }

    .notif-item.unread {
      background: rgba(139, 157, 131, 0.06);
    }

    .notif-item-msg {
      font-size: 13px;
      color: #2C2C2C;
      line-height: 1.5;
    }

    .notif-item-time {
      font-size: 11px;
      color: #9B8B7E;
      margin-top: 4px;
    }

    .notif-empty {
      padding: 32px;
      text-align: center;
      color: #9B8B7E;
      font-size: 13px;
      font-weight: 300;
    }

    /* Infinite canvas container */
    .canvas-container {
      position: fixed;
      inset: 0;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      overflow: hidden;
      cursor: grab;
      z-index: 1;
      background-color: #E8DFD3;
    }

    .canvas-container.panning {
      cursor: grabbing;
    }

    /* Main infinite canvas */
    .canvas {
      position: absolute;
      width: 50000px;
      height: 50000px;
      left: -20000px;
      top: -20000px;
      z-index: 1;
      transform-origin: 0 0;
      background-color: #E8DFD3;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 99px, rgba(139, 126, 115, 0.15) 99px, rgba(139, 126, 115, 0.15) 100px),
        repeating-linear-gradient(90deg, transparent, transparent 99px, rgba(139, 126, 115, 0.15) 99px, rgba(139, 126, 115, 0.15) 100px);
    }

    /* Widget cards */
    .widget {
      position: absolute;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 126, 115, 0.12);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
      cursor: grab;
      min-height: 200px;
      width: 380px;
      display: flex;
      flex-direction: column;
      user-select: none;
      z-index: 10;
    }

    .widget:hover {
      box-shadow: 0 8px 24px rgba(139, 157, 131, 0.15);
      transform: translateY(-2px);
      z-index: 11;
    }

    .widget:active {
      cursor: grabbing;
    }

    @media (max-width: 768px) {
      .widget {
        width: 320px;
      }
    }

    .widget:hover {
      box-shadow: 0 8px 24px rgba(139, 157, 131, 0.12);
      border-color: rgba(139, 157, 131, 0.2);
    }

    .widget.dragging {
      opacity: 0.4;
      cursor: grabbing !important;
      transform: scale(0.98) rotate(2deg);
      box-shadow: 0 12px 40px rgba(139, 157, 131, 0.4);
      border: 2px dashed rgba(139, 157, 131, 0.5);
    }

    .widget.drag-over {
      border: 2px solid rgba(139, 157, 131, 0.4);
      background: rgba(139, 157, 131, 0.05);
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(139, 126, 115, 0.08);
    }

    .widget-title {
      font-size: 16px;
      font-weight: 500;
      color: #2C2C2C;
    }

    .widget-remove {
      background: none;
      border: none;
      color: #9B8B7E;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 18px;
      line-height: 1;
      transition: all 0.2s;
      font-family: inherit;
    }

    .widget-remove:hover {
      background: rgba(201, 122, 122, 0.1);
      color: #C97A7A;
    }

    .widget-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .widget-content-full {
      padding: 0;
      height: 100%;
    }

    /* Minimal remove button for accessory widgets */
    .widget-remove-minimal {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(139, 126, 115, 0.2);
      color: #9B8B7E;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s;
      z-index: 20;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .widget:hover .widget-remove-minimal {
      opacity: 1;
    }

    .widget-remove-minimal:hover {
      background: rgba(201, 122, 122, 0.9);
      color: white;
      border-color: #C97A7A;
    }

    /* Sticky Note styles */
    .sticky-note {
      width: 100%;
      height: 100%;
      min-height: 200px;
      padding: 16px;
      padding-bottom: 40px;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: #2C2C2C;
    }

    .widget[data-widget-type="stickyNote"] {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      min-width: 250px;
      width: 250px;
    }

    .sticky-yellow { background: #FFF9C4; }
    .sticky-pink { background: #FFD1DC; }
    .sticky-blue { background: #B3E5FC; }
    .sticky-green { background: #C8E6C9; }
    .sticky-orange { background: #FFE0B2; }
    .sticky-purple { background: #E1BEE7; }

    /* Text Box styles */
    .textbox-toolbar {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: rgba(232, 223, 211, 0.3);
      border-bottom: 1px solid rgba(232, 223, 211, 0.5);
      flex-wrap: wrap;
      align-items: center;
    }

    .text-box {
      width: 100%;
      height: calc(100% - 45px);
      min-height: 150px;
      padding: 16px;
      font-size: 16px;
      line-height: 1.5;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: #2C2C2C;
    }

    .widget[data-widget-type="textBox"] {
      min-width: 320px;
      width: 320px;
      min-height: 220px;
    }

    /* To-Do List styles */
    .todo-container {
      padding: 16px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      margin-bottom: 6px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .todo-item:hover {
      background: rgba(139, 157, 131, 0.05);
    }

    .todo-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #8B9D83;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: #2C2C2C;
      font-family: inherit;
    }

    .todo-text.completed {
      text-decoration: line-through;
      color: #9B8B7E;
    }

    .todo-delete {
      opacity: 0;
      background: none;
      border: none;
      color: #C97A7A;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      font-family: inherit;
    }

    .todo-item:hover .todo-delete {
      opacity: 1;
    }

    .todo-add {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: rgba(139, 157, 131, 0.1);
      border: 1px dashed rgba(139, 157, 131, 0.3);
      border-radius: 6px;
      color: #8B9D83;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }

    .todo-add:hover {
      background: rgba(139, 157, 131, 0.15);
    }

    .widget[data-widget-type="todoList"] {
      min-width: 280px;
      width: 280px;
    }

    /* Image Widget styles */
    .image-upload-area {
      width: 100%;
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(139, 126, 115, 0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      padding: 20px;
    }

    .image-upload-area:hover {
      border-color: #8B9D83;
      background: rgba(139, 157, 131, 0.05);
    }

    .image-display {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .widget[data-widget-type="imageWidget"] {
      min-width: 300px;
      width: 300px;
    }

    /* Shape Widget styles */
    .shape-box {
      width: 100%;
      height: 100%;
      min-height: 150px;
      border-radius: 8px;
      position: relative;
    }

    .widget[data-widget-type="shape"] {
      min-width: 200px;
      width: 200px;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .widget[data-widget-type="shape"]:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    /* Clock widget styles */
    .clock-container {
      width: 100%;
      height: 100%;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .widget[data-widget-type="clock"] {
      min-width: 220px;
      width: 220px;
    }

    .widget[data-widget-type="clock"]:hover {
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
    }

    /* Quote Display widget styles */
    .widget[data-widget-type="quoteDisplay"] {
      min-width: 320px;
      width: 320px;
      min-height: 200px;
    }

    /* Countdown widget styles */
    .widget[data-widget-type="countdown"] {
      min-width: 240px;
      width: 240px;
      min-height: 200px;
    }

    /* Sticker Pack widget styles */
    .widget[data-widget-type="stickerPack"] {
      min-width: 200px;
      width: 200px;
      min-height: 200px;
      background: transparent;
    }

    /* Divider Line widget styles */
    .widget[data-widget-type="dividerLine"] {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .widget[data-widget-type="dividerLine"]:hover {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    /* Recent Conversations widget */
    .conv-item {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(139, 126, 115, 0.08);
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .conv-item:hover {
      background: rgba(139, 157, 131, 0.08);
      border-color: rgba(139, 157, 131, 0.15);
    }

    .conv-title {
      font-size: 14px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conv-time {
      font-size: 12px;
      color: #9B8B7E;
    }

    /* Quick Stats widget */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(139, 126, 115, 0.08);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 500;
      color: #8B9D83;
      display: block;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #9B8B7E;
      font-weight: 400;
    }

    /* Upcoming Events widget */
    .event-item {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(139, 126, 115, 0.08);
      border-left: 3px solid #8B9D83;
    }

    .event-title {
      font-size: 14px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 4px;
    }

    .event-time {
      font-size: 12px;
      color: #9B8B7E;
    }

    /* Study Groups widget */
    .group-item {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(139, 126, 115, 0.08);
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .group-item:hover {
      background: rgba(139, 157, 131, 0.08);
      border-color: rgba(139, 157, 131, 0.15);
    }

    .group-name {
      font-size: 14px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 4px;
    }

    .group-activity {
      font-size: 12px;
      color: #9B8B7E;
    }

    /* Quick Launch widget */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .quick-action-btn {
      background: linear-gradient(135deg, rgba(139, 157, 131, 0.1), rgba(139, 157, 131, 0.05));
      border: 1px solid rgba(139, 157, 131, 0.2);
      border-radius: 12px;
      padding: 20px 16px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      color: inherit;
    }

    .quick-action-btn:hover {
      background: linear-gradient(135deg, #8B9D83, #7A8C73);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(139, 157, 131, 0.2);
    }

    .quick-action-btn:hover svg {
      stroke: white;
    }

    .quick-action-btn:hover .quick-action-label {
      color: white;
    }

    .quick-action-btn svg {
      width: 24px;
      height: 24px;
      stroke: #8B9D83;
      fill: none;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }

    .quick-action-label {
      font-size: 13px;
      font-weight: 500;
      color: #2C2C2C;
      transition: all 0.3s ease;
    }

    /* Add widget button */
    .add-widget-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8B9D83;
      font-size: 24px;
      font-weight: 300;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      z-index: 100;
    }

    .add-widget-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(139, 157, 131, 0.15);
    }

    /* Widget picker modal */
    .widget-picker {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1001;
    }

    .widget-picker.active {
      display: flex;
    }

    .widget-picker-content {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 20px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .widget-picker-title {
      font-size: 20px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 20px;
    }

    /* Clock settings modal */
    .clock-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1002;
    }

    .clock-modal.active {
      display: flex;
    }

    .clock-modal-content {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 20px;
      padding: 32px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .clock-modal-title {
      font-size: 20px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 20px;

    function timeAgo(dateStr) {
      const now = new Date();
      const d = new Date(dateStr);
      const secs = Math.floor((now - d) / 1000);
      if (secs < 60) return 'just now';
      const mins = Math.floor(secs / 60);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 7) return days + 'd ago';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Load widgets from backend (per-user)
    async function loadWidgets() {
      const DEFAULT_WIDGETS = [
        { id: 'recentConversations_1', type: 'recentConversations', x: 20200, y: 20200, data: {} },
        { id: 'upcomingEvents_1', type: 'upcomingEvents', x: 20620, y: 20200, data: {} },

      ];

      console.log('Loading widgets from backend...');
      try {
        const res = await fetch(BACKEND_URL + '/api/user/dashboard-layout', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });

        console.log('Load response status:', res.status);

        if (res.ok) {
          const data = await res.json();
          console.log('Loaded data:', data);
          let layout = data.layout || DEFAULT_WIDGETS;

          // Load canvas pan position if saved
          if (data.canvasPan) {
            canvasPan = data.canvasPan;
            console.log('Loaded canvasPan:', canvasPan);
          }

          // Migration: Convert old array format ['id1', 'id2'] to new format [{id, type, x, y, data}]
          if (layout.length > 0 && typeof layout[0] === 'string') {
            layout = layout.map((widgetType, index) => ({
              id: generateWidgetId(widgetType),
              type: widgetType,
              x: 20200 + (index % 3) * 420,
              y: 20200 + Math.floor(index / 3) * 350,
              data: {}
            }));
            await saveWidgets(layout);
          }

          // Migration: If widgets don't have 'type' field, add it
          if (layout.length > 0 && typeof layout[0] === 'object' && !layout[0].type) {
            layout = layout.map(widget => ({
              id: widget.id || generateWidgetId('recentConversations'),
              type: widget.id || 'recentConversations',
              x: widget.x < 10000 ? widget.x + 20000 : widget.x,
              y: widget.y < 10000 ? widget.y + 20000 : widget.y,
              data: widget.data || {}
            }));
            await saveWidgets(layout);
          }

          // Migration: If widgets have old coordinates (< 10000), update them to new center
          if (layout.length > 0 && typeof layout[0] === 'object' && layout[0].x < 10000) {
            layout = layout.map(widget => ({
              ...widget,
              x: widget.x + 20000,
              y: widget.y + 20000
            }));
            await saveWidgets(layout);
          }

          // Filter out coming soon widgets
          activeWidgets = layout.filter(w => !WIDGET_TYPES[w.type]?.comingSoon);
          console.log('Loaded', activeWidgets.length, 'widgets');
        } else {
          console.log('Load failed, using defaults');
          activeWidgets = DEFAULT_WIDGETS;
        }
      } catch (e) {
        console.error('Load widgets error:', e);
        console.error('Error details:', e.message, e.stack);
        // Try localStorage fallback for migration
        const saved = localStorage.getItem('dashboardWidgets');
        if (saved) {
          const oldFormat = JSON.parse(saved);
          // Convert old format to new format
          activeWidgets = oldFormat
            .filter(widgetType => !WIDGET_TYPES[widgetType]?.comingSoon)

              x: 20200 + (index % 3) * 420,
              y: 20200 + Math.floor(index / 3) * 350,
              data: {}

          await saveWidgets(activeWidgets);
          localStorage.removeItem('dashboardWidgets');
        } else {
          activeWidgets = DEFAULT_WIDGETS;
        }
      }
      renderWidgets();
    }

    async function saveWidgets(widgetsToSave) {
      const toSave = widgetsToSave || activeWidgets;

            layout: toSave,

    }

    // Apply canvas transform

      const canvas = document.getElementById('canvas');
      canvas.style.transform = `translate(${canvasPan.x}px, ${canvasPan.y}px)`;

    function resetCanvasView() {
      canvasPan = { x: 0, y: 0 };
      updateCanvasTransform();
    }

    function renderWidgets() {
      const canvas = document.getElementById('canvas');
      canvas.innerHTML = '';

      if (activeWidgets.length === 0) {
        canvas.innerHTML = '<div class="empty-state">Click the + button to add widgets</div>';
        return;
      }

      const isMobile = window.innerWidth <= 768;

      activeWidgets.forEach((widgetData) => {
        const widgetDef = WIDGET_TYPES[widgetData.type];
        if (!widgetDef) return;

        const widget = document.createElement('div');
        widget.className = 'widget';
        widget.dataset.widgetId = widgetData.id;
        widget.dataset.widgetType = widgetData.type;
        widget.style.left = widgetData.x + 'px';
        widget.style.top = widgetData.y + 'px';

        // Different layout for accessory widgets (no header for some)
        if (widgetDef.category === 'accessory') {
          widget.innerHTML = `
            <button class="widget-remove widget-remove-minimal" onclick="removeWidget('${widgetData.id}')" title="Remove">×</button>
            <div class="widget-content widget-content-full" id="widget-${widgetData.id}">
              <div style="text-align:center;padding:20px;color:#9B8B7E;">Loading...</div>
            </div>
          `;
        } else {
          widget.innerHTML = `
            <div class="widget-header">
              <div class="widget-title">${widgetDef.name}</div>
              <button class="widget-remove" onclick="removeWidget('${widgetData.id}')">×</button>
            </div>
            <div class="widget-content" id="widget-${widgetData.id}">
              <div style="text-align:center;padding:20px;color:#9B8B7E;">Loading...</div>
            </div>
          `;
        }

        // Widget drag events (only on desktop)
        if (!isMobile) {
          widget.addEventListener('mousedown', (e) => {
            // Don't start drag if clicking on remove button or widget content
            if (e.target.closest('.widget-remove') || e.target.closest('.widget-content')) {
              return;
            }

            e.preventDefault();
            e.stopPropagation();
            isDragging = true;
            draggedWidget = widgetData;
            widget.classList.add('dragging');
            widget.style.zIndex = '100';

            // Calculate drag offset accounting for canvas pan
            widgetDragStart = {
              x: e.clientX - widgetData.x - canvasPan.x,
              y: e.clientY - widgetData.y - canvasPan.y
            };
          });
        }

        canvas.appendChild(widget);

        // Render widget content
        setTimeout(() => widgetDef.render(widgetData), 100);
      });

      updateCanvasTransform();
    }

    async function removeWidget(widgetId) {
      activeWidgets = activeWidgets.filter(w => w.id !== widgetId);
      await saveWidgets();
      renderWidgets();
    }

    // Canvas panning and widget dragging
    const canvasContainer = document.getElementById('canvasContainer');
    const canvas = document.getElementById('canvas');

    // Mouse down on canvas container (start panning)
    canvasContainer.addEventListener('mousedown', (e) => {
      // Only start panning if not clicking on a widget
      if (e.target === canvasContainer || e.target === canvas) {
        isPanningCanvas = true;
        canvasContainer.classList.add('panning');
        panStart = {
          x: e.clientX - canvasPan.x,
          y: e.clientY - canvasPan.y
        };
      }
    });

    // Mouse move (pan canvas or drag widget)
    document.addEventListener('mousemove', (e) => {
      if (isPanningCanvas) {
        // Pan the canvas
        canvasPan.x = e.clientX - panStart.x;
        canvasPan.y = e.clientY - panStart.y;
        updateCanvasTransform();
      } else if (isDragging && draggedWidget) {
        // Drag the widget (account for canvas pan)
        draggedWidget.x = e.clientX - widgetDragStart.x - canvasPan.x;
        draggedWidget.y = e.clientY - widgetDragStart.y - canvasPan.y;

        const widgetElement = canvas.querySelector(`[data-widget-id="${draggedWidget.id}"]`);
        if (widgetElement) {
          widgetElement.style.left = draggedWidget.x + 'px';
          widgetElement.style.top = draggedWidget.y + 'px';
        }
      }
    });

    // Mouse up (stop panning or dragging)
    document.addEventListener('mouseup', async () => {
      if (isPanningCanvas) {
        isPanningCanvas = false;
        canvasContainer.classList.remove('panning');
        // Save canvas pan position
        await saveWidgets();
      }

      if (isDragging && draggedWidget) {
        isDragging = false;
        const widgetElement = canvas.querySelector(`[data-widget-id="${draggedWidget.id}"]`);
        if (widgetElement) {
          widgetElement.classList.remove('dragging');
          widgetElement.style.zIndex = '10';
        }
        draggedWidget = null;
        // Save widget positions
        await saveWidgets();
      }
    });

    document.getElementById('widgetPicker').addEventListener('click', (e) => {

    function renderWidgetOptions() {
      const container = document.getElementById('widgetOptions');
      container.innerHTML = '';

      // Group widgets by category
      const appWidgets = [];
      const accessoryWidgets = [];

      Object.entries(WIDGET_TYPES).forEach(([type, widget]) => {
        if (widget.category === 'app') {
          appWidgets.push([type, widget]);
        } else {
          accessoryWidgets.push([type, widget]);

      // Render app widgets

        appWidgets.forEach(([type, widget]) => {
          const isAdded = activeWidgets.some(w => w.type === type);
          const isComingSoon = widget.comingSoon;
          const option = document.createElement('div');
          option.className = 'widget-option' + (isComingSoon ? ' coming-soon' : '');
          option.innerHTML = `
            <div class="widget-option-info">
              <div class="widget-option-name">${widget.name}${isComingSoon ? ' <span style="font-size:11px;color:#9B8B7E;font-weight:400;">(Coming Soon)</span>' : ''}</div>
              <div class="widget-option-desc">${widget.desc}</div>
            </div>
            <button class="widget-option-add" onclick="addWidget('${type}')" ${isAdded || isComingSoon ? 'disabled' : ''}>
              ${isComingSoon ? 'Coming Soon' : isAdded ? 'Added' : 'Add'}
            </button>
          `;
          container.appendChild(option);
        });
      }

      // Render accessory widgets
      if (accessoryWidgets.length > 0) {
        const accessoryHeader = document.createElement('div');
        accessoryHeader.style.cssText = 'font-size:13px;font-weight:600;color:#8B7E73;padding:8px 16px;margin-top:16px;';

        container.appendChild(accessoryHeader);

        accessoryWidgets.forEach(([type, widget]) => {
          const isComingSoon = widget.comingSoon;
          const option = document.createElement('div');
          option.className = 'widget-option' + (isComingSoon ? ' coming-soon' : '');
          option.innerHTML = `
            <div class="widget-option-info">
              <div class="widget-option-name">${widget.name}${isComingSoon ? ' <span style="font-size:11px;color:#9B8B7E;font-weight:400;">(Coming Soon)</span>' : ''}</div>
              <div class="widget-option-desc">${widget.desc}</div>
            </div>
            <button class="widget-option-add" onclick="addWidget('${type}')" ${isComingSoon ? 'disabled' : ''}>
              ${isComingSoon ? 'Coming Soon' : 'Add'}
            </button>
          `;
          container.appendChild(option);
        });
      }
    }

    async function addWidget(widgetType) {
      const widgetDef = WIDGET_TYPES[widgetType];

      if (widgetDef && !widgetDef.comingSoon) {
        // Generate unique ID for this widget instance
        const widgetId = generateWidgetId(widgetType);

        // Default data for different widget types
        let defaultData = {};
        if (widgetType === 'stickyNote') {
          defaultData = { color: 'yellow', text: 'New note...' };
        } else if (widgetType === 'textBox') {
          defaultData = { text: 'Type here...', fontSize: 16 };
        } else if (widgetType === 'todoList') {
          defaultData = { items: [{id: Date.now(), text: 'New task', checked: false}] };
        } else if (widgetType === 'shape') {
          defaultData = { color: '#8B9D83', width: 200, height: 150 };
        } else if (widgetType === 'imageWidget') {
          defaultData = { imageUrl: '', width: 300 };
        }

        // Calculate position for new widget (stagger them in center area)
        const newWidget = {
          id: widgetId,
          type: widgetType,
          x: 20200 + (activeWidgets.length % 4) * 420,
          y: 20200 + Math.floor(activeWidgets.length / 4) * 350,
          data: defaultData
        };
        activeWidgets.push(newWidget);
        await saveWidgets();
        renderWidgets();
        renderWidgetOptions();
      }
    }

        const data = await res.json();
        const conversations = data.conversations || [];

        if (conversations.length === 0) {
          container.innerHTML = '<div class="empty-state">No conversations yet</div>';
          return;
        }

        container.innerHTML = conversations.slice(0, 5).map(conv => `
          <a href="chat.html?id=${conv.id}" class="conv-item">
            <div class="conv-title">${conv.title || 'Untitled Chat'}</div>
            <div class="conv-time">${timeAgo(conv.updated_at || conv.created_at)}</div>
          </a>
        `).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">Error loading conversations</div>';
      }
    }

      const container = document.getElementById(`widget-${widgetData.id}`);
      try {
        // Fetch user stats from backend
        const res = await fetch(BACKEND_URL + '/api/user/stats', {
          headers: { 'Authorization': 'Bearer ' + authToken }

    async function renderUpcomingEvents(widgetData) {
      const container = document.getElementById(`widget-${widgetData.id}`);
      try {
        const res = await fetch(BACKEND_URL + '/api/calendar/upcoming', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });

        if (!res.ok) throw new Error('Failed to load');

        const data = await res.json();
        const events = data.events || [];

        if (events.length === 0) {
          container.innerHTML = '<div class="empty-state">No upcoming events</div>';
          return;
        }

        container.innerHTML = events.slice(0, 5).map(event => {
          const eventDate = new Date(event.event_date || event.start_date);
          const today = new Date();
          const daysUntil = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));

          let timeText = '';
          if (daysUntil === 0) timeText = 'Today';
          else if (daysUntil === 1) timeText = 'Tomorrow';
          else if (daysUntil < 7) timeText = `In ${daysUntil} days`;
          else timeText = eventDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

          return `
            <div class="event-item">
              <div class="event-title">${event.title || event.event_name}</div>
              <div class="event-time">${timeText}</div>
            </div>
          `;
        }).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">No events scheduled</div>';
      }
    }

      itemsContainer.innerHTML = items.map(item => `

    function addTodoItem(widgetId) {
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (!widgetData) return;

      const newItem = { id: Date.now(), text: 'New task', checked: false };
      widgetData.data.items.push(newItem);
      renderTodoItems(widgetId, widgetData.data.items);
      saveWidgets();
    }

    function toggleTodoItem(widgetId, itemId) {
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (!widgetData) return;

      const item = widgetData.data.items.find(i => i.id == itemId);
      if (item) {
        item.checked = !item.checked;
        renderTodoItems(widgetId, widgetData.data.items);
        saveWidgets();
      }
    }

    function updateTodoText(widgetId, itemId, newText) {
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (!widgetData) return;

      const item = widgetData.data.items.find(i => i.id == itemId);
      if (item) {
        item.text = newText;
        saveWidgets();
      }
    }

    function deleteTodoItem(widgetId, itemId) {
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (!widgetData) return;

      widgetData.data.items = widgetData.data.items.filter(i => i.id != itemId);
      renderTodoItems(widgetId, widgetData.data.items);
      saveWidgets();
    }

    function openClockModal(widgetId) {
      currentClockWidgetId = widgetId;
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (!widgetData) return;

      const mode = widgetData.data.mode || 'digital';
      const modal = document.getElementById('clockModal');
      modal.classList.add('active');

      // Set active tab
      document.querySelectorAll('.clock-tab').forEach(tab => tab.classList.remove('active'));
      document.querySelector(`.clock-tab[onclick*="${mode}"]`).classList.add('active');

      // Render styles for current mode
      renderClockStyles(mode, widgetData.data.style);
    }

    function closeClockModal() {
      document.getElementById('clockModal').classList.remove('active');
      currentClockWidgetId = null;
    }

    function switchClockTab(mode) {
      document.querySelectorAll('.clock-tab').forEach(tab => tab.classList.remove('active'));
      document.querySelector(`.clock-tab[onclick*="${mode}"]`).classList.add('active');

      const widgetData = activeWidgets.find(w => w.id === currentClockWidgetId);
      const currentStyle = widgetData?.data.style;
      renderClockStyles(mode, currentStyle);
    }

          "Try not to become a man of success. Rather become a man of value. - Albert Einstein",
          "If you are not willing to risk the usual, you will have to settle for the ordinary. - Jim Rohn",
          "There are no secrets to success. It is the result of preparation, hard work, and learning from failure. - Colin Powell",
          "The only place where success comes before work is in the dictionary. - Vidal Sassoon",
          "Success is not how high you have climbed, but how you make a positive difference to the world. - Roy T. Bennett",
          "Opportunities don't happen. You create them. - Chris Grosser",
          "Success is liking yourself, liking what you do, and liking how you do it. - Maya Angelou",
          "Don't aim for success if you want it; just do what you love and believe in. - David Frost",
          "The secret of success is to do the common thing uncommonly well. - John D. Rockefeller Jr."
        ]
      }
    };

    function renderQuoteDisplay(widgetData) {
      const container = document.getElementById(`widget-${widgetData.id}`);
      const category = widgetData.data.category || 'motivational';
      let quote = widgetData.data.quote;

      if (!quote) {
        const quotes = QUOTE_CATEGORIES[category].quotes;
        quote = quotes[Math.floor(Math.random() * quotes.length)];
        widgetData.data.quote = quote;
        widgetData.data.category = category;
      }

      const [text, author] = quote.split(' - ');

      container.innerHTML = `
        <div style="padding:20px;text-align:center;display:flex;flex-direction:column;justify-content:center;height:100%;cursor:pointer;" onclick="openQuoteModal('${widgetData.id}')">
          <div style="font-size:16px;font-style:italic;color:#2C2C2C;line-height:1.6;margin-bottom:12px;">"${text}"</div>
          <div style="font-size:13px;color:#8B9D83;font-weight:500;">- ${author || 'Anonymous'}</div>
          <button onclick="event.stopPropagation();refreshQuote('${widgetData.id}')" style="margin-top:16px;padding:8px 16px;background:#8B9D83;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;">New Quote</button>
          <div style="margin-top:8px;font-size:11px;color:#9B8B7E;cursor:pointer;">Change Category</div>
        </div>
      `;
    }

    function refreshQuote(widgetId) {
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (!widgetData) return;

      const category = widgetData.data.category || 'motivational';
      const quotes = QUOTE_CATEGORIES[category].quotes;
      const newQuote = quotes[Math.floor(Math.random() * quotes.length)];
      updateWidgetData(widgetId, { quote: newQuote });
      renderQuoteDisplay(widgetData);
    }

    function openQuoteModal(widgetId) {
      currentQuoteWidgetId = widgetId;
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (!widgetData) return;

      const currentCategory = widgetData.data.category || 'motivational';
      const modal = document.getElementById('quoteModal');
      modal.classList.add('active');

      renderQuoteCategories(currentCategory);
    }

    function closeQuoteModal() {
      document.getElementById('quoteModal').classList.remove('active');
      currentQuoteWidgetId = null;
    }

    function renderQuoteCategories(selectedCategory) {
      const container = document.getElementById('quoteCategories');

      container.innerHTML = Object.entries(QUOTE_CATEGORIES).map(([key, cat]) => `
        <div class="quote-category-option ${selectedCategory === key ? 'selected' : ''}" onclick="selectQuoteCategory('${key}')">
          <div class="quote-category-icon">${cat.icon}</div>
          <div class="quote-category-name">${cat.name}</div>
        </div>
      `).join('');
    }

    function selectQuoteCategory(category) {
      if (!currentQuoteWidgetId) return;

      // Get a random quote from the new category
      const quotes = QUOTE_CATEGORIES[category].quotes;
      const newQuote = quotes[Math.floor(Math.random() * quotes.length)];

      // Update widget data
      updateWidgetData(currentQuoteWidgetId, { category, quote: newQuote });

      // Re-render the widget
      const widgetData = activeWidgets.find(w => w.id === currentQuoteWidgetId);
      if (widgetData) {
        renderQuoteDisplay(widgetData);
      }

      // Update modal UI
      document.querySelectorAll('.quote-category-option').forEach(opt => opt.classList.remove('selected'));
      event.target.closest('.quote-category-option').classList.add('selected');

      // Close modal after selection
      setTimeout(() => closeQuoteModal(), 300);
    }

    // Close modal when clicking outside
    document.addEventListener('click', (e) => {
      const modal = document.getElementById('quoteModal');
      if (e.target === modal) {
        closeQuoteModal();
      }
    });

    // Countdown widget
    function renderCountdown(widgetData) {
      const container = document.getElementById(`widget-${widgetData.id}`);
      const targetDate = widgetData.data.targetDate || '';
      const label = widgetData.data.label || 'My Goal';

      if (!targetDate) {
        container.innerHTML = `
          <div style="padding:20px;text-align:center;">
            <div style="font-size:14px;color:#6B6B6B;margin-bottom:12px;">Set your deadline:</div>
            <input type="text" id="countdown-label-${widgetData.id}" placeholder="Event name" value="${label}" style="width:100%;padding:8px;margin-bottom:8px;border:1px solid #E8DFD3;border-radius:6px;font-family:inherit;font-size:13px;">
            <input type="date" id="countdown-date-${widgetData.id}" style="width:100%;padding:8px;margin-bottom:12px;border:1px solid #E8DFD3;border-radius:6px;font-family:inherit;font-size:13px;">
            <button onclick="setCountdownDate('${widgetData.id}')" style="padding:8px 16px;background:#8B9D83;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;">Start Countdown</button>
          </div>
        `;
      } else {
        const now = new Date();
        const target = new Date(targetDate);
        const diff = target - now;
        const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

        container.innerHTML = `
          <div style="padding:20px;text-align:center;display:flex;flex-direction:column;justify-content:center;height:100%;">
            <div style="font-size:13px;color:#8B9D83;margin-bottom:8px;font-weight:500;">${label}</div>
            <div style="font-size:48px;font-weight:300;color:#2C2C2C;line-height:1;">${days}</div>
            <div style="font-size:14px;color:#6B6B6B;margin-top:4px;">days remaining</div>
            <button onclick="clearCountdown('${widgetData.id}')" style="margin-top:16px;padding:6px 12px;background:rgba(255,255,255,0.7);color:#8B9D83;border:1px solid #E8DFD3;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;">Reset</button>
          </div>
        `;
      }
    }

    function setCountdownDate(widgetId) {
      const dateInput = document.getElementById(`countdown-date-${widgetId}`);
      const labelInput = document.getElementById(`countdown-label-${widgetId}`);
      if (!dateInput.value) return;

      updateWidgetData(widgetId, {
        targetDate: dateInput.value,
        label: labelInput.value || 'My Goal'
      });
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (widgetData) renderCountdown(widgetData);
    }

    function clearCountdown(widgetId) {
      updateWidgetData(widgetId, { targetDate: '', label: 'My Goal' });
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (widgetData) renderCountdown(widgetData);
    }

    // Sticker Pack widget
    const STICKER_OPTIONS = [
      '⭐', '🌟', '✨', '💫', '🌈', '🔥', '💯', '✅', '🎯', '🏆',
      '📚', '✏️', '📖', '💡', '🎓', '🧠', '💪', '👍', '✌️', '🙌',
      '❤️', '💙', '💚', '💛', '🧡', '💜', '🌸', '🌺', '🌻', '🌹',
      '☕', '🍕', '🍰', '🎵', '🎨', '🎭', '🎪', '🎬', '📱', '💻'
    ];

    function renderStickerPack(widgetData) {
      const container = document.getElementById(`widget-${widgetData.id}`);
      const sticker = widgetData.data.sticker || '';

      if (!sticker) {
        container.innerHTML = `
          <div style="padding:12px;text-align:center;">
            <div style="font-size:13px;color:#6B6B6B;margin-bottom:8px;">Pick a sticker:</div>
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-height:180px;overflow-y:auto;">
              ${STICKER_OPTIONS.map(s => `
                <button onclick="selectSticker('${widgetData.id}', '${s}')" style="font-size:28px;padding:8px;background:rgba(255,255,255,0.5);border:1px solid #E8DFD3;border-radius:8px;cursor:pointer;">${s}</button>
              `).join('')}
            </div>
          </div>
        `;
      } else {
        container.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:120px;cursor:pointer;" onclick="clearSticker('${widgetData.id}')">
            ${sticker}
          </div>
        `;
      }
    }

    function selectSticker(widgetId, sticker) {
      updateWidgetData(widgetId, { sticker });
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (widgetData) renderStickerPack(widgetData);
    }

    function clearSticker(widgetId) {
      updateWidgetData(widgetId, { sticker: '' });
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (widgetData) renderStickerPack(widgetData);
    }

    // Divider Line widget
    function renderDividerLine(widgetData) {
      const container = document.getElementById(`widget-${widgetData.id}`);
      const orientation = widgetData.data.orientation || 'horizontal';
      const color = widgetData.data.color || '#8B9D83';
      const thickness = widgetData.data.thickness || 2;

      const widgetElement = container.closest('.widget');

      if (orientation === 'horizontal') {
        widgetElement.style.width = '400px';
        widgetElement.style.height = '40px';
        container.innerHTML = `
          <div style="width:100%;height:${thickness}px;background:${color};margin:${(40-thickness)/2}px 0;"></div>
        `;
      } else {
        widgetElement.style.width = '40px';
        widgetElement.style.height = '300px';
        container.innerHTML = `
          <div style="width:${thickness}px;height:100%;background:${color};margin:0 ${(40-thickness)/2}px;"></div>
        `;
      }

      container.innerHTML += `
        <div style="position:absolute;bottom:4px;right:4px;display:flex;gap:4px;flex-direction:column;">
          <button onclick="toggleDividerOrientation('${widgetData.id}')" style="padding:4px 6px;background:rgba(255,255,255,0.9);border:1px solid #E8DFD3;border-radius:4px;cursor:pointer;font-size:10px;font-family:inherit;white-space:nowrap;">${orientation === 'horizontal' ? '↔️' : '↕️'}</button>
          <input type="color" value="${color}" onchange="changeDividerColor('${widgetData.id}', this.value)" style="width:24px;height:24px;border-radius:4px;border:1px solid rgba(255,255,255,0.8);cursor:pointer;padding:0;">
        </div>
      `;
    }

    function toggleDividerOrientation(widgetId) {
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (!widgetData) return;

      const newOrientation = widgetData.data.orientation === 'horizontal' ? 'vertical' : 'horizontal';
      updateWidgetData(widgetId, { orientation: newOrientation });
      renderDividerLine(widgetData);
    }

    function changeDividerColor(widgetId, color) {
      updateWidgetData(widgetId, { color });
      const widgetData = activeWidgets.find(w => w.id === widgetId);
      if (widgetData) renderDividerLine(widgetData);
    }

    // Helper function to update widget data
    function updateWidgetData(widgetId, newData) {
      const widget = activeWidgets.find(w => w.id === widgetId);
      if (widget) {
        widget.data = { ...widget.data, ...newData };
        saveWidgets();
      }
    }

    // Debounce helper
    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    // Initialize widgets after auth
    // Note: init() has already been called by this point, so we need to load widgets manually
    async function initWidgets() {
      // Wait for auth to be ready
      if (!authToken) {
        console.log('Waiting for auth...');
        setTimeout(initWidgets, 100);
        return;
      }
      console.log('Auth ready, loading widgets');
      await loadWidgets();
      updateCanvasTransform();
      renderWidgets();
    }

    // Start loading widgets
    initWidgets();

    // Re-render widgets on resize (to enable/disable dragging based on screen size)
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        // Don't re-render during drag or pan
        if (!isDragging && !isPanningCanvas) {
          renderWidgets();
        }
      }, 300);
    });
  </script>
</body>
</html>
