<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudyFlow Suite Dashboard - Your study hub">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Dashboard - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #FAF8F5;
      min-height: 100vh;
      color: #2C2C2C;
      overflow: hidden;
    }

    /* Subtle texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(139, 157, 131, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(212, 196, 176, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Top right user menu */
    .top-nav {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      z-index: 100;
    }

    .nav-bell {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8B7E73;
      position: relative;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .nav-bell:hover {
      background: rgba(255, 255, 255, 0.9);
      color: #8B9D83;
      transform: translateY(-2px);
    }

    .nav-bell svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    .nav-bell-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D4A574;
      display: none;
    }

    .nav-bell-badge.visible {
      display: block;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #8B9D83, #7A8C73);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(139, 157, 131, 0.2);
    }

    .user-avatar:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(139, 157, 131, 0.3);
    }

    .user-menu {
      position: absolute;
      top: 56px;
      right: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(139, 126, 115, 0.1);
      min-width: 200px;
      padding: 8px;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 101;
    }

    .user-menu.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .user-menu-email {
      padding: 10px 14px;
      font-size: 12px;
      color: #8B7E73;
      border-bottom: 1px solid rgba(139, 126, 115, 0.08);
      margin-bottom: 6px;
      font-weight: 300;
    }

    .user-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: #2C2C2C;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      transition: background 0.2s;
    }

    .user-menu-item:hover {
      background: rgba(139, 157, 131, 0.06);
    }

    .user-menu-item.logout {
      color: #C97A7A;
    }

    .user-menu-item svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
    }

    /* Notification dropdown */
    .notif-dropdown {
      position: absolute;
      top: 56px;
      right: 56px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(139, 126, 115, 0.1);
      width: 360px;
      max-height: 420px;
      overflow-y: auto;
      padding: 12px;
      display: none;
      z-index: 101;
    }

    .notif-dropdown.active {
      display: block;
    }

    .notif-dropdown-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 8px;
    }

    .notif-dropdown-header h3 {
      font-size: 15px;
      font-weight: 500;
      color: #2C2C2C;
    }

    .notif-mark-all {
      background: none;
      border: none;
      color: #8B9D83;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 400;
    }

    .notif-item {
      padding: 12px;
      border-radius: 12px;
      display: flex;
      gap: 12px;
      transition: background 0.2s;
      margin-bottom: 4px;
    }

    .notif-item:hover {
      background: rgba(139, 157, 131, 0.04);
    }

    .notif-item.unread {
      background: rgba(139, 157, 131, 0.06);
    }

    .notif-item-msg {
      font-size: 13px;
      color: #2C2C2C;
      line-height: 1.5;
    }

    .notif-item-time {
      font-size: 11px;
      color: #9B8B7E;
      margin-top: 4px;
    }

    .notif-empty {
      padding: 32px;
      text-align: center;
      color: #9B8B7E;
      font-size: 13px;
      font-weight: 300;
    }

    /* Main canvas with widget grid */
    .canvas {
      position: relative;
      min-height: calc(100vh - 120px);
      padding: 80px 40px 120px;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      align-content: start;
    }

    /* Widget cards */
    .widget {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 126, 115, 0.12);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
      transition: all 0.3s ease;
      cursor: move;
      min-height: 200px;
      display: flex;
      flex-direction: column;
    }

    @media (max-width: 768px) {
      .widget {
        cursor: default;
      }
    }

    .widget:hover {
      box-shadow: 0 8px 24px rgba(139, 157, 131, 0.12);
      border-color: rgba(139, 157, 131, 0.2);
    }

    .widget.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(139, 126, 115, 0.08);
    }

    .widget-title {
      font-size: 16px;
      font-weight: 500;
      color: #2C2C2C;
    }

    .widget-remove {
      background: none;
      border: none;
      color: #9B8B7E;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 18px;
      line-height: 1;
      transition: all 0.2s;
      font-family: inherit;
    }

    .widget-remove:hover {
      background: rgba(201, 122, 122, 0.1);
      color: #C97A7A;
    }

    .widget-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Recent Conversations widget */
    .conv-item {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(139, 126, 115, 0.08);
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .conv-item:hover {
      background: rgba(139, 157, 131, 0.08);
      border-color: rgba(139, 157, 131, 0.15);
    }

    .conv-title {
      font-size: 14px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conv-time {
      font-size: 12px;
      color: #9B8B7E;
    }

    /* Quick Stats widget */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(139, 126, 115, 0.08);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 500;
      color: #8B9D83;
      display: block;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: #9B8B7E;
      font-weight: 400;
    }

    /* Upcoming Events widget */
    .event-item {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(139, 126, 115, 0.08);
      border-left: 3px solid #8B9D83;
    }

    .event-title {
      font-size: 14px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 4px;
    }

    .event-time {
      font-size: 12px;
      color: #9B8B7E;
    }

    /* Study Groups widget */
    .group-item {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(139, 126, 115, 0.08);
      transition: all 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .group-item:hover {
      background: rgba(139, 157, 131, 0.08);
      border-color: rgba(139, 157, 131, 0.15);
    }

    .group-name {
      font-size: 14px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 4px;
    }

    .group-activity {
      font-size: 12px;
      color: #9B8B7E;
    }

    /* Quick Launch widget */
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .quick-action-btn {
      background: linear-gradient(135deg, rgba(139, 157, 131, 0.1), rgba(139, 157, 131, 0.05));
      border: 1px solid rgba(139, 157, 131, 0.2);
      border-radius: 12px;
      padding: 20px 16px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      color: inherit;
    }

    .quick-action-btn:hover {
      background: linear-gradient(135deg, #8B9D83, #7A8C73);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(139, 157, 131, 0.2);
    }

    .quick-action-btn:hover svg {
      stroke: white;
    }

    .quick-action-btn:hover .quick-action-label {
      color: white;
    }

    .quick-action-btn svg {
      width: 24px;
      height: 24px;
      stroke: #8B9D83;
      fill: none;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }

    .quick-action-label {
      font-size: 13px;
      font-weight: 500;
      color: #2C2C2C;
      transition: all 0.3s ease;
    }

    /* Add widget button */
    .add-widget-btn {
      position: fixed;
      top: 24px;
      left: 24px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8B9D83;
      font-size: 24px;
      font-weight: 300;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      z-index: 100;
    }

    .add-widget-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(139, 157, 131, 0.15);
    }

    /* Widget picker modal */
    .widget-picker {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1001;
    }

    .widget-picker.active {
      display: flex;
    }

    .widget-picker-content {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(30px);
      border-radius: 20px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    }

    .widget-picker-title {
      font-size: 20px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 20px;
    }

    .widget-option {
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(139, 126, 115, 0.12);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .widget-option:hover {
      background: rgba(139, 157, 131, 0.08);
      border-color: rgba(139, 157, 131, 0.2);
    }

    .widget-option.coming-soon {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .widget-option.coming-soon:hover {
      background: rgba(255, 255, 255, 0.5);
      border-color: rgba(139, 126, 115, 0.12);
    }

    .widget-option-info {
      flex: 1;
    }

    .widget-option-name {
      font-size: 15px;
      font-weight: 500;
      color: #2C2C2C;
      margin-bottom: 4px;
    }

    .widget-option-desc {
      font-size: 12px;
      color: #9B8B7E;
    }

    .widget-option-add {
      background: linear-gradient(135deg, #8B9D83, #7A8C73);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .widget-option-add:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(139, 157, 131, 0.3);
    }

    .widget-option-add:disabled {
      background: #E8E5E1;
      cursor: not-allowed;
      transform: none;
    }

    .empty-state {
      text-align: center;
      color: #9B8B7E;
      font-size: 14px;
      padding: 40px 20px;
    }

    /* Mac-style dock */
    .dock {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(139, 126, 115, 0.12);
      border-radius: 24px;
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
      z-index: 1000;
    }

    .dock-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .dock-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
      border: 1px solid rgba(139, 157, 131, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .dock-item:hover .dock-icon {
      transform: translateY(-12px) scale(1.1);
      background: linear-gradient(135deg, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0.9));
      border-color: rgba(139, 157, 131, 0.25);
      box-shadow: 0 8px 24px rgba(139, 157, 131, 0.15);
    }

    .dock-icon svg {
      width: 26px;
      height: 26px;
      stroke: #8B9D83;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all 0.3s ease;
    }

    .dock-item:hover .dock-icon svg {
      stroke: #7A8C73;
    }

    .dock-label {
      position: absolute;
      bottom: -32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 400;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .dock-item:hover .dock-label {
      opacity: 1;
    }

    /* Divider in dock */
    .dock-divider {
      width: 1px;
      height: 48px;
      background: rgba(139, 126, 115, 0.15);
      margin: 0 4px;
      align-self: center;
    }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .top-nav {
        top: 16px;
        right: 16px;
        gap: 8px;
      }

      .nav-bell,
      .user-avatar {
        width: 40px;
        height: 40px;
      }

      .add-widget-btn {
        top: 16px;
        left: 16px;
        width: 40px;
        height: 40px;
      }

      .canvas {
        padding: 70px 16px 100px;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .widget {
        min-height: auto;
        padding: 16px;
      }

      .widget-header {
        margin-bottom: 12px;
        padding-bottom: 10px;
      }

      .widget-title {
        font-size: 15px;
      }

      .stat-grid {
        gap: 10px;
      }

      .stat-box {
        padding: 14px 12px;
      }

      .stat-value {
        font-size: 24px;
      }

      .stat-label {
        font-size: 11px;
      }

      .quick-actions {
        gap: 10px;
      }

      .quick-action-btn {
        padding: 16px 12px;
      }

      .quick-action-btn svg {
        width: 20px;
        height: 20px;
      }

      .quick-action-label {
        font-size: 12px;
      }

      .conv-item,
      .event-item,
      .group-item {
        padding: 10px;
        margin-bottom: 6px;
      }

      .conv-title,
      .event-title,
      .group-name {
        font-size: 13px;
      }

      .conv-time,
      .event-time,
      .group-activity {
        font-size: 11px;
      }

      .dock {
        bottom: 12px;
        left: 12px;
        right: 12px;
        transform: none;
        padding: 10px 16px;
        gap: 6px;
        border-radius: 20px;
        overflow-x: auto;
        overflow-y: hidden;
        justify-content: flex-start;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .dock::-webkit-scrollbar {
        display: none;
      }

      .dock-icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        flex-shrink: 0;
      }

      .dock-icon svg {
        width: 22px;
        height: 22px;
      }

      .dock-item {
        flex-shrink: 0;
      }

      .dock-item:hover .dock-icon {
        transform: translateY(-8px) scale(1.05);
      }

      .dock-label {
        bottom: -28px;
        font-size: 11px;
        padding: 5px 10px;
      }

      .dock-divider {
        flex-shrink: 0;
      }

      .notif-dropdown {
        right: 8px;
        width: calc(100vw - 16px);
        max-height: 60vh;
      }

      .widget-picker-content {
        padding: 24px;
        max-width: 90%;
      }

      .widget-picker-title {
        font-size: 18px;
        margin-bottom: 16px;
      }

      .widget-option {
        padding: 14px;
      }

      .widget-option-name {
        font-size: 14px;
      }

      .widget-option-desc {
        font-size: 11px;
      }

      .widget-option-add {
        padding: 7px 14px;
        font-size: 12px;
      }

      .widget-remove {
        padding: 6px 10px;
        font-size: 20px;
        min-width: 32px;
        min-height: 32px;
      }

      .empty-state {
        padding: 30px 16px;
        font-size: 13px;
      }
    }

    /* Extra small screens */
    @media (max-width: 480px) {
      .canvas {
        padding: 60px 12px 90px;
      }

      .stat-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .stat-box {
        padding: 12px;
      }

      .quick-actions {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .dock {
        left: 8px;
        right: 8px;
        bottom: 8px;
        padding: 8px 12px;
        gap: 4px;
      }

      .dock-icon {
        width: 44px;
        height: 44px;
      }

      .dock-icon svg {
        width: 20px;
        height: 20px;
      }

      .dock-divider {
        height: 40px;
      }
    }

    /* Very narrow screens (Fold outer screen) */
    @media (max-width: 380px) {
      .dock {
        left: 6px;
        right: 6px;
        bottom: 6px;
        padding: 6px 10px;
        gap: 3px;
      }

      .dock-icon {

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let authToken = '';
    let currentUser = null;

    // Auth check
    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = session.user;
      authToken = session.access_token;

      document.getElementById('userAvatar').textContent = (currentUser.email || 'U').charAt(0).toUpperCase();
      document.getElementById('menuEmail').textContent = currentUser.email;

      loadNotifications();
    }

    // Notifications
    let notifData = [];
    let pendingInvites = [];

    async function loadNotifications() {
      try {
        const [notifRes, inviteRes] = await Promise.all([
          fetch(BACKEND_URL + '/api/notifications', { headers: { 'Authorization': 'Bearer ' + authToken } }),
          fetch(BACKEND_URL + '/api/groups/invites', { headers: { 'Authorization': 'Bearer ' + authToken } })
        ]);

        if (notifRes.ok) {
          const d = await notifRes.json();
          notifData = d.notifications || [];
        }
        if (inviteRes.ok) {
          const d = await inviteRes.json();
          pendingInvites = d.invites || [];
        }
        renderNotifications();
      } catch (e) {
        console.error('Load notifications error:', e);
      }
    }

    function timeAgo(dateStr) {
      const now = new Date();
      const d = new Date(dateStr);
      const secs = Math.floor((now - d) / 1000);
      if (secs < 60) return 'just now';
      const mins = Math.floor(secs / 60);
      if (mins < 60) return mins + 'm ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + 'h ago';
      const days = Math.floor(hrs / 24);
      if (days < 7) return days + 'd ago';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function renderNotifications() {
      const list = document.getElementById('notifList');
      const badge = document.getElementById('notifBadge');
      const items = [];

      pendingInvites.forEach(inv => {
        items.push(`<div class="notif-item unread">
          <div style="flex:1;">
            <div class="notif-item-msg">@${inv.invited_by} invited you to '${inv.group_name}'</div>
            <div class="notif-item-time">${timeAgo(inv.created_at)}</div>
            <div style="display:flex;gap:8px;margin-top:8px;">
              <button onclick="respondInvite('${inv.id}','accept')" style="flex:1;padding:8px;background:linear-gradient(135deg,#8B9D83,#7A8C73);color:white;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;">Accept</button>
              <button onclick="respondInvite('${inv.id}','decline')" style="flex:1;padding:8px;background:none;border:1px solid rgba(155,139,126,0.3);color:#9B8B7E;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;">Decline</button>
            </div>
          </div>
        </div>`);
      });

      notifData.filter(n => n.type !== 'group_invite').slice(0, 8).forEach(n => {
        items.push(`<div class="notif-item ${n.is_read ? '' : 'unread'}">
          <div>
            <div class="notif-item-msg">${n.message || n.title}</div>
            <div class="notif-item-time">${timeAgo(n.created_at)}</div>
          </div>
        </div>`);
      });

      if (!items.length) {
        list.innerHTML = '<div class="notif-empty">No notifications</div>';
        badge.classList.remove('visible');
      } else {
        list.innerHTML = items.join('');
        const unread = notifData.filter(n => !n.is_read).length + pendingInvites.length;
        if (unread > 0) badge.classList.add('visible');
        else badge.classList.remove('visible');
      }
    }

    async function respondInvite(inviteId, action) {
      try {
        await fetch(`${BACKEND_URL}/api/groups/invites/${inviteId}/${action}`, {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        pendingInvites = pendingInvites.filter(i => i.id !== inviteId);
        renderNotifications();
      } catch (e) {
        console.error('Respond invite error:', e);
      }
    }

    async function markAllRead() {
      try {
        await fetch(BACKEND_URL + '/api/notifications/read', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + authToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ all: true })
        });
        notifData.forEach(n => n.is_read = true);
        renderNotifications();
      } catch (e) {
        console.error('Mark all read error:', e);
      }
    }

    // UI interactions
    function toggleUserMenu() {
      document.getElementById('userMenu').classList.toggle('show');
      document.getElementById('notifDropdown').classList.remove('active');
    }

    document.getElementById('notifBell').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('notifDropdown').classList.toggle('active');
      document.getElementById('userMenu').classList.remove('show');
    });

    document.getElementById('notifMarkAll').addEventListener('click', (e) => {
      e.stopPropagation();
      markAllRead();
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#userMenu') && !e.target.closest('#userAvatar')) {
        document.getElementById('userMenu').classList.remove('show');
      }
      if (!e.target.closest('#notifDropdown') && !e.target.closest('#notifBell')) {
        document.getElementById('notifDropdown').classList.remove('active');
      }
    });

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = 'index.html';
    }

    init();

    // ======= WIDGET SYSTEM =======
    const WIDGET_TYPES = {
      recentConversations: {
        name: 'Recent Conversations',
        desc: 'Your latest AI chat sessions',
        render: renderRecentConversations,
        comingSoon: false
      },
      quickStats: {
        name: 'Quick Stats',
        desc: 'Your study progress at a glance',
        render: renderQuickStats,
        comingSoon: true
      },
      upcomingEvents: {
        name: 'Upcoming Events',
        desc: 'Calendar events and deadlines',
        render: renderUpcomingEvents,
        comingSoon: false
      },
      studyGroups: {
        name: 'Study Groups',
        desc: 'Active group activity',
        render: renderStudyGroups,
        comingSoon: false
      },
      quickLaunch: {
        name: 'Quick Launch',
        desc: 'Fast access to common actions',
        render: renderQuickLaunch,
        comingSoon: true
      }
    };

    let activeWidgets = [];

    // Load widgets from backend (per-user)
    async function loadWidgets() {
      const DEFAULT_WIDGETS = ['recentConversations', 'upcomingEvents', 'studyGroups'];

      try {
        const res = await fetch(BACKEND_URL + '/api/user/dashboard-layout', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });

        if (res.ok) {
          const data = await res.json();
          activeWidgets = data.layout || DEFAULT_WIDGETS;
        } else {
          // Fallback to default
          activeWidgets = DEFAULT_WIDGETS;
        }
      } catch (e) {
        console.error('Load widgets error:', e);
        // Try localStorage fallback for migration
        const saved = localStorage.getItem('dashboardWidgets');
        if (saved) {
          activeWidgets = JSON.parse(saved);
          // Filter out coming soon widgets
          activeWidgets = activeWidgets.filter(id => !WIDGET_TYPES[id]?.comingSoon);
          // Save to backend
          await saveWidgets();
          // Clear localStorage
          localStorage.removeItem('dashboardWidgets');
        } else {
          activeWidgets = DEFAULT_WIDGETS;
        }
      }
      renderWidgets();
    }

    async function saveWidgets() {
      try {
        await fetch(BACKEND_URL + '/api/user/dashboard-layout', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + authToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ layout: activeWidgets })
        });
      } catch (e) {
        console.error('Save widgets error:', e);
      }
    }

    function renderWidgets() {
      const canvas = document.getElementById('canvas');
      canvas.innerHTML = '';

      if (activeWidgets.length === 0) {
        canvas.innerHTML = '<div class="empty-state">Click the + button to add widgets</div>';
        return;
      }

      const isMobile = window.innerWidth <= 768;

      activeWidgets.forEach((widgetId, index) => {
        const widgetDef = WIDGET_TYPES[widgetId];
        if (!widgetDef) return;

        const widget = document.createElement('div');
        widget.className = 'widget';
        widget.draggable = !isMobile; // Disable dragging on mobile
        widget.dataset.widgetId = widgetId;
        widget.dataset.index = index;

        // Update cursor style for mobile
        if (isMobile) {
          widget.style.cursor = 'default';
        }

        widget.innerHTML = `
          <div class="widget-header">
            <div class="widget-title">${widgetDef.name}</div>
            <button class="widget-remove" onclick="removeWidget('${widgetId}')">×</button>
          </div>
          <div class="widget-content" id="widget-${widgetId}">
            <div style="text-align:center;padding:20px;color:#9B8B7E;">Loading...</div>
          </div>
        `;

        // Drag events (only on desktop)
        if (!isMobile) {
          widget.addEventListener('dragstart', (e) => {
            widget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', index);
          });

          widget.addEventListener('dragend', () => {
            widget.classList.remove('dragging');
          });

          widget.addEventListener('dragover', (e) => {
            e.preventDefault();
            const dragging = document.querySelector('.dragging');
            if (dragging && dragging !== widget) {
              const rect = widget.getBoundingClientRect();
              const midpoint = rect.left + rect.width / 2;
              if (e.clientX < midpoint) {
                canvas.insertBefore(dragging, widget);
              } else {
                canvas.insertBefore(dragging, widget.nextSibling);
              }
            }
          });

          widget.addEventListener('drop', async (e) => {
            e.preventDefault();
            const widgets = Array.from(canvas.querySelectorAll('.widget'));
            activeWidgets = widgets.map(w => w.dataset.widgetId);
            await saveWidgets();
          });
        }

        canvas.appendChild(widget);

        // Render widget content
        setTimeout(() => widgetDef.render(widgetId), 100);
      });
    }

    async function removeWidget(widgetId) {
      activeWidgets = activeWidgets.filter(id => id !== widgetId);
      await saveWidgets();
      renderWidgets();
    }

    // Widget picker
    document.getElementById('addWidgetBtn').addEventListener('click', () => {
      document.getElementById('widgetPicker').classList.add('active');
      renderWidgetOptions();
    });

    document.getElementById('widgetPicker').addEventListener('click', (e) => {
      if (e.target.id === 'widgetPicker') {
        document.getElementById('widgetPicker').classList.remove('active');
      }
    });

    function renderWidgetOptions() {
      const container = document.getElementById('widgetOptions');
      container.innerHTML = '';

      Object.entries(WIDGET_TYPES).forEach(([id, widget]) => {
        const isAdded = activeWidgets.includes(id);
        const isComingSoon = widget.comingSoon;
        const option = document.createElement('div');
        option.className = 'widget-option' + (isComingSoon ? ' coming-soon' : '');
        option.innerHTML = `
          <div class="widget-option-info">
            <div class="widget-option-name">${widget.name}${isComingSoon ? ' <span style="font-size:11px;color:#9B8B7E;font-weight:400;">(Coming Soon)</span>' : ''}</div>
            <div class="widget-option-desc">${widget.desc}</div>
          </div>
          <button class="widget-option-add" onclick="addWidget('${id}')" ${isAdded || isComingSoon ? 'disabled' : ''}>
            ${isComingSoon ? 'Coming Soon' : isAdded ? 'Added' : 'Add'}
          </button>
        `;
        container.appendChild(option);
      });
    }

    async function addWidget(widgetId) {
      const widgetDef = WIDGET_TYPES[widgetId];
      if (!activeWidgets.includes(widgetId) && widgetDef && !widgetDef.comingSoon) {
        activeWidgets.push(widgetId);
        await saveWidgets();
        renderWidgets();
        renderWidgetOptions();
      }
    }

    // ======= WIDGET RENDERERS =======

    async function renderRecentConversations(widgetId) {
      const container = document.getElementById(`widget-${widgetId}`);
      try {
        const res = await fetch(BACKEND_URL + '/api/conversations', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });

        if (!res.ok) throw new Error('Failed to load');

        const data = await res.json();
        const conversations = data.conversations || [];

        if (conversations.length === 0) {
          container.innerHTML = '<div class="empty-state">No conversations yet</div>';
          return;
        }

        container.innerHTML = conversations.slice(0, 5).map(conv => `
          <a href="chat.html?id=${conv.id}" class="conv-item">
            <div class="conv-title">${conv.title || 'Untitled Chat'}</div>
            <div class="conv-time">${timeAgo(conv.updated_at || conv.created_at)}</div>
          </a>
        `).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">Error loading conversations</div>';
      }
    }

    async function renderQuickStats(widgetId) {
      const container = document.getElementById(`widget-${widgetId}`);
      try {
        // Fetch user stats from backend
        const res = await fetch(BACKEND_URL + '/api/user/stats', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });

        let stats = {
          questions_answered: 0,
          study_streak: 0,
          total_time: 0,
          flashcards_reviewed: 0
        };

        if (res.ok) {
          const data = await res.json();
          stats = { ...stats, ...data };
        }

        container.innerHTML = `
          <div class="stat-grid">
            <div class="stat-box">
              <span class="stat-value">${stats.questions_answered || 0}</span>
              <span class="stat-label">Questions</span>
            </div>
            <div class="stat-box">
              <span class="stat-value">${stats.study_streak || 0}</span>
              <span class="stat-label">Day Streak</span>
            </div>
            <div class="stat-box">
              <span class="stat-value">${Math.floor((stats.total_time || 0) / 60)}h</span>
              <span class="stat-label">Study Time</span>
            </div>
            <div class="stat-box">
              <span class="stat-value">${stats.flashcards_reviewed || 0}</span>
              <span class="stat-label">Cards</span>
            </div>
          </div>
        `;
      } catch (e) {
        container.innerHTML = '<div class="empty-state">Error loading stats</div>';
      }
    }

    async function renderUpcomingEvents(widgetId) {
      const container = document.getElementById(`widget-${widgetId}`);
      try {
        const res = await fetch(BACKEND_URL + '/api/calendar/upcoming', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });

        if (!res.ok) throw new Error('Failed to load');

        const data = await res.json();
        const events = data.events || [];

        if (events.length === 0) {
          container.innerHTML = '<div class="empty-state">No upcoming events</div>';
          return;
        }

        container.innerHTML = events.slice(0, 5).map(event => {
          const eventDate = new Date(event.event_date || event.start_date);
          const today = new Date();
          const daysUntil = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));

          let timeText = '';
          if (daysUntil === 0) timeText = 'Today';
          else if (daysUntil === 1) timeText = 'Tomorrow';
          else if (daysUntil < 7) timeText = `In ${daysUntil} days`;
          else timeText = eventDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

          return `
            <div class="event-item">
              <div class="event-title">${event.title || event.event_name}</div>
              <div class="event-time">${timeText}</div>
            </div>
          `;
        }).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">No events scheduled</div>';
      }
    }

    async function renderStudyGroups(widgetId) {
      const container = document.getElementById(`widget-${widgetId}`);
      try {
        const res = await fetch(BACKEND_URL + '/api/groups', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });

        if (!res.ok) throw new Error('Failed to load');

        const data = await res.json();
        const groups = data.groups || [];

        if (groups.length === 0) {
          container.innerHTML = '<div class="empty-state">No study groups yet</div>';
          return;
        }

        container.innerHTML = groups.slice(0, 5).map(group => {
          const lastActivity = group.last_message_at || group.created_at;
          return `
            <a href="study-groups.html?id=${group.id}" class="group-item">
              <div class="group-name">${group.name}</div>
              <div class="group-activity">${group.member_count || 0} members • ${timeAgo(lastActivity)}</div>
            </a>
          `;
        }).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">Error loading groups</div>';
      }
    }

    function renderQuickLaunch(widgetId) {
      const container = document.getElementById(`widget-${widgetId}`);
      container.innerHTML = `
        <div class="quick-actions">
          <a href="chat.html" class="quick-action-btn">
            <svg viewBox="0 0 24 24">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>

      await originalInit();
      await loadWidgets();

    // Re-render widgets on resize (to enable/disable dragging based on screen size)
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        renderWidgets();
