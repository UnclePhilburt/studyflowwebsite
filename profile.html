<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="User Profile - StudyFlow Suite">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Profile - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #FAF8F5;
      --bg-secondary: rgba(255, 255, 255, 0.6);
      --bg-tertiary: rgba(255, 255, 255, 0.9);
      --text-primary: #2C2C2C;
      --text-secondary: #8B7E73;
      --text-muted: #9B8B7E;
      --accent-primary: #8B9D83;
      --accent-secondary: #7A8C73;
      --border-color: rgba(139, 157, 131, 0.2);
      --hover-bg: rgba(139, 157, 131, 0.06);
      --shadow: rgba(0, 0, 0, 0.04);
      --card-bg: white;
    }

    body[data-theme="dark"], body[data-theme="midnight"],
    body[data-theme="ember"], body[data-theme="neon"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: rgba(40, 40, 40, 0.8);
      --bg-tertiary: rgba(40, 40, 40, 0.95);
      --text-primary: #e8e8e8;
      --text-secondary: #a0a0a0;
      --text-muted: #666;
      --accent-primary: #8B9D83;
      --accent-secondary: #7A8C73;
      --border-color: rgba(255, 255, 255, 0.1);
      --hover-bg: rgba(139, 157, 131, 0.1);
      --shadow: rgba(0, 0, 0, 0.3);
      --card-bg: #242424;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding-bottom: 100px;
      overflow-x: hidden;
    }

    html {
      overflow-x: hidden;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      width: 100%;
      overflow-x: hidden;
    }

    /* Banner */
    .profile-banner {
      height: 250px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      position: relative;
      overflow: hidden;
    }

    .profile-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .banner-upload {
      position: absolute;
      bottom: 16px;
      right: 16px;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    /* Profile Header */
    .profile-header {
      padding: 20px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 16px 16px;
      margin-bottom: 24px;
    }

    .profile-top {
      display: flex;
      gap: 20px;
      margin-top: -80px;
    }

    .profile-avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 5px solid var(--bg-primary);
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      position: relative;
      flex-shrink: 0;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .avatar-upload {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      font-size: 0;
      opacity: 0;
      transition: opacity 0.2s;
      border: none;
    }

    .profile-avatar:hover .avatar-upload,
    .avatar-upload:focus {
      opacity: 1;
    }

    .profile-info {
      flex: 1;
      padding-top: 60px;
    }

    .profile-name-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .profile-display-name {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .profile-username {
      font-size: 18px;
      color: var(--text-muted);
    }

    .profile-bio {
      font-size: 15px;
      color: var(--text-secondary);
      margin: 12px 0;
      line-height: 1.5;
    }

    .profile-stats {
      display: flex;
      gap: 24px;
      margin-top: 16px;
    }

    .stat {
      cursor: pointer;
      transition: all 0.2s;
    }

    .stat:hover {
      color: var(--accent-primary);
    }

    .stat-number {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-secondary);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--hover-bg);
    }

    .btn-danger {
      background: #e89b5f;
      color: white;
    }

    .btn-danger:hover {
      background: #d0633a;
    }

    /* Tablet and narrow devices */
    @media (max-width: 920px) {
      .container {
        padding: 0 16px;
      }

      .posts-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)) !important;
      }
    }

    /* Posts Grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .grid-post {
      aspect-ratio: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }

    .grid-post:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px var(--shadow);
    }

    .grid-post img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .grid-post-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    .grid-post-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0;
      transition: opacity 0.2s;
      color: white;
      font-weight: 600;
    }

    .grid-post:hover .grid-post-overlay {
      opacity: 1;
    }

    .grid-post-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.2s;
      z-index: 2;
    }

    .grid-post:hover .grid-post-delete {
      opacity: 1;
    }

    .grid-post-delete:hover {
      background: #ef4444;
      transform: scale(1.1);
    }

    .grid-post-menu {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .mobile-only {
      display: none !important;
    }

    .desktop-only {
      display: flex !important;
    }

    @media (max-width: 768px) {
      .mobile-only {
        display: flex !important;
      }

      .desktop-only {
        display: none !important;
      }

      .grid-post-menu {
        opacity: 1 !important;
      }
    }

    /* Post Menu Modal */
    .post-menu-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10000;
      align-items: flex-end;
      animation: fadeIn 0.2s;
    }

    .post-menu-modal.active {
      display: flex;
    }

    .post-menu-content {
      width: 100%;
      background: var(--card-bg);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      animation: slideUp 0.3s;
    }

    .post-menu-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .post-menu-option {
      padding: 16px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-size: 16px;
      color: var(--text-primary);
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.2s;
      font-family: inherit;
    }

    .post-menu-option:active {
      background: var(--hover-bg);
    }

    .post-menu-option.danger {
      color: #ef4444;
    }

    .post-menu-cancel {
      margin-top: 12px;
      padding: 16px;
      border: none;
      background: var(--bg-secondary);
      width: 100%;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      border-radius: 10px;
      font-family: inherit;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--bg-tertiary);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .modal-close:hover {
      background: var(--hover-bg);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      background: var(--card-bg);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-help {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* User List (Followers/Following) */
    .user-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      transition: all 0.2s;
    }

    .user-item:hover {
      background: var(--hover-bg);
    }

    .user-item-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-item-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .user-item-info {
      flex: 1;
    }

    .user-item-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .user-item-username {
      font-size: 13px;
      color: var(--text-muted);
    }

    .user-item-bio {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 50;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--hover-bg);
    }

    @media (max-width: 768px) {
      /* Container mobile */
      .container {
        padding: 0 12px;
      }

      /* Banner mobile */
      .profile-banner {
        height: 150px;
      }

      .banner-upload {
        bottom: 8px;
        right: 8px;
        padding: 6px 12px;
        font-size: 12px;
      }

      /* Profile header mobile */
      .profile-header {
        padding: 12px;
        margin-bottom: 16px;
      }

      .profile-top {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .profile-avatar {
        width: 100px;
        height: 100px;
        font-size: 36px;
        margin-top: -50px;
      }

      .avatar-upload {
        width: 32px;
        height: 32px;
        bottom: 2px;
        right: 2px;
      }

      .avatar-upload svg {
        width: 16px;
        height: 16px;
      }

      .profile-info {
        padding-top: 0;
        margin-top: 12px;
      }

      .profile-display-name {
        font-size: 20px;
      }

      .profile-username {
        font-size: 13px;
      }

      .profile-bio {
        font-size: 13px;
        margin: 8px 0;
      }

      /* Profile stats mobile - stack on very small screens */
      .profile-stats {
        gap: 16px;
        margin-top: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .stat-number {
        font-size: 16px;
      }

      .stat-label {
        font-size: 12px;
      }

      /* Profile actions mobile */
      .profile-actions {
        flex-direction: column;
        gap: 8px;
        margin-top: 12px;
      }

      .btn {
        width: 100%;
        padding: 10px 16px;
        font-size: 13px;
      }

      /* Badge display mobile */
      .profile-badges {
        margin-top: 12px;
      }

      .profile-badges span {
        font-size: 9px !important;
        padding: 2px 5px !important;
      }

      /* Tabs mobile */
      .tabs {
        margin-bottom: 16px;
        gap: 0;
      }

      .tab {
        padding: 12px 8px;
        font-size: 12px;
      }

      /* Posts grid mobile */
      .posts-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 8px;
      }

      .post-card {
        border-radius: 8px;
      }

      .post-card:hover {
        transform: none;
      }

      /* Stats tab mobile */
      .stats-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .stat-card {
        padding: 12px;
      }

      .stat-card-value {
        font-size: 20px;
      }

      .stat-card-label {
        font-size: 12px;
      }

      /* Modal mobile */
      .modal-content {
        width: 95%;
        max-width: 95%;
        margin: 10px;
        max-height: calc(100vh - 20px);
      }

      .modal-header {
        padding: 12px;
      }

      .modal-header h2 {
        font-size: 16px;
      }

      .modal-body {
        padding: 12px;
      }

      /* Followers/Following modal mobile */
      .user-list-item {
        padding: 10px;
      }

      .user-list-avatar {
        width: 36px;
        height: 36px;
        font-size: 14px;
      }

      .user-list-username {
        font-size: 13px;
      }

      .user-list-displayname {
        font-size: 12px;
      }

      /* Badge management modal mobile */
      .badge-item {
        padding: 10px;
      }

      .badge-icon-large {
        font-size: 20px;
        width: 36px;
        height: 36px;
      }

      .badge-details h4 {
        font-size: 13px;
      }

      .badge-details p {
        font-size: 11px;
      }

      .badge-tier {
        font-size: 9px;
        padding: 2px 6px;
      }

      /* Edit profile modal mobile */
      .edit-form label {
        font-size: 12px;
      }

      .edit-form input,
      .edit-form textarea {
        font-size: 13px;
        padding: 8px 12px;
      }

      /* Back button mobile */
      .back-btn {
        top: 12px;
        left: 12px;
        width: 36px;
        height: 36px;
        font-size: 20px;
      }
    }

    /* Extra small mobile devices */
    @media (max-width: 375px) {
      .profile-display-name {
        font-size: 18px;
      }

      .profile-username {
        font-size: 12px;
      }

      .profile-bio {
        font-size: 12px;
      }

      .profile-stats {
        gap: 12px;
      }

      .stat-number {
        font-size: 14px;
      }

      .stat-label {
        font-size: 11px;
      }

      .tab {
        padding: 10px 6px;
        font-size: 11px;
      }

      .posts-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">←</button>

  <!-- Hidden file inputs -->
  <input type="file" id="avatarFileInput" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" style="display: none;">
  <input type="file" id="bannerFileInput" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" style="display: none;">

  <div class="profile-banner" id="banner">
    <button class="banner-upload" id="bannerUploadBtn" style="display: none;" onclick="uploadBanner()">Change Banner</button>
  </div>

  <div class="container">
    <div class="profile-header">
      <div class="profile-top">
        <div class="profile-avatar" id="avatar">
          <button class="avatar-upload" id="avatarUploadBtn" style="display: none;" onclick="uploadAvatar()" aria-label="Change profile picture"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
        </div>
        <div class="profile-info">
          <div class="profile-name-row">
            <h1 class="profile-display-name" id="displayName">Loading...</h1>
          </div>
          <div class="profile-username" id="username">@username</div>
          <p class="profile-bio" id="bio">No bio yet</p>
          <div id="profileBadges" style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;"></div>
          <div class="profile-stats">
            <div class="stat" onclick="showFollowers()">
              <div class="stat-number" id="followersCount">0</div>
              <div class="stat-label">Followers</div>
            </div>
            <div class="stat" onclick="showFollowing()">
              <div class="stat-number" id="followingCount">0</div>
              <div class="stat-label">Following</div>
            </div>
            <div class="stat">
              <div class="stat-number" id="postsCount">0</div>
              <div class="stat-label">Posts</div>
            </div>
            <div class="stat">
              <div class="stat-number" id="upvotesCount">0</div>
              <div class="stat-label">Upvotes</div>
            </div>
          </div>
          <div class="profile-actions" id="profileActions"></div>
        </div>
      </div>
    </div>

    <!-- Profile Tabs -->
    <div id="profileTabs" style="border-bottom:1px solid var(--border-color);margin-bottom:16px;">
      <div style="display:flex;gap:0;">
        <button class="profile-tab active" onclick="switchProfileTab('posts', this)" style="flex:1;padding:12px;border:none;background:none;font-size:14px;font-weight:600;color:var(--text-primary);cursor:pointer;border-bottom:2px solid var(--accent-primary);font-family:inherit;">Posts</button>
        <button class="profile-tab" id="savedTab" onclick="switchProfileTab('saved', this)" style="flex:1;padding:12px;border:none;background:none;font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;display:none;">Saved</button>
        <button class="profile-tab" onclick="switchProfileTab('stats', this)" style="flex:1;padding:12px;border:none;background:none;font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;">Stats</button>
      </div>
    </div>

    <!-- Posts Grid -->
    <div id="postsContainer">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading posts...</p>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal" id="editProfileModal">

      <div class="modal-header">
        <h2>Edit Profile</h2>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <form id="editProfileForm">
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="editDisplayName" maxlength="50">
          <div class="form-help">Max 50 characters</div>
        </div>
        <div class="form-group">
          <label>Bio</label>
          <textarea id="editBio" maxlength="500"></textarea>
          <div class="form-help">Max 500 characters</div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Save Changes</button>
      </form>
    </div>
  </div>

  <!-- Followers/Following Modal -->
  <div class="modal" id="followersModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="followersModalTitle">Followers</h2>
        <button class="modal-close" onclick="closeFollowersModal()">✕</button>
      </div>
      <div id="followersListContainer">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading...</p>

  <!-- Badge Management Modal -->
  <div class="modal" id="badgeModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Manage Badges</h2>
        <button class="modal-close" onclick="closeBadgeModal()">✕</button>
      </div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Select up to 3 badges to display on your profile and posts</p>
      <div id="badgeSelection" style="display:grid;gap:12px;"></div>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border-color);">
        <button onclick="saveBadgeSelection()" class="btn btn-primary" style="width:100%;">Save Selection</button>
      </div>
    </div>
  </div>

  <script>(function(){const t=localStorage.getItem('dashboard-theme')||'default';document.body.setAttribute('data-theme',t);})();</script>
  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const supabaseUrl = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

    let currentUser = null;
    let authToken = null;
    let profileData = null;
    let viewingUsername = null;
    let userBadges = [];
    let equippedBadgeIds = [];
    let selectedBadges = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = session.user;
      authToken = session.access_token;

      // Get username from URL or use current user
      const urlParams = new URLSearchParams(window.location.search);
      viewingUsername = urlParams.get('user');

      if (!viewingUsername) {
        // Load current user's profile
        await loadCurrentUserProfile();
      } else {
        // Load specific user's profile
        await loadProfile(viewingUsername);
      }
    });

    // Load current user's profile
    async function loadCurrentUserProfile() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/user/profile`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Failed to load profile');

        const data = await response.json();
        viewingUsername = data.profile.username;
        await loadProfile(viewingUsername);
      } catch (error) {
        console.error('Error loading current user:', error);
      }
    }

    // Load profile
    async function loadProfile(username) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/social/profile/${username}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Profile not found');

        const data = await response.json();
        profileData = data.profile;
        renderProfile();
        loadPosts();
        loadProfileBadges();
      } catch (error) {
        console.error('Error loading profile:', error);
        document.querySelector('.profile-info').innerHTML = '<p>Profile not found</p>';
      }
    }

    // Render profile
    function renderProfile() {
      // Banner
      const banner = document.getElementById('banner');
      if (profileData.banner_url) {
        banner.innerHTML = `
          <img src="${profileData.banner_url}" alt="Banner">
          <button class="banner-upload" id="bannerUploadBtn" style="display: none;" onclick="uploadBanner()">Change Banner</button>
        `;
      }

      // Avatar
      const avatar = document.getElementById('avatar');
      if (profileData.avatar_url) {
        avatar.innerHTML = `
          <img src="${profileData.avatar_url}" alt="${profileData.username}">
          <button class="avatar-upload" id="avatarUploadBtn" style="display: none;" onclick="uploadAvatar()" aria-label="Change profile picture"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
        `;
      } else {
        const initial = (profileData.display_name || profileData.username || 'U')[0].toUpperCase();
        avatar.innerHTML = `
          ${initial}
          <button class="avatar-upload" id="avatarUploadBtn" style="display: none;" onclick="uploadAvatar()" aria-label="Change profile picture"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
        `;
      }

      // Info
      document.getElementById('displayName').innerHTML = (profileData.display_name || profileData.username) + (profileData.is_verified ? ' <svg width="18" height="18" viewBox="0 0 24 24" fill="#7c9885" style="vertical-align:-3px;"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' : '');
      document.getElementById('username').textContent = `@${profileData.username}`;
      document.getElementById('bio').textContent = profileData.bio || 'No bio yet';
      document.getElementById('followersCount').textContent = profileData.follower_count || 0;
      document.getElementById('followingCount').textContent = profileData.following_count || 0;
      document.getElementById('postsCount').textContent = profileData.post_count || 0;
      document.getElementById('upvotesCount').textContent = profileData.upvotes_received || 0;

      // Actions
      const actions = document.getElementById('profileActions');
      if (profileData.is_own_profile) {
        actions.innerHTML = `
          <button class="btn btn-primary" onclick="openEditModal()">Edit Profile</button>
          <button class="btn btn-secondary" onclick="openBadgeModal()">Manage Badges</button>
          <button class="btn btn-secondary" onclick="window.location.href='messages.html'">Messages</button>
        `;
        document.getElementById('avatarUploadBtn').style.display = 'flex';
        document.getElementById('bannerUploadBtn').style.display = 'block';
        document.getElementById('savedTab').style.display = 'block';
      } else {
        const followBtn = profileData.is_following
          ? `<button class="btn btn-danger" onclick="unfollowUser()">Unfollow</button>`
          : `<button class="btn btn-primary" onclick="followUser()">Follow</button>`;
        actions.innerHTML = `
          ${followBtn}
          <button class="btn btn-secondary" onclick="sendMessage()">Message</button>
        `;
      }
    }

    // Load posts
    async function loadPosts() {
      const container = document.getElementById('postsContainer');
      try {
        const response = await fetch(`${BACKEND_URL}/api/social/profile/${viewingUsername}/posts`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Failed to load posts');

        const data = await response.json();
        // Filter out stories (is_story === true)
        const posts = (data.posts || []).filter(p => !p.is_story);

        if (posts.length === 0) {
          const composerHtml = profileData.is_own_profile ? buildProfileComposer() : '';
          container.innerHTML = composerHtml + `
            <div class="empty-state">
              <div class="empty-state-icon">&#x1F4DD;</div>
              <h3>No posts yet</h3>
              <p>${profileData.is_own_profile ? 'Share your first note!' : 'This user hasnt posted anything yet'}</p>
            </div>
          `;
          const pt = document.getElementById('profilePostText');
          if (pt) setupMentionAutocomplete(pt);
          return;
        }

        // Sort pinned posts first
        posts.sort((a, b) => (b.is_pinned ? 1 : 0) - (a.is_pinned ? 1 : 0));

        const composerHtml = profileData.is_own_profile ? buildProfileComposer() : '';
        container.innerHTML = composerHtml + `<div class="posts-grid">${posts.map(renderGridPost).join('')}</div>`;
        // Attach mention autocomplete after composer is in DOM
        const profileTextarea = document.getElementById('profilePostText');
        if (profileTextarea) setupMentionAutocomplete(profileTextarea);
      } catch (error) {
        console.error('Error loading posts:', error);
        container.innerHTML = '<div class="empty-state"><p>Failed to load posts</p></div>';
      }
    }

    function buildProfileComposer() {
      const avatarUrl = profileData.avatar_url;
      const avatarHtml = avatarUrl
        ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
        : (profileData.display_name || profileData.username || 'U')[0].toUpperCase();

      return `
        <div style="background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:12px;padding:16px;margin-bottom:16px;">
          <div style="display:flex;gap:12px;">
            <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-primary);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden;margin-top:4px;">${avatarHtml}</div>
            <textarea id="profilePostText" placeholder="What's on your mind?" style="flex:1;padding:10px 0;border:none;background:none;color:var(--text-primary);font-size:15px;font-family:inherit;resize:none;outline:none;min-height:40px;max-height:200px;" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';updateProfilePostBtn();"></textarea>
          </div>
          <div id="profileAttachPreview" style="display:none;margin:12px 0 0 48px;border-radius:10px;overflow:hidden;background:var(--bg-primary);border:1px solid var(--border-color);position:relative;">
            <button onclick="removeProfileAttach()" style="position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(0,0,0,0.5);color:white;font-size:12px;cursor:pointer;z-index:2;">&#x2715;</button>
            <img id="profilePreviewImg" style="max-width:100%;max-height:200px;object-fit:contain;display:none;">
            <div id="profilePreviewFile" style="display:none;padding:16px;text-align:center;">
              <div style="font-size:28px;margin-bottom:4px;">&#x1F4C4;</div>
              <div id="profilePreviewName" style="font-size:12px;color:var(--text-muted);"></div>
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border-color);margin-left:48px;">
            <div style="display:flex;gap:4px;">
              <button onclick="document.getElementById('profileFileInput').click()" style="padding:6px 12px;border-radius:8px;border:1px solid var(--border-color);background:none;color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;">Upload</button>
              <input type="file" id="profileFileInput" accept=".pdf,.jpg,.jpeg,.png,.gif,.webp" style="display:none;" onchange="handleProfileFile(event)">
            </div>
            <button id="profilePostBtn" onclick="submitProfilePost()" style="padding:8px 20px;border-radius:8px;border:none;background:var(--accent-primary);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;opacity:0.5;" disabled>Post</button>
          </div>
        </div>
      `;
    }

    let profileFile = null;
    let profileUploadedNoteId = null;
    let profileUploading = false;

    function updateProfilePostBtn() {
      const hasText = (document.getElementById('profilePostText')?.value || '').trim().length > 0;
      const hasFile = profileFile || profileUploadedNoteId;
      const btn = document.getElementById('profilePostBtn');
      if (btn) { btn.disabled = !(hasText || hasFile); btn.style.opacity = (hasText || hasFile) ? '1' : '0.5'; }
    }

    function handleProfileFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (file.size > 10 * 1024 * 1024) { alert('Max 10MB'); return; }

      profileFile = file;
      const preview = document.getElementById('profileAttachPreview');
      preview.style.display = 'block';

      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('profilePreviewImg').src = e.target.result;
          document.getElementById('profilePreviewImg').style.display = 'block';
          document.getElementById('profilePreviewFile').style.display = 'none';
        };
        reader.readAsDataURL(file);
      } else {
        document.getElementById('profilePreviewImg').style.display = 'none';
        document.getElementById('profilePreviewFile').style.display = 'block';
        document.getElementById('profilePreviewName').textContent = file.name;
      }

      updateProfilePostBtn();

      profileUploading = true;
      const formData = new FormData();
      formData.append('file', file);
      formData.append('content_type', file.type.startsWith('image/') ? 'photo' : 'note');
      fetch(`${BACKEND_URL}/api/social/upload-note`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${authToken}` },
        body: formData
      }).then(r => r.json()).then(data => {
        profileUploadedNoteId = data.note_id;
        profileUploading = false;
      }).catch(() => { profileUploading = false; });
    }

    function removeProfileAttach() {
      profileFile = null;
      profileUploadedNoteId = null;
      document.getElementById('profileAttachPreview').style.display = 'none';
      document.getElementById('profileFileInput').value = '';
      updateProfilePostBtn();
    }

    async function submitProfilePost() {
      const text = (document.getElementById('profilePostText')?.value || '').trim();
      const btn = document.getElementById('profilePostBtn');
      if (!text && !profileFile && !profileUploadedNoteId) return;

      if (profileUploading) {
        btn.textContent = 'Uploading...'; btn.disabled = true;
        const check = setInterval(() => {
          if (!profileUploading) { clearInterval(check); doProfilePost(text, btn); }
        }, 200);
        return;
      }
      doProfilePost(text, btn);
    }

    async function doProfilePost(text, btn) {
      btn.disabled = true; btn.textContent = 'Posting...';
      try {
        const res = await fetch(`${BACKEND_URL}/api/social/posts`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            post_type: profileUploadedNoteId ? 'note' : 'text',
            text_content: text || null,
            note_id: profileUploadedNoteId || null
          })
        });
        if (res.ok) {
          document.getElementById('profilePostText').value = '';
          removeProfileAttach();
          if (window.sfToast) sfToast('Posted!', 'success');
          loadPosts();
        } else {
          if (window.sfToast) sfToast('Failed to post', 'error');
        }
      } catch { if (window.sfToast) sfToast('Failed to post', 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Post'; updateProfilePostBtn(); }
    }

    // ========== PROFILE TABS ==========
    let currentProfileTab = 'posts';

    function switchProfileTab(tab, btn) {
      currentProfileTab = tab;
      document.querySelectorAll('.profile-tab').forEach(t => {
        t.style.color = 'var(--text-muted)';
        t.style.borderBottomColor = 'transparent';
      });
      btn.style.color = 'var(--text-primary)';
      btn.style.borderBottomColor = 'var(--accent-primary)';

      if (tab === 'posts') {
        loadPosts();
      } else if (tab === 'saved') {
        loadSavedPosts();
      } else if (tab === 'stats') {
        loadStats();
      }
    }

    async function loadSavedPosts() {
      const container = document.getElementById('postsContainer');
      container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">Loading saved posts...</div>';

      try {
        const res = await fetch(`${BACKEND_URL}/api/social/bookmarks`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (!res.ok) throw new Error('Failed');
        const data = await res.json();
        const posts = data.posts || [];

        if (posts.length === 0) {
          container.innerHTML = `<div style="text-align:center;padding:60px 20px;">
            <div style="font-size:40px;margin-bottom:12px;">&#x2B50;</div>
            <h3 style="color:var(--text-primary);margin-bottom:8px;">No saved posts</h3>
            <p style="color:var(--text-muted);">Posts you save will appear here</p>
          </div>`;
          return;
        }

        container.innerHTML = `<div class="posts-grid">${posts.map(renderGridPost).join('')}</div>`;
      } catch (e) {
        container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">Failed to load saved posts</div>';
      }
    }

    async function loadStats() {
      const container = document.getElementById('postsContainer');
      container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);"><div class="spinner"></div><p>Loading stats...</p></div>';

      try {
        let statsData;

        // Try to fetch from stats endpoint
        try {
          const res = await fetch(`${BACKEND_URL}/api/social/profile/${viewingUsername}/stats`, {
            headers: { 'Authorization': `Bearer ${authToken}` }
          });

          if (res.ok) {
            const data = await res.json();
            statsData = data.stats || {};
          } else {
            // Endpoint exists but returned error, use fallback
            throw new Error('Stats endpoint not available');
          }
        } catch (fetchError) {
          // If endpoint doesn't exist or CORS error, use profileData stats
          console.log('Stats endpoint not available, using profile data');
          statsData = {
            total_posts: profileData.post_count || 0,
            total_upvotes_received: profileData.upvotes_received || 0,
            total_downvotes_received: profileData.downvotes_received || 0,
            total_comments_received: profileData.comments_received || 0,
            total_upvotes_given: profileData.upvotes_given || 0,
            total_comments_made: profileData.comments_made || 0,
            follower_count: profileData.follower_count || 0,
            following_count: profileData.following_count || 0,
            total_views: profileData.total_views || 0,
            total_bookmarks_received: profileData.total_bookmarks_received || 0,
            account_created_at: profileData.created_at || null,
            leaderboard_rank: profileData.leaderboard_rank || null,
            top_post: profileData.top_post || null,
            interests: profileData.interests || null
          };
        }

        const upvotesReceived = statsData.total_upvotes_received || 0;
        const totalPosts = statsData.total_posts || 0;
        const avgUpvotesPerPost = totalPosts > 0 ? (upvotesReceived / totalPosts).toFixed(1) : 0;

        // Calculate account age
        let accountAge = 'Unknown';
        if (statsData.account_created_at) {
          const createdDate = new Date(statsData.account_created_at);
          const now = new Date();
          const diffTime = Math.abs(now - createdDate);
          const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

          if (diffDays < 30) {
            accountAge = `${diffDays} day${diffDays !== 1 ? 's' : ''}`;
          } else if (diffDays < 365) {
            const months = Math.floor(diffDays / 30);
            accountAge = `${months} month${months !== 1 ? 's' : ''}`;
          } else {
            const years = Math.floor(diffDays / 365);
            const remainingMonths = Math.floor((diffDays % 365) / 30);
            accountAge = `${years} year${years !== 1 ? 's' : ''}${remainingMonths > 0 ? `, ${remainingMonths} month${remainingMonths !== 1 ? 's' : ''}` : ''}`;
          }
        }

        // Build Most Upvoted Post section
        let topPostHtml = '';
        if (statsData.top_post) {
          const post = statsData.top_post;
          const postPreview = post.text_content ? post.text_content.substring(0, 100) + (post.text_content.length > 100 ? '...' : '') : 'View post';
          topPostHtml = `
            <div style="background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:12px;padding:24px;margin-bottom:24px;">
              <h3 style="font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text-primary);">Most Upvoted Post</h3>
              <div onclick="window.location.href='post.html?id=${post.id}'" style="padding:16px;background:var(--bg-secondary);border-radius:10px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='var(--hover-bg)'" onmouseout="this.style.background='var(--bg-secondary)'">
                <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">
                  <div style="flex:1;color:var(--text-primary);font-size:14px;line-height:1.5;">${postPreview}</div>
                  <div style="margin-left:16px;font-weight:700;color:var(--accent-primary);font-size:18px;white-space:nowrap;">▲ ${post.score || post.upvotes || 0}</div>
                </div>
                <div style="font-size:12px;color:var(--text-muted);">Click to view post →</div>
              </div>
            </div>
          `;
        }

        // Build Interests section
        let interestsHtml = '';
        if (statsData.interests && statsData.interests.subjects && statsData.interests.subjects.length > 0) {
          const subjects = statsData.interests.subjects.slice(0, 5);
          interestsHtml = `
            <div style="background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:12px;padding:24px;margin-bottom:24px;">
              <h3 style="font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text-primary);">Studying</h3>
              ${statsData.interests.degree ? `<div style="margin-bottom:12px;font-size:15px;color:var(--text-primary);font-weight:500;">📚 ${statsData.interests.degree}</div>` : ''}
              <div style="display:flex;flex-wrap:wrap;gap:8px;">
                ${subjects.map(s => `<span style="padding:6px 14px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:20px;font-size:13px;color:var(--text-primary);">${s}</span>`).join('')}
              </div>
            </div>
          `;
        }

        // Build Leaderboard Rank section
        let leaderboardHtml = '';

    // ========== MENTION AUTOCOMPLETE ==========
    let mentionDropdown = null;
    let mentionTarget = null;
    let mentionStartPos = -1;

    function setupMentionAutocomplete(textarea) {
      textarea.addEventListener('input', () => handleMentionInput(textarea));
      textarea.addEventListener('keydown', (e) => {
        if (!mentionDropdown || mentionDropdown.style.display === 'none') return;
        if (e.key === 'Enter' || e.key === 'Tab') {
          e.preventDefault();
          const first = mentionDropdown.querySelector('[data-username]');
          if (first) selectMention(first.dataset.username);
        } else if (e.key === 'Escape') { hideMentionDropdown(); }
      });
      textarea.addEventListener('blur', () => setTimeout(hideMentionDropdown, 200));
    }

    function handleMentionInput(textarea) {
      const val = textarea.value;
      const pos = textarea.selectionStart;
      const match = val.substring(0, pos).match(/@(\w*)$/);
      if (!match) { hideMentionDropdown(); return; }
      mentionTarget = textarea;
      mentionStartPos = pos - match[1].length - 1;
      showMentionSuggestions(match[1], textarea);
    }

    async function showMentionSuggestions(query, textarea) {
      if (query.length < 1) { hideMentionDropdown(); return; }
      let suggestions = [];
      try {
        const res = await fetch(`${BACKEND_URL}/api/social/search/users?q=${encodeURIComponent(query)}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (res.ok) {
          const data = await res.json();
          suggestions = (data.users || []).slice(0, 8).map(u => ({
            username: u.username, display_name: u.display_name, avatar_url: u.avatar_url
          }));
        }
      } catch {}
      if (suggestions.length === 0) { hideMentionDropdown(); return; }

      if (!mentionDropdown) {
        mentionDropdown = document.createElement('div');
        mentionDropdown.style.cssText = 'position:absolute;background:var(--bg-tertiary,white);border:1px solid var(--border-color);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.12);max-height:240px;overflow-y:auto;z-index:300;width:250px;';
        document.body.appendChild(mentionDropdown);
      }
      const rect = textarea.getBoundingClientRect();
      mentionDropdown.style.left = rect.left + 'px';
      mentionDropdown.style.top = (rect.bottom + window.scrollY + 4) + 'px';
      mentionDropdown.style.display = 'block';

      mentionDropdown.innerHTML = suggestions.map(s => {
        const av = s.avatar_url
          ? `<img src="${s.avatar_url}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">`
          : `<div style="width:28px;height:28px;border-radius:50%;background:var(--accent-primary);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">${(s.username||'?')[0].toUpperCase()}</div>`;
        return `<div data-username="${s.username}" onmousedown="selectMention('${s.username}')" style="display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;" onmouseover="this.style.background='var(--hover-bg)'" onmouseout="this.style.background=''">
          ${av}<div><div style="font-size:13px;font-weight:600;color:var(--text-primary);">@${s.username}</div>${s.display_name ? `<div style="font-size:11px;color:var(--text-muted);">${s.display_name}</div>` : ''}</div></div>`;
      }).join('');
    }

    function selectMention(username) {
      if (!mentionTarget || mentionStartPos === -1) return;
      const val = mentionTarget.value;
      const pos = mentionTarget.selectionStart;
      mentionTarget.value = val.substring(0, mentionStartPos) + '@' + username + ' ' + val.substring(pos);
      const newPos = mentionStartPos + username.length + 2;
      mentionTarget.selectionStart = newPos;
      mentionTarget.selectionEnd = newPos;
      mentionTarget.focus();
      hideMentionDropdown();
      mentionTarget.dispatchEvent(new Event('input'));
    }

    function hideMentionDropdown() {
      if (mentionDropdown) mentionDropdown.style.display = 'none';
      mentionStartPos = -1;
    }

        });

        if (response.ok) {

          alert(err.error || 'Failed to delete post');

        console.error('Delete error:', e);
        alert('Failed to delete post');

          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ badge_ids: selectedBadges })
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to save badges');
        }

        closeBadgeModal();
        loadProfileBadges(); // Reload to show new badges
      } catch (error) {
        console.error('Error saving badges:', error);
        alert(error.message || 'Failed to save badge selection');
      }
    }

    function closeBadgeModal() {
      document.getElementById('badgeModal').classList.remove('active');
    }

    // Post menu for mobile
    let currentMenuPostId = null;

    function openPostMenu(postId) {
      currentMenuPostId = postId;
      document.getElementById('postMenuModal').classList.add('active');
    }

    function closePostMenu() {
      document.getElementById('postMenuModal').classList.remove('active');
      currentMenuPostId = null;
    }

    function editPostFromMenu() {
      if (!currentMenuPostId) return;
      closePostMenu();
      // Redirect to post page with edit mode
      window.location.href = `post.html?id=${currentMenuPostId}&edit=true`;
    }

    async function deletePostFromMenu() {
      if (!currentMenuPostId) return;
      closePostMenu();
      await deletePost(currentMenuPostId);
    }
  </script>

  <!-- Post Menu Modal for Mobile -->
  <div id="postMenuModal" class="post-menu-modal" onclick="if(event.target===this) closePostMenu()">
    <div class="post-menu-content">
      <div class="post-menu-title">Post Options</div>
      <button class="post-menu-option" onclick="editPostFromMenu()">Edit Post</button>
      <button class="post-menu-option danger" onclick="deletePostFromMenu()">Delete Post</button>
      <button class="post-menu-cancel" onclick="closePostMenu()">Cancel</button>
    </div>
  </div>

<script src="assets/notifications.js"></script>
</body>
</html>
