<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="User Profile - StudyFlow Suite">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Profile - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #FAF8F5;
      --bg-secondary: rgba(255, 255, 255, 0.6);
      --bg-tertiary: rgba(255, 255, 255, 0.9);
      --text-primary: #2C2C2C;
      --text-secondary: #8B7E73;
      --text-muted: #9B8B7E;
      --accent-primary: #8B9D83;
      --accent-secondary: #7A8C73;
      --border-color: rgba(139, 157, 131, 0.2);
      --hover-bg: rgba(139, 157, 131, 0.06);
      --shadow: rgba(0, 0, 0, 0.04);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      padding-bottom: 100px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* Banner */
    .profile-banner {
      height: 250px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      position: relative;
      overflow: hidden;
    }

    .profile-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .banner-upload {
      position: absolute;
      bottom: 16px;
      right: 16px;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    /* Profile Header */
    .profile-header {
      padding: 20px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 16px 16px;
      margin-bottom: 24px;
    }

    .profile-top {
      display: flex;
      gap: 20px;
      margin-top: -80px;
    }

    .profile-avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 5px solid var(--bg-primary);
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      position: relative;
      flex-shrink: 0;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .avatar-upload {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 36px;
      height: 36px;
      background: var(--accent-primary);
      border: 3px solid var(--bg-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .profile-info {
      flex: 1;
      padding-top: 60px;
    }

    .profile-name-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .profile-display-name {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .profile-username {
      font-size: 18px;
      color: var(--text-muted);
    }

    .profile-bio {
      font-size: 15px;
      color: var(--text-secondary);
      margin: 12px 0;
      line-height: 1.5;
    }

    .profile-stats {
      display: flex;
      gap: 24px;
      margin-top: 16px;
    }

    .stat {
      cursor: pointer;
      transition: all 0.2s;
    }

    .stat:hover {
      color: var(--accent-primary);
    }

    .stat-number {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-secondary);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--hover-bg);
    }

    .btn-danger {
      background: #e89b5f;
      color: white;
    }

    .btn-danger:hover {
      background: #d0633a;
    }

    /* Posts Grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .grid-post {
      aspect-ratio: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }

    .grid-post:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px var(--shadow);
    }

    .grid-post img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .grid-post-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      opacity: 0;
      transition: opacity 0.2s;
      color: white;
      font-weight: 600;
    }

    .grid-post:hover .grid-post-overlay {
      opacity: 1;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--bg-tertiary);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .modal-close:hover {
      background: var(--hover-bg);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      background: white;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-help {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* User List (Followers/Following) */
    .user-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      transition: all 0.2s;
    }

    .user-item:hover {
      background: var(--hover-bg);
    }

    .user-item-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-item-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .user-item-info {
      flex: 1;
    }

    .user-item-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .user-item-username {
      font-size: 13px;
      color: var(--text-muted);
    }

    .user-item-bio {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 50;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--hover-bg);
    }

    @media (max-width: 768px) {
      .profile-banner {
        height: 150px;
      }

      .profile-top {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .profile-avatar {
        width: 100px;
        height: 100px;
        font-size: 36px;
      }

      .profile-info {
        padding-top: 0;
      }

      .posts-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">←</button>

  <!-- Hidden file inputs -->
  <input type="file" id="avatarFileInput" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" style="display: none;">
  <input type="file" id="bannerFileInput" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" style="display: none;">

  <div class="profile-banner" id="banner">
    <button class="banner-upload" id="bannerUploadBtn" style="display: none;" onclick="uploadBanner()">Change Banner</button>
  </div>

  <div class="container">
    <div class="profile-header">
      <div class="profile-top">
        <div class="profile-avatar" id="avatar">
          <button class="avatar-upload" id="avatarUploadBtn" style="display: none;" onclick="uploadAvatar()">Upload</button>
        </div>
        <div class="profile-info">
          <div class="profile-name-row">
            <h1 class="profile-display-name" id="displayName">Loading...</h1>
          </div>
          <div class="profile-username" id="username">@username</div>
          <p class="profile-bio" id="bio">No bio yet</p>
          <div class="profile-stats">
            <div class="stat" onclick="showFollowers()">
              <div class="stat-number" id="followersCount">0</div>
              <div class="stat-label">Followers</div>
            </div>
            <div class="stat" onclick="showFollowing()">
              <div class="stat-number" id="followingCount">0</div>
              <div class="stat-label">Following</div>
            </div>
            <div class="stat">
              <div class="stat-number" id="postsCount">0</div>
              <div class="stat-label">Posts</div>
            </div>
          </div>
          <div class="profile-actions" id="profileActions"></div>
        </div>
      </div>
    </div>

    <!-- Posts Grid -->
    <div id="postsContainer">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading posts...</p>
      </div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal" id="editProfileModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Profile</h2>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <form id="editProfileForm">
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="editDisplayName" maxlength="50">
          <div class="form-help">Max 50 characters</div>
        </div>
        <div class="form-group">
          <label>Bio</label>
          <textarea id="editBio" maxlength="500"></textarea>
          <div class="form-help">Max 500 characters</div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Save Changes</button>
      </form>
    </div>
  </div>

  <!-- Followers/Following Modal -->
  <div class="modal" id="followersModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="followersModalTitle">Followers</h2>
        <button class="modal-close" onclick="closeFollowersModal()">✕</button>
      </div>
      <div id="followersListContainer">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const supabaseUrl = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

    let currentUser = null;
    let authToken = null;
    let profileData = null;
    let viewingUsername = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = session.user;
      authToken = session.access_token;

      // Get username from URL or use current user
      const urlParams = new URLSearchParams(window.location.search);
      viewingUsername = urlParams.get('user');

      if (!viewingUsername) {
        // Load current user's profile
        await loadCurrentUserProfile();
      } else {
        // Load specific user's profile
        await loadProfile(viewingUsername);
      }
    });

    // Load current user's profile
    async function loadCurrentUserProfile() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/user/profile`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Failed to load profile');

        const data = await response.json();
        viewingUsername = data.profile.username;
        await loadProfile(viewingUsername);
      } catch (error) {
        console.error('Error loading current user:', error);
      }
    }

    // Load profile
    async function loadProfile(username) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/social/profile/${username}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Profile not found');

        const data = await response.json();
        profileData = data.profile;
        renderProfile();
        loadPosts();
      } catch (error) {
        console.error('Error loading profile:', error);
        document.querySelector('.profile-info').innerHTML = '<p>Profile not found</p>';
      }
    }

    // Render profile
    function renderProfile() {
      // Banner
      const banner = document.getElementById('banner');
      if (profileData.banner_url) {
        banner.innerHTML = `
          <img src="${profileData.banner_url}" alt="Banner">
          <button class="banner-upload" id="bannerUploadBtn" style="display: none;" onclick="uploadBanner()">Change Banner</button>
        `;
      }

      // Avatar
      const avatar = document.getElementById('avatar');
      if (profileData.avatar_url) {
        avatar.innerHTML = `
          <img src="${profileData.avatar_url}" alt="${profileData.username}">
          <button class="avatar-upload" id="avatarUploadBtn" style="display: none;" onclick="uploadAvatar()">Upload</button>
        `;
      } else {
        const initial = (profileData.display_name || profileData.username || 'U')[0].toUpperCase();
        avatar.innerHTML = `
          ${initial}
          <button class="avatar-upload" id="avatarUploadBtn" style="display: none;" onclick="uploadAvatar()">Upload</button>
        `;
      }

      // Info
      document.getElementById('displayName').textContent = profileData.display_name || profileData.username;
      document.getElementById('username').textContent = `@${profileData.username}`;
      document.getElementById('bio').textContent = profileData.bio || 'No bio yet';
      document.getElementById('followersCount').textContent = profileData.follower_count || 0;
      document.getElementById('followingCount').textContent = profileData.following_count || 0;
      document.getElementById('postsCount').textContent = profileData.post_count || 0;

      // Actions
      const actions = document.getElementById('profileActions');
      if (profileData.is_own_profile) {
        actions.innerHTML = `
          <button class="btn btn-primary" onclick="openEditModal()">Edit Profile</button>
          <button class="btn btn-secondary" onclick="window.location.href='messages.html'">Messages</button>
        `;
        document.getElementById('avatarUploadBtn').style.display = 'flex';
        document.getElementById('bannerUploadBtn').style.display = 'block';
      } else {
        const followBtn = profileData.is_following
          ? `<button class="btn btn-danger" onclick="unfollowUser()">Unfollow</button>`
          : `<button class="btn btn-primary" onclick="followUser()">Follow</button>`;
        actions.innerHTML = `
          ${followBtn}
          <button class="btn btn-secondary" onclick="sendMessage()">Message</button>
        `;
      }
    }

    // Load posts
    async function loadPosts() {
      const container = document.getElementById('postsContainer');
      try {
        const response = await fetch(`${BACKEND_URL}/api/social/profile/${viewingUsername}/posts`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Failed to load posts');

        const data = await response.json();
        const posts = data.posts || [];

        if (posts.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">📝</div>
              <h3>No posts yet</h3>
              <p>${profileData.is_own_profile ? 'Share your first note!' : 'This user hasnt posted anything yet'}</p>
            </div>
          `;
          return;
        }

        container.innerHTML = `<div class="posts-grid">${posts.map(renderGridPost).join('')}</div>`;
      } catch (error) {
        console.error('Error loading posts:', error);
        container.innerHTML = '<div class="empty-state"><p>Failed to load posts</p></div>';
      }
    }

    // Render grid post
    function renderGridPost(post) {
      const thumbnail = post.notes?.thumbnail_url || 'https://via.placeholder.com/400?text=Post';
      return `
        <div class="grid-post" onclick="window.location.href='post.html?id=${post.id}'">
          <img src="${thumbnail}" alt="Post">
          <div class="grid-post-overlay">
            <span>▲ ${post.score || 0}</span>
            <span>💬 ${post.comment_count || 0}</span>
          </div>
        </div>
      `;
    }

    // Follow/Unfollow
    async function followUser() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/social/follow/${viewingUsername}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
          await loadProfile(viewingUsername);
        }
      } catch (error) {
        console.error('Error following user:', error);
      }
    }

    async function unfollowUser() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/social/unfollow/${viewingUsername}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (response.ok) {
          await loadProfile(viewingUsername);
        }
      } catch (error) {
        console.error('Error unfollowing user:', error);
      }
    }

    // Send message
    function sendMessage() {
      window.location.href = `messages.html?user=${viewingUsername}`;
    }

    // Edit profile
    function openEditModal() {
      document.getElementById('editDisplayName').value = profileData.display_name || '';
      document.getElementById('editBio').value = profileData.bio || '';
      document.getElementById('editProfileModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editProfileModal').classList.remove('active');
    }

    document.getElementById('editProfileForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const updateData = {
        display_name: document.getElementById('editDisplayName').value.trim() || null,
        bio: document.getElementById('editBio').value.trim() || null
      };

      try {
        const response = await fetch(`${BACKEND_URL}/api/social/profile`, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(updateData)
        });

        if (response.ok) {
          closeEditModal();
          await loadProfile(viewingUsername);
        } else {
          const error = await response.json();
          alert(error.error || 'Failed to update profile');
        }
      } catch (error) {
        console.error('Error updating profile:', error);
        alert('Failed to update profile');
      }
    });

    // Upload avatar
    function uploadAvatar() {
      const fileInput = document.getElementById('avatarFileInput');
      fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Check file size (5MB max)
        if (file.size > 5 * 1024 * 1024) {
          alert('File too large! Maximum 5MB for avatars');
          return;
        }

        // Upload file
        const formData = new FormData();
        formData.append('file', file);

        try {
          const response = await fetch(`${BACKEND_URL}/api/social/profile/avatar`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${authToken}` },
            body: formData
          });

          if (response.ok) {
            const data = await response.json();
            // Update avatar immediately
            const avatar = document.getElementById('avatar');
            avatar.innerHTML = `
              <img src="${data.avatar_url}" alt="Avatar">
              <button class="avatar-upload" id="avatarUploadBtn" style="display: flex;" onclick="uploadAvatar()">Upload</button>
            `;
            profileData.avatar_url = data.avatar_url;
          } else {
            const error = await response.json();
            alert(error.error || 'Failed to upload avatar');
          }
        } catch (error) {
          console.error('Error uploading avatar:', error);
          alert('Failed to upload avatar');
        }

        // Reset input
        fileInput.value = '';
      };
      fileInput.click();
    }

    // Upload banner
    function uploadBanner() {
      const fileInput = document.getElementById('bannerFileInput');
      fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Check file size (10MB max)
        if (file.size > 10 * 1024 * 1024) {
          alert('File too large! Maximum 10MB for banners');
          return;
        }

        // Upload file
        const formData = new FormData();
        formData.append('file', file);

        try {
          const response = await fetch(`${BACKEND_URL}/api/social/profile/banner`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${authToken}` },
            body: formData
          });

          if (response.ok) {
            const data = await response.json();
            // Update banner immediately
            const banner = document.getElementById('banner');
            banner.innerHTML = `
              <img src="${data.banner_url}" alt="Banner">
              <button class="banner-upload" id="bannerUploadBtn" style="display: block;" onclick="uploadBanner()">Change Banner</button>
            `;
            profileData.banner_url = data.banner_url;
          } else {
            const error = await response.json();
            alert(error.error || 'Failed to upload banner');
          }
        } catch (error) {
          console.error('Error uploading banner:', error);
          alert('Failed to upload banner');
        }

        // Reset input
        fileInput.value = '';
      };
      fileInput.click();
    }

    // Show followers/following
    async function showFollowers() {
      document.getElementById('followersModalTitle').textContent = 'Followers';
      document.getElementById('followersModal').classList.add('active');
      await loadFollowersList('followers');
    }

    async function showFollowing() {
      document.getElementById('followersModalTitle').textContent = 'Following';
      document.getElementById('followersModal').classList.add('active');
      await loadFollowersList('following');
    }

    function closeFollowersModal() {
      document.getElementById('followersModal').classList.remove('active');
    }

    async function loadFollowersList(type) {
      const container = document.getElementById('followersListContainer');
      container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';

      try {
        const endpoint = type === 'followers' ? 'followers' : 'following';
        const response = await fetch(`${BACKEND_URL}/api/social/profile/${viewingUsername}/${endpoint}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Failed to load list');

        const data = await response.json();
        const users = data[type] || [];

        if (users.length === 0) {
          container.innerHTML = `<div class="empty-state"><p>No ${type} yet</p></div>`;
          return;
        }

        container.innerHTML = `<div class="user-list">${users.map(renderUserItem).join('')}</div>`;
      } catch (error) {
        console.error('Error loading list:', error);
        container.innerHTML = '<div class="empty-state"><p>Failed to load list</p></div>';
      }
    }

    function renderUserItem(user) {
      const avatar = user.avatar_url
        ? `<img src="${user.avatar_url}" alt="${user.username}">`
        : user.username[0].toUpperCase();

      return `
        <div class="user-item" onclick="window.location.href='profile.html?user=${user.username}'">
          <div class="user-item-avatar">${avatar}</div>
          <div class="user-item-info">
            <div class="user-item-name">${user.display_name || user.username}</div>
            <div class="user-item-username">@${user.username}</div>
            ${user.bio ? `<div class="user-item-bio">${user.bio}</div>` : ''}
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
