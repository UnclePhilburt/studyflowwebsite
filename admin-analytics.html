<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Analytics - StudyFlow Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f4f0;
      color: #2d2d2d;
      min-height: 100vh;
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(248, 247, 244, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(124, 152, 133, 0.1);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      z-index: 100;
    }

    .header a {
      color: #7c9885;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .header h1 { font-size: 16px; font-weight: 600; }

    .content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 24px 40px;
    }

    /* Summary cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 14px;
      padding: 20px;
    }

    .summary-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 700;
      color: #2d2d2d;
      line-height: 1;
    }

    .summary-trend {
      font-size: 12px;
      font-weight: 500;
      margin-top: 8px;
    }

    .summary-trend.up { color: #7c9885; }
    .summary-trend.neutral { color: #9ca3af; }

    /* Chart sections */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .chart-card {
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 14px;
      padding: 20px;
    }

    .chart-card.full-width {
      grid-column: 1 / -1;
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 16px;
    }

    .chart-container {
      position: relative;
      height: 220px;
    }

    /* University list */
    .uni-list {
      list-style: none;
    }

    .uni-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      font-size: 13px;
    }

    .uni-item:last-child { border-bottom: none; }

    .uni-name { font-weight: 500; color: #2d2d2d; }

    .uni-count {
      font-weight: 600;
      color: #7c9885;
      background: rgba(124, 152, 133, 0.08);
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 12px;
    }

    .uni-bar {
      flex: 1;
      height: 6px;
      background: rgba(0, 0, 0, 0.04);
      border-radius: 3px;
      margin: 0 12px;
      overflow: hidden;
    }

    .uni-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c9885, #6a8573);
      border-radius: 3px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: #9ca3af;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="admin.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Analytics Overview</h1>
  </div>

  <div class="content">
    <div class="loading" id="loadingState">Loading analytics...</div>
    <div id="dashboard" style="display:none;">

      <!-- Summary Cards -->
      <div class="summary-grid" id="summaryGrid"></div>

      <!-- Charts -->
      <div class="chart-grid">
        <div class="chart-card full-width">
          <div class="chart-title">Daily Activity (Last 30 Days)</div>
          <div class="chart-container">
            <canvas id="activityChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Signups</div>
          <div class="chart-container">
            <canvas id="signupsChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Uploads</div>
          <div class="chart-container">
            <canvas id="uploadsChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Top Universities -->
      <div class="chart-card" style="margin-bottom:32px;">
        <div class="chart-title">Top Universities</div>
        <ul class="uni-list" id="uniList"></ul>
      </div>

    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const adminKey = sessionStorage.getItem('studyflow_admin_key') || '';
    if (!adminKey) window.location.href = 'admin.html';

    // Chart.js defaults
    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.size = 11;
    Chart.defaults.color = '#9ca3af';

    const chartColors = {
      green: 'rgba(124, 152, 133, 1)',
      greenFill: 'rgba(124, 152, 133, 0.08)',
      orange: 'rgba(232, 155, 95, 1)',
      orangeFill: 'rgba(232, 155, 95, 0.08)',
      blue: 'rgba(99, 102, 241, 1)',
      blueFill: 'rgba(99, 102, 241, 0.08)',
      gray: 'rgba(156, 163, 175, 1)',
      grayFill: 'rgba(156, 163, 175, 0.08)'
    };

    async function loadAnalytics() {
      try {
        const res = await fetch(BACKEND_URL + '/admin/analytics?key=' + encodeURIComponent(adminKey));
        if (!res.ok) {
          if (res.status === 403) {
            sessionStorage.removeItem('studyflow_admin_key');
            window.location.href = 'admin.html';
            return;
          }
          throw new Error('Failed');
        }

        const data = await res.json();
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

        renderSummary(data.summary);
        renderActivityChart(data.dates, data.daily);
        renderSignupsChart(data.dates, data.daily.signups);
        renderUploadsChart(data.dates, data.daily.uploads);
        renderUniversities(data.top_universities);

      } catch (e) {
        document.getElementById('loadingState').textContent = 'Failed to load analytics: ' + e.message;
      }
    }

    function renderSummary(s) {
      const grid = document.getElementById('summaryGrid');
      const cards = [
        { label: 'Total Users', value: s.total_users, trend: `+${s.new_users_7d} this week`, up: s.new_users_7d > 0 },
        { label: 'Total Notes', value: s.total_notes, trend: `+${s.new_notes_7d} this week`, up: s.new_notes_7d > 0 },
        { label: 'Conversations', value: s.total_conversations, trend: 'All time', up: false },
        { label: 'Downloads', value: s.total_downloads, trend: 'All time', up: false }
      ];

      grid.innerHTML = cards.map(c => `
        <div class="summary-card">
          <div class="summary-label">${c.label}</div>
          <div class="summary-value">${c.value.toLocaleString()}</div>
          <div class="summary-trend ${c.up ? 'up' : 'neutral'}">${c.trend}</div>
        </div>
      `).join('');
    }

    function formatDateLabel(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function renderActivityChart(dates, daily) {
      const labels = dates.map(formatDateLabel);
      new Chart(document.getElementById('activityChart'), {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Conversations',
              data: daily.conversations,
              borderColor: chartColors.green,
              backgroundColor: chartColors.greenFill,
              fill: true,
              tension: 0.3,
              borderWidth: 2,
              pointRadius: 0,
              pointHitRadius: 10
            },
            {
              label: 'Uploads',
              data: daily.uploads,
              borderColor: chartColors.orange,
              backgroundColor: chartColors.orangeFill,
              fill: true,
              tension: 0.3,
              borderWidth: 2,
              pointRadius: 0,
              pointHitRadius: 10
            },
            {
              label: 'Downloads',
              data: daily.downloads,
              borderColor: chartColors.blue,
              backgroundColor: chartColors.blueFill,
              fill: true,
              tension: 0.3,
              borderWidth: 2,
              pointRadius: 0,
              pointHitRadius: 10
            },
            {
              label: 'Signups',
              data: daily.signups,
              borderColor: chartColors.gray,
              backgroundColor: chartColors.grayFill,
              fill: true,
              tension: 0.3,
              borderWidth: 2,
              pointRadius: 0,
              pointHitRadius: 10
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top', labels: { usePointStyle: true, pointStyle: 'circle', padding: 16 } }
          },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 8 } },
            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { precision: 0 } }
          }
        }
      });
    }

    function renderSignupsChart(dates, signups) {
      const labels = dates.map(formatDateLabel);
      new Chart(document.getElementById('signupsChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            data: signups,
            backgroundColor: chartColors.greenFill,
            borderColor: chartColors.green,
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } },
            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { precision: 0 } }
          }
        }
      });
    }

    function renderUploadsChart(dates, uploads) {
      const labels = dates.map(formatDateLabel);
      new Chart(document.getElementById('uploadsChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            data: uploads,
            backgroundColor: chartColors.orangeFill,
            borderColor: chartColors.orange,
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } },
            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { precision: 0 } }
          }
        }
      });
    }

    function renderUniversities(universities) {
      const list = document.getElementById('uniList');
      if (!universities || universities.length === 0) {
        list.innerHTML = '<li class="uni-item" style="color:#9ca3af;">No university data yet</li>';
        return;
      }

      const max = universities[0].count;
      list.innerHTML = universities.map(u => `
        <li class="uni-item">
          <span class="uni-name">${u.name}</span>
          <div class="uni-bar"><div class="uni-bar-fill" style="width:${(u.count / max * 100).toFixed(0)}%"></div></div>
          <span class="uni-count">${u.count}</span>
        </li>
      `).join('');
    }

    loadAnalytics();
  </script>
</body>
</html>
