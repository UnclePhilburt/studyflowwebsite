<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - StudyFlow Suite</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #e8e4df;
      color: #2d2d2d;
      overflow: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* Search box fixed at top */
    .search-stage {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      z-index: 1000;
    }

    .search-input {
      width: 100%;
      padding: 16px 24px;
      border: 2px solid rgba(124, 152, 133, 0.3);
      border-radius: 16px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      transition: all 0.3s;
      outline: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
    }

    .search-input::placeholder {
      color: rgba(124, 152, 133, 0.5);
    }

    .search-input:focus {
      border-color: rgba(124, 152, 133, 0.6);
      box-shadow: 0 6px 20px rgba(124, 152, 133, 0.15);
    }

    /* Card table - where cards are thrown */
    .card-table {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 120px 40px 40px;
      overflow: auto;
    }

    /* Individual card */
    .note-card {
      position: absolute;
      width: 300px;
      height: 200px;
      cursor: grab;
      perspective: 1000px;
      transition: transform 0.1s, z-index 0s;
      z-index: 1;
    }

    .note-card:active {
      cursor: grabbing;
      z-index: 999 !important;
    }

    .note-card.flipped {
      z-index: 50;
      width: 400px;
      height: 300px;
    }

    /* Card throw animation */
    @keyframes cardThrow {
      0% {
        opacity: 0;
        transform: translateY(-200px) rotate(0deg) scale(0.5);
      }
      70% {
        opacity: 1;
        transform: translateY(10px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Card inner - for 3D flip */
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .note-card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    /* Card sides */
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    /* Front of card */
    .card-front {
      background: linear-gradient(135deg, #ffffff 0%, #f5f3f0 100%);
      border: 2px solid rgba(124, 152, 133, 0.15);
      padding: 20px;
      display: flex;
      flex-direction: column;
      transition: all 0.3s;
    }

    .card-front:hover {
      border-color: rgba(124, 152, 133, 0.3);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15), 0 3px 10px rgba(0, 0, 0, 0.1);
    }

    /* Back of card */
    .card-back {
      background: #fff;
      border: 2px solid rgba(124, 152, 133, 0.25);
      transform: rotateY(180deg);
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 10px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-preview {
      font-size: 0.8rem;
      line-height: 1.5;
      color: #5d5d5d;
      margin-bottom: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      flex: 1;
    }

    .card-preview mark {
      background: rgba(232, 155, 95, 0.3);
      color: inherit;
      padding: 2px 4px;
      border-radius: 2px;
    }

    .card-meta {
      font-size: 0.7rem;
      color: #9a9a9a;
      opacity: 0.7;
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .card-meta .username {
      color: #7c9885;
      font-weight: 500;
    }

    /* Upvote badge */
    .upvote-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(124, 152, 133, 0.9);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      z-index: 10;
    }

    .upvote-badge.negative {
      background: rgba(200, 100, 100, 0.9);
    }

    .upvote-badge.zero {
      background: rgba(150, 150, 150, 0.7);
    }

    /* Back side content */
    .card-back-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: #7c9885;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(124, 152, 133, 0.2);
    }

    .card-back-content {
      font-size: 0.8rem;
      line-height: 1.6;
      color: #2d2d2d;
      overflow-y: auto;
      flex: 1;
      margin-bottom: 12px;
    }

    .card-back-content::-webkit-scrollbar {
      width: 4px;
    }

    .card-back-content::-webkit-scrollbar-thumb {
      background: rgba(124, 152, 133, 0.3);
      border-radius: 2px;
    }

    .card-back-footer {
      padding-top: 12px;
      border-top: 1px solid rgba(124, 152, 133, 0.2);
      text-align: center;
    }

    .view-full-btn {
      background: #7c9885;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s;
    }

    .view-full-btn:hover {
      background: #6a8473;
    }

    /* Top nav */
    .top-nav {
      position: fixed;
      top: 32px;
      right: 32px;
      z-index: 1000;
      display: flex;
      gap: 16px;
    }

    .nav-link {
      color: #5d5d5d;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.8);
      transition: all 0.3s;
    }

    .nav-link:hover {
      background: rgba(124, 152, 133, 0.15);
      color: #7c9885;
    }

    /* Loading state */
    .loading-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #9a9a9a;
      font-size: 0.9rem;
    }

    /* Hint text */
    .hint-text {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #9a9a9a;
      opacity: 0.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <div class="top-nav">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="notes.html" class="nav-link">My Notes</a>
  </div>

  <!-- Search -->
  <div class="search-stage">
    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="Search for notes..."
      autocomplete="off"
    >
  </div>

  <!-- Card Table -->
  <div class="card-table" id="cardTable"></div>

  <!-- Hint -->
  <div class="hint-text">
    Click cards to open · Drag to rearrange
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzI0MTc1MzksImV4cCI6MjA0Nzk5MzUzOX0.wY3_JRor-5DfOBZVCZLLpVI6-O7PJTrqe2Ty9HXdxnU';
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let authToken = null;
    let searchTimeout = null;
    let draggedCard = null;
    let offsetX = 0;
    let offsetY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;

    // Initialize
    (async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      authToken = session.access_token;

      // Setup search
      document.getElementById('searchInput').addEventListener('input', handleSearchInput);

      // Restore previous state if exists
      restoreState();
    })();

    // Save state to sessionStorage
    function saveState(query, results, cardPositions) {
      sessionStorage.setItem('browseState', JSON.stringify({
        query: query,
        results: results,
        cardPositions: cardPositions,
        timestamp: Date.now()
      }));
    }

    // Restore state from sessionStorage
    function restoreState() {
      const savedState = sessionStorage.getItem('browseState');
      if (!savedState) return;

      try {
        const state = JSON.parse(savedState);

        // Only restore if less than 30 minutes old
        if (Date.now() - state.timestamp > 30 * 60 * 1000) {
          sessionStorage.removeItem('browseState');
          return;
        }

        // Restore search query
        if (state.query) {
          document.getElementById('searchInput').value = state.query;
        }

        // Restore results with saved positions
        if (state.results && state.results.length > 0) {
          displayCards(state.results, state.query, state.cardPositions);
        }
      } catch (e) {
        console.error('Error restoring state:', e);
        sessionStorage.removeItem('browseState');
      }
    }

    // Real-time search
    function handleSearchInput(e) {
      const query = e.target.value.trim();

      clearTimeout(searchTimeout);

      if (!query) {
        document.getElementById('cardTable').innerHTML = '';
        sessionStorage.removeItem('browseState'); // Clear saved state
        return;
      }

      searchTimeout = setTimeout(() => {
        performSearch(query);
      }, 300);
    }

    // Perform search
    async function performSearch(query) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/notes/semantic-browse`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            question: query
          })
        });

        if (!response.ok) {
          throw new Error('Search failed');
        }

        const results = await response.json();
        displayCards(results, query);

        // Save state
        saveState(query, results, null);

      } catch (error) {
        console.error('Search error:', error);
        document.getElementById('cardTable').innerHTML = '<div class="loading-msg">Unable to search. Please try again.</div>';
      }
    }

    // Display cards scattered on table
    function displayCards(results, query, savedPositions = null) {
      const cardTable = document.getElementById('cardTable');

      if (results.length === 0) {
        cardTable.innerHTML = '<div class="loading-msg">No notes found</div>';
        return;
      }

      // Clear existing cards
      cardTable.innerHTML = '';

      // Create cards with random scatter positions
      results.forEach((result, index) => {
        const filename = result.filename || 'Untitled';
        const preview = result.content || '';
        const username = result.username || 'Anonymous';
        const university = result.university || 'Unknown';
        const year = result.created_at ? new Date(result.created_at).getFullYear() : new Date().getFullYear();
        const upvotes = result.upvotes || 0;

        // Highlight search terms
        let highlightedPreview = preview;
        if (query) {
          const regex = new RegExp(`(${query})`, 'gi');
          highlightedPreview = highlightedPreview.replace(regex, '<mark>$1</mark>');
        }

        // Use saved position if available, otherwise random
        let cardX, cardY, cardRotation;
        if (savedPositions && savedPositions[result.note_id]) {
          cardX = savedPositions[result.note_id].x;
          cardY = savedPositions[result.note_id].y;
          cardRotation = savedPositions[result.note_id].rotation;
        } else {
          // Random position and rotation
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;
          cardX = Math.random() * (viewportWidth - 400) + 50;
          cardY = Math.random() * (viewportHeight - 350) + 150;
          cardRotation = (Math.random() - 0.5) * 12; // -6 to +6 degrees
        }

        // Create card element
        const card = document.createElement('div');
        card.className = 'note-card';
        card.dataset.noteId = result.note_id;
        card.style.left = `${cardX}px`;
        card.style.top = `${cardY}px`;
        card.style.transform = `rotate(${cardRotation}deg)`;

        // Only animate if not restoring from saved state
        if (!savedPositions) {
          card.style.animation = `cardThrow ${0.5 + index * 0.05}s cubic-bezier(0.34, 1.56, 0.64, 1) forwards`;
        }

        // Determine upvote badge class
        let upvoteBadgeClass = '';
        if (upvotes > 0) {
          upvoteBadgeClass = '';
        } else if (upvotes < 0) {
          upvoteBadgeClass = 'negative';
        } else {
          upvoteBadgeClass = 'zero';
        }

        const upvoteSymbol = upvotes > 0 ? '▲' : (upvotes < 0 ? '▼' : '−');

        card.innerHTML = `
          <div class="card-inner">
            <!-- Front of card -->
            <div class="card-front">
              <div class="upvote-badge ${upvoteBadgeClass}">
                ${upvoteSymbol} ${Math.abs(upvotes)}
              </div>
              <div class="card-title">${filename}</div>
              <div class="card-preview">${highlightedPreview.substring(0, 150)}...</div>
              <div class="card-meta">
                <span class="username">@${username}</span> · ${university} · ${year}
              </div>
            </div>

            <!-- Back of card -->
            <div class="card-back">
              <div class="upvote-badge ${upvoteBadgeClass}">
                ${upvoteSymbol} ${Math.abs(upvotes)}
              </div>
              <div class="card-back-header">${filename}</div>
              <div class="card-back-content">${highlightedPreview}</div>
              <div class="card-back-footer">
                <div style="color: #7c9885; font-size: 0.7rem;">Opening note...</div>
              </div>
            </div>
          </div>
        `;

        // Click to flip and open
        card.addEventListener('click', (e) => {
          if (isDragging) return; // Don't flip if user was dragging

          // Play flip animation
          card.classList.add('flipped');

          // Wait for flip animation, then open note
          setTimeout(() => {
            openFullNote(result.note_id);
          }, 600); // Match the CSS transition time
        });

        // Drag functionality
        card.addEventListener('mousedown', startDrag);

        cardTable.appendChild(card);
      });
    }

    // Drag handlers
    function startDrag(e) {
      draggedCard = e.currentTarget;
      const rect = draggedCard.getBoundingClientRect();

      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      isDragging = false; // Reset drag flag

      document.addEventListener('mousemove', drag);
      document.addEventListener('mouseup', stopDrag);

      e.preventDefault();
    }

    function drag(e) {
      if (!draggedCard) return;

      // Check if mouse moved more than 5px to consider it a drag
      const deltaX = Math.abs(e.clientX - dragStartX);
      const deltaY = Math.abs(e.clientY - dragStartY);
      if (deltaX > 5 || deltaY > 5) {
        isDragging = true;
      }

      const x = e.clientX - offsetX;
      const y = e.clientY - offsetY;

      draggedCard.style.left = `${x}px`;
      draggedCard.style.top = `${y}px`;
      draggedCard.style.transform = 'rotate(0deg)'; // Straighten while dragging
    }

    function stopDrag() {
      // Save current positions after drag
      if (isDragging) {
        saveCurrentCardPositions();
      }

      draggedCard = null;
      document.removeEventListener('mousemove', drag);
      document.removeEventListener('mouseup', stopDrag);

      // Reset drag flag after a short delay to prevent click from firing
      setTimeout(() => {
        isDragging = false;
      }, 100);
    }

    // Save current card positions to sessionStorage
    function saveCurrentCardPositions() {
      const savedState = sessionStorage.getItem('browseState');
      if (!savedState) return;

      try {
        const state = JSON.parse(savedState);
        const cardPositions = {};

        // Get all cards and save their positions
        const cards = document.querySelectorAll('.note-card');
        cards.forEach(card => {
          const noteId = card.dataset.noteId;
          const left = parseFloat(card.style.left);
          const top = parseFloat(card.style.top);
          const transform = card.style.transform;

          // Extract rotation from transform
          const rotationMatch = transform.match(/rotate\(([^)]+)\)/);
          const rotation = rotationMatch ? rotationMatch[1] : '0deg';

          cardPositions[noteId] = {
            x: left,
            y: top,
            rotation: rotation
          };
        });

        state.cardPositions = cardPositions;
        sessionStorage.setItem('browseState', JSON.stringify(state));
      } catch (e) {
        console.error('Error saving card positions:', e);
      }
    }

    // Open full note
    function openFullNote(noteId) {
      window.location.href = `note-viewer.html?id=${noteId}`;
    }
  </script>
</body>
</html>
