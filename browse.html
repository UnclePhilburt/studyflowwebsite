<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - StudyFlow Suite</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f6f3;
      color: #2d2d2d;
      transition: background-color 1s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Active background color shifts based on subject */
    body.subject-biology { background: linear-gradient(135deg, #f0f8f0 0%, #f8f6f3 50%); }
    body.subject-chemistry { background: linear-gradient(135deg, #f5f0f8 0%, #f8f6f3 50%); }
    body.subject-physics { background: linear-gradient(135deg, #f0f5f8 0%, #f8f6f3 50%); }
    body.subject-math { background: linear-gradient(135deg, #fff8f0 0%, #f8f6f3 50%); }
    body.subject-history { background: linear-gradient(135deg, #f5f3f0 0%, #f8f6f3 50%); }
    body.subject-literature { background: linear-gradient(135deg, #fff0f5 0%, #f8f6f3 50%); }
    body.subject-computer { background: linear-gradient(135deg, #f0f8ff 0%, #f8f6f3 50%); }
    body.subject-engineering { background: linear-gradient(135deg, #fff5f0 0%, #f8f6f3 50%); }

    /* Search container - center stage */
    .search-stage {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 700px;
      z-index: 100;
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-stage.has-results {
      top: 100px;
      transform: translate(-50%, 0);
    }

    .search-stage.viewing-note {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -100px);
    }

    .search-input {
      width: 100%;
      padding: 24px 32px;
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 24px;
      font-size: 1.25rem;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .search-input::placeholder {
      color: rgba(124, 152, 133, 0.4);
      font-weight: 300;
    }

    .search-input:focus {
      border-color: rgba(124, 152, 133, 0.5);
      box-shadow: 0 8px 32px rgba(124, 152, 133, 0.12);
      text-align: left;
    }

    /* Subject-based accent colors for search */
    .search-input.accent-biology { border-color: rgba(76, 175, 80, 0.5); }
    .search-input.accent-chemistry { border-color: rgba(156, 39, 176, 0.5); }
    .search-input.accent-physics { border-color: rgba(33, 150, 243, 0.5); }
    .search-input.accent-math { border-color: rgba(255, 152, 0, 0.5); }
    .search-input.accent-history { border-color: rgba(121, 85, 72, 0.5); }
    .search-input.accent-literature { border-color: rgba(233, 30, 99, 0.5); }
    .search-input.accent-computer { border-color: rgba(0, 188, 212, 0.5); }
    .search-input.accent-engineering { border-color: rgba(255, 87, 34, 0.5); }

    /* Results container */
    .results-flow {
      position: fixed;
      top: 200px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 800px;
      max-height: calc(100vh - 240px);
      overflow-y: auto;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .results-flow.visible {
      opacity: 1;
    }

    .results-flow::-webkit-scrollbar {
      width: 6px;
    }

    .results-flow::-webkit-scrollbar-track {
      background: transparent;
    }

    .results-flow::-webkit-scrollbar-thumb {
      background: rgba(124, 152, 133, 0.2);
      border-radius: 3px;
    }

    /* Individual note result - ink spreading effect */
    .note-result {
      margin-bottom: 32px;
      padding: 24px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      filter: blur(8px);
      transform: scale(0.95);
      animation: inkSpread 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes inkSpread {
      0% {
        opacity: 0;
        filter: blur(8px);
        transform: scale(0.95);
      }
      60% {
        opacity: 0.7;
        filter: blur(4px);
        transform: scale(0.98);
      }
      100% {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
      }
    }

    .note-result:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124, 152, 133, 0.15);
    }

    .note-result.holding {
      transform: scale(1.02);
      box-shadow: 0 12px 32px rgba(124, 152, 133, 0.25);
    }

    .note-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 500;
      color: #2d2d2d;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .note-preview {
      font-size: 0.9375rem;
      line-height: 1.7;
      color: #5d5d5d;
      margin-bottom: 16px;
      font-style: italic;
    }

    .note-preview mark {
      background: rgba(232, 155, 95, 0.25);
      color: inherit;
      padding: 2px 4px;
      border-radius: 3px;
      font-weight: 500;
    }

    .note-meta {
      font-size: 0.75rem;
      color: #9a9a9a;
      opacity: 0.5;
      transition: opacity 0.3s;
      letter-spacing: 0.02em;
    }

    .note-result:hover .note-meta {
      opacity: 0.7;
    }

    .note-meta .username {
      color: #7c9885;
      font-weight: 500;
    }

    /* Note viewer - full screen */
    .note-viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.95);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .note-viewer.active {
      opacity: 1;
      pointer-events: all;
      transform: scale(1);
    }

    .note-viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Loading states */
    .loading-shimmer {
      text-align: center;
      padding: 40px;
      color: #9a9a9a;
      font-size: 0.875rem;
    }

    /* Empty state */
    .empty-state {
      position: fixed;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #9a9a9a;
      font-size: 0.9375rem;
      opacity: 0.6;
    }

    /* Top nav */
    .top-nav {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .nav-link {
      color: #5d5d5d;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .nav-link:hover {
      background: rgba(124, 152, 133, 0.08);
      color: #7c9885;
    }

    .scroll-hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: #9a9a9a;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .scroll-hint.visible {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <div class="top-nav">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="notes.html" class="nav-link">My Notes</a>
  </div>

  <!-- Search Stage -->
  <div class="search-stage" id="searchStage">
    <input
      type="text"
      class="search-input"
      id="searchInput"
      placeholder="What are you looking for?"
      autocomplete="off"
    >
  </div>

  <!-- Results Flow -->
  <div class="results-flow" id="resultsFlow"></div>

  <!-- Note Viewer -->
  <div class="note-viewer" id="noteViewer">
    <iframe id="noteFrame" src=""></iframe>
  </div>

  <!-- Scroll Hint -->
  <div class="scroll-hint" id="scrollHint">Scroll up to return</div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzI0MTc1MzksImV4cCI6MjA0Nzk5MzUzOX0.wY3_JRor-5DfOBZVCZLLpVI6-O7PJTrqe2Ty9HXdxnU';
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let authToken = null;
    let searchTimeout = null;
    let currentResults = [];
    let holdTimeout = null;
    let currentHoldingNote = null;

    // Initialize
    (async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      authToken = session.access_token;

      // Setup real-time search
      document.getElementById('searchInput').addEventListener('input', handleSearchInput);

      // Setup scroll gesture to dismiss note viewer
      setupScrollGestures();
    })();

    // Real-time search with debouncing
    function handleSearchInput(e) {
      const query = e.target.value.trim();

      clearTimeout(searchTimeout);

      if (!query) {
        // Clear results
        document.getElementById('resultsFlow').innerHTML = '';
        document.getElementById('resultsFlow').classList.remove('visible');
        document.getElementById('searchStage').classList.remove('has-results');
        document.body.className = '';
        document.getElementById('searchInput').className = 'search-input';
        return;
      }

      // Debounce search (300ms)
      searchTimeout = setTimeout(() => {
        performSearch(query);
      }, 300);
    }

    // Perform semantic search
    async function performSearch(query) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/search/notes`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            query: query,
            match_count: 10
          })
        });

        if (!response.ok) {
          throw new Error('Search failed');
        }

        const results = await response.json();
        currentResults = results;

        displayResults(results, query);
        updateSubjectContext(results);

      } catch (error) {
        console.error('Search error:', error);
        document.getElementById('resultsFlow').innerHTML = '<div class="loading-shimmer">Unable to search. Please try again.</div>';
      }
    }

    // Display results with ink-spreading effect
    function displayResults(results, query) {
      const resultsContainer = document.getElementById('resultsFlow');
      const searchStage = document.getElementById('searchStage');

      if (results.length === 0) {
        resultsContainer.innerHTML = '<div class="loading-shimmer">No notes found</div>';
        resultsContainer.classList.add('visible');
        searchStage.classList.add('has-results');
        return;
      }

      // Group by note_id to show each note once
      const noteMap = new Map();
      results.forEach(r => {
        if (!noteMap.has(r.note_id)) {
          noteMap.set(r.note_id, r);
        }
      });

      const uniqueResults = Array.from(noteMap.values());

      // Create HTML for results
      const html = uniqueResults.map((result, index) => {
        const filename = result.filename || 'Untitled';
        const preview = result.content || '';
        const username = result.username || 'Anonymous';
        const university = result.university || 'Unknown';
        const year = result.created_at ? new Date(result.created_at).getFullYear() : new Date().getFullYear();

        // Highlight search terms in preview
        let highlightedPreview = preview;
        if (query) {
          const regex = new RegExp(`(${query})`, 'gi');
          highlightedPreview = highlightedPreview.replace(regex, '<mark>$1</mark>');
        }

        return `
          <div class="note-result"
               data-note-id="${result.note_id}"
               data-index="${index}"
               style="animation-delay: ${index * 0.1}s"
               onmousedown="startHold('${result.note_id}')"
               onmouseup="endHold()"
               onmouseleave="endHold()">
            <div class="note-title">${filename}</div>
            <div class="note-preview">${highlightedPreview.substring(0, 200)}...</div>
            <div class="note-meta">
              <span class="username">@${username}</span> · ${university} · ${year}
            </div>
          </div>
        `;
      }).join('');

      resultsContainer.innerHTML = html;
      resultsContainer.classList.add('visible');
      searchStage.classList.add('has-results');
    }

    // Update subject context (background color + search accent)
    function updateSubjectContext(results) {
      if (results.length === 0) return;

      const topResult = results[0];
      const courseCode = (topResult.course_code || '').toLowerCase();
      const filename = (topResult.filename || '').toLowerCase();
      const combinedText = `${courseCode} ${filename}`;

      const subjectPatterns = {
        'biology': /bio|anatomy|physiology|genetics|ecology|microbio/,
        'chemistry': /chem|organic|inorganic|biochem/,
        'physics': /phys|mechanics|thermodynamics|quantum/,
        'math': /math|calc|algebra|geometry|statistics/,
        'history': /hist|historical|civilization|war|ancient/,
        'literature': /lit|english|writing|poetry|novel/,
        'computer': /cs|comp|programming|software|algorithm|coding/,
        'engineering': /eng|mechanical|electrical|civil/
      };

      // Remove existing classes
      document.body.className = '';
      document.getElementById('searchInput').className = 'search-input';

      // Find matching subject
      for (const [subject, pattern] of Object.entries(subjectPatterns)) {
        if (pattern.test(combinedText)) {
          document.body.classList.add(`subject-${subject}`);
          document.getElementById('searchInput').classList.add(`accent-${subject}`);
          console.log(`Context: ${subject}`);
          return;
        }
      }
    }

    // Hover-and-hold to open note
    function startHold(noteId) {
      currentHoldingNote = noteId;
      const noteElement = document.querySelector(`[data-note-id="${noteId}"]`);

      holdTimeout = setTimeout(() => {
        if (currentHoldingNote === noteId) {
          noteElement.classList.add('holding');
          setTimeout(() => {
            openNote(noteId);
          }, 200);
        }
      }, 500); // Hold for 500ms
    }

    function endHold() {
      clearTimeout(holdTimeout);
      if (currentHoldingNote) {
        const noteElement = document.querySelector(`[data-note-id="${currentHoldingNote}"]`);
        if (noteElement) {
          noteElement.classList.remove('holding');
        }
      }
      currentHoldingNote = null;
    }

    // Open note in viewer
    function openNote(noteId) {
      const noteViewer = document.getElementById('noteViewer');
      const noteFrame = document.getElementById('noteFrame');
      const searchStage = document.getElementById('searchStage');
      const scrollHint = document.getElementById('scrollHint');

      searchStage.classList.add('viewing-note');
      noteFrame.src = `note-viewer.html?id=${noteId}`;
      noteViewer.classList.add('active');
      scrollHint.classList.add('visible');
    }

    // Scroll gestures to zoom in/out
    function setupScrollGestures() {
      let lastScrollY = window.scrollY;

      window.addEventListener('scroll', () => {
        const noteViewer = document.getElementById('noteViewer');

        if (noteViewer.classList.contains('active')) {
          // If viewing note and scrolled to very top, zoom out
          if (window.scrollY === 0 && lastScrollY > 0) {
            closeNoteViewer();
          }
        }

        lastScrollY = window.scrollY;
      }, { passive: true });

      // ESC key also closes
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeNoteViewer();
        }
      });
    }

    function closeNoteViewer() {
      const noteViewer = document.getElementById('noteViewer');
      const searchStage = document.getElementById('searchStage');
      const scrollHint = document.getElementById('scrollHint');

      noteViewer.classList.remove('active');
      searchStage.classList.remove('viewing-note');
      scrollHint.classList.remove('visible');

      setTimeout(() => {
        document.getElementById('noteFrame').src = '';
      }, 600);
    }
  </script>
</body>
</html>
