<head>

<style>#sf-page-transition{position:fixed;inset:0;background:#f5f4f0;z-index:999999;opacity:1;transition:opacity .15s ease;pointer-events:none;}</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - StudyFlow Suite</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Theme Variables */

      --bg-primary: #FAF8F5;

    body[data-theme="ember"] {

      --text-primary: #f0e8e0; --text-secondary: #c0a898; --text-muted: #8a7a6a;
      --accent-primary: #e8734a; --accent-secondary: #d0633a; --accent-tertiary: #f09060;
      --border-color: rgba(232, 115, 74, 0.25); --hover-bg: rgba(232, 115, 74, 0.1);
      --gradient-start: rgba(232, 115, 74, 0.05); --gradient-end: rgba(240, 144, 96, 0.05);

    body[data-theme="neon"] {
      --bg-primary: #0a0a14; --bg-secondary: #12121e; --bg-tertiary: rgba(18, 18, 30, 0.98);

      --gradient-start: rgba(0, 212, 170, 0.05); --gradient-end: rgba(255, 96, 144, 0.05);

    body[data-theme="sand"] {
      --bg-primary: #F8F2EA; --bg-secondary: #ede4d8; --bg-tertiary: rgba(248, 242, 234, 0.98);
      --text-primary: #4a3828; --text-secondary: #7a6248; --text-muted: #a89078;
      --accent-primary: #c4784a; --accent-secondary: #b0683a; --accent-tertiary: #d8986a;
      --border-color: rgba(196, 120, 74, 0.2); --hover-bg: rgba(196, 120, 74, 0.08);
      --gradient-start: rgba(196, 120, 74, 0.03); --gradient-end: rgba(216, 152, 106, 0.04);

      --text-primary: #1e2e3e; --text-secondary: #4a6478; --text-muted: #7a98b0;
      --accent-primary: #5a9ab8; --accent-secondary: #4a8aa8; --accent-tertiary: #7abcd8;
      --border-color: rgba(90, 154, 184, 0.2); --hover-bg: rgba(90, 154, 184, 0.08);
      --gradient-start: rgba(90, 154, 184, 0.03); --gradient-end: rgba(122, 188, 216, 0.04);

    }

    body[data-theme="slate"] {
      --bg-primary: #F2F4F6; --bg-secondary: #e2e6ea; --bg-tertiary: rgba(242, 244, 246, 0.98);
      --text-primary: #1e2430; --text-secondary: #4a5468; --text-muted: #7a8498;
      --accent-primary: #5a6a8a; --accent-secondary: #4a5a7a; --accent-tertiary: #7a8aaa;
      --border-color: rgba(90, 106, 138, 0.2); --hover-bg: rgba(90, 106, 138, 0.08);
      --gradient-start: rgba(90, 106, 138, 0.03); --gradient-end: rgba(122, 138, 170, 0.04);
      --widget-bg: rgba(248, 250, 252, 0.7); --shadow: rgba(0, 0, 0, 0.06);
    }

    body[data-theme="matcha"] {
      --bg-primary: #F4F8F2; --bg-secondary: #e2eddc; --bg-tertiary: rgba(244, 248, 242, 0.98);
      --text-primary: #2a3424; --text-secondary: #5a6a4a; --text-muted: #8a9a78;
      --accent-primary: #7aa45a; --accent-secondary: #6a944a; --accent-tertiary: #9ac47a;
      --border-color: rgba(122, 164, 90, 0.2); --hover-bg: rgba(122, 164, 90, 0.08);
      --gradient-start: rgba(122, 164, 90, 0.03); --gradient-end: rgba(154, 196, 122, 0.04);

    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* Top bar - single flex row for filter, search, nav */
    .top-bar {
      position: fixed;
      top: 32px;
      left: 32px;
      right: 32px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Search box fills remaining space */
    .search-stage {
      flex: 1;
      min-width: 0;
      max-width: 600px;
    }

    .search-input {
      width: 100%;
      padding: 16px 24px;
      border: 2px solid var(--border-color);
      border-radius: 16px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      background: var(--bg-tertiary);
      backdrop-filter: blur(20px);
      transition: all 0.3s;
      outline: none;
      box-shadow: 0 4px 16px var(--shadow);
      color: var(--text-primary);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 6px 20px var(--shadow);
    }

    /* Card table - where cards are thrown */
    .card-table {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 120px 40px 40px;
      overflow: auto;
    }

    /* Individual card */
    .note-card {
      position: absolute;
      width: 300px;
      height: 200px;
      cursor: grab;
      perspective: 1000px;
      transition: transform 0.1s, z-index 0s;
      z-index: 1;
    }

    .note-card:active {
      cursor: grabbing;
      z-index: 999 !important;
    }

    .note-card.flipped {
      z-index: 50;
      width: 400px;
      height: 300px;
    }

    /* Card throw animation */
    @keyframes cardThrow {
      0% {
        opacity: 0;
        transform: translateY(-200px) rotate(0deg) scale(0.5);
      }
      70% {
        opacity: 1;
        transform: translateY(10px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Card inner - for 3D flip */
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .note-card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    /* Card sides */
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    /* Front of card */
    .card-front {
      background: var(--widget-bg);
      border: 2px solid var(--border-color);
      padding: 20px;
      display: flex;
      flex-direction: column;
      transition: all 0.3s;
    }

    .card-front:hover {
      border-color: var(--accent-primary);
      box-shadow: 0 8px 24px var(--shadow), 0 3px 10px var(--shadow);
    }

    /* Back of card */
    .card-back {
      background: var(--widget-bg);
      border: 2px solid var(--border-color);
      transform: rotateY(180deg);
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-preview {
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--text-secondary);
      margin-bottom: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      flex: 1;
    }

    .card-preview mark {
      background: var(--hover-bg);
      color: inherit;
      padding: 2px 4px;
      border-radius: 2px;
    }

    .card-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.7;
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid var(--border-color);
    }

    .card-meta .username {
      color: var(--accent-primary);
      font-weight: 500;
    }

    /* Upvote badge */
    .upvote-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--accent-primary);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 2px 8px var(--shadow);
      z-index: 10;
    }

    .upvote-badge.negative {
      background: rgba(200, 100, 100, 0.9);
    }

    .upvote-badge.zero {
      background: var(--text-muted);
    }

    /* Back side content */
    .card-back-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent-primary);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }

    .card-back-content {
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text-primary);
      overflow-y: auto;
      flex: 1;
      margin-bottom: 12px;
    }

    .card-back-content::-webkit-scrollbar {
      width: 4px;
    }

    .card-back-content::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 2px;
    }

    .card-back-footer {
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
      text-align: center;
    }

    .view-full-btn {
      background: var(--accent-primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s;
    }

    .view-full-btn:hover {
      background: var(--accent-secondary);
    }

    /* Top nav */
    .top-nav {
      display: flex;
      gap: 16px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--bg-secondary);
      transition: all 0.3s;
    }

    .nav-link:hover {
      background: var(--hover-bg);
      color: var(--accent-primary);
    }

    /* Loading state */
    .loading-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Hint text */
    .hint-text {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.6;
      text-align: center;
    }

    /* University filter */
    .filter-container {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-tertiary);
      backdrop-filter: blur(20px);
      padding: 12px 16px;
      border-radius: 12px;
      border: 2px solid var(--border-color);
      box-shadow: 0 4px 16px var(--shadow);
      flex-shrink: 0;
    }

    .filter-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .filter-toggle {
      position: relative;
      width: 40px;
      height: 22px;
      background: var(--text-muted);
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .filter-toggle.active {
      background: var(--accent-primary);
    }

    .filter-toggle-slider {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .filter-toggle.active .filter-toggle-slider {
      transform: translateX(18px);
    }

    .university-select {
      position: relative;
      min-width: 200px;
    }

    .university-input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid var(--border-color);
      border-radius: 8px;
      font-size: 0.8rem;
      font-family: inherit;
      outline: none;
      background: var(--widget-bg);
      color: var(--text-primary);
      cursor: pointer;
    }

    .university-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: var(--hover-bg);
    }

    .university-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--widget-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: 0 8px 24px var(--shadow);
      max-height: 250px;
      overflow-y: auto;
      display: none;
      z-index: 100;
    }

    .university-dropdown.visible {
      display: block;
    }

    .university-option {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--text-primary);
      transition: background 0.2s;
    }

    .university-option:hover {
      background: var(--hover-bg);
    }

    .university-option.selected {
      background: var(--border-color);
      font-weight: 500;
    }

              <div class="loading-msg" style="padding: 60px 40px;">
                <div style="font-size: 1.2rem; color: var(--accent-primary); margin-bottom: 16px;">University .edu Email Required</div>
                <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6;">
                  Browse requires a verified university .edu email address.<br>
                  Verify your .edu email to access the collective knowledge base.
                </div>
                <a href="account.html" class="load-more-btn">
                  Verify .edu Email
                </a>
              </div>
            `;
            return;
          }
          throw new Error('Failed to load initial notes');
        }

        const data = await response.json();
        const results = data.notes || data;

        if (results.length === 0) {
          document.getElementById('cardTable').innerHTML = '';
          setHintText(false);
          document.getElementById('hintText').style.display = 'block';
          return;
        }

        displayCards(results, '');
        setHintText(true);
        document.getElementById('hintText').style.display = 'block';
        console.log(`[Initial Load] Displayed ${results.length} initial notes`);

      } catch (error) {
        console.error('[Initial Load] Error:', error);
        document.getElementById('cardTable').innerHTML = '';
        setHintText(false);
        document.getElementById('hintText').style.display = 'block';
      }
    }

    // Fetch user's university from profile
    async function fetchUserUniversity(user) {
      try {
        if (!user) {
          console.log('[fetchUserUniversity] No user provided');
          return;
        }

        console.log('[fetchUserUniversity] User provided, fetching profile for:', user.id);
        const { data: profile, error: profileError } = await supabaseClient
          .from('user_profiles')
          .select('university, edu_email_verified')
          .eq('id', user.id)
          .single();

        if (profileError) {
          console.error('[fetchUserUniversity] Profile fetch error:', profileError);
          return;
        }

        if (!profile) {
          console.log('[fetchUserUniversity] No profile found');
          return;
        }

        console.log('[fetchUserUniversity] Profile found:', {
          hasUniversity: !!profile.university,
          eduVerified: profile.edu_email_verified
        });

        // Check if .edu email is verified
        if (!profile.edu_email_verified) {
          console.log('[fetchUserUniversity] User not .edu verified, showing message');

          // Show verification required message
          document.getElementById('cardTable').innerHTML = `
            <div class="loading-msg" style="padding: 60px 40px;">
              <div style="font-size: 1.2rem; color: var(--accent-primary); margin-bottom: 16px;">🎓 .edu Email Required</div>
              <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6;">
                Browse requires a verified university .edu email address.<br>
                Verify your .edu email to access the collective knowledge base.
              </div>
              <a href="account.html" class="load-more-btn">
                Verify .edu Email
              </a>
            </div>
          `;

          // Disable search input
          document.getElementById('searchInput').disabled = true;
          document.getElementById('searchInput').placeholder = 'Verify .edu email to search...';

          // Don't return - let page continue loading
          console.log('[fetchUserUniversity] Page loaded but search disabled');
          return;
        }

        console.log('[fetchUserUniversity] User is .edu verified');

        if (profile.university) {
          console.log('[fetchUserUniversity] Setting university:', profile.university);
          userUniversity = profile.university;
          selectedUniversity = profile.university;
          document.getElementById('universityFilter').value = profile.university;
        } else {
          console.log('[fetchUserUniversity] No university set in profile');
        }

      } catch (error) {
        console.error('[fetchUserUniversity] Caught error:', error);
        // Don't rethrow - let page continue loading
      }
    }

    // Setup university filter dropdown
    function setupUniversityFilter() {
      const toggle = document.getElementById('filterToggle');
      const input = document.getElementById('universityFilter');
      const dropdown = document.getElementById('universityDropdown');

      // Populate dropdown with universities
      populateUniversityDropdown();

      // Toggle filter on/off
      toggle.addEventListener('click', () => {
        filterEnabled = !filterEnabled;
        toggle.classList.toggle('active', filterEnabled);
        input.disabled = !filterEnabled;

        // If enabled and there's a search query, re-run search
        const searchQuery = document.getElementById('searchInput').value.trim();
        if (searchQuery) {
          currentOffset = 0; // Reset offset
          performSearch(searchQuery, 0);
        }
      });

      // Show dropdown on input click
      input.addEventListener('click', () => {
        if (!input.disabled) {
          dropdown.classList.add('visible');
        }
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.university-select')) {
          dropdown.classList.remove('visible');
        }
      });

      // Handle input for search -- show dropdown and filter as you type
      input.addEventListener('input', () => {
        if (!input.disabled) {
          dropdown.classList.add('visible');
          filterUniversityDropdown(input.value);
        }
      });

      // Also show dropdown on focus
      input.addEventListener('focus', () => {
        if (!input.disabled) {
          dropdown.classList.add('visible');
          filterUniversityDropdown(input.value);
        }
      });
    }

    // Populate university dropdown
    function populateUniversityDropdown() {
      const dropdown = document.getElementById('universityDropdown');
      dropdown.innerHTML = '';

      UNIVERSITIES.forEach(uni => {
        const option = document.createElement('div');
        option.className = 'university-option';
        if (uni === selectedUniversity) {
          option.classList.add('selected');
        }
        option.textContent = uni;
        option.addEventListener('click', () => selectUniversity(uni));
        dropdown.appendChild(option);
      });
    }

    // Filter university dropdown based on search
    function filterUniversityDropdown(query) {
      const dropdown = document.getElementById('universityDropdown');
      const options = dropdown.querySelectorAll('.university-option');

      options.forEach(option => {
        const text = option.textContent.toLowerCase();
        const matches = text.includes(query.toLowerCase());
        option.style.display = matches ? 'block' : 'none';
      });
    }

    // Select a university from dropdown
    function selectUniversity(uni) {
      selectedUniversity = uni;
      document.getElementById('universityFilter').value = uni;
      document.getElementById('universityDropdown').classList.remove('visible');

      // Update dropdown selected state
      const options = document.querySelectorAll('.university-option');
      options.forEach(opt => {
        opt.classList.toggle('selected', opt.textContent === uni);
      });

      // Re-run search if there's a query
      const searchQuery = document.getElementById('searchInput').value.trim();
      if (searchQuery && filterEnabled) {
        currentOffset = 0; // Reset offset
        performSearch(searchQuery, 0);
      }
    }

    // Save state to sessionStorage
    function saveState(query, results, cardPositions) {
      sessionStorage.setItem('browseState', JSON.stringify({
        query: query,
        results: results,
        cardPositions: cardPositions,
        filterEnabled: filterEnabled,
        selectedUniversity: selectedUniversity,
        currentOffset: currentOffset,
        hasMore: hasMore,
        timestamp: Date.now()
      }));
    }

    // Restore state from sessionStorage (returns true if state was restored)
    function restoreState() {
      const savedState = sessionStorage.getItem('browseState');
      if (!savedState) return false;

      try {
        const state = JSON.parse(savedState);

        // Only restore if less than 30 minutes old
        if (Date.now() - state.timestamp > 30 * 60 * 1000) {
          sessionStorage.removeItem('browseState');
          return;
        }

        // Restore filter state
        if (state.filterEnabled !== undefined) {
          filterEnabled = state.filterEnabled;
          const toggle = document.getElementById('filterToggle');
          const input = document.getElementById('universityFilter');
          toggle.classList.toggle('active', filterEnabled);
          input.disabled = !filterEnabled;
        }

        if (state.selectedUniversity) {
          selectedUniversity = state.selectedUniversity;
          document.getElementById('universityFilter').value = state.selectedUniversity;
        }

        // Restore pagination state
        if (state.currentOffset !== undefined) {
          currentOffset = state.currentOffset;
        }
        if (state.hasMore !== undefined) {
          hasMore = state.hasMore;
        }

        // Restore search query
        if (state.query) {
          currentQuery = state.query;
          document.getElementById('searchInput').value = state.query;
        }

        // Restore results with saved positions
        if (state.results && state.results.length > 0) {
          displayCards(state.results, state.query, state.cardPositions);

          // Show/hide load more button
          const loadMoreContainer = document.getElementById('loadMoreContainer');
          const hintText = document.getElementById('hintText');
          if (hasMore) {
            loadMoreContainer.style.display = 'block';
            hintText.style.display = 'none';
          } else {
            loadMoreContainer.style.display = 'none';
            hintText.style.display = 'block';
          }
        }
        return true;
      } catch (e) {
        console.error('Error restoring state:', e);
        sessionStorage.removeItem('browseState');
        return false;
      }
    }

    // Real-time search
    function handleSearchInput(e) {
      const query = e.target.value.trim();

      clearTimeout(searchTimeout);

      if (!query) {
        document.getElementById('cardTable').innerHTML = '';
        document.getElementById('loadMoreContainer').style.display = 'none';
        sessionStorage.removeItem('browseState'); // Clear saved state
        currentOffset = 0;
        currentQuery = '';
        // Reload initial notes when search is cleared
        loadInitialNotes();
        return;
      }

      searchTimeout = setTimeout(() => {
        currentOffset = 0; // Reset offset for new search
        performSearch(query, 0);
      }, 300);
    }

    // Perform search
    async function performSearch(query, offset = 0) {
      try {
        // Show loading state only for new searches (not load-more)
        if (offset === 0) {
          showLoading();
        }
        const requestBody = {
          question: query,
          offset: offset
        };

        // Add university filter if enabled
        if (filterEnabled && selectedUniversity) {
          requestBody.university = selectedUniversity;
        }

        // Add advanced filters
        if (activeAdvFilters.course_code) requestBody.course_code = activeAdvFilters.course_code;
        if (activeAdvFilters.professor) requestBody.professor = activeAdvFilters.professor;
        if (activeAdvFilters.username) requestBody.username = activeAdvFilters.username;
        if (activeAdvFilters.file_type) requestBody.file_type = activeAdvFilters.file_type;
        if (activeAdvFilters.sort_by) requestBody.sort_by = activeAdvFilters.sort_by;

        const response = await fetch(`${BACKEND_URL}/api/notes/semantic-browse`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
          // Check if it's a 401 (unauthorized - session expired)
          if (response.status === 401) {
            console.log('Session expired, redirecting to login...');
            window.location.href = 'index.html';
            return;
          }

          // Check if it's a 403 (edu verification required)
          if (response.status === 403) {
            const errorData = await response.json();
            document.getElementById('cardTable').innerHTML = `
              <div class="loading-msg" style="padding: 60px 40px;">
                <div style="font-size: 1.2rem; color: var(--accent-primary); margin-bottom: 16px;">🎓 .edu Email Required</div>
                <div style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6;">
                  Browse requires a verified university .edu email address.<br>
                  Verify your .edu email to access the collective knowledge base.
                </div>
                <a href="account.html" class="load-more-btn">
                  Verify .edu Email
                </a>
              </div>
            `;
            return;
          }
          throw new Error('Search failed');
        }

        const data = await response.json();
        const results = data.notes || data; // Handle both new and old format
        hasMore = data.has_more || false;
        currentQuery = query;
        currentOffset = offset;

        displayCards(results, query);
        window.dispatchEvent(new CustomEvent('sf:search-performed', { detail: { query, resultCount: results.length } }));

        // Show/hide load more button
        const loadMoreContainer = document.getElementById('loadMoreContainer');
        const hintText = document.getElementById('hintText');
        if (hasMore && results.length > 0) {
          loadMoreContainer.style.display = 'block';
          hintText.style.display = 'none';
        } else {
          loadMoreContainer.style.display = 'none';
          if (results.length > 0) {
            setHintText(true);
            hintText.style.display = 'block';
          }
        }

        // Save state
        saveState(query, results, null);

      } catch (error) {
        console.error('Search error:', error);
        document.getElementById('cardTable').innerHTML = '<div class="loading-msg">Unable to search. Please try again.</div>';
      }
    }

    // Display cards scattered on table
    function displayCards(results, query, savedPositions = null) {
      const cardTable = document.getElementById('cardTable');

      if (results.length === 0) {
        cardTable.innerHTML = '<div class="loading-msg">No notes found</div>';
        setHintText(false);
        return;
      }

      // Clear existing cards
      cardTable.innerHTML = '';

      // Update hint text for card interaction
      setHintText(true);

      // Create cards with random scatter positions
      results.forEach((result, index) => {
        const filename = result.filename || 'Untitled';
        const preview = result.content || '';
        const username = result.username || 'Anonymous';
        const university = result.university || 'Unknown';
        const year = result.created_at ? new Date(result.created_at).getFullYear() : new Date().getFullYear();
        const upvotes = result.upvotes || 0;

        // Highlight search terms
        let highlightedPreview = preview;
        if (query) {
          const regex = new RegExp(`(${query})`, 'gi');
          highlightedPreview = highlightedPreview.replace(regex, '<mark>$1</mark>');
        }

        // Use saved position if available, otherwise random
        let cardX, cardY, cardRotation;
        if (savedPositions && savedPositions[result.note_id]) {
          cardX = savedPositions[result.note_id].x;
          cardY = savedPositions[result.note_id].y;
          cardRotation = savedPositions[result.note_id].rotation;
        } else {
          // Random position and rotation
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;
          cardX = Math.random() * (viewportWidth - 400) + 50;
          cardY = Math.random() * (viewportHeight - 350) + 150;
          cardRotation = (Math.random() - 0.5) * 12; // -6 to +6 degrees
        }

        // Create card element
        const card = document.createElement('div');
        card.className = 'note-card';
        card.dataset.noteId = result.note_id;
        card.style.left = `${cardX}px`;
        card.style.top = `${cardY}px`;
        card.style.transform = `rotate(${cardRotation}deg)`;

        // Only animate if not restoring from saved state
        if (!savedPositions) {
          card.style.animation = `cardThrow ${0.5 + index * 0.05}s cubic-bezier(0.34, 1.56, 0.64, 1) forwards`;
        }

        // Determine upvote badge class
        let upvoteBadgeClass = '';
        if (upvotes > 0) {
          upvoteBadgeClass = '';
        } else if (upvotes < 0) {
          upvoteBadgeClass = 'negative';
        } else {
          upvoteBadgeClass = 'zero';
        }

        const upvoteSymbol = upvotes > 0 ? '▲' : (upvotes < 0 ? '▼' : '−');

        card.innerHTML = `
          <div class="card-inner">
            <!-- Front of card -->
            <div class="card-front">
              <div class="upvote-badge ${upvoteBadgeClass}">
                ${upvoteSymbol} ${Math.abs(upvotes)}
              </div>
              <div class="card-title">${filename}</div>
              <div class="card-preview">${highlightedPreview.substring(0, 150)}...</div>
              <div class="card-meta">
                <a href="profile.html?user=${username}" class="username" onclick="event.stopPropagation();" style="color:var(--accent-primary);text-decoration:none;">@${username}</a> · ${university} · ${year}
              </div>
            </div>

            <!-- Back of card -->
            <div class="card-back">
              <div class="upvote-badge ${upvoteBadgeClass}">
                ${upvoteSymbol} ${Math.abs(upvotes)}
              </div>
              <div class="card-back-header">${filename}</div>
              <div class="card-back-content">${highlightedPreview}</div>
              <div class="card-back-footer">
                <div style="color: var(--accent-primary); font-size: 0.7rem;">Opening note...</div>
              </div>
            </div>
          </div>
        `;

        // Click to flip and open
        card.addEventListener('click', (e) => {
          if (isDragging) return; // Don't flip if user was dragging

          // Play flip animation
          card.classList.add('flipped');

          // Wait for flip animation, then open note
          setTimeout(() => {
            openFullNote(result.note_id);
          }, 600); // Match the CSS transition time
        });

        // Drag functionality (desktop only)
        if (window.innerWidth > 768) {
          card.addEventListener('mousedown', startDrag);
        }

        cardTable.appendChild(card);
      });
    }

    // Drag handlers
    function startDrag(e) {
      draggedCard = e.currentTarget;
      const rect = draggedCard.getBoundingClientRect();

      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      isDragging = false; // Reset drag flag

      document.addEventListener('mousemove', drag);
      document.addEventListener('mouseup', stopDrag);

      e.preventDefault();
    }

    function drag(e) {
      if (!draggedCard) return;

      // Check if mouse moved more than 5px to consider it a drag
      const deltaX = Math.abs(e.clientX - dragStartX);
      const deltaY = Math.abs(e.clientY - dragStartY);
      if (deltaX > 5 || deltaY > 5) {
        isDragging = true;
      }

      const x = e.clientX - offsetX;
      const y = e.clientY - offsetY;

      draggedCard.style.left = `${x}px`;
      draggedCard.style.top = `${y}px`;
      draggedCard.style.transform = 'rotate(0deg)'; // Straighten while dragging
    }

    function stopDrag() {
      // Save current positions after drag
      if (isDragging) {
        saveCurrentCardPositions();
      }

      draggedCard = null;
      document.removeEventListener('mousemove', drag);
      document.removeEventListener('mouseup', stopDrag);

      // Reset drag flag after a short delay to prevent click from firing
      setTimeout(() => {
        isDragging = false;
      }, 100);
    }

    // Save current card positions to sessionStorage
    function saveCurrentCardPositions() {
      const savedState = sessionStorage.getItem('browseState');
      if (!savedState) return;

      try {
        const state = JSON.parse(savedState);
        const cardPositions = {};

        // Get all cards and save their positions
        const cards = document.querySelectorAll('.note-card');
        cards.forEach(card => {
          const noteId = card.dataset.noteId;
          const left = parseFloat(card.style.left);
          const top = parseFloat(card.style.top);
          const transform = card.style.transform;

          // Extract rotation from transform
          const rotationMatch = transform.match(/rotate\(([^)]+)\)/);
          const rotation = rotationMatch ? rotationMatch[1] : '0deg';

          cardPositions[noteId] = {
            x: left,
            y: top,
            rotation: rotation
          };
        });

        state.cardPositions = cardPositions;
        sessionStorage.setItem('browseState', JSON.stringify(state));
      } catch (e) {
        console.error('Error saving card positions:', e);
      }
    }

    // Open full note
    function openFullNote(noteId) {
      window.location.href = `note-viewer.html?id=${noteId}`;
    }
  </script>
