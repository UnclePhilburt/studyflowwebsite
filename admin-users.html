<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>User Management - StudyFlow Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f4f0;
      color: #2d2d2d;
      min-height: 100vh;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(248, 247, 244, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(124, 152, 133, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left a {
      color: #7c9885;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .header h1 { font-size: 16px; font-weight: 600; }

    .header-stats {
      font-size: 13px;
      color: #9ca3af;
      font-weight: 500;
    }

    /* Toolbar */
    .toolbar {
      position: fixed;
      top: 56px; left: 0; right: 0;
      height: 56px;
      background: rgba(248, 247, 244, 0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(124, 152, 133, 0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      z-index: 90;
    }

    .search-box {
      flex: 1;
      max-width: 360px;
      padding: 8px 14px;
      border: 1.5px solid rgba(124, 152, 133, 0.2);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: white;
      color: #2d2d2d;
    }

    .search-box:focus { border-color: #7c9885; }
    .search-box::placeholder { color: #bbb; }

    .filter-btn {
      padding: 7px 14px;
      border: 1.5px solid rgba(124, 152, 133, 0.2);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      background: white;
      color: #666;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #7c9885; color: #2d2d2d; }
    .filter-btn.active { background: #7c9885; color: white; border-color: #7c9885; }

    /* Main layout */
    .main {
      display: flex;
      margin-top: 112px;
      height: calc(100vh - 112px);
    }

    /* User list */
    .user-list {
      width: 420px;
      border-right: 1px solid rgba(124, 152, 133, 0.1);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      cursor: pointer;
      transition: background 0.15s;
    }

    .user-row:hover { background: rgba(124, 152, 133, 0.04); }
    .user-row.selected { background: rgba(124, 152, 133, 0.08); }

    .user-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c9885, #6a8573);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-avatar.suspended { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .user-avatar.banned { background: linear-gradient(135deg, #dc2626, #b91c1c); }

    .user-info { flex: 1; min-width: 0; }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      color: #2d2d2d;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-email {
      font-size: 11px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-badges {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge.active { background: rgba(124, 152, 133, 0.1); color: #7c9885; }
    .badge.suspended { background: rgba(245, 158, 11, 0.1); color: #d97706; }
    .badge.banned { background: rgba(220, 38, 38, 0.1); color: #dc2626; }
    .badge.bad_standing { background: rgba(156, 163, 175, 0.15); color: #6b7280; }
    .badge.pro { background: rgba(99, 102, 241, 0.1); color: #6366f1; }

    /* Detail panel */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
    }

    .detail-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #9ca3af;
      font-size: 14px;
    }

    .detail-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 28px;
    }

    .detail-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c9885, #6a8573);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .detail-avatar.suspended { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .detail-avatar.banned { background: linear-gradient(135deg, #dc2626, #b91c1c); }

    .detail-title {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .detail-subtitle {
      font-size: 13px;
      color: #9ca3af;
    }

    .detail-badges {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      padding: 16px;
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 12px;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #2d2d2d;
    }

    .stat-value.danger { color: #dc2626; }
    .stat-value.warning { color: #d97706; }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .info-item {
      padding: 14px;
      background: rgba(248, 247, 244, 0.8);
      border-radius: 10px;
    }

    .info-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 13px;
      font-weight: 500;
      color: #2d2d2d;
    }

    /* Action buttons */
    .action-group {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .action-btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: 2px solid;
      transition: all 0.15s;
    }

    .action-btn.suspend {
      border-color: #f59e0b;
      background: white;
      color: #d97706;
    }

    .action-btn.suspend:hover {
      background: #f59e0b;
      color: white;
    }

    .action-btn.unsuspend {
      border-color: #7c9885;
      background: white;
      color: #7c9885;
    }

    .action-btn.unsuspend:hover {
      background: #7c9885;
      color: white;
    }

    .action-btn.ban {
      border-color: #dc2626;
      background: white;
      color: #dc2626;
    }

    .action-btn.ban:hover {
      background: #dc2626;
      color: white;
    }

    /* Section headers */
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 12px;
    }

    /* Recent notes table */
    .notes-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 28px;
    }

    .notes-table th {
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .notes-table td {
      font-size: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.03);
      color: #2d2d2d;
    }

    .notes-table tr:hover td { background: rgba(124, 152, 133, 0.03); }

    .notes-table .filename {
      font-weight: 500;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .public-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .public-dot.yes { background: #7c9885; }
    .public-dot.no { background: #d1d5db; }

    /* DMCA history */
    .dmca-item {
      padding: 12px;
      background: rgba(220, 38, 38, 0.03);
      border: 1px solid rgba(220, 38, 38, 0.08);
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .dmca-item strong { color: #dc2626; }

    /* Loading & empty states */
    .loading-state {
      padding: 40px;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
    }

    .empty-list {
      padding: 40px;
      text-align: center;
      color: #9ca3af;
      font-size: 13px;
    }

    /* Confirmation modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 16px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
      max-width: 400px;
      width: 100%;
      padding: 24px;
    }

    .modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .modal-input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
    }

    .modal-input:focus { border-color: #7c9885; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .modal-btn.cancel {
      background: rgba(0, 0, 0, 0.05);
      color: #666;
    }

    .modal-btn.confirm-suspend {
      background: #f59e0b;
      color: white;
    }

    .modal-btn.confirm-ban {
      background: #dc2626;
      color: white;
    }

    .modal-btn.confirm-unsuspend {
      background: #7c9885;
      color: white;
    }

    /* Flash */
    .flash-msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      z-index: 400;
      transition: transform 0.3s;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .flash-msg.show { transform: translateX(-50%) translateY(0); }
    .flash-msg.success { background: #7c9885; color: white; }
    .flash-msg.error { background: #dc2626; color: white; }

    @media (max-width: 768px) {
      .user-list { width: 100%; }
      .detail-panel { display: none; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <a href="admin.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h1>User Management</h1>
    </div>
    <div class="header-stats" id="headerStats">Loading...</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox" placeholder="Search by username, email, or university...">
    <button class="filter-btn active" data-filter="" id="filterAll">All</button>
    <button class="filter-btn" data-filter="suspended">Suspended</button>
    <button class="filter-btn" data-filter="banned">Banned</button>
    <button class="filter-btn" data-filter="bad_standing">Bad Standing</button>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="user-list" id="userList">
      <div class="loading-state" id="listLoading">Loading users...</div>
    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty" id="detailEmpty">Select a user to view details</div>
      <div id="detailContent" style="display:none;"></div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalBox">
      <h3 id="modalTitle"></h3>
      <p id="modalDesc"></p>
      <input type="text" class="modal-input" id="modalReason" placeholder="Reason...">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-btn" id="modalConfirm"></button>
      </div>
    </div>
  </div>

  <!-- Flash message -->
  <div class="flash-msg" id="flashMsg"></div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    let adminKey = sessionStorage.getItem('studyflow_admin_key') || '';
    if (!adminKey) window.location.href = 'admin.html';

    let allUsers = [];
    let selectedUserId = null;
    let currentFilter = '';
    let searchTimeout = null;
    let pendingAction = null; // {action, userId, userName}

    // --- Load users ---
    async function loadUsers(search = '', filter = '') {
      document.getElementById('listLoading').style.display = 'block';
      try {
        let url = BACKEND_URL + '/admin/users?key=' + encodeURIComponent(adminKey) + '&limit=200';
        if (filter) url += '&filter=' + filter;

        const res = await fetch(url);
        if (!res.ok) {
          if (res.status === 403) {
            sessionStorage.removeItem('studyflow_admin_key');
            window.location.href = 'admin.html';
            return;
          }
          throw new Error('Failed');
        }

        const data = await res.json();
        allUsers = data.users || [];

        // Client-side search for speed
        let filtered = allUsers;
        if (search) {
          const s = search.toLowerCase();
          filtered = allUsers.filter(u =>
            (u.username || '').toLowerCase().includes(s) ||
            (u.email || '').toLowerCase().includes(s) ||
            (u.full_name || '').toLowerCase().includes(s) ||
            (u.university || '').toLowerCase().includes(s)
          );
        }

        renderUserList(filtered);
        document.getElementById('headerStats').textContent = allUsers.length + ' users total';
      } catch (e) {
        document.getElementById('listLoading').textContent = 'Failed to load users';
        console.error(e);
      }
    }

    function renderUserList(users) {
      const list = document.getElementById('userList');
      document.getElementById('listLoading').style.display = 'none';

      if (users.length === 0) {
        list.innerHTML = '<div class="empty-list">No users found</div>';
        return;
      }

      list.innerHTML = users.map(u => {
        const initial = (u.username || u.email || '?')[0].toUpperCase();
        const avatarClass = u.status === 'banned' ? 'banned' : (u.status === 'suspended' ? 'suspended' : '');
        const selected = u.id === selectedUserId ? 'selected' : '';
        const badges = [];
        if (u.status === 'banned') badges.push('<span class="badge banned">Banned</span>');
        else if (u.status === 'suspended') badges.push('<span class="badge suspended">Suspended</span>');
        else if (u.status === 'bad_standing') badges.push('<span class="badge bad_standing">Bad Standing</span>');
        if (u.subscription !== 'free') badges.push('<span class="badge pro">' + u.subscription + '</span>');

        return `
          <div class="user-row ${selected}" onclick="selectUser('${u.id}')">
            <div class="user-avatar ${avatarClass}">${initial}</div>
            <div class="user-info">
              <div class="user-name">@${u.username || 'no-username'}</div>
              <div class="user-email">${u.email} ${u.university ? '- ' + u.university : ''}</div>
            </div>
            <div class="user-badges">${badges.join('')}</div>
          </div>
        `;
      }).join('');
    }

    // --- Select user -> load detail ---
    async function selectUser(userId) {
      selectedUserId = userId;

      // Highlight in list
      document.querySelectorAll('.user-row').forEach(r => r.classList.remove('selected'));
      const rows = document.querySelectorAll('.user-row');
      rows.forEach(r => { if (r.onclick.toString().includes(userId)) r.classList.add('selected'); });

      document.getElementById('detailEmpty').style.display = 'none';
      const content = document.getElementById('detailContent');
      content.style.display = 'block';
      content.innerHTML = '<div class="loading-state">Loading user details...</div>';

      try {
        const res = await fetch(BACKEND_URL + '/admin/users/' + userId + '?key=' + encodeURIComponent(adminKey));
        if (!res.ok) throw new Error('Failed');
        const user = await res.json();
        renderDetail(user);
      } catch (e) {
        content.innerHTML = '<div class="loading-state">Failed to load user details</div>';
      }
    }

    function renderDetail(u) {
      const content = document.getElementById('detailContent');
      const initial = (u.username || u.email || '?')[0].toUpperCase();
      const avatarClass = u.status === 'banned' ? 'banned' : (u.status === 'suspended' ? 'suspended' : '');
      const joinDate = u.created_at ? new Date(u.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : '--';

      // Status badges
      const badges = [];
      if (u.status === 'banned') badges.push('<span class="badge banned">Banned</span>');
      else if (u.status === 'suspended') badges.push('<span class="badge suspended">Suspended</span>');
      else if (u.status === 'bad_standing') badges.push('<span class="badge bad_standing">Bad Standing</span>');
      else badges.push('<span class="badge active">Active</span>');

      if (u.subscription !== 'free') badges.push('<span class="badge pro">' + u.subscription + '</span>');
      if (u.edu_verified) badges.push('<span class="badge active">.edu Verified</span>');

      // Action buttons
      let actions = '';
      if (u.status === 'banned') {
        actions = '<div style="font-size:12px;color:#9ca3af;">This user is permanently banned.</div>';
      } else if (u.status === 'suspended') {
        actions = `
          <button class="action-btn unsuspend" onclick="openModal('unsuspend', '${u.id}', '${(u.username || u.email).replace(/'/g, "\\'")}')">Unsuspend</button>
          <button class="action-btn ban" onclick="openModal('ban', '${u.id}', '${(u.username || u.email).replace(/'/g, "\\'")}')">Ban Permanently</button>
        `;
      } else {
        actions = `
          <button class="action-btn suspend" onclick="openModal('suspend', '${u.id}', '${(u.username || u.email).replace(/'/g, "\\'")}')">Suspend</button>
          <button class="action-btn ban" onclick="openModal('ban', '${u.id}', '${(u.username || u.email).replace(/'/g, "\\'")}')">Ban Permanently</button>
        `;
      }

      // Recent notes
      let notesHtml = '';
      if (u.recent_notes && u.recent_notes.length > 0) {
        notesHtml = `
          <div class="section-title">Recent Notes</div>
          <table class="notes-table">
            <thead><tr>
              <th>Filename</th><th>University</th><th>Course</th><th>Public</th><th>Uploaded</th>
            </tr></thead>
            <tbody>
              ${u.recent_notes.map(n => `
                <tr>
                  <td class="filename">${n.filename}</td>
                  <td>${n.university || '--'}</td>
                  <td>${n.course_code || '--'}</td>
                  <td><span class="public-dot ${n.is_public ? 'yes' : 'no'}"></span></td>
                  <td>${n.uploaded_at ? new Date(n.uploaded_at).toLocaleDateString() : '--'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      // DMCA history
      let dmcaHtml = '';
      if (u.dmca_history && u.dmca_history.length > 0) {
        dmcaHtml = `
          <div class="section-title">DMCA History</div>
          ${u.dmca_history.map(d => `
            <div class="dmca-item">
              <strong>${d.status || 'pending'}</strong> - ${d.note_filename || 'Unknown file'}
              <br><span style="color:#9ca3af;">${d.reason || ''}</span>
              <br><span style="color:#bbb;font-size:11px;">${d.created_at ? new Date(d.created_at).toLocaleDateString() : ''}</span>
            </div>
          `).join('')}
        `;
      }

      content.innerHTML = `
        <div class="detail-header">
          <div class="detail-avatar ${avatarClass}">${initial}</div>
          <div>
            <div class="detail-title">@${u.username || 'no-username'}</div>
            <div class="detail-subtitle">${u.email} ${u.full_name ? '(' + u.full_name + ')' : ''}</div>
            <div class="detail-badges">${badges.join('')}</div>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Notes</div>
            <div class="stat-value">${u.stats.total_notes}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Conversations</div>
            <div class="stat-value">${u.stats.total_conversations}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">DMCA Strikes</div>
            <div class="stat-value ${u.dmca_strikes >= 2 ? 'danger' : (u.dmca_strikes >= 1 ? 'warning' : '')}">${u.dmca_strikes}/3</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Pages This Month</div>
            <div class="stat-value">${u.pages_uploaded_this_month}</div>
          </div>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">University</div>
            <div class="info-value">${u.university || 'Not set'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Subscription</div>
            <div class="info-value">${u.subscription}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Joined</div>
            <div class="info-value">${joinDate}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Nexus Enabled</div>
            <div class="info-value">${u.nexus_enabled ? 'Yes' : 'No'}</div>
          </div>
          ${u.frozen_reason ? `
          <div class="info-item" style="grid-column:1/-1;">
            <div class="info-label">Suspension Reason</div>
            <div class="info-value" style="color:#d97706;">${u.frozen_reason}</div>
          </div>` : ''}
        </div>

        <div class="section-title">Actions</div>
        <div class="action-group">${actions}</div>

        ${notesHtml}
        ${dmcaHtml}
      `;
    }

    // --- Modal ---
    function openModal(action, userId, userName) {
      pendingAction = { action, userId, userName };
      const overlay = document.getElementById('modalOverlay');
      const title = document.getElementById('modalTitle');
      const desc = document.getElementById('modalDesc');
      const reason = document.getElementById('modalReason');
      const confirm = document.getElementById('modalConfirm');

      reason.value = '';

      if (action === 'suspend') {
        title.textContent = 'Suspend @' + userName;
        desc.textContent = 'This will freeze the account. The user will be notified.';
        reason.placeholder = 'Reason for suspension...';
        reason.style.display = 'block';
        confirm.textContent = 'Suspend';
        confirm.className = 'modal-btn confirm-suspend';
      } else if (action === 'unsuspend') {
        title.textContent = 'Unsuspend @' + userName;
        desc.textContent = 'This will restore the account. The user will be notified.';
        reason.style.display = 'none';
        confirm.textContent = 'Unsuspend';
        confirm.className = 'modal-btn confirm-unsuspend';
      } else if (action === 'ban') {
        title.textContent = 'Ban @' + userName;
        desc.textContent = 'This is permanent. Sets 3 DMCA strikes, freezes the account, and hides all their notes from Nexus. The user will be notified.';
        reason.placeholder = 'Reason for ban...';
        reason.style.display = 'block';
        confirm.textContent = 'Ban Permanently';
        confirm.className = 'modal-btn confirm-ban';
      }

      confirm.onclick = () => executeAction();
      overlay.style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
      pendingAction = null;
    }

    async function executeAction() {
      if (!pendingAction) return;
      const { action, userId } = pendingAction;
      const reason = document.getElementById('modalReason').value.trim();

      closeModal();

      try {
        const endpoint = action === 'unsuspend'
          ? `/admin/users/${userId}/unsuspend`
          : `/admin/users/${userId}/${action}`;

        const body = { key: adminKey };
        if (reason) body.reason = reason;

        const res = await fetch(BACKEND_URL + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        if (!res.ok) throw new Error('Action failed');

        showFlash(action === 'suspend' ? 'User suspended' : action === 'ban' ? 'User banned' : 'User unsuspended', 'success');

        // Refresh
        await selectUser(userId);
        await loadUsers(document.getElementById('searchBox').value.trim(), currentFilter);

      } catch (e) {
        showFlash('Action failed: ' + e.message, 'error');
      }
    }

    function showFlash(msg, type) {
      const el = document.getElementById('flashMsg');
      el.textContent = msg;
      el.className = 'flash-msg ' + type + ' show';
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    // --- Search & filter ---
    document.getElementById('searchBox').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim();
      searchTimeout = setTimeout(() => {
        // Filter client-side from already loaded users
        if (!query) {
          renderUserList(allUsers);
        } else {
          const s = query.toLowerCase();
          renderUserList(allUsers.filter(u =>
            (u.username || '').toLowerCase().includes(s) ||
            (u.email || '').toLowerCase().includes(s) ||
            (u.full_name || '').toLowerCase().includes(s) ||
            (u.university || '').toLowerCase().includes(s)
          ));
        }
      }, 200);
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        loadUsers(document.getElementById('searchBox').value.trim(), currentFilter);
      });
    });

    // Escape closes modal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // Init
    loadUsers();
  </script>
</body>
</html>
