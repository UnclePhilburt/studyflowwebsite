<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Flashcards - StudyFlow Suite</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f7f4;
      color: #2d2d2d;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: relative;
      -webkit-user-select: none;
      user-select: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(124, 152, 133, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(232, 155, 95, 0.04) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #7c9885;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 10px;
      transition: background 0.2s;
      text-decoration: none;
    }

    .back-btn:hover { background: rgba(124, 152, 133, 0.1); }

    .back-btn svg {
      width: 18px; height: 18px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .top-bar-info {
      text-align: right;
      font-size: 12px;
      color: #9ca3af;
    }

    .streak-display {
      font-size: 14px;
      font-weight: 700;
      color: #e89b5f;
    }

    /* ─── Topic Input Screen ─── */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    .topic-screen {
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 32px;
    }

    .topic-icon {
      width: 72px; height: 72px;
      background: rgba(124, 152, 133, 0.1);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
    }

    .topic-icon svg {
      width: 36px; height: 36px;
      stroke: #7c9885; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .topic-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      color: #2d2d2d;
      text-align: center;
    }

    .topic-subtitle {
      font-size: 15px;
      color: #9ca3af;
      text-align: center;
      max-width: 360px;
      line-height: 1.6;
      margin-top: -16px;
    }

    .topic-input-wrap {
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    .topic-input {
      width: 100%;
      padding: 16px 56px 16px 20px;
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.7);
      font-family: inherit;
      font-size: 16px;
      color: #2d2d2d;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .topic-input::placeholder { color: #c4c4c4; }

    .topic-input:focus {
      border-color: #7c9885;
      box-shadow: 0 0 0 4px rgba(124, 152, 133, 0.1);
    }

    .topic-go-btn {
      position: absolute;
      right: 6px; top: 50%; transform: translateY(-50%);
      width: 42px; height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c9885, #6a8573);
      border: none;
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .topic-go-btn:hover { transform: translateY(-50%) scale(1.05); }
    .topic-go-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: translateY(-50%); }

    .topic-go-btn svg {
      width: 20px; height: 20px;
      stroke: white; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ─── Loading Screen ─── */
    .loading-screen {
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(124, 152, 133, 0.15);
      border-top-color: #7c9885;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 16px; color: #9ca3af; font-weight: 500;
    }

    .loading-subtext {
      font-size: 13px; color: #c4c4c4;
    }

    /* ─── Quiz Screen ─── */
    .quiz-screen { position: relative; }

    .progress-bar-wrap {
      padding: 0 20px;
      flex-shrink: 0;
    }

    .progress-bar {
      height: 4px;
      background: rgba(124, 152, 133, 0.12);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c9885, #e89b5f);
      border-radius: 4px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .quiz-counter {
      text-align: center;
      padding: 12px 0 4px;
      font-size: 13px;
      color: #9ca3af;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Card Area */
    .card-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px 20px;
      position: relative;
      overflow: hidden;
    }

    .swipe-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid rgba(124, 152, 133, 0.15);
      border-radius: 24px;
      padding: 32px 24px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      gap: 24px;
      cursor: grab;
      touch-action: pan-y;
      transition: box-shadow 0.3s;
      position: relative;
      will-change: transform;
    }

    .swipe-card:active { cursor: grabbing; }

    .swipe-card.correct {
      border-color: #34a853;
      box-shadow: 0 0 40px rgba(52, 168, 83, 0.2);
    }

    .swipe-card.incorrect {
      border-color: #ea4335;
      box-shadow: 0 0 40px rgba(234, 67, 53, 0.2);
    }

    .card-question {
      font-size: 18px;
      font-weight: 600;
      color: #2d2d2d;
      text-align: center;
      line-height: 1.5;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124, 152, 133, 0.2), transparent);
    }

    .card-hint {
      text-align: center;
      font-size: 11px;
      color: #c4c4c4;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card-option {
      padding: 16px 12px;
      border-radius: 14px;
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
      color: #2d2d2d;
      transition: all 0.2s;
    }

    .card-option.left {
      background: rgba(99, 102, 241, 0.08);
      border: 1.5px solid rgba(99, 102, 241, 0.2);
    }

    .card-option.right {
      background: rgba(232, 155, 95, 0.08);
      border: 1.5px solid rgba(232, 155, 95, 0.2);
    }

    .card-option.highlight-left {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.5);
      transform: scale(1.03);
    }

    .card-option.highlight-right {
      background: rgba(232, 155, 95, 0.2);
      border-color: rgba(232, 155, 95, 0.5);
      transform: scale(1.03);
    }

    .swipe-indicators {
      display: flex;
      justify-content: space-between;
      padding: 0 4px;
    }

    .swipe-indicator {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.4;
    }

    .swipe-indicator.left-ind { color: #6366f1; }
    .swipe-indicator.right-ind { color: #e89b5f; }

    /* Feedback overlay */
    .feedback-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
    }

    .feedback-overlay.show { opacity: 1; }

    .feedback-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .feedback-icon.correct-icon {
      background: rgba(52, 168, 83, 0.15);
      color: #34a853;
    }

    .feedback-icon.incorrect-icon {
      background: rgba(234, 67, 53, 0.15);
      color: #ea4335;
    }

    @keyframes popIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    /* ─── Results Screen ─── */
    .results-screen {
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 24px;
    }

    .results-circle {
      width: 140px; height: 140px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .results-circle svg {
      position: absolute;
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }

    .results-circle .bg { stroke: rgba(124, 152, 133, 0.1); }
    .results-circle .fg {
      stroke: #7c9885;
      transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .results-score {
      font-family: 'Lora', serif;
      font-size: 36px;
      font-weight: 600;
      color: #2d2d2d;
    }

    .results-label {
      font-size: 15px;
      color: #9ca3af;
      text-align: center;
    }

    .results-topic {
      font-size: 13px;
      color: #b0b0b0;
      text-align: center;
      font-style: italic;
    }

    .results-stats {
      display: flex;
      gap: 32px;
    }

    .results-stat {
      text-align: center;
    }

    .results-stat-num {
      font-size: 24px;
      font-weight: 700;
      color: #7c9885;
    }

    .results-stat-num.wrong { color: #ea4335; }

    .results-stat-label {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .results-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .result-btn {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .result-btn.primary {
      background: linear-gradient(135deg, #7c9885, #6a8573);
      color: white;
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.25);
    }

    .result-btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 152, 133, 0.35);
    }

    .result-btn.secondary {
      background: rgba(124, 152, 133, 0.1);
      color: #7c9885;
    }

    .result-btn.secondary:hover { background: rgba(124, 152, 133, 0.18); }

    /* ─── Error state ─── */
    .error-msg {
      color: #ea4335;
      font-size: 13px;
      text-align: center;
      margin-top: 8px;
    }

    /* ─── Mobile tweaks ─── */
    @media (max-width: 480px) {
      .topic-title { font-size: 24px; }
      .card-question { font-size: 16px; min-height: 60px; }
      .card-option { padding: 14px 10px; font-size: 14px; }
      .swipe-card { padding: 24px 18px 18px; gap: 18px; }
      .results-circle { width: 120px; height: 120px; }
      .results-score { font-size: 30px; }
    }

    @media (min-width: 769px) {
      .swipe-card { max-width: 480px; }
      .card-question { font-size: 20px; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <a href="dashboard.html" class="back-btn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <div class="top-bar-info">
      <div class="streak-display" id="streakDisplay"></div>
    </div>
  </div>

  <!-- Screen: Topic Input -->
  <div class="screen topic-screen active" id="topicScreen">
    <div class="topic-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M8 6h8"/><path d="M8 10h8"/><path d="M8 14h4"/></svg>
    </div>
    <div class="topic-title">Quick Quiz</div>
    <div class="topic-subtitle">Type any topic and we'll generate questions from the Nexus notes</div>
    <div class="topic-input-wrap">
      <input type="text" class="topic-input" id="topicInput" placeholder="e.g. Photosynthesis, Civil War, Calculus..." autocomplete="off">
      <button class="topic-go-btn" id="topicGoBtn" onclick="startQuiz()">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="error-msg" id="topicError"></div>
  </div>

  <!-- Screen: Loading -->
  <div class="screen loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Generating questions...</div>
    <div class="loading-subtext" id="loadingSubtext">Searching Nexus notes</div>
  </div>

  <!-- Screen: Quiz -->
  <div class="screen quiz-screen" id="quizScreen">
    <div class="progress-bar-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>
    <div class="quiz-counter" id="quizCounter">1 / 15</div>

    <div class="card-area" id="cardArea">
      <div class="swipe-card" id="swipeCard">
        <div class="card-question" id="cardQuestion">Loading...</div>
        <div class="card-divider"></div>
        <div class="card-hint">Swipe toward your answer</div>
        <div class="card-options">
          <div class="card-option left" id="optionLeft"></div>
          <div class="card-option right" id="optionRight"></div>
        </div>
        <div class="swipe-indicators">
          <div class="swipe-indicator left-ind">Swipe left</div>
          <div class="swipe-indicator right-ind">Swipe right</div>
        </div>
      </div>

      <div class="feedback-overlay" id="feedbackOverlay">
        <div class="feedback-icon" id="feedbackIcon"></div>
      </div>
    </div>
  </div>

  <!-- Screen: Results -->
  <div class="screen results-screen" id="resultsScreen">
    <div class="results-circle">
      <svg viewBox="0 0 140 140">
        <circle class="bg" cx="70" cy="70" r="62" fill="none" stroke-width="8"/>
        <circle class="fg" id="resultCircle" cx="70" cy="70" r="62" fill="none" stroke-width="8"
          stroke-dasharray="389.56" stroke-dashoffset="389.56" stroke-linecap="round"/>
      </svg>
      <div class="results-score" id="resultScore">0%</div>
    </div>
    <div class="results-label" id="resultLabel">Nice work!</div>
    <div class="results-topic" id="resultTopic"></div>
    <div class="results-stats">
      <div class="results-stat">
        <div class="results-stat-num" id="resultCorrect">0</div>
        <div class="results-stat-label">Correct</div>
      </div>
      <div class="results-stat">
        <div class="results-stat-num wrong" id="resultWrong">0</div>
        <div class="results-stat-label">Missed</div>
      </div>
    </div>
    <div class="results-actions">
      <button class="result-btn primary" onclick="retryMissed()" id="retryBtn">Retry Missed</button>
      <button class="result-btn secondary" onclick="newQuiz()">New Topic</button>
    </div>
  </div>
</div>

<script>
  var BACKEND_URL = 'https://studyflowsuite.onrender.com';
  var SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

  var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  var authToken = null;
  var questions = [];
  var currentIndex = 0;
  var correctCount = 0;
  var streak = 0;
  var maxStreak = 0;
  var missed = [];
  var currentTopic = '';
  var isAnimating = false;

  // ─── Auth ───
  (async function() {
    var sess = await supabaseClient.auth.getSession();
    if (!sess.data.session) { window.location.href = 'index.html'; return; }
    authToken = sess.data.session.access_token;
  })();

  // ─── Screen management ───
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  // ─── Start quiz ───
  async function startQuiz() {
    var topic = document.getElementById('topicInput').value.trim();
    if (!topic) return;

    currentTopic = topic;
    document.getElementById('topicError').textContent = '';
    showScreen('loadingScreen');
    document.getElementById('loadingSubtext').textContent = 'Searching Nexus notes for "' + topic + '"';

    var prompt = 'Generate exactly 15 quiz questions about "' + topic + '" based on the study notes available. ' +
      'Each question should have exactly two answer choices where only one is correct. ' +
      'Mix multiple choice and true/false questions. ' +
      'Return ONLY a valid JSON array with no other text, in this exact format: ' +
      '[{"question":"What is...?","left":"Answer A","right":"Answer B","correct":"left"}] ' +
      'where "correct" is either "left" or "right". Make questions educational and clear.';

    try {
      var resp = await fetch(BACKEND_URL + '/api/notes/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + authToken
        },
        body: JSON.stringify({ message: prompt, source: 'flashcard' })
      });

      if (!resp.ok) throw new Error('HTTP ' + resp.status);

      var data = await resp.json();
      var text = data.response || '';

      // Extract JSON array from response
      var jsonMatch = text.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error('No valid questions generated');

      questions = JSON.parse(jsonMatch[0]);
      if (!Array.isArray(questions) || questions.length === 0) throw new Error('Empty questions');

      // Validate structure
      questions = questions.filter(function(q) {
        return q.question && q.left && q.right && (q.correct === 'left' || q.correct === 'right');
      });

      if (questions.length === 0) throw new Error('No valid questions after filtering');

      currentIndex = 0;
      correctCount = 0;
      streak = 0;
      maxStreak = 0;
      missed = [];

      showScreen('quizScreen');
      renderCard();

    } catch (err) {
      console.error('Quiz generation error:', err);
      showScreen('topicScreen');
      document.getElementById('topicError').textContent = 'Could not generate questions. Try a different topic.';
    }
  }

  // Enter key to start
  document.getElementById('topicInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') startQuiz();
  });

  // ─── Render card ───
  function renderCard() {
    if (currentIndex >= questions.length) { showResults(); return; }

    var q = questions[currentIndex];
    document.getElementById('cardQuestion').textContent = q.question;
    document.getElementById('optionLeft').textContent = q.left;
    document.getElementById('optionRight').textContent = q.right;
    document.getElementById('quizCounter').textContent = (currentIndex + 1) + ' / ' + questions.length;
    document.getElementById('progressFill').style.width = ((currentIndex / questions.length) * 100) + '%';
    document.getElementById('streakDisplay').textContent = streak > 0 ? streak + ' streak' : '';

    // Reset card state
    var card = document.getElementById('swipeCard');
    card.style.transition = 'none';
    card.style.transform = 'translateX(0) rotate(0deg)';
    card.className = 'swipe-card';
    document.getElementById('optionLeft').className = 'card-option left';
    document.getElementById('optionRight').className = 'card-option right';
    document.getElementById('feedbackOverlay').classList.remove('show');
    isAnimating = false;

    // Force reflow
    card.offsetHeight;
    card.style.transition = '';
  }

  // ─── Swipe handling ───
  var startX = 0, currentX = 0, isDragging = false;
  var card = document.getElementById('swipeCard');
  var cardArea = document.getElementById('cardArea');

  function onStart(x) {
    if (isAnimating) return;
    isDragging = true;
    startX = x;
    currentX = 0;
    card.style.transition = 'none';
  }

  function onMove(x) {
    if (!isDragging || isAnimating) return;
    currentX = x - startX;
    var rotate = currentX * 0.08;
    card.style.transform = 'translateX(' + currentX + 'px) rotate(' + rotate + 'deg)';

    var leftOpt = document.getElementById('optionLeft');
    var rightOpt = document.getElementById('optionRight');

    if (currentX < -40) {
      leftOpt.className = 'card-option left highlight-left';
      rightOpt.className = 'card-option right';
    } else if (currentX > 40) {
      rightOpt.className = 'card-option right highlight-right';
      leftOpt.className = 'card-option left';
    } else {
      leftOpt.className = 'card-option left';
      rightOpt.className = 'card-option right';
    }
  }

  function onEnd() {
    if (!isDragging || isAnimating) return;
    isDragging = false;

    var threshold = cardArea.offsetWidth * 0.2;

    if (Math.abs(currentX) > threshold) {
      var choice = currentX < 0 ? 'left' : 'right';
      submitAnswer(choice);
    } else {
      card.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
      card.style.transform = 'translateX(0) rotate(0deg)';
      document.getElementById('optionLeft').className = 'card-option left';
      document.getElementById('optionRight').className = 'card-option right';
    }
  }

  // Touch events
  card.addEventListener('touchstart', function(e) { onStart(e.touches[0].clientX); }, { passive: true });
  card.addEventListener('touchmove', function(e) { onMove(e.touches[0].clientX); }, { passive: true });
  card.addEventListener('touchend', function() { onEnd(); });

  // Mouse events
  card.addEventListener('mousedown', function(e) { e.preventDefault(); onStart(e.clientX); });
  document.addEventListener('mousemove', function(e) { onMove(e.clientX); });
  document.addEventListener('mouseup', function() { onEnd(); });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (isAnimating) return;
    if (!document.getElementById('quizScreen').classList.contains('active')) return;
    if (e.key === 'ArrowLeft') submitAnswer('left');
    else if (e.key === 'ArrowRight') submitAnswer('right');
  });

  // Click on options
  document.getElementById('optionLeft').addEventListener('click', function() {
    if (!isAnimating) submitAnswer('left');
  });
  document.getElementById('optionRight').addEventListener('click', function() {
    if (!isAnimating) submitAnswer('right');
  });

  // ─── Submit answer ───
  function submitAnswer(choice) {
    if (isAnimating || currentIndex >= questions.length) return;
    isAnimating = true;

    var q = questions[currentIndex];
    var isCorrect = choice === q.correct;

    // Animate card out
    var direction = choice === 'left' ? -1 : 1;
    card.style.transition = 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
    card.style.transform = 'translateX(' + (direction * cardArea.offsetWidth) + 'px) rotate(' + (direction * 20) + 'deg)';

    // Show feedback
    card.classList.add(isCorrect ? 'correct' : 'incorrect');
    var overlay = document.getElementById('feedbackOverlay');
    var icon = document.getElementById('feedbackIcon');
    icon.className = 'feedback-icon ' + (isCorrect ? 'correct-icon' : 'incorrect-icon');
    icon.textContent = isCorrect ? '\u2713' : '\u2717';
    overlay.classList.add('show');

    if (isCorrect) {
      correctCount++;
      streak++;
      if (streak > maxStreak) maxStreak = streak;
    } else {
      streak = 0;
      missed.push(q);
    }

    setTimeout(function() {
      currentIndex++;
      renderCard();
    }, 600);
  }

  // ─── Results ───
  function showResults() {
    showScreen('resultsScreen');

    var total = questions.length;
    var pct = Math.round((correctCount / total) * 100);

    document.getElementById('resultScore').textContent = pct + '%';
    document.getElementById('resultCorrect').textContent = correctCount;
    document.getElementById('resultWrong').textContent = total - correctCount;
    document.getElementById('resultTopic').textContent = '"' + currentTopic + '"';

    // Progress circle
    var circumference = 389.56;
    var offset = circumference - (pct / 100) * circumference;
    setTimeout(function() {
      document.getElementById('resultCircle').style.strokeDashoffset = offset;
    }, 100);

    // Label
    var label = 'Keep practicing!';
    if (pct === 100) label = 'Perfect score!';
    else if (pct >= 80) label = 'Great job!';
    else if (pct >= 60) label = 'Good effort!';
    document.getElementById('resultLabel').textContent = label;

    // Retry button visibility
    document.getElementById('retryBtn').style.display = missed.length > 0 ? '' : 'none';

    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('streakDisplay').textContent = maxStreak > 1 ? 'Best: ' + maxStreak + ' streak' : '';
  }

  function retryMissed() {
    questions = missed.slice();
    missed = [];
    currentIndex = 0;
    correctCount = 0;
    streak = 0;

    // Reset circle
    document.getElementById('resultCircle').style.strokeDashoffset = '389.56';

    showScreen('quizScreen');
    renderCard();
  }

  function newQuiz() {
    // Reset circle
    document.getElementById('resultCircle').style.strokeDashoffset = '389.56';

    document.getElementById('topicInput').value = '';
    document.getElementById('streakDisplay').textContent = '';
    showScreen('topicScreen');
    document.getElementById('topicInput').focus();
  }
</script>
</body>
</html>
