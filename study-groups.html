<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Study Groups - Collaborate with classmates on StudyFlow Suite.">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Study Groups - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #FAF8F5; --bg-secondary: rgba(255,255,255,0.6); --bg-tertiary: rgba(255,255,255,0.9);
      --text-primary: #2C2C2C; --text-secondary: #8B7E73; --text-muted: #9B8B7E;
      --accent-primary: #8B9D83; --accent-secondary: #7A8C73; --accent-tertiary: #D4A574;
      --border-color: rgba(139,157,131,0.2); --hover-bg: rgba(139,157,131,0.06);
      --widget-bg: rgba(255,255,255,0.7); --shadow: rgba(0,0,0,0.04);
    }

    body[data-theme="dark"] {
      --bg-primary: #1a1a1a; --bg-secondary: rgba(40,40,40,0.8); --bg-tertiary: rgba(50,50,50,0.9);
      --text-primary: #f5f5f5; --text-secondary: #d0d0d0; --text-muted: #a0a0a0;
      --accent-primary: #7c9885; --accent-secondary: #6a8573; --accent-tertiary: #e89b5f;
      --border-color: rgba(124,152,133,0.3); --hover-bg: rgba(124,152,133,0.15);
      --widget-bg: rgba(40,40,40,0.8); --shadow: rgba(0,0,0,0.3);
    }

    body[data-theme="ocean"] {
      --bg-primary: #F0F8FF; --bg-secondary: rgba(230,245,255,0.6); --bg-tertiary: rgba(240,250,255,0.9);
      --text-primary: #1e3a5f; --text-secondary: #4a6b8a; --text-muted: #7a9cb8;
      --accent-primary: #4a90a4; --accent-secondary: #3a7a8e; --accent-tertiary: #5fb3c8;
      --border-color: rgba(74,144,164,0.2); --hover-bg: rgba(74,144,164,0.06);
      --widget-bg: rgba(255,255,255,0.7); --shadow: rgba(0,0,0,0.04);
    }

    body[data-theme="sunset"] {
      --bg-primary: #FFF5F0; --bg-secondary: rgba(255,240,230,0.6); --bg-tertiary: rgba(255,245,238,0.9);
      --text-primary: #4a2c2a; --text-secondary: #8a5a4a; --text-muted: #b88a7a;
      --accent-primary: #d17a5f; --accent-secondary: #b86a4f; --accent-tertiary: #e89b7f;
      --border-color: rgba(209,122,95,0.2); --hover-bg: rgba(209,122,95,0.06);
      --widget-bg: rgba(255,255,255,0.7); --shadow: rgba(0,0,0,0.04);
    }

    body[data-theme="minimal"] {
      --bg-primary: #fff; --bg-secondary: rgba(245,245,245,0.6); --bg-tertiary: rgba(250,250,250,0.9);
      --text-primary: #1a1a1a; --text-secondary: #666; --text-muted: #999;
      --accent-primary: #4a4a4a; --accent-secondary: #3a3a3a; --accent-tertiary: #6a6a6a;
      --border-color: rgba(74,74,74,0.2); --hover-bg: rgba(74,74,74,0.06);
      --widget-bg: rgba(250,250,250,0.7); --shadow: rgba(0,0,0,0.04);
    }

    body[data-theme="forest"] {
      --bg-primary: #F5F9F5; --bg-secondary: rgba(235,245,235,0.6); --bg-tertiary: rgba(245,250,245,0.9);
      --text-primary: #2a3a2a; --text-secondary: #4a6a4a; --text-muted: #7a9a7a;
      --accent-primary: #5a8a5a; --accent-secondary: #4a7a4a; --accent-tertiary: #7aaa7a;
      --border-color: rgba(90,138,90,0.2); --hover-bg: rgba(90,138,90,0.06);
      --widget-bg: rgba(255,255,255,0.7); --shadow: rgba(0,0,0,0.04);
    }

    body[data-theme="lavender"] {
      --bg-primary: #F8F5FF; --bg-secondary: rgba(245,235,255,0.6); --bg-tertiary: rgba(250,245,255,0.9);
      --text-primary: #3a2a4a; --text-secondary: #6a5a8a; --text-muted: #9a8ab8;
      --accent-primary: #8a7aa4; --accent-secondary: #7a6a94; --accent-tertiary: #aa9ac8;
      --border-color: rgba(138,122,164,0.2); --hover-bg: rgba(138,122,164,0.06);
      --widget-bg: rgba(255,255,255,0.7); --shadow: rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* ============ TOP NAV ============ */
    .top-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--bg-tertiary);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 100;
    }

    .top-nav a { color: var(--accent-primary); text-decoration: none; display: flex; align-items: center; }
    .top-nav h1 { font-size: 16px; font-weight: 600; flex: 1; }

    .nav-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: none;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .nav-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

    .nav-btn.primary {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border: none;
    }

    .nav-btn.primary:hover { box-shadow: 0 4px 16px var(--shadow); }

    /* ============ GROUP LIST ============ */
    .group-list {
      padding: 72px 24px 24px;
      max-width: 800px;
      margin: 0 auto;
      overflow-y: auto;
      height: 100vh;
    }

    .group-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .group-list-title {
      font-family: 'Lora', serif;
      font-size: 28px;
      font-weight: 500;
    }

    .group-card {
      background: var(--widget-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .group-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--accent-primary);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .group-card:hover { border-color: var(--accent-primary); box-shadow: 0 8px 32px var(--shadow); transform: translateY(-2px); }
    .group-card:hover::before { opacity: 1; }

    .group-card-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .group-card-icon svg { width: 22px; height: 22px; stroke: white; fill: none; stroke-width: 2; }

    .group-card-info { flex: 1; min-width: 0; }

    .group-card-name {
      font-family: 'Lora', serif;
      font-size: 16px; font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .group-card-preview {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .group-card-meta {
      display: flex; align-items: center; gap: 12px;
      margin-top: 6px; font-size: 11px; color: var(--text-muted);
    }

    .group-card-meta svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

    .group-card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .role-badge {
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .role-badge.owner { background: linear-gradient(135deg, var(--accent-tertiary), #d4864a); color: white; }
    .role-badge.member { background: var(--hover-bg); color: var(--accent-primary); border: 1px solid var(--border-color); }

    .group-empty {
      text-align: center; padding: 80px 20px; color: var(--text-muted);
    }

    .group-empty h3 { font-family: 'Lora', serif; font-size: 22px; color: var(--text-secondary); margin-bottom: 8px; }

    /* ============ GROUP DETAIL (SPLIT VIEW) ============ */
    .group-detail {
      display: none;
      height: 100vh;
      padding-top: 56px;
    }

    .group-detail.active { display: flex; }

    /* Chat panel (left) */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      min-width: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

    .chat-day-sep {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 12px 0;
      font-weight: 500;
    }

    .chat-msg {
      display: flex;
      gap: 10px;
      max-width: 70%;
      margin-bottom: 2px;
    }

    .chat-msg.self { align-self: flex-end; flex-direction: row-reverse; }
    .chat-msg.other { align-self: flex-start; }

    .chat-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .chat-msg.self .chat-avatar { background: var(--accent-secondary); }

    .chat-msg-body { min-width: 0; }

    .chat-msg-name {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 2px;
      padding: 0 4px;
    }

    .chat-msg.self .chat-msg-name { text-align: right; }

    .chat-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
    }

    .chat-msg.self .chat-bubble {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: white;
      border-bottom-right-radius: 4px;
    }

    .chat-msg.other .chat-bubble {
      background: var(--hover-bg);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: 4px;
    }

    .chat-msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      padding: 0 4px;
    }

    .chat-msg.self .chat-msg-time { text-align: right; }

    .chat-empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      text-align: center; color: var(--text-muted); padding: 40px;
    }

    .chat-empty-state h3 { font-family: 'Lora', serif; font-size: 20px; color: var(--text-secondary); margin-bottom: 8px; }

    .chat-input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
      display: flex; align-items: flex-end; gap: 10px;
    }

    .chat-input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: var(--bg-tertiary);
      font-family: inherit; font-size: 14px;
      color: var(--text-primary);
      resize: none; outline: none;
      max-height: 120px; line-height: 1.5;
    }

    .chat-input:focus { border-color: var(--accent-primary); }
    .chat-input::placeholder { color: var(--text-muted); }

    .chat-send {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border: none; color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: all 0.2s;
    }

    .chat-send:hover { transform: scale(1.05); }
    .chat-send:disabled { opacity: 0.4; }

    /* Side panel (right) */
    .side-panel {
      width: 320px;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      flex-shrink: 0;
    }

    .side-panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex; gap: 4px;
    }

    .side-tab {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 12px; font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .side-tab:hover { color: var(--text-primary); }
    .side-tab.active { background: var(--accent-primary); color: white; }

    .side-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .side-section-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Member list */
    .member-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
    }

    .member-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent-primary); color: white;
      font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }

    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .member-role { font-size: 11px; color: var(--text-muted); }

    .member-remove {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 4px; font-size: 14px;
      opacity: 0; transition: opacity 0.15s;
    }

    .member-item:hover .member-remove { opacity: 1; }

    /* Note items */
    .note-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px; border-radius: 10px;
      background: var(--hover-bg); margin-bottom: 8px;
      cursor: pointer; transition: all 0.15s;
    }

    .note-item:hover { background: var(--border-color); }

    .note-item-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--accent-primary); color: white;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .note-item-icon svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2; }

    .note-item-info { flex: 1; min-width: 0; }
    .note-item-name { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item-meta { font-size: 11px; color: var(--text-muted); }

    /* Invite section */
    .invite-input-row {
      display: flex; gap: 8px; margin-bottom: 12px;
    }

    .invite-input {
      flex: 1; padding: 8px 12px; border-radius: 8px;
      border: 1px solid var(--border-color); background: var(--bg-tertiary);
      font-size: 13px; font-family: inherit; color: var(--text-primary); outline: none;
    }

    .invite-input:focus { border-color: var(--accent-primary); }

    .invite-btn {
      padding: 8px 14px; border-radius: 8px;
      background: var(--accent-primary); color: white;
      border: none; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }

    /* Upload note btn */
    .upload-note-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 8px;
      background: none; border: 1px dashed var(--border-color);
      color: var(--text-muted); font-size: 12px; font-weight: 500;
      font-family: inherit; cursor: pointer; width: 100%;
      justify-content: center; margin-bottom: 12px; transition: all 0.15s;
    }

    .upload-note-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

    /* Action buttons */
    .danger-btn {
      padding: 8px 14px; border-radius: 8px;
      background: rgba(220,38,38,0.06); border: 1px solid rgba(220,38,38,0.15);
      color: #dc2626; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer; width: 100%;
      text-align: center; margin-top: 16px; transition: all 0.15s;
    }

    .danger-btn:hover { background: #dc2626; color: white; }

    /* Create group modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      z-index: 300; align-items: center; justify-content: center; padding: 24px;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--bg-tertiary); border-radius: 16px;
      box-shadow: 0 16px 48px var(--shadow);
      max-width: 400px; width: 100%; padding: 24px;
    }

    .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

    .modal input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border-color);
      border-radius: 10px; font-size: 14px; font-family: inherit;
      color: var(--text-primary); background: var(--bg-primary); outline: none; margin-bottom: 16px;
    }

    .modal input:focus { border-color: var(--accent-primary); }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    .modal-btn {
      padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none;
    }

    .modal-btn.cancel { background: var(--hover-bg); color: var(--text-secondary); }
    .modal-btn.confirm { background: var(--accent-primary); color: white; }

    /* Loading */
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border-color); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .side-panel { display: none; }
      .group-list { padding: 72px 16px 24px; }
    }
  </style>
</head>
<body>
  <script>(function(){ document.body.setAttribute('data-theme', localStorage.getItem('dashboard-theme') || 'default'); })();</script>

  <!-- Top Nav -->
  <div class="top-nav">
    <a href="dashboard.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Study Groups</h1>
    <button class="nav-btn primary" id="createBtn" onclick="document.getElementById('createModal').classList.add('show')">+ Create Group</button>
  </div>

  <!-- Group List View -->
  <div class="group-list" id="groupList">
    <div class="spinner" id="listLoading"></div>
    <div id="listContent" style="display:none;"></div>
  </div>

  <!-- Group Detail View (Split) -->
  <div class="group-detail" id="groupDetail">
    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-empty-state" id="chatEmpty">
          <div>
            <h3>Start the conversation</h3>
            <p>Send a message to your study group</p>
          </div>
        </div>
      </div>
      <div class="chat-input-bar">
        <textarea class="chat-input" id="chatInput" placeholder="Message the group..." rows="1"></textarea>
        <button class="chat-send" id="chatSend" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel">
      <div class="side-panel-header">
        <button class="side-tab active" data-tab="members" onclick="switchSideTab('members', this)">Members</button>
        <button class="side-tab" data-tab="notes" onclick="switchSideTab('notes', this)">Notes</button>
        <button class="side-tab" data-tab="settings" onclick="switchSideTab('settings', this)">Settings</button>
      </div>
      <div class="side-content" id="sideContent"></div>
    </div>
  </div>

  <!-- Create Group Modal -->
  <div class="modal-overlay" id="createModal">
    <div class="modal">
      <h3>Create Study Group</h3>
      <input type="text" id="createNameInput" placeholder="Group name (e.g., Bio 101 Study Group)">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="document.getElementById('createModal').classList.remove('show')">Cancel</button>
        <button class="modal-btn confirm" onclick="createGroup()">Create</button>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal">
      <h3 id="confirmTitle"></h3>
      <p id="confirmMsg" style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;line-height:1.5;"></p>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="hideConfirm()">Cancel</button>
        <button class="modal-btn confirm" id="confirmAction" style="background:#dc2626;"></button>
      </div>
    </div>
  </div>

  <input type="file" id="noteFileInput" style="display:none;" accept=".pdf,.doc,.docx,.txt,.ppt,.pptx,.xls,.xlsx,.png,.jpg,.jpeg">

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null, accessToken = null;
    let groups = [], currentGroup = null, currentGroupDetail = null;
    let realtimeChannel = null, chatSending = false;
    let confirmCallback = null;
    let currentSideTab = 'members';

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken };
    }

    async function apiFetch(path, opts = {}) {
      const res = await fetch(BACKEND_URL + path, { ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) } });
      return res.ok ? res.json() : null;
    }

    // ============ GROUP LIST ============
    async function loadGroups() {
      const data = await apiFetch('/api/groups');
      groups = data ? (data.groups || data || []) : [];
      renderGroupList();
    }

    function renderGroupList() {
      const content = document.getElementById('listContent');
      document.getElementById('listLoading').style.display = 'none';
      content.style.display = 'block';

      if (groups.length === 0) {
        content.innerHTML = '<div class="group-empty"><h3>No study groups yet</h3><p>Create one to start collaborating with classmates</p></div>';
        return;
      }

      content.innerHTML = groups.map(g => {
        const role = (g.members || []).find(m => m.user_id === currentUser.id);
        const roleName = role ? role.role : 'member';
        const memberCount = g.member_count || (g.members || []).length || 0;
        return `
          <div class="group-card" onclick="openGroup('${g.id}')">
            <div class="group-card-icon">
              <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div class="group-card-info">
              <div class="group-card-name">${g.name || 'Unnamed Group'}</div>
              <div class="group-card-meta">
                <span><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> ${memberCount} members</span>
              </div>
            </div>
            <div class="group-card-right">
              <span class="role-badge ${roleName}">${roleName}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // ============ GROUP DETAIL ============
    async function openGroup(groupId) {
      currentGroup = groupId;
      document.getElementById('groupList').style.display = 'none';
      document.getElementById('groupDetail').classList.add('active');
      document.querySelector('.top-nav h1').innerHTML = `<a href="#" onclick="closeGroup();return false;" style="color:var(--text-muted);margin-right:8px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></a> Loading...`;
      document.getElementById('createBtn').style.display = 'none';

      const data = await apiFetch('/api/groups/' + groupId);
      if (!data) { closeGroup(); return; }
      currentGroupDetail = data.group || data;

      document.querySelector('.top-nav h1').innerHTML = `<a href="#" onclick="closeGroup();return false;" style="color:var(--text-muted);margin-right:8px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></a> ${currentGroupDetail.name || 'Group'}`;

      renderSidePanel();
      loadChatHistory();
      subscribeRealtime(groupId);
    }

    function closeGroup() {
      currentGroup = null;
      currentGroupDetail = null;
      unsubscribeRealtime();
      document.getElementById('groupDetail').classList.remove('active');
      document.getElementById('groupList').style.display = 'block';
      document.querySelector('.top-nav h1').textContent = 'Study Groups';
      document.getElementById('createBtn').style.display = '';
      loadGroups();
    }

    // ============ SIDE PANEL ============
    function switchSideTab(tab, btn) {
      currentSideTab = tab;
      document.querySelectorAll('.side-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderSidePanel();
    }

    function renderSidePanel() {
      const el = document.getElementById('sideContent');
      if (!currentGroupDetail) return;

      const members = currentGroupDetail.members || [];
      const notes = currentGroupDetail.notes || [];
      const isOwner = members.find(m => m.user_id === currentUser.id && m.role === 'owner');

      if (currentSideTab === 'members') {
        el.innerHTML = `
          <div class="side-section-title">Invite</div>
          <div class="invite-input-row">
            <input class="invite-input" id="inviteInput" placeholder="Username to invite...">
            <button class="invite-btn" onclick="inviteUser()">Invite</button>
          </div>
          <div class="side-section-title">Members (${members.length})</div>
          ${members.map(m => `
            <div class="member-item">
              <div class="member-avatar">${(m.username || m.email || '?')[0].toUpperCase()}</div>
              <div class="member-info">
                <div class="member-name">@${m.username || m.email || 'Unknown'}</div>
                <div class="member-role">${m.role}</div>
              </div>
              ${isOwner && m.user_id !== currentUser.id ? `<button class="member-remove" onclick="removeMember('${m.user_id}')">&times;</button>` : ''}
            </div>
          `).join('')}
          ${!isOwner ? '<button class="danger-btn" onclick="leaveGroup()">Leave Group</button>' : ''}
        `;
      } else if (currentSideTab === 'notes') {
        el.innerHTML = `
          <label class="upload-note-btn" for="noteFileInput">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload Note
          </label>
          <div class="side-section-title">Shared Notes (${notes.length})</div>
          ${notes.length === 0 ? '<p style="font-size:12px;color:var(--text-muted);">No notes shared yet</p>' : ''}
          ${notes.map(n => `
            <div class="note-item" onclick="downloadNote('${n.id}')">
              <div class="note-item-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
              <div class="note-item-info">
                <div class="note-item-name">${n.original_filename || n.filename || 'File'}</div>
                <div class="note-item-meta">${n.username ? '@' + n.username : ''}</div>
              </div>
            </div>
          `).join('')}
        `;
      } else if (currentSideTab === 'settings') {
        el.innerHTML = `
          <div class="side-section-title">Group Settings</div>
          <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">${currentGroupDetail.name}</p>
          ${isOwner ? '<button class="danger-btn" onclick="deleteGroup()">Delete Group</button>' : '<button class="danger-btn" onclick="leaveGroup()">Leave Group</button>'}
        `;
      }
    }

    // ============ CHAT ============
    async function loadChatHistory() {
      const el = document.getElementById('chatMessages');
      el.innerHTML = '';
      const data = await apiFetch('/api/groups/' + currentGroup + '/messages');
      const messages = data ? (data.messages || data || []) : [];
      if (messages.length === 0) {
        el.innerHTML = '<div class="chat-empty-state"><div><h3>Start the conversation</h3><p>Send a message to your study group</p></div></div>';
        return;
      }
      let lastDate = '';
      messages.forEach(m => {
        const msgDate = m.created_at ? new Date(m.created_at).toLocaleDateString() : '';
        if (msgDate && msgDate !== lastDate) {
          el.innerHTML += `<div class="chat-day-sep">${msgDate}</div>`;
          lastDate = msgDate;
        }
        appendMessage(m, false);
      });
      scrollChatBottom();
    }

    function appendMessage(msg, scroll = true) {
      const el = document.getElementById('chatMessages');
      const empty = document.getElementById('chatEmpty');
      if (empty) empty.remove();

      const isSelf = msg.user_id === currentUser.id;
      const isAI = msg.role === 'assistant' || msg.is_ai;
      const cls = isSelf ? 'self' : 'other';
      const initial = (msg.sender_username || msg.username || '?')[0].toUpperCase();
      const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : '';

      const div = document.createElement('div');
      div.className = `chat-msg ${cls}`;
      div.innerHTML = `
        <div class="chat-avatar">${isAI ? 'AI' : initial}</div>
        <div class="chat-msg-body">
          <div class="chat-msg-name">${isAI ? 'StudyFlow AI' : (msg.sender_username || msg.username || 'Unknown')}</div>
          <div class="chat-bubble">${msg.content || ''}</div>
          <div class="chat-msg-time">${time}</div>
        </div>
      `;
      el.appendChild(div);
      if (scroll) scrollChatBottom();
    }

    function scrollChatBottom() {
      requestAnimationFrame(() => {
        const el = document.getElementById('chatMessages');
        el.scrollTop = el.scrollHeight;
      });
    }

    async function sendChat() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || chatSending) return;
      chatSending = true;
      input.value = '';
      updateSendState();

      appendMessage({ user_id: currentUser.id, sender_username: currentUser.email, content: text, created_at: new Date().toISOString() });

      await apiFetch('/api/groups/' + currentGroup + '/chat', { method: 'POST', body: JSON.stringify({ message: text }) });
      chatSending = false;
      updateSendState();
    }

    function updateSendState() {
      document.getElementById('chatSend').disabled = !document.getElementById('chatInput').value.trim() || chatSending;
    }

    document.getElementById('chatInput').addEventListener('input', updateSendState);
    document.getElementById('chatInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });
    document.getElementById('chatSend').addEventListener('click', sendChat);

    // ============ REALTIME ============
    function subscribeRealtime(groupId) {
      unsubscribeRealtime();
      realtimeChannel = supabaseClient.channel('group-' + groupId)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'study_group_messages', filter: 'group_id=eq.' + groupId }, (payload) => {
          const msg = payload.new;
          if (msg.user_id === currentUser.id && !msg.is_ai && msg.role !== 'assistant') return;
          appendMessage(msg);
        }).subscribe();
    }

    function unsubscribeRealtime() {
      if (realtimeChannel) { supabaseClient.removeChannel(realtimeChannel); realtimeChannel = null; }
    }

    // ============ ACTIONS ============
    async function createGroup() {
      const name = document.getElementById('createNameInput').value.trim();
      if (!name) return;
      const data = await apiFetch('/api/groups', { method: 'POST', body: JSON.stringify({ name }) });
      document.getElementById('createModal').classList.remove('show');
      document.getElementById('createNameInput').value = '';
      if (data && (data.id || data.group_id)) {
        openGroup(data.id || data.group_id);
      } else {
        loadGroups();
      }
    }

    async function inviteUser() {
      const username = document.getElementById('inviteInput').value.trim();
      if (!username) return;
      await apiFetch('/api/groups/' + currentGroup + '/invite', { method: 'POST', body: JSON.stringify({ username }) });
      document.getElementById('inviteInput').value = '';
      const data = await apiFetch('/api/groups/' + currentGroup);
      if (data) { currentGroupDetail = data.group || data; renderSidePanel(); }
    }

    async function removeMember(userId) {
      showConfirm('Remove Member', 'Remove this member from the group?', 'Remove', async () => {
        await apiFetch('/api/groups/' + currentGroup + '/members/' + userId, { method: 'DELETE' });
        const data = await apiFetch('/api/groups/' + currentGroup);
        if (data) { currentGroupDetail = data.group || data; renderSidePanel(); }
      });
    }

    async function leaveGroup() {
      showConfirm('Leave Group', 'You will no longer have access to this group.', 'Leave', async () => {
        await apiFetch('/api/groups/' + currentGroup + '/members/' + currentUser.id, { method: 'DELETE' });
        closeGroup();
      });
    }

    async function deleteGroup() {
      showConfirm('Delete Group', 'This will permanently delete the group and all its data.', 'Delete', async () => {
        await apiFetch('/api/groups/' + currentGroup, { method: 'DELETE' });
        closeGroup();
      });
    }

    async function downloadNote(noteId) {
      const data = await apiFetch('/api/groups/' + currentGroup + '/notes/' + noteId + '/download');
      if (data && data.url) window.open(data.url, '_blank');
    }

    document.getElementById('noteFileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file || !currentGroup) return;
      const formData = new FormData();
      formData.append('file', file);
      await fetch(BACKEND_URL + '/api/groups/' + currentGroup + '/notes/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + accessToken },
        body: formData
      });
      e.target.value = '';
      const data = await apiFetch('/api/groups/' + currentGroup);
      if (data) { currentGroupDetail = data.group || data; renderSidePanel(); }
    });

    function showConfirm(title, msg, action, callback) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmMsg').textContent = msg;
      document.getElementById('confirmAction').textContent = action;
      confirmCallback = callback;
      document.getElementById('confirmAction').onclick = async () => { hideConfirm(); if (confirmCallback) await confirmCallback(); };
      document.getElementById('confirmModal').classList.add('show');
    }

    function hideConfirm() { document.getElementById('confirmModal').classList.remove('show'); }

    // ============ INIT ============
    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      currentUser = session.user;
      accessToken = session.access_token;
      loadGroups();
    }

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { hideConfirm(); document.getElementById('createModal').classList.remove('show'); } });

    init();
  </script>
</body>
</html>
