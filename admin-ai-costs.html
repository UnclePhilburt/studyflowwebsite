<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>AI Costs - StudyFlow Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f4f0;
      color: #2d2d2d;
      min-height: 100vh;
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(248, 247, 244, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(124, 152, 133, 0.1);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      z-index: 100;
    }

    .header a {
      color: #7c9885;
      text-decoration: none;
      display: flex;
      align-items: center;
    }

    .header h1 { font-size: 16px; font-weight: 600; }

    .content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 24px 40px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .summary-card {
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 14px;
      padding: 20px;
    }

    .summary-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 700;
      color: #2d2d2d;
      line-height: 1;
    }

    .summary-sub {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 8px;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 32px;
    }

    .chart-card {
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 14px;
      padding: 20px;
    }

    .chart-card.full-width { grid-column: 1 / -1; }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 16px;
    }

    .chart-container {
      position: relative;
      height: 220px;
    }

    /* Breakdown table */
    .breakdown-table {
      width: 100%;
      border-collapse: collapse;
    }

    .breakdown-table th {
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .breakdown-table td {
      font-size: 13px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.03);
    }

    .breakdown-table tr:hover td { background: rgba(124, 152, 133, 0.03); }

    .cost-val { font-weight: 600; font-variant-numeric: tabular-nums; }
    .cost-val.green { color: #7c9885; }

    /* Provider bar */
    .provider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    }

    .provider-row:last-child { border-bottom: none; }

    .provider-name {
      width: 100px;
      font-size: 13px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .provider-bar {
      flex: 1;
      height: 8px;
      background: rgba(0, 0, 0, 0.04);
      border-radius: 4px;
      overflow: hidden;
    }

    .provider-bar-fill {
      height: 100%;
      border-radius: 4px;
    }

    .provider-cost {
      width: 80px;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #2d2d2d;
    }

    .empty-msg {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 80px 24px;
      color: #9ca3af;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <a href="admin.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>AI Cost Tracker</h1>
  </div>

  <div class="content">
    <div class="loading" id="loadingState">Loading cost data...</div>
    <div id="dashboard" style="display:none;">
      <div class="summary-grid" id="summaryGrid"></div>

      <div class="chart-grid">
        <div class="chart-card full-width">
          <div class="chart-title">Daily AI Spend (Last 30 Days)</div>
          <div class="chart-container">
            <canvas id="costChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Spend by Provider (30 Days)</div>
          <div id="providerBreakdown"></div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Today's Usage</div>
          <div id="todayBreakdown"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const adminKey = sessionStorage.getItem('studyflow_admin_key') || '';
    if (!adminKey) window.location.href = 'admin.html';

    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.size = 11;
    Chart.defaults.color = '#9ca3af';

    const providerColors = {
      openai: '#10a37f',
      gemini: '#4285f4',
      anthropic: '#d4a574',
      cohere: '#6366f1'
    };

    async function loadCosts() {
      try {
        const res = await fetch(BACKEND_URL + '/admin/ai-costs?key=' + encodeURIComponent(adminKey));
        if (!res.ok) {
          if (res.status === 403) {
            sessionStorage.removeItem('studyflow_admin_key');
            window.location.href = 'admin.html';
            return;
          }
          throw new Error('Failed');
        }

        const data = await res.json();
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

        renderSummary(data);
        renderCostChart(data.dates, data.daily_totals);
        renderProviders(data.provider_totals);
        renderToday(data.today_breakdown, data.today_calls);

      } catch (e) {
        document.getElementById('loadingState').textContent = 'Failed to load: ' + e.message;
      }
    }

    function fmt(cost) {
      if (cost >= 1) return '$' + cost.toFixed(2);
      if (cost >= 0.01) return '$' + cost.toFixed(3);
      return '$' + cost.toFixed(4);
    }

    function renderSummary(data) {
      const grid = document.getElementById('summaryGrid');
      const todayTotal = data.daily_totals.length > 0 ? data.daily_totals[data.daily_totals.length - 1] : 0;
      const todayCalls = data.today_calls ? data.today_calls.reduce((sum, c) => sum + c.count, 0) : 0;

      grid.innerHTML = `
        <div class="summary-card">
          <div class="summary-label">Today</div>
          <div class="summary-value">${fmt(todayTotal)}</div>
          <div class="summary-sub">${todayCalls} API calls</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Last 7 Days</div>
          <div class="summary-value">${fmt(data.seven_day_total)}</div>
          <div class="summary-sub">avg ${fmt(data.seven_day_total / 7)}/day</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">This Month</div>
          <div class="summary-value">${fmt(data.month_total)}</div>
          <div class="summary-sub">${data.last_month_total > 0 ? 'Last month: ' + fmt(data.last_month_total) : 'First month tracking'}</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Projected Monthly</div>
          <div class="summary-value">${fmt(data.seven_day_total / 7 * 30)}</div>
          <div class="summary-sub">Based on 7-day average</div>
        </div>
      `;
    }

    function renderCostChart(dates, totals) {
      const labels = dates.map(d => {
        const dt = new Date(d + 'T00:00:00');
        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      });

      new Chart(document.getElementById('costChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            data: totals,
            backgroundColor: 'rgba(124, 152, 133, 0.15)',
            borderColor: 'rgba(124, 152, 133, 1)',
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => fmt(ctx.parsed.y)
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { maxTicksLimit: 8 } },
            y: {
              beginAtZero: true,
              grid: { color: 'rgba(0,0,0,0.04)' },
              ticks: { callback: (v) => '$' + v.toFixed(3) }
            }
          }
        }
      });
    }

    function renderProviders(providers) {
      const el = document.getElementById('providerBreakdown');
      if (!providers || providers.length === 0) {
        el.innerHTML = '<div class="empty-msg">No data yet</div>';
        return;
      }

      const max = providers[0].cost;
      el.innerHTML = providers.map(p => {
        const color = providerColors[p.provider] || '#9ca3af';
        const pct = max > 0 ? (p.cost / max * 100).toFixed(0) : 0;
        return `
          <div class="provider-row">
            <div class="provider-name">${p.provider}</div>
            <div class="provider-bar">
              <div class="provider-bar-fill" style="width:${pct}%;background:${color}"></div>
            </div>
            <div class="provider-cost">${fmt(p.cost)}</div>
          </div>
        `;
      }).join('');
    }

    function renderToday(breakdown, calls) {
      const el = document.getElementById('todayBreakdown');

      if ((!breakdown || breakdown.length === 0) && (!calls || calls.length === 0)) {
        el.innerHTML = '<div class="empty-msg">No API calls today yet</div>';
        return;
      }

      // Merge cost and call data
      const callMap = {};
      if (calls) calls.forEach(c => { callMap[c.name] = c.count; });

      const rows = (breakdown || []).map(b => ({
        name: b.name,
        cost: b.cost,
        calls: callMap[b.name] || 0
      }));

      el.innerHTML = `
        <table class="breakdown-table">
          <thead><tr><th>Endpoint</th><th>Calls</th><th>Cost</th></tr></thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td>${r.name}</td>
                <td>${r.calls}</td>
                <td class="cost-val green">${fmt(r.cost)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    loadCosts();
  </script>
</body>
</html>
