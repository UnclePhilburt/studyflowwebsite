<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Calendar - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8ede8 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .header-title {
      font-size: 28px;
      font-weight: 700;
      color: #2d2d2d;
      margin-bottom: 8px;
    }

    .header-subtitle {
      color: #5d5d5d;
      font-size: 15px;
    }

    .upload-section {
      background: white;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 16px;
    }

    .upload-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 14px;
      font-weight: 500;
      color: #2d2d2d;
      margin-bottom: 8px;
    }

    .form-group input, .form-group select {
      padding: 12px 16px;
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #7c9885;
      box-shadow: 0 0 0 3px rgba(124, 152, 133, 0.1);
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
      width: 100%;
    }

    .file-input-wrapper input[type=file] {
      position: absolute;
      left: -9999px;
    }

    .file-input-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      background: rgba(124, 152, 133, 0.1);
      border: 2px dashed rgba(124, 152, 133, 0.3);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #6b8575;
      font-weight: 500;
    }

    .file-input-label:hover {
      background: rgba(124, 152, 133, 0.15);
      border-color: #7c9885;
    }

    .upload-btn {
      grid-column: 1 / -1;
      padding: 14px 32px;
      background: linear-gradient(135deg, #7c9885 0%, #6b8575 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 152, 133, 0.3);
    }

    .calendar-section {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .events-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .event-card {
      background: rgba(124, 152, 133, 0.05);
      border: 2px solid rgba(124, 152, 133, 0.15);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.3s ease;
    }

    .event-card:hover {
      border-color: #7c9885;
      box-shadow: 0 2px 8px rgba(124, 152, 133, 0.15);
    }

    .event-card.completed {
      opacity: 0.6;
      background: rgba(0, 0, 0, 0.02);
    }

    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 8px;
    }

    .event-title {
      font-size: 16px;
      font-weight: 600;
      color: #2d2d2d;
    }

    .event-type {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(124, 152, 133, 0.15);
      color: #6b8575;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .event-details {
      color: #5d5d5d;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .event-date {
      color: #7c9885;
      font-weight: 600;
    }

    .event-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .event-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .complete-btn {
      background: rgba(124, 152, 133, 0.15);
      color: #6b8575;
    }

    .complete-btn:hover {
      background: rgba(124, 152, 133, 0.25);
    }

    .delete-btn {
      background: rgba(217, 83, 79, 0.15);
      color: #d9534f;
    }

    .delete-btn:hover {
      background: rgba(217, 83, 79, 0.25);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #5d5d5d;
    }

    @media (max-width: 768px) {
      .upload-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="header-title">My Calendar</h1>
      <p class="header-subtitle">Upload your syllabus to automatically extract assignments and exams</p>
    </div>

    <!-- Upload Syllabus Section -->
    <div class="upload-section">
      <h2 class="section-title">Upload Course Syllabus</h2>
      <form id="uploadForm" class="upload-form">
        <div class="form-group">
          <label>Course Name *</label>
          <input type="text" id="courseName" placeholder="e.g., Introduction to Psychology" required>
        </div>

        <div class="form-group">
          <label>Course Code</label>
          <input type="text" id="courseCode" placeholder="e.g., PSY101">
        </div>

        <div class="form-group">
          <label>Professor Name</label>
          <input type="text" id="professorName" placeholder="e.g., Dr. Smith">
        </div>

        <div class="form-group">
          <label>Semester</label>
          <input type="text" id="semester" placeholder="e.g., Fall 2026">
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
          <label>Syllabus File (PDF or DOCX) *</label>
          <div class="file-input-wrapper">
            <input type="file" id="fileInput" accept=".pdf,.docx,.doc" required>
            <label for="fileInput" class="file-input-label">
              <span id="fileLabel">Choose File (PDF or DOCX)</span>
            </label>
          </div>
        </div>

        <button type="submit" class="upload-btn">Upload & Extract Calendar Events</button>
      </form>
    </div>

    <!-- Calendar Events Section -->
    <div class="calendar-section">
      <h2 class="section-title">Upcoming Events</h2>
      <div id="eventsContainer" class="loading">Loading events...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let authToken = null;

    // Check auth and load events
    (async function() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      authToken = session.access_token;
      await loadEvents();
    })();

    // File input label update
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const fileName = e.target.files[0]?.name || 'Choose File (PDF or DOCX)';
      document.getElementById('fileLabel').textContent = fileName;
    });

    // Upload syllabus form
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData();
      formData.append('file', document.getElementById('fileInput').files[0]);
      formData.append('course_name', document.getElementById('courseName').value);
      formData.append('course_code', document.getElementById('courseCode').value);
      formData.append('professor_name', document.getElementById('professorName').value);
      formData.append('semester', document.getElementById('semester').value);

      const uploadBtn = document.querySelector('.upload-btn');
      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Uploading & Extracting...';

      try {
        const response = await fetch(`${BACKEND_URL}/api/syllabus/upload`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${authToken}`
          },
          body: formData
        });

        const data = await response.json();

        if (response.ok) {
          alert(`Success! Extracted ${data.events.length} calendar events`);
          document.getElementById('uploadForm').reset();
          document.getElementById('fileLabel').textContent = 'Choose File (PDF or DOCX)';
          await loadEvents();
        } else {
          alert('Upload failed: ' + (data.error || 'Unknown error'));
        }
      } catch (error) {
        console.error('Upload error:', error);
        alert('Upload failed: ' + error.message);
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.textContent = 'Upload & Extract Calendar Events';
      }
    });

    // Load calendar events
    async function loadEvents() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/calendar/events`, {
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        const data = await response.json();

        if (response.ok) {
          displayEvents(data.events);
        } else {
          document.getElementById('eventsContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>Failed to load events</p></div>';
        }
      } catch (error) {
        console.error('Load events error:', error);
        document.getElementById('eventsContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>Error loading events</p></div>';
      }
    }

    // Display events
    function displayEvents(events) {
      const container = document.getElementById('eventsContainer');

      if (!events || events.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📅</div><p>No events yet. Upload a syllabus to get started!</p></div>';
        return;
      }

      container.innerHTML = '<div class="events-list">' +
        events.map(event => `
          <div class="event-card ${event.completed ? 'completed' : ''}">
            <div class="event-header">
              <div>
                <div class="event-title">${event.title}</div>
                <div class="event-details">
                  <span class="event-date">${formatDate(event.due_date)}${event.due_time ? ' at ' + event.due_time : ''}</span>
                  ${event.course_name ? ' • ' + event.course_name : ''}
                  ${event.course_code ? ' (' + event.course_code + ')' : ''}
                </div>
                ${event.description ? '<div class="event-details">' + event.description + '</div>' : ''}
              </div>
              <span class="event-type">${event.event_type}</span>
            </div>
            <div class="event-actions">
              <button class="event-btn complete-btn" onclick="toggleComplete('${event.id}', ${!event.completed})">
                ${event.completed ? 'Mark Incomplete' : 'Mark Complete'}
              </button>
              <button class="event-btn delete-btn" onclick="deleteEvent('${event.id}')">Delete</button>
            </div>
          </div>
        `).join('') +
        '</div>';
    }

    // Toggle event completion
    async function toggleComplete(eventId, completed) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/calendar/events/${eventId}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ completed: completed })
        });

        if (response.ok) {
          await loadEvents();
        } else {
          alert('Failed to update event');
        }
      } catch (error) {
        console.error('Toggle complete error:', error);
        alert('Failed to update event');
      }
    }

    // Delete event
    async function deleteEvent(eventId) {
      if (!confirm('Are you sure you want to delete this event?')) return;

      try {
        const response = await fetch(`${BACKEND_URL}/api/calendar/events/${eventId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${authToken}`
          }
        });

        if (response.ok) {
          await loadEvents();
        } else {
          alert('Failed to delete event');
        }
      } catch (error) {
        console.error('Delete event error:', error);
        alert('Failed to delete event');
      }
    }

    // Format date helper
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }
  </script>
</body>
</html>
