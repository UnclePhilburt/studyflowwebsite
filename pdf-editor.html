<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotate PDF - StudyFlow Suite</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f5f4f0 0%, #ede9e4 100%);
      min-height: 100vh;
      color: #2d2d2d;
      overflow: hidden;
    }

    /* ---- Header ---- */
    .editor-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: white;
      border-bottom: 1px solid #e0ddd8;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }

    .back-link {
      color: #7c9885;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .back-link:hover { color: #6a8573; }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #2d2d2d;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-nav-btn {
      background: #f5f4f0;
      border: 1px solid #e0ddd8;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #2d2d2d;
      transition: background 0.15s;
    }

    .page-nav-btn:hover:not(:disabled) { background: #ede9e4; }
    .page-nav-btn:disabled { opacity: 0.4; cursor: default; }

    .page-indicator {
      font-size: 13px;
      color: #666;
      min-width: 100px;
      text-align: center;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      justify-content: flex-end;
    }

    .save-status {
      font-size: 12px;
      color: #999;
    }

    .save-status.unsaved { color: #e89b5f; }
    .save-status.saving { color: #7c9885; }
    .save-status.saved { color: #999; }
    .save-status.error { color: #d9534f; }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: #7c9885;
      color: white;
    }

    .btn-primary:hover { background: #6a8573; }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }

    /* ---- Toolbar ---- */
    .toolbar {
      position: fixed;
      top: 56px;
      left: 0;
      width: 64px;
      bottom: 0;
      background: white;
      border-right: 1px solid #e0ddd8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 4px;
      z-index: 90;
      overflow-y: auto;
    }

    .tool-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      position: relative;
    }

    .tool-btn:hover { background: #f5f4f0; }
    .tool-btn.active { background: #7c9885; color: white; }
    .tool-btn.active svg { stroke: white; }

    .tool-btn svg {
      width: 20px;
      height: 20px;
      stroke: #555;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tool-label {
      font-size: 9px;
      color: #999;
      margin-top: 2px;
      text-align: center;
    }

    .tool-btn.active + .tool-label { color: #7c9885; }

    .toolbar-divider {
      width: 36px;
      height: 1px;
      background: #e0ddd8;
      margin: 8px 0;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #2d2d2d; }

    .stroke-btn {
      width: 36px;
      height: 28px;
      border: 1px solid #e0ddd8;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #666;
      transition: all 0.15s;
    }

    .stroke-btn:hover { background: #f5f4f0; }
    .stroke-btn.active { border-color: #7c9885; background: #f0f5f2; }

    /* ---- Canvas viewport ---- */
    .canvas-viewport {
      position: fixed;
      top: 56px;
      left: 64px;
      right: 0;
      bottom: 0;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      background: #e8e4df;
    }

    .canvas-wrapper {
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      background: white;
    }

    #annotation-canvas {
      display: block;
    }

    /* ---- Loading ---- */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #f5f4f0 0%, #ede9e4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .loading-overlay .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0ddd8;
      border-top-color: #7c9885;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-overlay p {
      margin-top: 16px;
      color: #666;
      font-size: 14px;
    }

    /* ---- Error ---- */
    .error-page {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #f5f4f0 0%, #ede9e4 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .error-page h2 { color: #d9534f; margin-bottom: 12px; }
    .error-page p { color: #666; margin-bottom: 24px; }

    /* ---- Save Modal ---- */
    .save-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
      backdrop-filter: blur(4px);
    }
    .save-modal-overlay.active { display: flex; }

    .save-modal {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
    }
    .save-modal h3 {
      font-size: 18px;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 8px;
    }
    .save-modal p {
      font-size: 14px;
      color: #7a7a7a;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .save-modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .save-modal-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .save-modal-btn.primary {
      background: linear-gradient(135deg, #7c9885 0%, #6b8575 100%);
      color: white;
    }
    .save-modal-btn.primary:hover {
      box-shadow: 0 4px 16px rgba(124, 152, 133, 0.4);
      transform: translateY(-1px);
    }
    .save-modal-btn.secondary {
      background: linear-gradient(135deg, #e89b5f 0%, #d4783d 100%);
      color: white;
    }
    .save-modal-btn.secondary:hover {
      box-shadow: 0 4px 16px rgba(232, 155, 95, 0.4);
      transform: translateY(-1px);
    }
    .save-modal-btn.ghost {
      background: transparent;
      color: #7a7a7a;
      border: 1px solid #e0ddd8;
    }
    .save-modal-btn.ghost:hover {
      background: rgba(124, 152, 133, 0.06);
      color: #2d2d2d;
    }
  </style>
</head>
<body>

  <!-- Save Choice Modal -->
  <div class="save-modal-overlay" id="saveModal">
    <div class="save-modal">
      <h3>Save annotations</h3>
      <p id="saveModalMsg">How would you like to save your changes?</p>
      <div class="save-modal-actions">
        <button class="save-modal-btn primary" id="saveOverwriteBtn">Overwrite original note</button>
        <button class="save-modal-btn secondary" id="saveNewBtn">Save as a new note</button>
        <button class="save-modal-btn ghost" onclick="closeSaveModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <p>Loading PDF editor...</p>
  </div>

  <!-- Error -->
  <div class="error-page" id="error-page" style="display:none;">
    <h2>Failed to load</h2>
    <p id="error-msg">Something went wrong.</p>
    <a href="javascript:history.back()" class="btn btn-primary">Go Back</a>
  </div>

  <!-- Header -->
  <div class="editor-header" id="editor-header" style="display:none;">
    <div class="header-left">
      <a class="back-link" id="back-link" href="javascript:history.back()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 12L6 8l4-4"/></svg>
        Back
      </a>
      <span class="header-title" id="header-title">Untitled</span>
    </div>
    <div class="header-center">
      <button class="page-nav-btn" id="prev-btn" onclick="changePage(-1)" disabled>Prev</button>
      <span class="page-indicator" id="page-indicator">Page 1 of 1</span>
      <button class="page-nav-btn" id="next-btn" onclick="changePage(1)" disabled>Next</button>
    </div>
    <div class="header-right">
      <span class="save-status saved" id="save-status">All changes saved</span>
      <button class="btn btn-primary" id="save-btn" onclick="saveAnnotations()">Save</button>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar" style="display:none;">
    <!-- Select -->
    <button class="tool-btn active" data-tool="select" onclick="setTool('select')" title="Select (V)">
      <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 2-3 7z"/></svg>
    </button>
    <div class="tool-label">Select</div>

    <!-- Highlight -->
    <button class="tool-btn" data-tool="highlight" onclick="setTool('highlight')" title="Highlight (H)">
      <svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="1"/></svg>
    </button>
    <div class="tool-label">Highlight</div>

    <!-- Draw -->
    <button class="tool-btn" data-tool="draw" onclick="setTool('draw')" title="Draw (D)">
      <svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg>
    </button>
    <div class="tool-label">Draw</div>

    <!-- Text -->
    <button class="tool-btn" data-tool="text" onclick="setTool('text')" title="Text (T)">
      <svg viewBox="0 0 24 24"><path d="M4 7V4h16v3"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
    </button>
    <div class="tool-label">Text</div>

    <!-- Eraser -->
    <button class="tool-btn" data-tool="eraser" onclick="setTool('eraser')" title="Eraser (E)">
      <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l9-9 8 8-4 4"/><line x1="6" y1="11" x2="13" y2="18"/></svg>
    </button>
    <div class="tool-label">Eraser</div>

    <div class="toolbar-divider"></div>

    <!-- Colors -->
    <div id="color-section" style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div class="color-swatch active" data-color="rgba(255,235,59,0.4)" style="background:rgba(255,235,59,0.7);" onclick="setColor(this)" title="Yellow"></div>
      <div class="color-swatch" data-color="rgba(76,175,80,0.4)" style="background:rgba(76,175,80,0.7);" onclick="setColor(this)" title="Green"></div>
      <div class="color-swatch" data-color="rgba(66,165,245,0.4)" style="background:rgba(66,165,245,0.7);" onclick="setColor(this)" title="Blue"></div>
      <div class="color-swatch" data-color="rgba(236,64,122,0.4)" style="background:rgba(236,64,122,0.7);" onclick="setColor(this)" title="Pink"></div>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Stroke width -->
    <div id="stroke-section" style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <button class="stroke-btn" data-width="2" onclick="setStrokeWidth(this)">S</button>
      <button class="stroke-btn active" data-width="4" onclick="setStrokeWidth(this)">M</button>
      <button class="stroke-btn" data-width="8" onclick="setStrokeWidth(this)">L</button>
    </div>
  </div>

  <!-- Canvas viewport -->
  <div class="canvas-viewport" id="canvas-viewport" style="display:none;">
    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="annotation-canvas"></canvas>
    </div>
  </div>

  <!-- Supabase + Fabric.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

  <script>
    // ---- Config ----
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ---- State ----
    let authToken = null;
    let noteId = null;
    let isFromTextSource = false;
    let noteFilename = '';
    let canvas = null;
    let pageImages = [];       // [{page, data, width, height}]
    let currentPage = 1;
    let totalPages = 0;
    let pageAnnotationsCache = {};  // {pageNum: fabricJSON}
    let currentTool = 'select';
    let currentColor = 'rgba(255,235,59,0.4)';
    let currentStrokeWidth = 4;
    let hasUnsavedChanges = false;
    let autoSaveTimer = null;
    let highlightStartPoint = null;
    let undoStack = [];
    const MAX_UNDO = 30;

    // ---- Init ----
    (async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      noteId = urlParams.get('id');
      isFromTextSource = urlParams.get('source') === 'text';

      if (!noteId) {
        showError('No note ID provided.');
        return;
      }

      // Auth check
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html?redirect=' + encodeURIComponent(window.location.href);
        return;
      }
      authToken = session.access_token;

      try {
        // Load metadata first to check file type
        const metaRes = await fetch(`${BACKEND_URL}/api/notes/${noteId}/metadata`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!metaRes.ok) throw new Error('Failed to load note data');

        const metaData = await metaRes.json();

        // Check if this is an office document - redirect to office editor
        const fileType = metaData.note.file_type;
        if (fileType === 'docx' || fileType === 'xlsx' || fileType === 'pptx') {
          document.getElementById('loading-text').textContent = 'Redirecting to Office editor...';
          setTimeout(() => {
            window.location.href = `office-editor.html?id=${noteId}`;
          }, 500);
          return;
        }

        // Load images for PDF
        const imgRes = await fetch(`${BACKEND_URL}/api/notes/${noteId}/view-as-images`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!imgRes.ok) {
          const errorData = await imgRes.json().catch(() => ({}));
          // Check if backend suggests redirect
          if (errorData.redirect) {
            window.location.href = errorData.redirect;
            return;
          }
          throw new Error('Failed to load note data');
        }

        const imgData = await imgRes.json();

        // Set header title
        noteFilename = metaData.note.filename || 'Untitled';
        document.getElementById('header-title').textContent = noteFilename;

        // If opened from pdf-annotate picker, go back there; otherwise note-viewer
        const referrer = document.referrer;
        if (referrer && referrer.includes('pdf-annotate.html')) {
          document.getElementById('back-link').href = 'pdf-annotate.html';
        } else {
          document.getElementById('back-link').href = `note-viewer.html?id=${noteId}`;
        }

        // Store page images
        pageImages = imgData.images || [];
        totalPages = imgData.total_pages || pageImages.length;

        if (totalPages === 0) {
          showError('No pages found in this PDF.');
          return;
        }

        // Preload first image to get dimensions
        await preloadImage(pageImages[0].data);

        // Init canvas
        initCanvas();

        // Load saved annotations
        await loadAnnotations();

        // Show editor
        document.getElementById('loading').style.display = 'none';
        document.getElementById('editor-header').style.display = 'flex';
        document.getElementById('toolbar').style.display = 'flex';
        document.getElementById('canvas-viewport').style.display = 'flex';

        // Render first page
        await renderPage(1);
        updatePageNav();

      } catch (err) {
        console.error(err);
        showError(err.message);
      }
    })();

    // ---- Canvas setup ----
    function initCanvas() {
      canvas = new fabric.Canvas('annotation-canvas', {
        selection: true,
        preserveObjectStacking: true
      });

      // Object added/modified/removed => mark dirty
      canvas.on('object:added', onCanvasChange);
      canvas.on('object:modified', onCanvasChange);
      canvas.on('object:removed', onCanvasChange);

      // Highlight tool: draw rect on mouse drag
      canvas.on('mouse:down', onMouseDown);
      canvas.on('mouse:move', onMouseMove);
      canvas.on('mouse:up', onMouseUp);

      // Eraser: click to delete
      canvas.on('mouse:down', onEraserClick);

      // Text tool: click to place
      canvas.on('mouse:down', onTextClick);
    }

    function onCanvasChange(e) {
      // Ignore background image events
      if (e.target && e.target._isBgImage) return;
      markUnsaved();
      pushUndo();
    }

    // ---- Page rendering ----
    function preloadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function renderPage(pageNum) {
      // Save current page annotations before switching
      if (canvas && currentPage !== pageNum) {
        saveCurrentPageToCache();
      }

      currentPage = pageNum;
      const pageData = pageImages[pageNum - 1];
      if (!pageData) return;

      const img = await preloadImage(pageData.data);
      const w = img.naturalWidth;
      const h = img.naturalHeight;

      // Resize canvas
      canvas.setWidth(w);
      canvas.setHeight(h);
      document.getElementById('canvas-wrapper').style.width = w + 'px';
      document.getElementById('canvas-wrapper').style.height = h + 'px';

      // Set background image
      canvas.setBackgroundImage(
        new fabric.Image(img, { selectable: false, evented: false }),
        canvas.renderAll.bind(canvas),
        { scaleX: 1, scaleY: 1 }
      );

      // Restore cached annotations for this page
      canvas.getObjects().slice().forEach(obj => canvas.remove(obj));

      if (pageAnnotationsCache[pageNum]) {
        const json = pageAnnotationsCache[pageNum];
        if (json.objects && json.objects.length > 0) {
          await new Promise(resolve => {
            canvas.loadFromJSON({ objects: json.objects }, () => {
              // Re-set background after loadFromJSON clears it
              canvas.setBackgroundImage(
                new fabric.Image(img, { selectable: false, evented: false }),
                canvas.renderAll.bind(canvas),
                { scaleX: 1, scaleY: 1 }
              );
              resolve();
            });
          });
        }
      }

      canvas.renderAll();
      applyToolState();
      updatePageNav();
      undoStack = [];
    }

    function saveCurrentPageToCache() {
      if (!canvas) return;
      const objects = canvas.toJSON(['_annotType']).objects || [];
      if (objects.length > 0) {
        pageAnnotationsCache[currentPage] = { objects };
      } else {
        delete pageAnnotationsCache[currentPage];
      }
    }

    function changePage(delta) {
      const next = currentPage + delta;
      if (next < 1 || next > totalPages) return;
      renderPage(next);
    }

    function updatePageNav() {
      document.getElementById('page-indicator').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prev-btn').disabled = currentPage <= 1;
      document.getElementById('next-btn').disabled = currentPage >= totalPages;
    }

    // ---- Tools ----
    function setTool(tool) {
      currentTool = tool;

      // Update UI
      document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tool === tool);
      });

      // Show/hide color section for highlight/draw
      const colorSection = document.getElementById('color-section');
      const strokeSection = document.getElementById('stroke-section');
      const showOptions = (tool === 'highlight' || tool === 'draw');
      colorSection.style.display = showOptions ? 'flex' : 'none';
      strokeSection.style.display = (tool === 'draw') ? 'flex' : 'none';

      applyToolState();
    }

    function applyToolState() {
      if (!canvas) return;

      canvas.isDrawingMode = (currentTool === 'draw');
      canvas.selection = (currentTool === 'select');

      if (currentTool === 'draw') {
        canvas.freeDrawingBrush.color = currentColor.replace(/[\d.]+\)$/, '0.8)');
        canvas.freeDrawingBrush.width = currentStrokeWidth;
      }

      // Set object selectability
      canvas.forEachObject(obj => {
        obj.selectable = (currentTool === 'select');
        obj.evented = (currentTool === 'select' || currentTool === 'eraser');
      });

      // Cursor
      if (currentTool === 'eraser') {
        canvas.defaultCursor = 'crosshair';
        canvas.hoverCursor = 'pointer';
      } else if (currentTool === 'highlight') {
        canvas.defaultCursor = 'crosshair';
        canvas.hoverCursor = 'crosshair';
      } else if (currentTool === 'text') {
        canvas.defaultCursor = 'text';
        canvas.hoverCursor = 'text';
      } else {
        canvas.defaultCursor = 'default';
        canvas.hoverCursor = 'move';
      }
    }

    function setColor(el) {
      currentColor = el.dataset.color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      applyToolState();
    }

    function setStrokeWidth(el) {
      currentStrokeWidth = parseInt(el.dataset.width);
      document.querySelectorAll('.stroke-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      applyToolState();
    }

    // ---- Highlight tool (drag to draw rect) ----
    function onMouseDown(opt) {
      if (currentTool !== 'highlight') return;
      const pointer = canvas.getPointer(opt.e);
      highlightStartPoint = { x: pointer.x, y: pointer.y };
    }

    function onMouseMove(opt) {
      if (currentTool !== 'highlight' || !highlightStartPoint) return;
      // Preview handled by mouse:up for simplicity
    }

    function onMouseUp(opt) {
      if (currentTool !== 'highlight' || !highlightStartPoint) return;
      const pointer = canvas.getPointer(opt.e);
      const x = Math.min(highlightStartPoint.x, pointer.x);
      const y = Math.min(highlightStartPoint.y, pointer.y);
      const w = Math.abs(pointer.x - highlightStartPoint.x);
      const h = Math.abs(pointer.y - highlightStartPoint.y);

      highlightStartPoint = null;

      if (w < 5 && h < 5) return; // Too small, ignore

      const rect = new fabric.Rect({
        left: x,
        top: y,
        width: w,
        height: Math.max(h, 20),
        fill: currentColor,
        stroke: 'transparent',
        strokeWidth: 0,
        selectable: false,
        evented: false,
        _annotType: 'highlight'
      });

      canvas.add(rect);
      canvas.renderAll();
    }

    // ---- Eraser tool ----
    function onEraserClick(opt) {
      if (currentTool !== 'eraser') return;
      const target = opt.target;
      if (target) {
        canvas.remove(target);
        canvas.renderAll();
      }
    }

    // ---- Text tool ----
    function onTextClick(opt) {
      if (currentTool !== 'text') return;
      // Don't place text if clicking on an existing object
      if (opt.target) return;

      const pointer = canvas.getPointer(opt.e);
      const text = new fabric.IText('Type here...', {
        left: pointer.x,
        top: pointer.y,
        fontSize: 18,
        fontFamily: 'Inter, sans-serif',
        fill: '#2d2d2d',
        selectable: true,
        editable: true,
        _annotType: 'text'
      });

      canvas.add(text);
      canvas.setActiveObject(text);
      text.enterEditing();
      text.selectAll();
      canvas.renderAll();

      // Switch to select so user can edit the text
      setTool('select');
    }

    // ---- Undo ----
    function pushUndo() {
      const json = canvas.toJSON(['_annotType']);
      undoStack.push(JSON.stringify(json));
      if (undoStack.length > MAX_UNDO) undoStack.shift();
    }

    function undo() {
      if (undoStack.length < 2) return;
      undoStack.pop(); // Remove current state
      const prev = undoStack[undoStack.length - 1];
      const parsed = JSON.parse(prev);
      canvas.loadFromJSON(parsed, () => {
        // Re-set background
        const pageData = pageImages[currentPage - 1];
        if (pageData) {
          const img = new Image();
          img.onload = () => {
            canvas.setBackgroundImage(
              new fabric.Image(img, { selectable: false, evented: false }),
              canvas.renderAll.bind(canvas),
              { scaleX: 1, scaleY: 1 }
            );
          };
          img.src = pageData.data;
        }
        applyToolState();
      });
    }

    // ---- Save / Load ----
    function markUnsaved() {
      hasUnsavedChanges = true;
      document.getElementById('save-status').textContent = 'Unsaved changes';
      document.getElementById('save-status').className = 'save-status unsaved';

      // Auto-save after 30s of inactivity (silently overwrites, no modal)
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => doSave('overwrite'), 30000);
    }

    async function saveAnnotations() {
      // Show save choice modal
      showSaveModal();
    }

    function showSaveModal() {
      const modal = document.getElementById('saveModal');
      const msg = document.getElementById('saveModalMsg');

      if (isFromTextSource) {
        msg.textContent = `This was originally a text file. Overwriting will convert "${noteFilename}" to a PDF with your annotations.`;
      } else {
        msg.textContent = 'How would you like to save your changes?';
      }

      document.getElementById('saveOverwriteBtn').onclick = () => {
        closeSaveModal();
        doSave('overwrite');
      };
      document.getElementById('saveNewBtn').onclick = () => {
        closeSaveModal();
        doSave('new');
      };

      modal.classList.add('active');
    }

    function closeSaveModal() {
      document.getElementById('saveModal').classList.remove('active');
    }

    // Close save modal on overlay click or Escape
    document.getElementById('saveModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSaveModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('saveModal').classList.contains('active')) {
        closeSaveModal();
      }
    });

    async function doSave(mode) {
      // Save current page to cache first
      saveCurrentPageToCache();

      const statusEl = document.getElementById('save-status');
      statusEl.textContent = 'Saving...';
      statusEl.className = 'save-status saving';

      try {
        // Build payload from all cached pages
        const annotations = [];
        for (let p = 1; p <= totalPages; p++) {
          const cached = pageAnnotationsCache[p];
          annotations.push({
            page_number: p,
            objects: cached ? cached.objects : []
          });
        }

        const targetId = noteId;
        let endpoint = `${BACKEND_URL}/api/notes/${targetId}/annotations`;
        let method = 'POST';
        let body = { annotations };

        if (mode === 'new') {
          // Save as a new note with annotations
          endpoint = `${BACKEND_URL}/api/notes/${targetId}/annotations`;
          body = { annotations, save_as_new: true };
        }

        const res = await fetch(endpoint, {
          method: method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(body)
        });

        if (!res.ok) throw new Error('Save failed');

        hasUnsavedChanges = false;
        statusEl.textContent = 'All changes saved';
        statusEl.className = 'save-status saved';
        clearTimeout(autoSaveTimer);

        // If saved as new, update to the new note
        if (mode === 'new') {
          const resData = await res.clone().json().catch(() => null);
          if (resData && resData.new_note_id) {
            noteId = resData.new_note_id;
            isFromTextSource = false;
            window.history.replaceState(null, '', `pdf-editor.html?id=${noteId}`);
            statusEl.textContent = 'Saved as new note';
          } else {
            statusEl.textContent = 'Saved as new note';
          }
        }
      } catch (err) {
        console.error('Save error:', err);
        statusEl.textContent = 'Save failed';
        statusEl.className = 'save-status error';
      }
    }

    async function loadAnnotations() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/notes/${noteId}/annotations`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!res.ok) return;

        const data = await res.json();
        (data.annotations || []).forEach(ann => {
          if (ann.objects && ann.objects.length > 0) {
            pageAnnotationsCache[ann.page_number] = { objects: ann.objects };
          }
        });
      } catch (err) {
        console.error('Load annotations error:', err);
      }
    }

    // ---- Keyboard shortcuts ----
    document.addEventListener('keydown', (e) => {
      // Ignore if typing in a text input
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      // Ignore if editing a Fabric IText
      if (canvas && canvas.getActiveObject() && canvas.getActiveObject().isEditing) return;

      // Cmd+S / Ctrl+S -> Save
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveAnnotations();
        return;
      }

      // Cmd+Z / Ctrl+Z -> Undo
      if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
        e.preventDefault();
        undo();
        return;
      }

      // Esc -> Select tool
      if (e.key === 'Escape') {
        setTool('select');
        return;
      }

      // Arrow keys -> page nav
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        changePage(-1);
        return;
      }
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        changePage(1);
        return;
      }

      // Number keys for tools
      switch (e.key) {
        case '1': case 'v': setTool('select'); break;
        case '2': case 'h': setTool('highlight'); break;
        case '3': case 'd': setTool('draw'); break;
        case '4': case 't': setTool('text'); break;
        case '5': case 'e': setTool('eraser'); break;
      }
    });

    // ---- Unsaved changes warning ----
    window.addEventListener('beforeunload', (e) => {
      if (hasUnsavedChanges) {
        e.preventDefault();
        e.returnValue = '';
      }
    });

    // ---- Helpers ----
    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-page').style.display = 'flex';
    }
  </script>
</body>
</html>
