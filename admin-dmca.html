<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>DMCA Admin - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f5f4f0 0%, #ede9e4 100%);
      min-height: 100vh;
      color: #2d2d2d;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 20%, rgba(124, 152, 133, 0.03) 0%, transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(232, 155, 95, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .page-header {
      text-align: center;
      padding: 60px 0 40px;
    }

    .page-header h1 {
      font-family: 'Lora', Georgia, serif;
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #7c9885 0%, #e89b5f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .page-header p {
      font-size: 1rem;
      color: #5d5d5d;
      font-weight: 400;
    }

    /* Auth gate */
    .auth-gate {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      padding: 3rem;
      border-radius: 16px;
      border: 2px solid rgba(124, 152, 133, 0.15);
      box-shadow: 0 4px 24px rgba(124, 152, 133, 0.08);
      max-width: 460px;
      margin: 0 auto;
      text-align: center;
    }

    .auth-gate h2 {
      font-family: 'Lora', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 0.5rem;
    }

    .auth-gate p {
      font-size: 0.9rem;
      color: #5d5d5d;
      margin-bottom: 1.5rem;
    }

    .auth-gate input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid rgba(124, 152, 133, 0.25);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #2d2d2d;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }

    .auth-gate input[type="password"]:focus {
      border-color: #7c9885;
    }

    .btn-primary {
      display: inline-block;
      padding: 12px 32px;
      background: #7c9885;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn-primary:hover {
      background: #6b8874;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .auth-error {
      color: #c0392b;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }

    /* Dashboard */
    .dashboard {
      display: none;
    }

    .dashboard-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .report-count {
      font-size: 0.95rem;
      color: #5d5d5d;
    }

    .report-count strong {
      color: #2d2d2d;
    }

    .filter-group {
      display: flex;
      gap: 8px;
    }

    .filter-btn {
      padding: 6px 16px;
      border: 2px solid rgba(124, 152, 133, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      color: #5d5d5d;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: #7c9885;
      color: #2d2d2d;
    }

    .filter-btn.active {
      background: #7c9885;
      color: #fff;
      border-color: #7c9885;
    }

    .btn-logout {
      padding: 6px 16px;
      border: 2px solid rgba(192, 57, 43, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      color: #c0392b;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: #c0392b;
      color: #fff;
      border-color: #c0392b;
    }

    /* Report cards */
    .reports-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .report-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      padding: 1.5rem;
      border-radius: 14px;
      border: 2px solid rgba(124, 152, 133, 0.12);
      box-shadow: 0 2px 12px rgba(124, 152, 133, 0.06);
      transition: box-shadow 0.2s;
    }

    .report-card:hover {
      box-shadow: 0 4px 20px rgba(124, 152, 133, 0.12);
    }

    .report-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      gap: 12px;
      flex-wrap: wrap;
    }

    .report-card-header h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d2d2d;
    }

    .report-card-header h3 a {
      color: #7c9885;
      text-decoration: none;
      transition: color 0.2s;
    }

    .report-card-header h3 a:hover {
      color: #5a7a65;
      text-decoration: underline;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .badge-pending {
      background: rgba(232, 155, 95, 0.15);
      color: #d07b3a;
      border: 1px solid rgba(232, 155, 95, 0.3);
    }

    .badge-approved {
      background: rgba(192, 57, 43, 0.1);
      color: #c0392b;
      border: 1px solid rgba(192, 57, 43, 0.2);
    }

    .badge-rejected {
      background: rgba(100, 100, 100, 0.1);
      color: #777;
      border: 1px solid rgba(100, 100, 100, 0.2);
    }

    .report-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
      margin-bottom: 1rem;
    }

    .detail-item {
      font-size: 0.875rem;
    }

    .detail-label {
      color: #888;
      font-weight: 500;
      display: block;
      margin-bottom: 2px;
    }

    .detail-value {
      color: #2d2d2d;
      word-break: break-word;
    }

    .report-reason {
      background: rgba(245, 244, 240, 0.6);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .report-reason .detail-label {
      margin-bottom: 6px;
    }

    .report-reason .detail-value {
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .report-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-approve {
      padding: 8px 24px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-approve:hover {
      background: #a93226;
    }

    .btn-approve:active {
      transform: scale(0.97);
    }

    .btn-approve:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-reject {
      padding: 8px 24px;
      background: transparent;
      color: #777;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s, transform 0.1s;
    }

    .btn-reject:hover {
      border-color: #999;
      color: #555;
    }

    .btn-reject:active {
      transform: scale(0.97);
    }

    .btn-reject:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* States */
    .loading-state,
    .empty-state,
    .error-state {
      text-align: center;
      padding: 3rem;
      color: #888;
      font-size: 0.95rem;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(124, 152, 133, 0.2);
      border-top-color: #7c9885;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-state {
      color: #c0392b;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .page-header h1 {
        font-size: 1.8rem;
      }

      .report-details {
        grid-template-columns: 1fr;
      }

      .dashboard-bar {
        flex-direction: column;
        align-items: flex-start;
      }

      .auth-gate {
        padding: 2rem 1.5rem;
      }

      .report-card {
        padding: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>DMCA Admin Dashboard</h1>
      <p>Review and process copyright takedown reports</p>
    </div>

    <!-- Auth Gate -->
    <div class="auth-gate" id="authGate">
      <h2>Admin Access Required</h2>
      <p>Enter your admin key to view and manage DMCA reports.</p>
      <form id="authForm">
        <input type="password" id="adminKeyInput" placeholder="Admin key" autocomplete="off" required>
        <button type="submit" class="btn-primary" id="authBtn">Authenticate</button>
      </form>
      <p class="auth-error" id="authError">Invalid admin key. Access denied.</p>
    </div>

    <!-- Dashboard (hidden until authenticated) -->
    <div class="dashboard" id="dashboard">
      <div class="dashboard-bar">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="approved">Approved</button>
          <button class="filter-btn" data-filter="rejected">Rejected</button>
        </div>
        <div style="display: flex; align-items: center; gap: 12px;">
          <span class="report-count" id="reportCount"></span>
          <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
      </div>

      <div id="reportsContainer">
        <div class="loading-state" id="loadingState">
          <div class="loading-spinner"></div>
          Loading reports...
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'https://studyflowsuite.onrender.com';
    const STORAGE_KEY = 'studyflow_admin_key';

    let adminKey = '';
    let allReports = [];
    let currentFilter = 'all';

    // DOM elements
    const authGate = document.getElementById('authGate');
    const dashboard = document.getElementById('dashboard');
    const authForm = document.getElementById('authForm');
    const adminKeyInput = document.getElementById('adminKeyInput');
    const authBtn = document.getElementById('authBtn');
    const authError = document.getElementById('authError');
    const reportsContainer = document.getElementById('reportsContainer');
    const reportCount = document.getElementById('reportCount');
    const logoutBtn = document.getElementById('logoutBtn');

    // Check for stored key on load
    (function init() {
      const storedKey = sessionStorage.getItem(STORAGE_KEY);
      if (storedKey) {
        adminKey = storedKey;
        showDashboard();
        fetchReports();
      }
    })();

    // Auth form
    authForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      const key = adminKeyInput.value.trim();
      if (!key) return;

      authBtn.disabled = true;
      authBtn.textContent = 'Authenticating...';
      authError.style.display = 'none';

      adminKey = key;

      try {
        const res = await fetch(API_BASE + '/api/dmca/reports?key=' + encodeURIComponent(key));
        if (!res.ok) {
          throw new Error('Auth failed');
        }
        const data = await res.json();
        sessionStorage.setItem(STORAGE_KEY, key);
        allReports = data.reports || [];
        showDashboard();
        renderReports();
      } catch (err) {
        authError.style.display = 'block';
        adminKey = '';
      } finally {
        authBtn.disabled = false;
        authBtn.textContent = 'Authenticate';
      }
    });

    // Logout
    logoutBtn.addEventListener('click', function() {
      sessionStorage.removeItem(STORAGE_KEY);
      adminKey = '';
      allReports = [];
      dashboard.style.display = 'none';
      authGate.style.display = 'block';
      adminKeyInput.value = '';
      authError.style.display = 'none';
    });

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(function(b) {
          b.classList.remove('active');
        });
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderReports();
      });
    });

    function showDashboard() {
      authGate.style.display = 'none';
      dashboard.style.display = 'block';
    }

    async function fetchReports() {
      reportsContainer.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div>Loading reports...</div>';

      try {
        const res = await fetch(API_BASE + '/api/dmca/reports?key=' + encodeURIComponent(adminKey));
        if (!res.ok) {
          if (res.status === 401 || res.status === 403) {
            sessionStorage.removeItem(STORAGE_KEY);
            adminKey = '';
            dashboard.style.display = 'none';
            authGate.style.display = 'block';
            authError.style.display = 'block';
            return;
          }
          throw new Error('Failed to fetch reports');
        }
        const data = await res.json();
        allReports = data.reports || [];
        renderReports();
      } catch (err) {
        reportsContainer.innerHTML = '<div class="error-state">Failed to load reports. Please try again.</div>';
      }
    }

    function renderReports() {
      const filtered = currentFilter === 'all'
        ? allReports
        : allReports.filter(function(r) { return r.status === currentFilter; });

      const pendingCount = allReports.filter(function(r) { return r.status === 'pending'; }).length;
      reportCount.innerHTML = '<strong>' + allReports.length + '</strong> total reports, <strong>' + pendingCount + '</strong> pending';

      if (filtered.length === 0) {
        reportsContainer.innerHTML = '<div class="empty-state">No ' + (currentFilter === 'all' ? '' : currentFilter + ' ') + 'reports found.</div>';
        return;
      }

      var html = '<div class="reports-list">';

      filtered.forEach(function(report) {
        var statusClass = 'badge-' + (report.status || 'pending');
        var statusText = report.status || 'pending';
        var dateStr = report.created_at ? new Date(report.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'Unknown';

        html += '<div class="report-card" data-id="' + report.id + '">';
        html += '<div class="report-card-header">';
        html += '<h3>';
        if (report.note_id) {
          html += '<a href="note-viewer.html?id=' + encodeURIComponent(report.note_id) + '" target="_blank">' + escapeHtml(report.note_filename || 'Unknown File') + '</a>';
        } else {
          html += escapeHtml(report.note_filename || 'Unknown File');
        }
        html += '</h3>';
        html += '<span class="badge ' + statusClass + '">' + escapeHtml(statusText) + '</span>';
        html += '</div>';

        html += '<div class="report-details">';
        html += detailItem('University', report.university);
        html += detailItem('Course Code', report.course_code);
        html += detailItem('Uploader', report.uploader_username);
        html += detailItem('Date Submitted', dateStr);
        html += detailItem('Reporter Name', report.reporter_name);
        html += detailItem('Reporter Email', report.reporter_email);
        html += '</div>';

        html += '<div class="report-reason">';
        html += '<span class="detail-label">Reason</span>';
        html += '<span class="detail-value">' + escapeHtml(report.reason || 'No reason provided') + '</span>';
        html += '</div>';

        if (report.status === 'pending') {
          html += '<div class="report-actions">';
          html += '<button class="btn-approve" onclick="processReport(\'' + report.id + '\', \'approve\', this)">Approve Takedown</button>';
          html += '<button class="btn-reject" onclick="processReport(\'' + report.id + '\', \'reject\', this)">Reject</button>';
          html += '</div>';
        }

        html += '</div>';
      });

      html += '</div>';
      reportsContainer.innerHTML = html;
    }

    async function processReport(reportId, action, btnEl) {
      var card = btnEl.closest('.report-card');
      var buttons = card.querySelectorAll('button');
      buttons.forEach(function(b) { b.disabled = true; });
      btnEl.textContent = action === 'approve' ? 'Approving...' : 'Rejecting...';

      try {
        var res = await fetch(API_BASE + '/api/dmca/process/' + encodeURIComponent(reportId), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ admin_key: adminKey, action: action })
        });

        if (!res.ok) {
          throw new Error('Failed to process report');
        }

        await fetchReports();
      } catch (err) {
        alert('Error processing report: ' + err.message);
        buttons.forEach(function(b) { b.disabled = false; });
        btnEl.textContent = action === 'approve' ? 'Approve Takedown' : 'Reject';
      }
    }

    function detailItem(label, value) {
      return '<div class="detail-item"><span class="detail-label">' + escapeHtml(label) + '</span><span class="detail-value">' + escapeHtml(value || '--') + '</span></div>';
    }

    function escapeHtml(str) {
      if (!str) return '';
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(String(str)));
      return div.innerHTML;
    }
  </script>
</body>
</html>
