<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badges - StudyFlow</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1266375537905101" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --card-bg: #1e2746;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --text-muted: #6b7280;
      --border-color: #2a3050;
      --hover-bg: rgba(139, 157, 131, 0.08);
      --accent-primary: #8B9D83;
      --accent-secondary: #6b8575;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 0 16px;
      padding-top: max(0px, env(safe-area-inset-top));
      height: calc(56px + env(safe-area-inset-top, 0));
      display: flex; align-items: center; gap: 12px;
    }
    .back-btn {
      background: none; border: none; color: var(--text-primary);
      cursor: pointer; padding: 8px; border-radius: 50%;
      display: flex; align-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    .top-bar h1 {
      font-size: 20px; font-weight: 700;
      flex: 1;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Equipped section */
    .equipped-section {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .section-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .equipped-slots {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .equipped-slot {
      flex: 1;
      max-width: 100px;
      aspect-ratio: 1;
      border-radius: 16px;
      border: 2px dashed var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .equipped-slot.filled {
      border: 2px solid var(--accent-primary);
      background: rgba(139, 157, 131, 0.1);
    }
    .equipped-slot:active {
      transform: scale(0.95);
    }
    .equipped-slot-icon {
      font-size: 32px;
    }
    .equipped-slot-empty {
      font-size: 24px;
      color: var(--text-muted);
    }
    .equipped-slot-name {
      font-size: 10px;
      color: var(--text-secondary);
      text-align: center;
      max-width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .save-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent-primary);
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn:active { opacity: 0.85; }
    .save-btn:disabled { opacity: 0.4; }

    /* Category filter */
    .category-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 12px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .category-tab {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .category-tab.active {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    /* Badge grid */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .badge-card {
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .badge-card.locked {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .badge-card.equipped {
      border-color: var(--accent-primary);
      background: rgba(139, 157, 131, 0.12);
    }
    .badge-card:not(.locked):active {
      transform: scale(0.96);
    }
    .badge-card-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .badge-card-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .badge-card-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.3;
      min-height: 28px;
    }
    .badge-card-progress {
      margin-top: 8px;
      height: 4px;
      background: var(--bg-primary);
      border-radius: 2px;
      overflow: hidden;
    }
    .badge-card-progress-fill {
      height: 100%;
      background: var(--accent-primary);
      transition: width 0.3s;
    }
    .badge-card-progress-text {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .check-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      padding: 16px;
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid var(--border-color);
    }
    .stat {
      flex: 1;
      text-align: center;
    }
    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="back-btn" onclick="window.location.href='profile.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h1>Badges</h1>
  </div>

  <div class="container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    <div id="content" style="display:none;">
      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-num" id="earnedCount">0</div>
          <div class="stat-label">Earned</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="totalCount">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="equippedCount">0/3</div>
          <div class="stat-label">Equipped</div>
        </div>
      </div>

      <!-- Equipped Section -->
      <div class="equipped-section">
        <div class="section-title">Equipped Badges</div>
        <div class="section-subtitle">Tap a badge below to equip up to 3</div>
        <div class="equipped-slots" id="equippedSlots"></div>
        <button class="save-btn" id="saveBtn" onclick="saveBadges()">Save</button>
      </div>

      <!-- Categories -->
      <div class="category-tabs" id="categoryTabs"></div>

      <!-- Badge Grid -->
      <div class="badge-grid" id="badgeGrid"></div>
    </div>
  </div>

  <script>
    var BACKEND = 'https://studyflowsuite.onrender.com';
    var sb = window.supabase.createClient(
      'https://mxddgbpxjoltaimftpmn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI'
    );

    var token = null;
    var allBadges = [];
    var earnedBadges = [];
    var equippedIds = [];
    var currentCategory = 'all';

    document.addEventListener('DOMContentLoaded', function() {
      sb.auth.getSession().then(function(r) {
        if (!r.data.session) { location.href = 'mobile.html'; return; }
        token = r.data.session.access_token;
        loadBadges();
      });
    });

    function loadBadges() {
      fetch(BACKEND + '/api/badges/available', {
        headers: { 'Authorization': 'Bearer ' + token }
      }).then(function(r) { return r.json(); }).then(function(data) {
        allBadges = data.badges || [];
        // Hide hidden badges that aren't unlocked
        allBadges = allBadges.filter(function(b) { return !b.hidden || b.unlocked; });
        earnedBadges = allBadges.filter(function(b) { return b.unlocked; });

        return fetch(BACKEND + '/api/badges/my-badges', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
      }).then(function(r) { return r.json(); }).then(function(data) {
        equippedIds = data.equipped_badge_ids || [];
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        renderAll();
      }).catch(function(e) {
        console.error('Failed to load badges:', e);
        document.getElementById('loading').innerHTML = '<p style="color:var(--text-muted);">Failed to load badges</p>';
      });
    }

    function renderAll() {
      document.getElementById('earnedCount').textContent = earnedBadges.length;
      document.getElementById('totalCount').textContent = allBadges.length;
      document.getElementById('equippedCount').textContent = equippedIds.length + '/3';
      renderEquippedSlots();
      renderCategories();
      renderBadgeGrid();
    }

    function renderEquippedSlots() {
      var html = '';
      for (var i = 0; i < 3; i++) {
        var badgeId = equippedIds[i];
        var badge = badgeId ? allBadges.find(function(b) { return b.id === badgeId; }) : null;
        if (badge) {
          html += '<div class="equipped-slot filled" onclick="unequip(\'' + badge.id + '\')">' +
            '<div class="equipped-slot-icon">' + badge.icon + '</div>' +
            '<div class="equipped-slot-name">' + badge.name + '</div>' +
          '</div>';
        } else {
          html += '<div class="equipped-slot">' +
            '<div class="equipped-slot-empty">+</div>' +
            '<div class="equipped-slot-name">Empty</div>' +
          '</div>';
        }
      }
      document.getElementById('equippedSlots').innerHTML = html;
    }

    function renderCategories() {
      var cats = ['all'];
      allBadges.forEach(function(b) {
        if (b.category && cats.indexOf(b.category) === -1) cats.push(b.category);
      });
      document.getElementById('categoryTabs').innerHTML = cats.map(function(cat) {
        var label = cat === 'all' ? 'All' : cat;
        var active = currentCategory === cat ? ' active' : '';
        return '<button class="category-tab' + active + '" onclick="setCategory(\'' + cat + '\')">' + label + '</button>';
      }).join('');
    }

    function setCategory(cat) {
      currentCategory = cat;
      renderCategories();
      renderBadgeGrid();
    }

    function renderBadgeGrid() {
      var filtered = currentCategory === 'all'
        ? allBadges
        : allBadges.filter(function(b) { return b.category === currentCategory; });

      // Sort: equipped first, then unlocked, then locked
      filtered.sort(function(a, b) {
        var aEq = equippedIds.indexOf(a.id) > -1 ? 0 : 1;
        var bEq = equippedIds.indexOf(b.id) > -1 ? 0 : 1;
        if (aEq !== bEq) return aEq - bEq;
        if (a.unlocked !== b.unlocked) return a.unlocked ? -1 : 1;
        return 0;
      });

      if (!filtered.length) {
        document.getElementById('badgeGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p>No badges in this category</p></div>';
        return;
      }

      document.getElementById('badgeGrid').innerHTML = filtered.map(function(b) {
        var equipped = equippedIds.indexOf(b.id) > -1;
        var locked = !b.unlocked;
        var classes = 'badge-card';
        if (equipped) classes += ' equipped';
        if (locked) classes += ' locked';

        var progress = b.goal > 0 ? Math.min(100, (b.progress / b.goal) * 100) : 0;
        var progressBar = locked ? (
          '<div class="badge-card-progress"><div class="badge-card-progress-fill" style="width:' + progress + '%;"></div></div>' +
          '<div class="badge-card-progress-text">' + b.progress + ' / ' + b.goal + '</div>'
        ) : '';

        return '<div class="' + classes + '" onclick="' + (locked ? '' : 'toggleBadge(\'' + b.id + '\')') + '">' +
          (equipped ? '<div class="check-badge">&#10003;</div>' : '') +
          '<div class="badge-card-icon">' + b.icon + '</div>' +
          '<div class="badge-card-name">' + b.name + '</div>' +
          '<div class="badge-card-desc">' + (b.description || '') + '</div>' +
          progressBar +
        '</div>';
      }).join('');
    }

    function toggleBadge(id) {
      var idx = equippedIds.indexOf(id);
      if (idx > -1) {
        equippedIds.splice(idx, 1);
      } else {
        if (equippedIds.length >= 3) {
          if (window.sfToast) sfToast('Max 3 badges', 'error');
          else alert('Max 3 badges equipped');
          return;
        }
        equippedIds.push(id);
      }
      renderAll();
    }

    function unequip(id) {
      toggleBadge(id);
    }

    function saveBadges() {
      var btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';
      fetch(BACKEND + '/api/badges/equip', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ badge_ids: equippedIds })
      }).then(function(r) {
        if (!r.ok) throw new Error('Failed');
        location.href = 'profile.html';
      }).catch(function() {
        alert('Failed to save badges');
        btn.disabled = false;
        btn.textContent = 'Save';
      });
    }
  </script>
<script src="assets/transitions.js"></script>
</body>
</html>
