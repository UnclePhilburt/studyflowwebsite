<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Feature Requests - Admin - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f4f0;
      color: #2d2d2d;
      min-height: 100vh;
      padding: 24px;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-family: 'Lora', serif;
      font-size: 28px;
      color: #2d2d2d;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      color: #9ca3af;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      font-size: 14px;
      color: #7c9885;
      text-decoration: none;
    }

    .back-link:hover { text-decoration: underline; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: white;
      border: 1px solid rgba(124, 152, 133, 0.12);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-label {
      font-size: 12px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #2d2d2d;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      background: white;
      border: 1.5px solid rgba(124, 152, 133, 0.2);
      color: #6b7280;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: #7c9885; }
    .filter-btn.active {
      background: #7c9885;
      color: white;
      border-color: #7c9885;
    }

    .request-card {
      background: white;
      border: 1px solid rgba(124, 152, 133, 0.12);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .request-title {
      font-size: 17px;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 6px;
    }

    .request-meta {
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .request-description {
      font-size: 14px;
      line-height: 1.6;
      color: #4b5563;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary { background: #7c9885; color: white; }
    .btn-primary:hover { background: #6a8573; }

    .btn-secondary { background: white; border: 1.5px solid #7c9885; color: #7c9885; }
    .btn-secondary:hover { background: #f9faf8; }

    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:hover { background: #b91c1c; }

    .status-badge {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-pending { background: #fef3c7; color: #92400e; }
    .status-reviewing { background: #dbeafe; color: #1e40af; }
    .status-in-progress { background: #e0e7ff; color: #4338ca; }
    .status-completed { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 600px;
      width: 100%;
    }

    .modal-header h2 {
      font-family: 'Lora', serif;
      font-size: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4b5563;
      margin-bottom: 8px;
    }

    .form-select,
    .form-textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid rgba(124, 152, 133, 0.2);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .form-select:focus,
    .form-textarea:focus { border-color: #7c9885; }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="admin.html" class="back-link">← Back to Admin Dashboard</a>

    <div class="header">
      <h1>Feature Requests Management</h1>
      <p>Manage user-submitted feature requests and update their status</p>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-label">Total Requests</div>
        <div class="stat-value" id="stat-total">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="stat-pending">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">In Progress</div>
        <div class="stat-value" id="stat-in-progress">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed</div>
        <div class="stat-value" id="stat-completed">-</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('pending')">Pending</button>
      <button class="filter-btn" onclick="setFilter('reviewing')">Reviewing</button>
      <button class="filter-btn" onclick="setFilter('in-progress')">In Progress</button>
      <button class="filter-btn" onclick="setFilter('completed')">Completed</button>
      <button class="filter-btn" onclick="setFilter('rejected')">Rejected</button>
    </div>

    <!-- Requests List -->
    <div id="requestsList">
      <div class="loading">Loading feature requests...</div>
    </div>

  </div>

  <!-- Update Modal -->
  <div id="updateModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Update Feature Request</h2>
      </div>

      <div id="modalError" class="error-message" style="display: none;"></div>

      <form id="updateForm" onsubmit="submitUpdate(event)">
        <input type="hidden" id="currentRequestId">

        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="updateStatus" class="form-select">
            <option value="pending">Pending</option>
            <option value="reviewing">Reviewing</option>
            <option value="in-progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Admin Response (optional)</label>
          <textarea id="updateResponse" class="form-textarea" placeholder="Provide feedback or updates to the user..."></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeUpdateModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Update Request</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    let authToken = localStorage.getItem('auth_token');
    let currentFilter = 'all';
    let allRequests = [];

    // Check auth
    if (!authToken) {
      window.location.href = 'admin.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadRequests();
    });

    async function loadRequests() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/feature-requests?status=all&sort=recent`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Failed to load requests');

        const data = await response.json();
        allRequests = data.requests;
        updateStats();
        renderRequests();

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('requestsList').innerHTML = `
          <div class="error-message">${error.message}</div>
        `;
      }
    }

    function updateStats() {
      const stats = {
        total: allRequests.length,
        pending: allRequests.filter(r => r.status === 'pending').length,
        'in-progress': allRequests.filter(r => r.status === 'in-progress').length,
        completed: allRequests.filter(r => r.status === 'completed').length
      };

      document.getElementById('stat-total').textContent = stats.total;
      document.getElementById('stat-pending').textContent = stats.pending;
      document.getElementById('stat-in-progress').textContent = stats['in-progress'];
      document.getElementById('stat-completed').textContent = stats.completed;
    }

    function setFilter(filter) {
      currentFilter = filter;

      // Update button states
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      renderRequests();
    }

    function renderRequests() {
      const filtered = currentFilter === 'all'
        ? allRequests
        : allRequests.filter(r => r.status === currentFilter);

      const container = document.getElementById('requestsList');

      if (filtered.length === 0) {
        container.innerHTML = `<div class="loading">No ${currentFilter === 'all' ? '' : currentFilter} requests found</div>`;
        return;
      }

      container.innerHTML = filtered.map(req => `
        <div class="request-card">
          <div class="request-header">
            <div>
              <div class="request-title">${escapeHtml(req.title)}</div>
              <div class="request-meta">
                <span>${req.username || 'Anonymous'}</span>
                <span>•</span>
                <span>ID: ${req.id.slice(0, 8)}</span>
                <span>•</span>
                <span>${formatDate(req.created_at)}</span>
                <span>•</span>
                <span>${req.vote_count} votes</span>
              </div>
            </div>
            <span class="status-badge status-${req.status}">${formatStatus(req.status)}</span>
          </div>

          <div class="request-description">${escapeHtml(req.description)}</div>

          ${req.admin_response ? `
            <div style="margin-bottom:12px;padding:12px;background:#f9faf8;border-left:3px solid #7c9885;border-radius:6px;">
              <div style="font-size:11px;font-weight:600;color:#7c9885;margin-bottom:6px;">Current Response:</div>
              <div style="font-size:13px;color:#4b5563;">${escapeHtml(req.admin_response)}</div>
            </div>
          ` : ''}

          <div class="admin-actions">
            <button class="btn btn-primary" onclick="openUpdateModal('${req.id}', '${req.status}', ${JSON.stringify(req.admin_response || '').replace(/'/g, "&apos;")})">Update Status</button>
          </div>
        </div>
      `).join('');
    }

    function openUpdateModal(requestId, currentStatus, currentResponse) {
      document.getElementById('currentRequestId').value = requestId;
      document.getElementById('updateStatus').value = currentStatus;
      document.getElementById('updateResponse').value = currentResponse || '';
      document.getElementById('modalError').style.display = 'none';
      document.getElementById('updateModal').classList.add('active');
    }

    function closeUpdateModal() {
      document.getElementById('updateModal').classList.remove('active');
    }

    async function submitUpdate(event) {
      event.preventDefault();

      const requestId = document.getElementById('currentRequestId').value;
      const status = document.getElementById('updateStatus').value;
      const response = document.getElementById('updateResponse').value.trim();
      const errorDiv = document.getElementById('modalError');

      errorDiv.style.display = 'none';

      try {
        const apiResponse = await fetch(`${BACKEND_URL}/api/admin/feature-requests/${requestId}`, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            status: status,
            admin_response: response || null
          })
        });

        if (!apiResponse.ok) {
          const error = await apiResponse.json();
          throw new Error(error.error || 'Failed to update');
        }

        closeUpdateModal();
        loadRequests();

      } catch (error) {
        console.error('Error updating:', error);
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
      }
    }

    function formatDate(dateString) {
      return new Date(dateString).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function formatStatus(status) {
      return status.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Close modal on outside click
    document.getElementById('updateModal').addEventListener('click', (e) => {
      if (e.target.id === 'updateModal') {
        closeUpdateModal();
      }
    });
  </script>

</body>
</html>
