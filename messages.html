<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Direct Messages - StudyFlow Suite">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Messages - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #FAF8F5;
      --bg-secondary: rgba(255, 255, 255, 0.6);
      --bg-tertiary: rgba(255, 255, 255, 0.9);
      --text-primary: #2C2C2C;
      --text-secondary: #8B7E73;
      --text-muted: #9B8B7E;
      --accent-primary: #8B9D83;
      --accent-secondary: #7A8C73;
      --border-color: rgba(139, 157, 131, 0.2);
      --hover-bg: rgba(139, 157, 131, 0.06);
      --shadow: rgba(0, 0, 0, 0.04);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      margin: 0;
      height: 100vh;
      overflow: hidden;
    }

    .messages-container {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .conversations-sidebar {
      width: 350px;
      background: var(--bg-tertiary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .sidebar-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .new-message-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent-primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .new-message-btn:hover {
      background: var(--accent-secondary);
    }

    .conversations-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .conversation-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
    }

    .conversation-item:hover {
      background: var(--hover-bg);
    }

    .conversation-item.active {
      background: var(--accent-primary);
      color: white;
    }

    .conversation-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      flex-shrink: 0;
    }

    .conversation-item.active .conversation-avatar {
      background: white;
      color: var(--accent-primary);
    }

    .conversation-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .conversation-info {
      flex: 1;
      min-width: 0;
    }

    .conversation-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .conversation-preview {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-item.active .conversation-preview {
      color: rgba(255, 255, 255, 0.8);
    }

    .conversation-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .conversation-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .conversation-item.active .conversation-time {
      color: rgba(255, 255, 255, 0.8);
    }

    .unread-badge {
      background: var(--accent-primary);
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .conversation-item.active .unread-badge {
      background: white;
      color: var(--accent-primary);
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
    }

    .chat-header {
      padding: 20px 24px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }

    .chat-header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .chat-header-info {
      flex: 1;
    }

    .chat-header-name {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header-username {
      font-size: 13px;
      color: var(--text-muted);
    }

    .view-profile-btn {
      padding: 8px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-profile-btn:hover {
      background: var(--hover-bg);
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 60%;
      display: flex;
      gap: 8px;
    }

    .message.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .message-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .message-content {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 12px 16px;
      word-wrap: break-word;
    }

    .message.sent .message-content {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    .message-text {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .message.sent .message-time {
      color: rgba(255, 255, 255, 0.7);
    }

    .message-input-area {
      padding: 20px 24px;
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 12px;
    }

    .message-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 24px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      transition: all 0.2s;
    }

    .message-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      background: white;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--accent-secondary);
      transform: scale(1.05);
    }

    .send-btn:disabled {
      background: var(--bg-secondary);
      color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    /* Empty States */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: var(--text-muted);
      padding: 40px;
      text-align: center;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--bg-tertiary);
      border-radius: 16px;
      max-width: 500px;
      width: 100%;
      padding: 24px;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
      background: white;
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 50;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--hover-bg);
    }

    @media (max-width: 768px) {
      .conversations-sidebar {
        width: 100%;
      }

      .chat-area {
        display: none;
      }

      .chat-area.mobile-active {
        display: flex;
        position: fixed;
        inset: 0;
        z-index: 100;
      }

      .message {
        max-width: 80%;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="window.location.href='social.html'">←</button>

  <div class="messages-container">
    <!-- Conversations Sidebar -->
    <div class="conversations-sidebar">
      <div class="sidebar-header">
        <h1>Messages</h1>
        <button class="new-message-btn" onclick="openNewMessageModal()">New Message</button>
      </div>
      <div class="conversations-list" id="conversationsList">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading conversations...</p>
        </div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="empty-state">
        <div class="empty-state-icon">💬</div>
        <h3>Select a conversation</h3>
        <p>Choose a conversation from the list to start messaging</p>
      </div>
    </div>
  </div>

  <!-- New Message Modal -->
  <div class="modal" id="newMessageModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>New Message</h2>
        <button class="modal-close" onclick="closeNewMessageModal()">✕</button>
      </div>
      <form id="newMessageForm">
        <div class="form-group">
          <label>Enter username</label>
          <input type="text" id="newMessageUsername" placeholder="@username" required>
        </div>
        <button type="submit" class="new-message-btn">Start Conversation</button>
      </form>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const supabaseUrl = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

    let currentUser = null;
    let authToken = null;
    let conversations = [];
    let activeConversation = null;
    let messages = [];
    let messagePollingInterval = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = session.user;
      authToken = session.access_token;

      await loadConversations();

      // Check if username specified in URL
      const urlParams = new URLSearchParams(window.location.search);
      const username = urlParams.get('user');
      if (username) {
        await startConversationWithUser(username);
      }
    });

    // Load conversations
    async function loadConversations() {
      try {
        const response = await fetch(`${BACKEND_URL}/api/social/dm/conversations`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Failed to load conversations');

        const data = await response.json();
        conversations = data.conversations || [];

        renderConversations();
      } catch (error) {
        console.error('Error loading conversations:', error);
        document.getElementById('conversationsList').innerHTML =
          '<div class="empty-state"><p>Failed to load conversations</p></div>';
      }
    }

    // Render conversations
    function renderConversations() {
      const container = document.getElementById('conversationsList');

      if (conversations.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h3>No messages yet</h3>
            <p>Start a conversation to connect with others</p>
          </div>
        `;
        return;
      }

      container.innerHTML = conversations.map(conv => {
        const user = conv.other_user;
        const avatar = user.avatar_url
          ? `<img src="${user.avatar_url}" alt="${user.username}">`
          : user.username[0].toUpperCase();
        const lastMsg = conv.last_message;
        const preview = lastMsg ? lastMsg.content : 'No messages yet';
        const time = lastMsg ? getTimeAgo(lastMsg.created_at) : '';
        const isActive = activeConversation?.conversation_id === conv.conversation_id;

        return `
          <div class="conversation-item ${isActive ? 'active' : ''}"
               onclick="selectConversation('${conv.conversation_id}', '${user.username}')">
            <div class="conversation-avatar">${avatar}</div>
            <div class="conversation-info">
              <div class="conversation-name">${user.display_name || user.username}</div>
              <div class="conversation-preview">${preview}</div>
            </div>
            <div class="conversation-meta">
              ${time ? `<div class="conversation-time">${time}</div>` : ''}
              ${conv.unread_count > 0 ? `<div class="unread-badge">${conv.unread_count}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    // Select conversation
    async function selectConversation(conversationId, username) {
      activeConversation = conversations.find(c => c.conversation_id === conversationId);
      if (!activeConversation) return;

      // Clear existing polling
      if (messagePollingInterval) {
        clearInterval(messagePollingInterval);
      }

      // Load messages
      await loadMessages(conversationId);

      // Render chat interface
      renderChatInterface();

      // Poll for new messages every 3 seconds
      messagePollingInterval = setInterval(() => {
        loadMessages(conversationId, true);
      }, 3000);

      // Mark as read
      renderConversations();

      // Mobile: show chat area
      document.getElementById('chatArea').classList.add('mobile-active');
    }

    // Load messages
    async function loadMessages(conversationId, silent = false) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/social/dm/conversation/${conversationId}/messages`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) throw new Error('Failed to load messages');

        const data = await response.json();
        messages = data.messages || [];

        if (!silent) {
          renderMessages();
        } else {
          // Only update if new messages
          const currentCount = document.querySelectorAll('.message').length;
          if (messages.length !== currentCount) {
            renderMessages();
          }
        }
      } catch (error) {
        console.error('Error loading messages:', error);
      }
    }

    // Render chat interface
    function renderChatInterface() {
      const user = activeConversation.other_user;
      const avatar = user.avatar_url
        ? `<img src="${user.avatar_url}" alt="${user.username}">`
        : user.username[0].toUpperCase();

      document.getElementById('chatArea').innerHTML = `
        <div class="chat-header">
          <div class="chat-header-avatar">${avatar}</div>
          <div class="chat-header-info">
            <div class="chat-header-name">${user.display_name || user.username}</div>
            <div class="chat-header-username">@${user.username}</div>
          </div>
          <button class="view-profile-btn" onclick="window.location.href='profile.html?user=${user.username}'">
            View Profile
          </button>
        </div>
        <div class="messages-area" id="messagesArea"></div>
        <div class="message-input-area">
          <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1"
                    onkeypress="handleMessageKeyPress(event)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
      `;

      renderMessages();
    }

    // Render messages
    function renderMessages() {
      const container = document.getElementById('messagesArea');
      if (!container) return;

      if (messages.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">👋</div>
            <h3>Start the conversation</h3>
            <p>Send a message to get started</p>
          </div>
        `;
        return;
      }

      container.innerHTML = messages.map(msg => {
        const isSent = msg.sender_id === currentUser.id;
        const time = getTimeAgo(msg.created_at);
        const avatar = isSent ? 'You' : activeConversation.other_user.username[0].toUpperCase();

        return `
          <div class="message ${isSent ? 'sent' : 'received'}">
            <div class="message-avatar">${avatar}</div>
            <div class="message-content">
              <div class="message-text">${escapeHtml(msg.content)}</div>
              <div class="message-time">${time}</div>
            </div>
          </div>
        `;
      }).join('');

      // Scroll to bottom
      container.scrollTop = container.scrollHeight;
    }

    // Send message
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();

      if (!content || !activeConversation) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;

      try {
        const response = await fetch(
          `${BACKEND_URL}/api/social/dm/conversation/${activeConversation.conversation_id}/send`,
          {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${authToken}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ content })
          }
        );

        if (response.ok) {
          input.value = '';
          await loadMessages(activeConversation.conversation_id);
          await loadConversations();
        } else {
          alert('Failed to send message');
        }
      } catch (error) {
        console.error('Error sending message:', error);
        alert('Failed to send message');
      } finally {
        btn.disabled = false;
      }
    }

    // Handle Enter key in message input
    function handleMessageKeyPress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // New message modal
    function openNewMessageModal() {
      document.getElementById('newMessageModal').classList.add('active');
    }

    function closeNewMessageModal() {
      document.getElementById('newMessageModal').classList.remove('active');
      document.getElementById('newMessageForm').reset();
    }

    document.getElementById('newMessageForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      let username = document.getElementById('newMessageUsername').value.trim();

      // Remove @ if present
      if (username.startsWith('@')) {
        username = username.substring(1);
      }

      await startConversationWithUser(username);
      closeNewMessageModal();
    });

    // Start conversation with user
    async function startConversationWithUser(username) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/social/dm/conversation/${username}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) {
          alert('User not found');
          return;
        }

        const data = await response.json();
        await loadConversations();
        selectConversation(data.conversation_id, username);
      } catch (error) {
        console.error('Error starting conversation:', error);
        alert('Failed to start conversation');
      }
    }

    // Time ago helper
    function getTimeAgo(timestamp) {
      const now = new Date();
      const then = new Date(timestamp);
      const seconds = Math.floor((now - then) / 1000);

      if (seconds < 60) return 'just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
      if (seconds < 604800) return `${Math.floor(seconds / 86400)}d`;
      return then.toLocaleDateString();
    }

    // Escape HTML
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (messagePollingInterval) {
        clearInterval(messagePollingInterval);
      }
    });
  </script>
</body>
</html>
