<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nexus Leaderboard - Top contributors to the StudyFlow Suite knowledge base">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Nexus Leaderboard - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Theme Variables */
    :root {
      /* Default Theme (Earthy) */
      --bg-primary: #FAF8F5;
      --bg-secondary: #ede9e4;
      --bg-tertiary: rgba(255, 255, 255, 0.98);
      --text-primary: #2C2C2C;
      --text-secondary: #6B6B6B;
      --text-muted: #9B8B7E;
      --accent-primary: #8B9D83;
      --accent-secondary: #6B8575;
      --accent-tertiary: #e89b5f;
      --border-color: rgba(124, 152, 133, 0.2);
      --hover-bg: rgba(124, 152, 133, 0.08);
      --shadow: rgba(124, 152, 133, 0.15);
      --gradient-start: rgba(124, 152, 133, 0.03);
      --gradient-end: rgba(232, 155, 95, 0.04);
    }

    body[data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #0f0f0f;
      --bg-tertiary: rgba(40, 40, 40, 0.98);
      --text-primary: #f5f5f5;
      --text-secondary: #d0d0d0;
      --text-muted: #a0a0a0;
      --accent-primary: #7c9885;
      --accent-secondary: #6a8573;
      --accent-tertiary: #e89b5f;
      --border-color: rgba(124, 152, 133, 0.3);
      --hover-bg: rgba(124, 152, 133, 0.15);
      --shadow: rgba(0, 0, 0, 0.4);
      --gradient-start: rgba(124, 152, 133, 0.08);
      --gradient-end: rgba(232, 155, 95, 0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      padding: 32px 20px;
      background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
      border-radius: 24px;
      border: 2px solid var(--border-color);
    }

    .header-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-tertiary) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon svg {
      width: 40px;
      height: 40px;
      stroke: white;
    }

    .header h1 {
      font-family: 'Lora', Georgia, serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .header p {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: var(--bg-tertiary);
      padding: 24px;
      border-radius: 16px;
      border: 2px solid var(--border-color);
      text-align: center;
    }

    .stat-value {
      font-family: 'Lora', Georgia, serif;
      font-size: 48px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-tertiary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .leaderboard-container {
      background: var(--bg-tertiary);
      border-radius: 24px;
      border: 2px solid var(--border-color);
      padding: 32px;
    }

    .leaderboard-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border-color);
    }

    .leader-item {
      display: flex;
      align-items: center;
      padding: 20px;
      margin-bottom: 12px;
      background: var(--hover-bg);
      border-radius: 16px;
      border: 2px solid var(--border-color);
      transition: all 0.3s;
    }

    .leader-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--shadow);
      border-color: var(--accent-primary);
    }

    .leader-item.top-3 {
      background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
      border-color: var(--accent-primary);
    }

    .leader-rank {
      font-size: 24px;
      font-weight: 700;
      width: 60px;
      text-align: center;
      color: var(--text-secondary);
    }

    .leader-rank.medal {
      font-size: 36px;
    }

    .leader-info {
      flex: 1;
      margin-left: 20px;
    }

    .leader-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .leader-university {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .leader-stats {
      text-align: right;
    }

    .leader-pages {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent-primary);
    }

    .leader-label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 12px 24px;
      background: var(--bg-tertiary);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      background: var(--hover-bg);
      transform: translateX(-4px);
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <a href="dashboard.html" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
      <line x1="19" y1="12" x2="5" y2="12"></line>
      <polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    Dashboard
  </a>

  <div class="container">
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="8.5" cy="7" r="4"></circle>
          <line x1="20" y1="8" x2="20" y2="14"></line>
          <line x1="23" y1="11" x2="17" y2="11"></line>
        </svg>
      </div>
      <h1>Nexus Leaderboard</h1>
      <p>Top contributors to the StudyFlow Suite knowledge base</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalContributors">-</div>
        <div class="stat-label">Total Contributors</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalPages">-</div>
        <div class="stat-label">Total Pages Shared</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="totalUniversities">-</div>
        <div class="stat-label">Universities</div>
      </div>
    </div>

    <div class="leaderboard-container">
      <div class="leaderboard-title">Top Contributors</div>
      <div id="leaderboardList">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>Loading leaderboard...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Load theme
    (function() {
      const savedTheme = localStorage.getItem('dashboard-theme') || 'default';
      document.body.setAttribute('data-theme', savedTheme);
    })();

    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function init() {
      // Check auth
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = 'index.html';
        return;
      }

      const authToken = session.access_token;
      loadLeaderboard(authToken);
    }

    async function loadLeaderboard(authToken) {
      try {
        const response = await fetch(`${BACKEND_URL}/api/leaderboard`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (!response.ok) {
          throw new Error('Failed to load leaderboard');
        }

        const leaders = await response.json();

        // Update stats
        const totalPages = leaders.reduce((sum, l) => sum + (l.pages_contributed || 0), 0);
        const uniqueUniversities = new Set(leaders.map(l => l.university).filter(Boolean)).size;

        document.getElementById('totalContributors').textContent = leaders.length;
        document.getElementById('totalPages').textContent = totalPages.toLocaleString();
        document.getElementById('totalUniversities').textContent = uniqueUniversities;

        // Render leaderboard
        const listEl = document.getElementById('leaderboardList');

        if (leaders.length === 0) {
          listEl.innerHTML = '<div class="loading">No contributors yet. Be the first!</div>';
          return;
        }

        listEl.innerHTML = leaders.map((leader, index) => {
          const rank = index + 1;
          const isTop3 = rank <= 3;
          const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';

          return `
            <div class="leader-item ${isTop3 ? 'top-3' : ''}">
              <div class="leader-rank ${medal ? 'medal' : ''}">${medal || rank}</div>
              <div class="leader-info">
                <div class="leader-name">${leader.username || 'Anonymous'}</div>
                <div class="leader-university">${leader.university || 'Unknown University'}</div>
              </div>
              <div class="leader-stats">
                <div class="leader-pages">${(leader.pages_contributed || 0).toLocaleString()}</div>
                <div class="leader-label">Pages</div>
              </div>
            </div>
          `;
        }).join('');

      } catch (error) {
        console.error('Leaderboard error:', error);
        document.getElementById('leaderboardList').innerHTML = '<div class="loading">Error loading leaderboard</div>';
      }
    }

    init();
  </script>
</body>
</html>
