<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nexus Leaderboard - StudyFlow Suite contributor network">
  <link rel="icon" type="image/png" href="icon128.png">
  <title>Nexus Leaderboard - StudyFlow Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #FAF8F5; --bg-secondary: #ede9e4; --bg-tertiary: rgba(255,255,255,0.98);
      --text-primary: #2C2C2C; --text-secondary: #6B6B6B; --text-muted: #9B8B7E;
      --accent-primary: #8B9D83; --accent-secondary: #6B8575; --accent-tertiary: #e89b5f;
      --border-color: rgba(124,152,133,0.2); --hover-bg: rgba(124,152,133,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="dark"] {
      --bg-primary: #1a1a1a; --bg-secondary: #0f0f0f; --bg-tertiary: rgba(40,40,40,0.98);
      --text-primary: #f5f5f5; --text-secondary: #d0d0d0; --text-muted: #a0a0a0;
      --accent-primary: #7c9885; --accent-secondary: #6a8573; --accent-tertiary: #e89b5f;
      --border-color: rgba(124,152,133,0.3); --hover-bg: rgba(124,152,133,0.15);
      --shadow: rgba(0,0,0,0.4);
    }

    body[data-theme="ocean"] {
      --bg-primary: #F0F8FF; --bg-secondary: #d5ecf5; --bg-tertiary: rgba(240,250,255,0.98);
      --text-primary: #1e3a5f; --text-secondary: #4a6b8a; --text-muted: #7a9cb8;
      --accent-primary: #4a90a4; --accent-secondary: #3a7a8e; --accent-tertiary: #5fb3c8;
      --border-color: rgba(74,144,164,0.2); --hover-bg: rgba(74,144,164,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="sunset"] {
      --bg-primary: #FFF5F0; --bg-secondary: #f5e5d8; --bg-tertiary: rgba(255,245,238,0.98);
      --text-primary: #4a2c2a; --text-secondary: #8a5a4a; --text-muted: #b88a7a;
      --accent-primary: #d17a5f; --accent-secondary: #b86a4f; --accent-tertiary: #e89b7f;
      --border-color: rgba(209,122,95,0.2); --hover-bg: rgba(209,122,95,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="minimal"] {
      --bg-primary: #fff; --bg-secondary: #f5f5f5; --bg-tertiary: rgba(250,250,250,0.98);
      --text-primary: #1a1a1a; --text-secondary: #666; --text-muted: #999;
      --accent-primary: #4a4a4a; --accent-secondary: #3a3a3a; --accent-tertiary: #6a6a6a;
      --border-color: rgba(74,74,74,0.2); --hover-bg: rgba(74,74,74,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="forest"] {
      --bg-primary: #F5F9F5; --bg-secondary: #e0f0e0; --bg-tertiary: rgba(245,250,245,0.98);
      --text-primary: #2a3a2a; --text-secondary: #4a6a4a; --text-muted: #7a9a7a;
      --accent-primary: #5a8a5a; --accent-secondary: #4a7a4a; --accent-tertiary: #7aaa7a;
      --border-color: rgba(90,138,90,0.2); --hover-bg: rgba(90,138,90,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="lavender"] {
      --bg-primary: #F8F5FF; --bg-secondary: #ebe5f5; --bg-tertiary: rgba(250,245,255,0.98);
      --text-primary: #3a2a4a; --text-secondary: #6a5a8a; --text-muted: #9a8ab8;
      --accent-primary: #8a7aa4; --accent-secondary: #7a6a94; --accent-tertiary: #aa9ac8;
      --border-color: rgba(138,122,164,0.2); --hover-bg: rgba(138,122,164,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(10, 10, 18, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 100;
    }

    .top-bar a { color: #7c9885; text-decoration: none; display: flex; align-items: center; }
    .top-bar h1 { font-size: 16px; font-weight: 600; color: #f0f0f0; }

    .top-bar-search {
      margin-left: auto;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      font-size: 13px;
      font-family: inherit;
      color: #f0f0f0;
      outline: none;
      width: 220px;
    }

    .top-bar-search:focus { border-color: #7c9885; }
    .top-bar-search::placeholder { color: rgba(255,255,255,0.3); }

    /* Filters */
    .filter-bar {
      position: fixed;
      top: 56px; left: 0; right: 0;
      height: 44px;
      background: rgba(10, 10, 18, 0.8);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 8px;
      z-index: 99;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: none;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #7c9885; color: #7c9885; }
    .filter-btn.active { background: #7c9885; color: white; border-color: #7c9885; }

    /* Graph canvas */
    #graphCanvas {
      position: fixed;
      top: 100px;
      left: 0;
      width: 100%;
      height: calc(100vh - 100px);
    }

    /* Node tooltip */
    .node-tooltip {
      position: fixed;
      background: rgba(15, 15, 25, 0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 200;
      display: none;
      min-width: 200px;
    }

    .node-tooltip.visible { display: block; }

    .tooltip-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #f0f0f0; }
    .tooltip-uni { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    .tooltip-stats { display: flex; gap: 16px; }
    .tooltip-stat { text-align: center; }
    .tooltip-stat-val { font-size: 16px; font-weight: 700; color: #7c9885; }
    .tooltip-stat-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 100px;
      right: 0;
      bottom: 0;
      width: 320px;
      background: rgba(10, 10, 18, 0.95);
      border-left: 1px solid rgba(255,255,255,0.06);
      z-index: 50;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-toggle {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 60;
      box-shadow: 0 4px 16px var(--shadow);
      transition: all 0.2s;
    }

    .sidebar-toggle:hover { transform: scale(1.1); }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h3 { font-size: 14px; font-weight: 600; color: #f0f0f0; }

    .sidebar-close {
      background: none; border: none;
      color: rgba(255,255,255,0.4); cursor: pointer;
      font-size: 18px;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .sidebar-item:hover { background: rgba(255,255,255,0.05); }
    .sidebar-item.highlighted { background: rgba(255,255,255,0.05); border: 1px solid #7c9885; }

    .sidebar-rank {
      width: 28px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
      text-align: center;
    }

    .sidebar-rank.gold { color: #d97706; }
    .sidebar-rank.silver { color: #6b7280; }
    .sidebar-rank.bronze { color: #b45309; }

    .sidebar-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }

    .sidebar-info { flex: 1; min-width: 0; }
    .sidebar-name { font-size: 13px; font-weight: 500; color: #e0e0e0; }
    .sidebar-meta { font-size: 11px; color: rgba(255,255,255,0.4); }

    .sidebar-stat {
      font-size: 13px;
      font-weight: 700;
      color: #7c9885;
    }

    /* Your rank card */
    .your-rank {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(15, 15, 25, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .your-rank-number {
      font-size: 24px;
      font-weight: 700;
      color: #7c9885;
    }

    .your-rank-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    .your-rank-name {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
    }

    /* Loading */
    .graph-loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      z-index: 10;
    }

    .spinner { width: 24px; height: 24px; border: 2px solid var(--border-color); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <script>(function(){ document.body.setAttribute('data-theme', localStorage.getItem('dashboard-theme') || 'default'); })();</script>

  <div class="top-bar">
    <a href="dashboard.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>

  <div class="node-tooltip" id="tooltip">

      <div class="tooltip-stat">

  <div class="your-rank" id="yourRank" style="display:none;">

  <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">

  </button>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>Rankings</h3>
      <button class="sidebar-close" onclick="toggleSidebar()">&times;</button>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let authToken = null;
    let currentUser = null;
    let contributors = [];
    let nodes = [];
    let currentFilter = 'all';
    let hoveredNode = null;
    let userUniversity = null;

    // Canvas
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let camX = 0, camY = 0, camScale = 1;
    let isDragging = false, dragStartX, dragStartY;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight - 100;
    }
    window.addEventListener('resize', resize);
    resize();

    // University color map
    const uniColors = {};
    let colorIndex = 0;
    const palette = ['#7c9885','#4a90a4','#d17a5f','#8a7aa4','#5a8a5a','#e89b5f','#6366f1','#dc2626','#2d9248','#d97706'];

    function getUniColor(uni) {
      if (!uni) return '#9ca3af';
      if (!uniColors[uni]) {
        uniColors[uni] = palette[colorIndex % palette.length];
        colorIndex++;
      }
      return uniColors[uni];
    }

    // Force simulation
    function buildNodes(data) {
      const maxPages = Math.max(...data.map(d => d.pages_contributed || 1), 1);
      const cx = width / 2, cy = height / 2;

      nodes = data.map((d, i) => {
        const size = 8 + (d.pages_contributed / maxPages) * 40;
        const angle = (i / data.length) * Math.PI * 2;
        const dist = 100 + Math.random() * 250;
        return {
          x: cx + Math.cos(angle) * dist,
          y: cy + Math.sin(angle) * dist,
          vx: 0, vy: 0,
          size,
          username: d.username || 'Anonymous',
          university: d.university || 'Unknown',
          pages: d.pages_contributed || 0,
          rank: i + 1,
          isUser: d.username === currentUser?.email?.split('@')[0],
          color: getUniColor(d.university),
          alpha: 1
        };
      });
    }

    function simulate() {
      const center = { x: width / 2, y: height / 2 };

      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];

        // Gravity toward center (stronger for higher rank)
        const pull = 0.01 + (1 - n.rank / nodes.length) * 0.02;
        n.vx += (center.x - n.x) * pull;
        n.vy += (center.y - n.y) * pull;

        // Repulsion from other nodes
        for (let j = i + 1; j < nodes.length; j++) {
          const m = nodes[j];
          const dx = n.x - m.x;
          const dy = n.y - m.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const minDist = n.size + m.size + 10;

          if (dist < minDist) {
            const force = (minDist - dist) * 0.05;
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            n.vx += fx; n.vy += fy;
            m.vx -= fx; m.vy -= fy;
          }
        }

        // Attraction to same university nodes
        for (let j = 0; j < nodes.length; j++) {
          if (i === j) continue;
          if (nodes[j].university === n.university) {
            const dx = nodes[j].x - n.x;
            const dy = nodes[j].y - n.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            if (dist > 80) {
              n.vx += dx * 0.001;
              n.vy += dy * 0.001;
            }
          }
        }

        // Damping
        n.vx *= 0.85;
        n.vy *= 0.85;
        n.x += n.vx;
        n.y += n.vy;
      }
    }

    // Background stars (generated once)
    let bgStars = [];
    function generateStars() {
      bgStars = [];
      for (let i = 0; i < 300; i++) {
        bgStars.push({
          x: Math.random() * 4000 - 1000,
          y: Math.random() * 4000 - 1000,
          size: Math.random() * 1.5 + 0.5,
          twinkle: Math.random() * Math.PI * 2,
          speed: 0.5 + Math.random() * 2
        });
      }
    }
    generateStars();

    function draw() {
      // Dark space background
      ctx.fillStyle = '#0a0a12';
      ctx.fillRect(0, 0, width, height);

      // Subtle gradient overlay
      const bgGrad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width * 0.7);
      bgGrad.addColorStop(0, 'rgba(20, 25, 40, 0.3)');
      bgGrad.addColorStop(1, 'rgba(5, 5, 10, 0)');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.translate(camX, camY);
      ctx.scale(camScale, camScale);

      // Draw twinkling background stars
      const t = Date.now() / 1000;
      bgStars.forEach(s => {
        const twinkle = 0.3 + Math.sin(t * s.speed + s.twinkle) * 0.4;
        ctx.globalAlpha = twinkle;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
      });

      // Draw nebula glows around university clusters
      const uniCenters = {};
      nodes.forEach(n => {
        if (n.alpha < 0.3) return;
        if (!uniCenters[n.university]) uniCenters[n.university] = { x: 0, y: 0, count: 0, color: n.color };
        uniCenters[n.university].x += n.x;
        uniCenters[n.university].y += n.y;
        uniCenters[n.university].count++;
      });

      Object.values(uniCenters).forEach(c => {
        if (c.count < 2) return;
        c.x /= c.count;
        c.y /= c.count;
        const radius = 80 + c.count * 25;
        const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, radius);
        grad.addColorStop(0, c.color + '18');
        grad.addColorStop(0.5, c.color + '08');
        grad.addColorStop(1, 'transparent');
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      });

      // Draw connections between same-university nodes
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          if (nodes[i].university === nodes[j].university && nodes[i].alpha > 0.3 && nodes[j].alpha > 0.3) {
            const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
            if (dist < 250) {
              ctx.globalAlpha = 0.1 * (1 - dist / 250) * nodes[i].alpha;
              ctx.beginPath();
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.strokeStyle = nodes[i].color;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }
      }

      // Draw nodes
      nodes.forEach(n => {
        if (n.alpha < 0.05) return;
        ctx.globalAlpha = n.alpha;

        // Outer glow (all nodes)
        const glowSize = n.size * 2.5;
        const glow = ctx.createRadialGradient(n.x, n.y, n.size * 0.5, n.x, n.y, glowSize);
        glow.addColorStop(0, n.color + '40');
        glow.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(n.x, n.y, glowSize, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        // User's node pulse
        if (n.isUser) {
          const pulse = n.size + 12 + Math.sin(t * 3) * 5;
          const pulseGlow = ctx.createRadialGradient(n.x, n.y, n.size, n.x, n.y, pulse);
          pulseGlow.addColorStop(0, '#ffffff33');
          pulseGlow.addColorStop(1, 'transparent');
          ctx.beginPath();
          ctx.arc(n.x, n.y, pulse, 0, Math.PI * 2);
          ctx.fillStyle = pulseGlow;
          ctx.fill();
        }

        // Core bright dot
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
        const coreGrad = ctx.createRadialGradient(n.x - n.size * 0.3, n.y - n.size * 0.3, 0, n.x, n.y, n.size);
        coreGrad.addColorStop(0, '#ffffff');
        coreGrad.addColorStop(0.3, n === hoveredNode ? '#ffffff' : n.color);
        coreGrad.addColorStop(1, n.color + 'cc');
        ctx.fillStyle = coreGrad;
        ctx.fill();

        // Hovered ring
        if (n === hoveredNode) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.size + 4, 0, Math.PI * 2);
          ctx.strokeStyle = '#ffffff88';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // Label
        if (n.size > 18 || n === hoveredNode) {
          ctx.globalAlpha = n.alpha * 0.9;
          ctx.font = `600 ${Math.max(10, n.size * 0.4)}px Inter`;
          ctx.textAlign = 'center';
          ctx.fillStyle = '#ffffffcc';
          ctx.shadowColor = '#000000';
          ctx.shadowBlur = 4;
          ctx.fillText('@' + n.username, n.x, n.y + n.size + 16);
          ctx.shadowBlur = 0;
        }
      });

      ctx.restore();
    }

    function animate() {
      simulate();
      draw();
      requestAnimationFrame(animate);
    }

    // Mouse interaction
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragStartX = e.clientX - camX;
      dragStartY = e.clientY - camY;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (isDragging) {
        camX = e.clientX - dragStartX;
        camY = e.clientY - dragStartY;
        return;
      }

      // Hit test
      const mx = (e.clientX - camX) / camScale;
      const my = (e.clientY - camY - 100) / camScale;
      hoveredNode = null;

      for (const n of nodes) {
        const dist = Math.hypot(mx - n.x, my - n.y);
        if (dist < n.size) {
          hoveredNode = n;
          break;
        }
      }

      const tooltip = document.getElementById('tooltip');
      if (hoveredNode) {
        canvas.style.cursor = 'pointer';
        tooltip.classList.add('visible');
        tooltip.style.left = (e.clientX + 16) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
        document.getElementById('tooltipName').textContent = '@' + hoveredNode.username;
        document.getElementById('tooltipUni').textContent = hoveredNode.university;
        document.getElementById('tooltipPages').textContent = hoveredNode.pages;
        document.getElementById('tooltipRank').textContent = '#' + hoveredNode.rank;
      } else {
        canvas.style.cursor = 'grab';
        tooltip.classList.remove('visible');
      }
    });

    canvas.addEventListener('mouseup', () => { isDragging = false; });

    canvas.addEventListener('click', (e) => {
      if (hoveredNode) {
        // Zoom to node
        const targetScale = 2;
        camScale = targetScale;
        camX = width / 2 - hoveredNode.x * targetScale;
        camY = (height / 2 + 100) - hoveredNode.y * targetScale;
      }
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = -e.deltaY * 0.001;
      const newScale = Math.min(4, Math.max(0.3, camScale + delta * camScale));
      const mx = e.clientX, my = e.clientY - 100;
      camX = mx - (mx - camX) * (newScale / camScale);
      camY = my - (my - camY) * (newScale / camScale);
      camScale = newScale;
    }, { passive: false });

    // Filters
    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter();
    }

    function applyFilter() {
      nodes.forEach(n => {
        if (currentFilter === 'all') {
          n.alpha = 1;
        } else if (currentFilter === 'myUni') {
          n.alpha = (n.university === userUniversity) ? 1 : 0.08;
        } else if (currentFilter === 'top10') {
          n.alpha = n.rank <= 10 ? 1 : 0.08;
        }
      });
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      if (!q) { nodes.forEach(n => n.alpha = 1); return; }
      nodes.forEach(n => {
        n.alpha = n.username.toLowerCase().includes(q) || n.university.toLowerCase().includes(q) ? 1 : 0.08;
      });

      // Zoom to first match
      const match = nodes.find(n => n.alpha === 1);
      if (match) {
        camX = width / 2 - match.x * camScale;
        camY = (height / 2 + 100) - match.y * camScale;
      }
    });

    // Sidebar
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function renderSidebar() {
      const list = document.getElementById('sidebarList');
      const sorted = [...contributors].sort((a, b) => (b.pages_contributed || 0) - (a.pages_contributed || 0));

      list.innerHTML = sorted.map((c, i) => {
        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        const initial = (c.username || '?')[0].toUpperCase();
        return `
          <div class="sidebar-item" onclick="focusNode('${c.username}')">
            <div class="sidebar-rank ${rankClass}">${i + 1}</div>
            <div class="sidebar-avatar" style="background:${getUniColor(c.university)}">${initial}</div>
            <div class="sidebar-info">
              <div class="sidebar-name">@${c.username || 'Anonymous'}</div>
              <div class="sidebar-meta">${c.university || 'Unknown'}</div>
            </div>
            <div class="sidebar-stat">${c.pages_contributed || 0}</div>
          </div>
        `;
      }).join('');
    }

    function focusNode(username) {
      const node = nodes.find(n => n.username === username);
      if (node) {
        camScale = 2;
        camX = width / 2 - node.x * camScale;
        camY = (height / 2 + 100) - node.y * camScale;
      }
    }

    // Init
    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      authToken = session.access_token;
      currentUser = session.user;

      // Get user's university
      try {
        const res = await fetch(BACKEND_URL + '/api/current-user', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        if (res.ok) {
          const user = await res.json();
          userUniversity = user.university;
        }
      } catch (e) {}

      // Load contributors
      try {
        const res = await fetch(BACKEND_URL + '/api/leaderboard', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        if (res.ok) {
          contributors = await res.json();
          if (Array.isArray(contributors)) {
            // Sort by pages
            contributors.sort((a, b) => (b.pages_contributed || 0) - (a.pages_contributed || 0));
          } else {
            contributors = [];
          }
        }
      } catch (e) { contributors = []; }

      document.getElementById('graphLoading').style.display = 'none';

      if (contributors.length === 0) {
        document.getElementById('graphLoading').style.display = 'block';
        document.getElementById('graphLoading').innerHTML = '<div style="color:var(--text-muted);">No contributors yet</div>';
        return;
      }

      buildNodes(contributors);
      renderSidebar();

      // Find user's rank
      const userEmail = currentUser.email?.split('@')[0];
      const userIdx = contributors.findIndex(c => c.username === userEmail);
      if (userIdx >= 0) {
        document.getElementById('yourRank').style.display = 'flex';
        document.getElementById('yourRankNum').textContent = '#' + (userIdx + 1);
        document.getElementById('yourRankName').textContent = '@' + contributors[userIdx].username;
        document.getElementById('yourRankPages').textContent = (contributors[userIdx].pages_contributed || 0) + ' pages shared';
      }

      animate();
    }

    init();
  </script>
</body>
</html>
