  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #FAF8F5; --bg-secondary: #ede9e4; --bg-tertiary: rgba(255,255,255,0.98);
      --text-primary: #2C2C2C; --text-secondary: #6B6B6B; --text-muted: #9B8B7E;

      --border-color: rgba(124,152,133,0.2); --hover-bg: rgba(124,152,133,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="dark"] {
      --bg-primary: #1a1a1a; --bg-secondary: #0f0f0f; --bg-tertiary: rgba(40,40,40,0.98);
      --text-primary: #f5f5f5; --text-secondary: #d0d0d0; --text-muted: #a0a0a0;
      --accent-primary: #7c9885; --accent-secondary: #6a8573; --accent-tertiary: #e89b5f;
      --border-color: rgba(124,152,133,0.3); --hover-bg: rgba(124,152,133,0.15);
      --shadow: rgba(0,0,0,0.4);
    }

    body[data-theme="ocean"] {
      --bg-primary: #F0F8FF; --bg-secondary: #d5ecf5; --bg-tertiary: rgba(240,250,255,0.98);
      --text-primary: #1e3a5f; --text-secondary: #4a6b8a; --text-muted: #7a9cb8;
      --accent-primary: #4a90a4; --accent-secondary: #3a7a8e; --accent-tertiary: #5fb3c8;
      --border-color: rgba(74,144,164,0.2); --hover-bg: rgba(74,144,164,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="sunset"] {
      --bg-primary: #FFF5F0; --bg-secondary: #f5e5d8; --bg-tertiary: rgba(255,245,238,0.98);
      --text-primary: #4a2c2a; --text-secondary: #8a5a4a; --text-muted: #b88a7a;
      --accent-primary: #d17a5f; --accent-secondary: #b86a4f; --accent-tertiary: #e89b7f;
      --border-color: rgba(209,122,95,0.2); --hover-bg: rgba(209,122,95,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="minimal"] {
      --bg-primary: #fff; --bg-secondary: #f5f5f5; --bg-tertiary: rgba(250,250,250,0.98);
      --text-primary: #1a1a1a; --text-secondary: #666; --text-muted: #999;
      --accent-primary: #4a4a4a; --accent-secondary: #3a3a3a; --accent-tertiary: #6a6a6a;
      --border-color: rgba(74,74,74,0.2); --hover-bg: rgba(74,74,74,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="forest"] {
      --bg-primary: #F5F9F5; --bg-secondary: #e0f0e0; --bg-tertiary: rgba(245,250,245,0.98);
      --text-primary: #2a3a2a; --text-secondary: #4a6a4a; --text-muted: #7a9a7a;
      --accent-primary: #5a8a5a; --accent-secondary: #4a7a4a; --accent-tertiary: #7aaa7a;
      --border-color: rgba(90,138,90,0.2); --hover-bg: rgba(90,138,90,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="lavender"] {
      --bg-primary: #F8F5FF; --bg-secondary: #ebe5f5; --bg-tertiary: rgba(250,245,255,0.98);
      --text-primary: #3a2a4a; --text-secondary: #6a5a8a; --text-muted: #9a8ab8;
      --accent-primary: #8a7aa4; --accent-secondary: #7a6a94; --accent-tertiary: #aa9ac8;
      --border-color: rgba(138,122,164,0.2); --hover-bg: rgba(138,122,164,0.08);
      --shadow: rgba(0,0,0,0.08);
    }

    body[data-theme="coffee"] {
      --bg-primary: #F5F0EB; --bg-secondary: #e8ddd2; --bg-tertiary: rgba(245, 240, 235, 0.98);
      --text-primary: #3a2d24; --text-secondary: #6b5a4e; --text-muted: #9a8878;
      --accent-primary: #8B6F4E; --accent-secondary: #7a5f3e; --accent-tertiary: #c49a6c;
      --border-color: rgba(139, 111, 78, 0.2); --hover-bg: rgba(139, 111, 78, 0.08);
      --shadow: rgba(0, 0, 0, 0.06);
    }

    body[data-theme="rose"] {
      --bg-primary: #FFF5F5; --bg-secondary: #f5e0e0; --bg-tertiary: rgba(255, 248, 248, 0.98);
      --text-primary: #4a2a2a; --text-secondary: #8a5a5a; --text-muted: #b88a8a;
      --accent-primary: #c47a7a; --accent-secondary: #b06a6a; --accent-tertiary: #e0a0a0;
      --border-color: rgba(196, 122, 122, 0.2); --hover-bg: rgba(196, 122, 122, 0.08);
      --shadow: rgba(0, 0, 0, 0.06);
    }

    body[data-theme="midnight"] {
      --bg-primary: #0f1628; --bg-secondary: #1a2340; --bg-tertiary: rgba(25, 35, 60, 0.98);
      --text-primary: #e8ecf4; --text-secondary: #a0b0cc; --text-muted: #6a7a9a;
      --accent-primary: #5b8af5; --accent-secondary: #4a7ae5; --accent-tertiary: #7aa4ff;
      --border-color: rgba(91, 138, 245, 0.2); --hover-bg: rgba(91, 138, 245, 0.1);
      --shadow: rgba(0, 0, 0, 0.4);
    }

    body[data-theme="ember"] {
      --bg-primary: #1a1614; --bg-secondary: #2a2220; --bg-tertiary: rgba(40, 34, 30, 0.98);
      --text-primary: #f0e8e0; --text-secondary: #c0a898; --text-muted: #8a7a6a;
      --accent-primary: #e8734a; --accent-secondary: #d0633a; --accent-tertiary: #f09060;
      --border-color: rgba(232, 115, 74, 0.25); --hover-bg: rgba(232, 115, 74, 0.1);
      --shadow: rgba(0, 0, 0, 0.4);
    }

    body[data-theme="neon"] {
      --bg-primary: #0a0a14; --bg-secondary: #12121e; --bg-tertiary: rgba(18, 18, 30, 0.98);
      --text-primary: #e0e8f0; --text-secondary: #a0a8c0; --text-muted: #6a708a;
      --accent-primary: #00d4aa; --accent-secondary: #00c09a; --accent-tertiary: #ff6090;
      --border-color: rgba(0, 212, 170, 0.2); --hover-bg: rgba(0, 212, 170, 0.08);
      --shadow: rgba(0, 0, 0, 0.5);
    }

    body[data-theme="sand"] {
      --bg-primary: #F8F2EA; --bg-secondary: #ede4d8; --bg-tertiary: rgba(248, 242, 234, 0.98);
      --text-primary: #4a3828; --text-secondary: #7a6248; --text-muted: #a89078;
      --accent-primary: #c4784a; --accent-secondary: #b0683a; --accent-tertiary: #d8986a;
      --border-color: rgba(196, 120, 74, 0.2); --hover-bg: rgba(196, 120, 74, 0.08);
      --shadow: rgba(0, 0, 0, 0.06);
    }

    body[data-theme="arctic"] {
      --bg-primary: #F0F6FA; --bg-secondary: #dce8f0; --bg-tertiary: rgba(240, 246, 250, 0.98);
      --text-primary: #1e2e3e; --text-secondary: #4a6478; --text-muted: #7a98b0;
      --accent-primary: #5a9ab8; --accent-secondary: #4a8aa8; --accent-tertiary: #7abcd8;
      --border-color: rgba(90, 154, 184, 0.2); --hover-bg: rgba(90, 154, 184, 0.08);
      --shadow: rgba(0, 0, 0, 0.05);
    }

    body[data-theme="slate"] {
      --bg-primary: #F2F4F6; --bg-secondary: #e2e6ea; --bg-tertiary: rgba(242, 244, 246, 0.98);
      --text-primary: #1e2430; --text-secondary: #4a5468; --text-muted: #7a8498;
      --accent-primary: #5a6a8a; --accent-secondary: #4a5a7a; --accent-tertiary: #7a8aaa;
      --border-color: rgba(90, 106, 138, 0.2); --hover-bg: rgba(90, 106, 138, 0.08);
      --shadow: rgba(0, 0, 0, 0.06);
    }

    body[data-theme="matcha"] {
      --bg-primary: #F4F8F2; --bg-secondary: #e2eddc; --bg-tertiary: rgba(244, 248, 242, 0.98);
      --text-primary: #2a3424; --text-secondary: #5a6a4a; --text-muted: #8a9a78;
      --accent-primary: #7aa45a; --accent-secondary: #6a944a; --accent-tertiary: #9ac47a;
      --border-color: rgba(122, 164, 90, 0.2); --hover-bg: rgba(122, 164, 90, 0.08);
      --shadow: rgba(0, 0, 0, 0.05);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* Top bar */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--bg-tertiary);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      z-index: 100;
    }

    .top-bar a { color: var(--accent-primary); text-decoration: none; display: flex; align-items: center; }
    .top-bar h1 { font-size: 16px; font-weight: 600; color: var(--text-primary); }

    .top-bar-search {
      margin-left: auto;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: var(--hover-bg);
      font-size: 13px;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      width: 220px;
    }

    .top-bar-search:focus { border-color: var(--accent-primary); }
    .top-bar-search::placeholder { color: var(--text-muted); }

    /* Filters */
    .filter-bar {
      position: fixed;
      top: 56px; left: 0; right: 0;
      height: 44px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 8px;
      z-index: 99;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      background: none;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .filter-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }

    /* Graph canvas */
    #graphCanvas {
      position: fixed;
      top: 100px;
      left: 0;
      width: 100%;
      height: calc(100vh - 100px);
    }

    /* Node tooltip */
    .node-tooltip {
      position: fixed;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 32px var(--shadow);
      pointer-events: none;
      z-index: 200;
      display: none;
      min-width: 200px;
    }

    .node-tooltip.visible { display: block; }

    .tooltip-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text-primary); }
    .tooltip-uni { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .tooltip-stats { display: flex; gap: 16px; }
    .tooltip-stat { text-align: center; }
    .tooltip-stat-val { font-size: 16px; font-weight: 700; color: var(--accent-primary); }
    .tooltip-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 100px;
      right: 0;
      bottom: 0;
      width: 320px;
      background: var(--bg-tertiary);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--border-color);
      z-index: 50;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-toggle {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 60;
      box-shadow: 0 4px 16px var(--shadow);
      transition: all 0.2s;
    }

    .sidebar-toggle:hover { transform: scale(1.1); }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); }

    .sidebar-close {
      background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      font-size: 18px;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .sidebar-item:hover { background: var(--hover-bg); }
    .sidebar-item.highlighted { background: var(--hover-bg); border: 1px solid var(--accent-primary); }

    .sidebar-rank {
      width: 28px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
    }

    .sidebar-rank.gold { color: #d97706; }
    .sidebar-rank.silver { color: #6b7280; }
    .sidebar-rank.bronze { color: #b45309; }

    .sidebar-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }

    .sidebar-info { flex: 1; min-width: 0; }
    .sidebar-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .sidebar-meta { font-size: 11px; color: var(--text-muted); }

    .sidebar-stat {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-primary);
    }

    /* Your rank card */
    .your-rank {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: var(--bg-tertiary);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: 0 4px 16px var(--shadow);
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .your-rank-number {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-primary);
    }

    .your-rank-label {
      font-size: 11px;
      color: var(--text-muted);
    }

    .your-rank-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Loading */
    .graph-loading {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      z-index: 10;
    }

    .spinner { width: 24px; height: 24px; border: 2px solid var(--border-color); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============ MOBILE ============ */
    .mobile-leaderboard { display: none; }

    @media (max-width: 768px) {
      /* Hide desktop graph */
      #graphCanvas, .sidebar, .sidebar-toggle, .your-rank,
      .node-tooltip, .graph-loading { display: none !important; }

      body {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        height: auto;
      }

      .top-bar {
        position: sticky;
        top: 0;
      }

      .top-bar-search {
        width: 140px;
        font-size: 14px;
        padding: 8px 14px;
      }

      .filter-bar {
        position: sticky;
        top: 56px;
        padding: 0 12px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .filter-bar::-webkit-scrollbar { display: none; }

      .filter-btn {
        white-space: nowrap;
        min-height: 36px;
        font-size: 12px;
      }

      .mobile-leaderboard {
        display: block;
        padding: 12px;
        padding-top: 110px;
      }

      /* Your rank banner */
      .ml-your-rank {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 16px;
        background: rgba(124, 152, 133, 0.1);
        border: 1px solid rgba(124, 152, 133, 0.25);
        border-radius: 14px;
        margin-bottom: 16px;
      }

      .ml-your-rank-num {
        font-size: 28px;
        font-weight: 700;
        color: #7c9885;
        line-height: 1;
      }

      .ml-your-rank-info {
        flex: 1;
      }

      .ml-your-rank-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
      }

      .ml-your-rank-meta {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      /* Ranked list */
      .ml-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .ml-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        background: var(--widget-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        transition: background 0.15s;
      }

      .ml-item:active { background: var(--hover-bg); }

      .ml-item.top-3 {
        background: rgba(124, 152, 133, 0.08);
        border-color: rgba(124, 152, 133, 0.2);
      }

      .ml-rank {
        width: 28px;
        font-size: 14px;
        font-weight: 700;
        color: var(--text-muted);
        text-align: center;
        flex-shrink: 0;
      }

      .ml-rank.gold { color: #d97706; }
      .ml-rank.silver { color: #9ca3af; }
      .ml-rank.bronze { color: #b45309; }

      .ml-avatar {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        color: white;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .ml-info {
        flex: 1;
        min-width: 0;
      }

      .ml-name {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-primary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .ml-uni {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 1px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .ml-pages {
        font-size: 14px;
        font-weight: 700;
        color: #7c9885;
        flex-shrink: 0;
      }

      .ml-pages-label {
        font-size: 9px;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      .ml-stat-col {
        text-align: right;
        flex-shrink: 0;
      }

      .ml-empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-muted);
        font-size: 14px;
      }

      .nav-back {
        top: 14px;
        left: 12px;
        width: 36px;
        height: 36px;
        border-radius: 10px;
      }
    }

    /* Back to Dashboard */
    .nav-back {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 99;
      color: var(--text-primary);
      text-decoration: none;
      box-shadow: 0 2px 8px var(--shadow);
    }
  </style>
</head>
<body>
  <script>(function(){ document.body.setAttribute('data-theme', localStorage.getItem('dashboard-theme') || 'default'); })();</script>

  <div class="top-bar">
    <a href="dashboard.html" class="nav-back" style="position:static;box-shadow:none;backdrop-filter:none;background:var(--hover-bg);" title="Back to Dashboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <h1>Nexus Network</h1>
    <input class="top-bar-search" id="searchInput" placeholder="Search contributors..." />
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('myUni', this)">My University</button>
    <button class="filter-btn" onclick="setFilter('top10', this)">Top 10</button>
  </div>

  <!-- Mobile Leaderboard List -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const SUPABASE_URL = 'https://mxddgbpxjoltaimftpmn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let authToken = null;
    let currentUser = null;
    let contributors = [];
    let nodes = [];
    let currentFilter = 'all';
    let hoveredNode = null;
    let userUniversity = null;

    // Canvas
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let camX = 0, camY = 0, camScale = 1;
    let isDragging = false, dragStartX, dragStartY;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight - 100;
    }
    window.addEventListener('resize', resize);
    resize();

    // University color map
    const uniColors = {};
    let colorIndex = 0;
    const palette = ['#7c9885','#4a90a4','#d17a5f','#8a7aa4','#5a8a5a','#e89b5f','#6366f1','#dc2626','#2d9248','#d97706'];

    function getUniColor(uni) {
      if (!uni) return '#9ca3af';
      if (!uniColors[uni]) {
        uniColors[uni] = palette[colorIndex % palette.length];
        colorIndex++;
      }
      return uniColors[uni];
    }

    // Force simulation
    function buildNodes(data) {
      const maxPages = Math.max(...data.map(d => d.pages_contributed || 1), 1);
      const cx = width / 2, cy = height / 2;

      // Assign each university a starting angle so clusters begin separated
      const unis = [...new Set(data.map(d => d.university || 'Unknown'))];
      const uniAngle = {};
      unis.forEach((u, i) => { uniAngle[u] = (i / unis.length) * Math.PI * 2; });

      nodes = data.map((d, i) => {
        const size = 8 + (d.pages_contributed / maxPages) * 40;
        const baseAngle = uniAngle[d.university || 'Unknown'];
        const spread = (Math.random() - 0.5) * 0.8;
        const dist = 200 + Math.random() * 150;
        return {
          x: cx + Math.cos(baseAngle + spread) * dist,
          y: cy + Math.sin(baseAngle + spread) * dist,
          vx: 0, vy: 0,
          size,
          username: d.username || 'Anonymous',
          university: d.university || 'Unknown',
          pages: d.pages_contributed || 0,
          rank: i + 1,
          isUser: d.username === currentUser?.email?.split('@')[0],
          color: getUniColor(d.university),
          alpha: 1,
          trail: []
        };
      });
    }

    function simulate() {
      const center = { x: width / 2, y: height / 2 };
      const t = Date.now() / 1000;

      // Find the biggest node per university (the "sun" of each cluster)
      const uniSuns = {};
      nodes.forEach(n => {
        if (!uniSuns[n.university] || n.size > uniSuns[n.university].size) {
          uniSuns[n.university] = n;
        }
      });

      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];
        const sun = uniSuns[n.university];
        const isSun = (n === sun);

        if (isSun) {
          // Suns drift toward center (stronger for higher rank)
          const pull = 0.005 + (1 - n.rank / nodes.length) * 0.01;
          n.vx += (center.x - n.x) * pull;
          n.vy += (center.y - n.y) * pull;

          // Suns strongly repel each other to keep clusters apart
          for (const otherUni in uniSuns) {
            if (otherUni === n.university) continue;
            const m = uniSuns[otherUni];
            const dx = n.x - m.x;
            const dy = n.y - m.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            if (dist < 500) {
              const repel = (500 - dist) * 0.008;
              n.vx += (dx / dist) * repel;
              n.vy += (dy / dist) * repel;
            }
          }
        } else {
          // Smaller nodes orbit their university's sun
          const dx = sun.x - n.x;
          const dy = sun.y - n.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;

          // Desired orbit radius based on rank within university
          const orbitRadius = sun.size + 30 + (n.rank % 20) * 8;

          // Pull toward orbit radius (spring force)
          const radiusDiff = dist - orbitRadius;
          n.vx += (dx / dist) * radiusDiff * 0.01;
          n.vy += (dy / dist) * radiusDiff * 0.01;

          // Tangential velocity (creates orbiting motion)
          const orbitSpeed = 0.04 + (1 / (n.size + 1)) * 0.15;
          n.vx += (-dy / dist) * orbitSpeed;
          n.vy += (dx / dist) * orbitSpeed;
        }

        // Repulsion from close nodes (prevents overlap)
        for (let j = i + 1; j < nodes.length; j++) {
          const m = nodes[j];
          const dx = n.x - m.x;
          const dy = n.y - m.y;
          const dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const minDist = n.size + m.size + 6;

          if (dist < minDist) {
            const force = (minDist - dist) * 0.08;
            const fx = (dx / dist) * force;
            const fy = (dy / dist) * force;
            n.vx += fx; n.vy += fy;
            m.vx -= fx; m.vy -= fy;
          }
        }

        // Damping
        n.vx *= 0.92;
        n.vy *= 0.92;
        n.x += n.vx;
        n.y += n.vy;

        // Record trail (every 3rd frame to save memory)
        if (!n._frame) n._frame = 0;
        n._frame++;
        if (n._frame % 3 === 0) {
          n.trail.push({ x: n.x, y: n.y });
          if (n.trail.length > 20) n.trail.shift();
        }
      }
    }

    // Background stars
    let bgStars = [];
    function generateStars() {
      bgStars = [];
      for (let i = 0; i < 300; i++) {
        bgStars.push({
          x: Math.random() * 4000 - 1000,
          y: Math.random() * 4000 - 1000,
          size: Math.random() * 1.5 + 0.5,
          twinkle: Math.random() * Math.PI * 2,
          speed: 0.5 + Math.random() * 2
        });
      }
    }
    generateStars();

    // Ambient dust particles
    let dustParticles = [];
    for (let i = 0; i < 80; i++) {
      dustParticles.push({
        x: Math.random() * 4000 - 1000,
        y: Math.random() * 4000 - 1000,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        size: Math.random() * 2 + 0.5,
        alpha: Math.random() * 0.15 + 0.03
      });
    }

    // Shooting stars
    let shootingStars = [];
    function maybeSpawnShootingStar() {
      if (Math.random() < 0.003 && shootingStars.length < 2) { // ~every 5 sec at 60fps
        const angle = Math.random() * Math.PI * 0.5 + Math.PI * 0.1;
        shootingStars.push({
          x: Math.random() * 3000 - 500,
          y: Math.random() * 1000 - 500,
          vx: Math.cos(angle) * 8,
          vy: Math.sin(angle) * 8,
          life: 1.0,
          length: 40 + Math.random() * 60
        });
      }
    }

    // Spark particles (emitted between close nodes)
    let sparks = [];
    function emitSparks() {
      if (sparks.length > 50) return;
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          if (nodes[i].university !== nodes[j].university) continue;
          const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
          if (dist < 80 && Math.random() < 0.02) {
            const t = Math.random();
            sparks.push({
              x: nodes[i].x + (nodes[j].x - nodes[i].x) * t,
              y: nodes[i].y + (nodes[j].y - nodes[i].y) * t,
              vx: (Math.random() - 0.5) * 0.5,
              vy: (Math.random() - 0.5) * 0.5,
              life: 1.0,
              color: nodes[i].color,
              size: Math.random() * 2 + 0.5
            });
          }
        }
      }
    }

    // Get computed theme colors for canvas rendering
    function getThemeColors() {
      const s = getComputedStyle(document.body);
      return {
        bg: s.getPropertyValue('--bg-primary').trim() || '#FAF8F5',
        accent: s.getPropertyValue('--accent-primary').trim() || '#8B9D83',
        border: s.getPropertyValue('--border-color').trim() || 'rgba(139,157,131,0.2)',
        text: s.getPropertyValue('--text-primary').trim() || '#2C2C2C',
        muted: s.getPropertyValue('--text-muted').trim() || '#9B8B7E',
        isDark: document.body.getAttribute('data-theme') === 'dark'
      };
    }

    function draw() {
      const tc = getThemeColors();

      // Themed background
      ctx.fillStyle = tc.bg;
      ctx.fillRect(0, 0, width, height);

      // Subtle radial gradient center glow
      const bgGrad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width * 0.6);
      bgGrad.addColorStop(0, tc.isDark ? 'rgba(124,152,133,0.04)' : 'rgba(124,152,133,0.03)');
      bgGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, width, height);

      // Dot grid background (matches chat/dashboard canvas)
      ctx.globalAlpha = tc.isDark ? 0.15 : 0.12;
      const gridSize = 24;
      const dotR = 1;
      const startX = (camX % (gridSize * camScale)) / camScale;
      const startY = (camY % (gridSize * camScale)) / camScale;
      ctx.fillStyle = tc.isDark ? '#7c9885' : '#9B8B7E';
      for (let gx = -gridSize; gx < width / camScale + gridSize; gx += gridSize) {
        for (let gy = -gridSize; gy < height / camScale + gridSize; gy += gridSize) {
          ctx.beginPath();
          ctx.arc(gx + startX, gy + startY, dotR, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;

      ctx.save();
      ctx.translate(camX, camY);
      ctx.scale(camScale, camScale);

      const t = Date.now() / 1000;

      // Ambient floating particles (soft, themed)
      dustParticles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < -1000) p.x = 3000;
        if (p.x > 3000) p.x = -1000;
        if (p.y < -1000) p.y = 3000;
        if (p.y > 3000) p.y = -1000;
        ctx.globalAlpha = p.alpha * 0.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = tc.accent;
        ctx.fill();
      });

      // Draw soft halos around university clusters
      const uniCenters = {};
      nodes.forEach(n => {
        if (n.alpha < 0.3) return;
        if (!uniCenters[n.university]) uniCenters[n.university] = { x: 0, y: 0, count: 0, color: n.color };
        uniCenters[n.university].x += n.x;
        uniCenters[n.university].y += n.y;
        uniCenters[n.university].count++;
      });

      Object.values(uniCenters).forEach(c => {
        c.x /= c.count;
        c.y /= c.count;
        if (c.count < 2) return;
        const radius = 80 + c.count * 25;
        const grad = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, radius);
        grad.addColorStop(0, c.color + '18');
        grad.addColorStop(0.5, c.color + '08');
        grad.addColorStop(1, 'transparent');
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      });

      // University labels floating near cluster centers
      Object.entries(uniCenters).forEach(([uni, c]) => {
        if (c.count < 1) return;
        ctx.globalAlpha = 0.6;
        ctx.font = '600 13px Inter';
        ctx.textAlign = 'center';
        ctx.fillStyle = c.color;
        ctx.shadowColor = tc.isDark ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.8)';
        ctx.shadowBlur = 4;
        ctx.fillText(uni, c.x, c.y - 60 - c.count * 3);
        ctx.shadowBlur = 0;

        ctx.globalAlpha = 0.35;
        ctx.font = '400 10px Inter';
        ctx.fillStyle = tc.muted;
        ctx.fillText(c.count + ' contributor' + (c.count !== 1 ? 's' : ''), c.x, c.y - 60 - c.count * 3 + 15);
      });

      // Draw orbit trails
      nodes.forEach(n => {
        if (n.trail.length < 3 || n.alpha < 0.1) return;
        ctx.beginPath();
        ctx.moveTo(n.trail[0].x, n.trail[0].y);
        for (let i = 1; i < n.trail.length; i++) {
          ctx.lineTo(n.trail[i].x, n.trail[i].y);
        }
        ctx.strokeStyle = n.color;
        ctx.lineWidth = n.size * 0.3;
        ctx.globalAlpha = 0.08 * n.alpha;
        ctx.lineCap = 'round';
        ctx.stroke();
      });

      // Draw connections between same-university nodes
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          if (nodes[i].university === nodes[j].university && nodes[i].alpha > 0.3 && nodes[j].alpha > 0.3) {
            const dist = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
            if (dist < 250) {
              ctx.globalAlpha = 0.1 * (1 - dist / 250) * nodes[i].alpha;
              ctx.beginPath();
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.strokeStyle = nodes[i].color;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }
      }

      // Draw nodes
      nodes.forEach(n => {
        if (n.alpha < 0.05) return;
        ctx.globalAlpha = n.alpha;

        // Outer glow (all nodes)
        const glowSize = n.size * 2.5;
        const glow = ctx.createRadialGradient(n.x, n.y, n.size * 0.5, n.x, n.y, glowSize);
        glow.addColorStop(0, n.color + '40');
        glow.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(n.x, n.y, glowSize, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        // User's node pulse
        if (n.isUser) {
          const pulse = n.size + 12 + Math.sin(t * 3) * 5;
          const pulseGlow = ctx.createRadialGradient(n.x, n.y, n.size, n.x, n.y, pulse);
          pulseGlow.addColorStop(0, n.color + '30');
          pulseGlow.addColorStop(1, 'transparent');
          ctx.beginPath();
          ctx.arc(n.x, n.y, pulse, 0, Math.PI * 2);
          ctx.fillStyle = pulseGlow;
          ctx.fill();
        }

        // Core node
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
        const coreGrad = ctx.createRadialGradient(n.x - n.size * 0.3, n.y - n.size * 0.3, 0, n.x, n.y, n.size);
        coreGrad.addColorStop(0, tc.isDark ? '#ffffff' : n.color);
        coreGrad.addColorStop(0.4, n.color);
        coreGrad.addColorStop(1, n.color + 'aa');
        ctx.fillStyle = coreGrad;
        ctx.fill();

        // Subtle border
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
        ctx.strokeStyle = tc.isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.08)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Hovered ring
        if (n === hoveredNode) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.size + 4, 0, Math.PI * 2);
          ctx.strokeStyle = n.color;
          ctx.lineWidth = 2.5;
          ctx.stroke();
        }

        // Label
        if (n.size > 18 || n === hoveredNode) {
          ctx.globalAlpha = n.alpha * 0.85;
          ctx.font = `600 ${Math.max(10, n.size * 0.4)}px Inter`;
          ctx.textAlign = 'center';
          ctx.fillStyle = tc.text;
          ctx.shadowColor = tc.isDark ? 'rgba(0,0,0,0.6)' : 'rgba(255,255,255,0.9)';
          ctx.shadowBlur = 3;
          ctx.fillText('@' + n.username, n.x, n.y + n.size + 16);
          ctx.shadowBlur = 0;
        }
      });

      // Spark particles between close nodes
      emitSparks();
      sparks = sparks.filter(s => {
        s.x += s.vx;
        s.y += s.vy;
        s.life -= 0.015;
        if (s.life <= 0) return false;
        ctx.globalAlpha = s.life * 0.6;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.fill();
        return true;
      });

      ctx.restore();
    }

    function animate() {
      simulate();
      draw();
      requestAnimationFrame(animate);
    }

    // Mouse interaction
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragStartX = e.clientX - camX;
      dragStartY = e.clientY - camY;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (isDragging) {
        camX = e.clientX - dragStartX;
        camY = e.clientY - dragStartY;
        return;
      }

      // Hit test
      const mx = (e.clientX - camX) / camScale;
      const my = (e.clientY - camY - 100) / camScale;
      hoveredNode = null;

      for (const n of nodes) {
        const dist = Math.hypot(mx - n.x, my - n.y);
        if (dist < n.size) {
          hoveredNode = n;
          break;
        }
      }

      const tooltip = document.getElementById('tooltip');
      if (hoveredNode) {
        canvas.style.cursor = 'pointer';
        tooltip.classList.add('visible');
        tooltip.style.left = (e.clientX + 16) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
        document.getElementById('tooltipName').textContent = '@' + hoveredNode.username;
        document.getElementById('tooltipUni').textContent = hoveredNode.university;
        document.getElementById('tooltipPages').textContent = hoveredNode.pages;
        document.getElementById('tooltipRank').textContent = '#' + hoveredNode.rank;
      } else {
        canvas.style.cursor = 'grab';
        tooltip.classList.remove('visible');
      }
    });

    canvas.addEventListener('mouseup', () => { isDragging = false; });

    canvas.addEventListener('click', (e) => {
      if (hoveredNode) {
        // Zoom to node
        const targetScale = 2;
        camScale = targetScale;
        camX = width / 2 - hoveredNode.x * targetScale;
        camY = (height / 2 + 100) - hoveredNode.y * targetScale;
      }
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = -e.deltaY * 0.001;
      const newScale = Math.min(4, Math.max(0.3, camScale + delta * camScale));
      const mx = e.clientX, my = e.clientY - 100;
      camX = mx - (mx - camX) * (newScale / camScale);
      camY = my - (my - camY) * (newScale / camScale);
      camScale = newScale;
    }, { passive: false });

    // Filters
    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter();
    }

    function applyFilter() {
      nodes.forEach(n => {
        if (currentFilter === 'all') {
          n.alpha = 1;
        } else if (currentFilter === 'myUni') {
          n.alpha = (n.university === userUniversity) ? 1 : 0.08;
        } else if (currentFilter === 'top10') {
          n.alpha = n.rank <= 10 ? 1 : 0.08;
        }
      });
    }

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      if (!q) { nodes.forEach(n => n.alpha = 1); return; }
      nodes.forEach(n => {
        n.alpha = n.username.toLowerCase().includes(q) || n.university.toLowerCase().includes(q) ? 1 : 0.08;
      });

      // Zoom to first match
      const match = nodes.find(n => n.alpha === 1);
      if (match) {
        camX = width / 2 - match.x * camScale;
        camY = (height / 2 + 100) - match.y * camScale;
      }
    });

    // Sidebar
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function renderSidebar() {
      const list = document.getElementById('sidebarList');
      const sorted = [...contributors].sort((a, b) => (b.pages_contributed || 0) - (a.pages_contributed || 0));

      list.innerHTML = sorted.map((c, i) => {
        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
        const initial = (c.username || '?')[0].toUpperCase();
        return `
          <div class="sidebar-item" onclick="focusNode('${c.username}')">
            <div class="sidebar-rank ${rankClass}">${i + 1}</div>
            <div class="sidebar-avatar" style="background:${getUniColor(c.university)}">${initial}</div>
            <div class="sidebar-info">
              <div class="sidebar-name">@${c.username || 'Anonymous'}</div>
              <div class="sidebar-meta">${c.university || 'Unknown'}</div>
            </div>
            <div class="sidebar-stat">${c.pages_contributed || 0}</div>
          </div>
        `;
      }).join('');
    }

    function focusNode(username) {
      const node = nodes.find(n => n.username === username);
      if (node) {
        camScale = 2;
        camX = width / 2 - node.x * camScale;
        camY = (height / 2 + 100) - node.y * camScale;
      }
    }

    // Init
    async function init() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      authToken = session.access_token;
      currentUser = session.user;

      // Get user's university
      try {
        const res = await fetch(BACKEND_URL + '/api/current-user', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        if (res.ok) {
          const user = await res.json();
          userUniversity = user.university;
        }
      } catch (e) {}

      // Load contributors
      try {
        const res = await fetch(BACKEND_URL + '/api/leaderboard', {
          headers: { 'Authorization': 'Bearer ' + authToken }
        });
        if (res.ok) {
          contributors = await res.json();
          if (Array.isArray(contributors)) {
            // Sort by pages
            contributors.sort((a, b) => (b.pages_contributed || 0) - (a.pages_contributed || 0));
          } else {
            contributors = [];
          }
        }
      } catch (e) { contributors = []; }

      document.getElementById('graphLoading').style.display = 'none';

      if (contributors.length === 0) {
        document.getElementById('graphLoading').style.display = 'block';
        document.getElementById('graphLoading').innerHTML = '<div style="color:var(--text-muted);">No contributors yet</div>';
        if (window.innerWidth <= 768) {
          document.getElementById('mlList').innerHTML = '<div class="ml-empty">No contributors yet</div>';
        }
        return;
      }

      // Find user's rank
      const userEmail = currentUser.email?.split('@')[0];
      const userIdx = contributors.findIndex(c => c.username === userEmail);

      // Mobile: render list and skip graph
      if (window.innerWidth <= 768) {
        renderMobileList(contributors, userIdx);
        return;
      }

      buildNodes(contributors);
      renderSidebar();

      if (userIdx >= 0) {
        document.getElementById('yourRank').style.display = 'flex';
        document.getElementById('yourRankNum').textContent = '#' + (userIdx + 1);
        document.getElementById('yourRankName').textContent = '@' + contributors[userIdx].username;
        document.getElementById('yourRankPages').textContent = (contributors[userIdx].pages_contributed || 0) + ' pages shared';
      }

      animate();
    }

    function renderMobileList(data, userIdx) {
      // Your rank banner
      if (userIdx >= 0) {
        const u = data[userIdx];
        document.getElementById('mlYourRank').style.display = 'flex';
        document.getElementById('mlYourRankNum').textContent = '#' + (userIdx + 1);
        document.getElementById('mlYourRankName').textContent = '@' + (u.username || 'Anonymous');
        document.getElementById('mlYourRankMeta').textContent = (u.pages_contributed || 0) + ' pages shared';
      }

      const list = document.getElementById('mlList');
      list.innerHTML = data.map((c, i) => {
        const rank = i + 1;
        const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
        const initial = (c.username || '?')[0].toUpperCase();
        const color = getUniColor(c.university);
        const pages = c.pages_contributed || 0;
        const uni = c.university || 'Unknown';
        const name = c.username || 'Anonymous';
        const isTop3 = rank <= 3 ? ' top-3' : '';

        return `<div class="ml-item${isTop3}">
          <div class="ml-rank ${rankClass}">${rank}</div>
          <div class="ml-avatar" style="background:${color}">${initial}</div>
          <div class="ml-info">
            <div class="ml-name">@${name}</div>
            <div class="ml-uni">${uni}</div>
          </div>
          <div class="ml-stat-col">
            <div class="ml-pages">${pages}</div>
            <div class="ml-pages-label">pages</div>
          </div>
        </div>`;
      }).join('');
    }

    // Mobile search filter
    if (window.innerWidth <= 768) {
      document.getElementById('searchInput').addEventListener('input', function(e) {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('.ml-item').forEach(item => {
          const text = item.textContent.toLowerCase();
          item.style.display = text.includes(q) ? 'flex' : 'none';
        });
      });
    }

    init();
  </script>
