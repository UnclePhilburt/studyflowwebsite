<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post - StudyFlow</title>
  <link rel="icon" type="image/png" href="icon128.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --card-bg: #1e2746;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --text-muted: #6b7280;
      --border-color: #2a3050;
      --accent-primary: #8B9D83;
      --accent-secondary: #6b8575;
      --hover-bg: rgba(139, 157, 131, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 0 16px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      background: none; border: none; color: var(--text-primary);
      cursor: pointer; padding: 8px; border-radius: 50%;
      display: flex; align-items: center;
    }
    .top-bar h1 { font-size: 18px; font-weight: 700; }
    .post-btn {
      padding: 8px 24px; border-radius: 8px; border: none;
      background: var(--accent-primary); color: white;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .post-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .content { padding: 16px; max-width: 600px; margin: 0 auto; }
    .composer-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; flex-shrink: 0; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .username { font-weight: 600; font-size: 15px; }
    textarea {
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      min-height: 150px; font-family: inherit; font-size: 16px;
      resize: none; background: var(--card-bg); color: var(--text-primary);
    }
    textarea:focus { outline: none; }
    textarea::placeholder { color: var(--text-muted); }
    .actions-bar {
      display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap;
    }
    .action-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-radius: 10px;
      border: 1px solid var(--border-color); background: none;
      color: var(--text-secondary); font-size: 14px; cursor: pointer;
      font-family: inherit;
    }
    .action-btn:active { background: var(--hover-bg); }
    .preview-area {
      margin-top: 16px; border-radius: 12px; overflow: hidden;
      background: var(--card-bg); border: 1px solid var(--border-color);
      position: relative; display: none;
    }
    .preview-area img {
      width: 100%; max-height: 400px; object-fit: contain; display: block;
    }
    .remove-btn {
      position: absolute; top: 8px; right: 8px;
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: rgba(0,0,0,0.6); color: white; font-size: 16px;
      cursor: pointer; z-index: 2;
    }
    .bg-picker {
      display: none; margin-top: 16px;
    }
    .bg-picker-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .bg-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .bg-opt {
      width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
      border: 2px solid transparent;
    }
    .bg-opt.selected { border-color: var(--accent-primary); }
    .uploading-indicator {
      display: none; padding: 12px; text-align: center;
      color: var(--text-muted); font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <button class="back-btn" onclick="window.location.href='social.html'">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1>Create Post</h1>
    </div>
    <button class="post-btn" id="postBtn" onclick="submitPost()" disabled>Post</button>
  </div>

  <div class="content">
    <div class="composer-header">
      <div class="avatar" id="userAvatar"></div>
      <div class="username" id="userName">...</div>
    </div>

    <textarea id="postText" placeholder="What's on your mind?" oninput="updatePostBtn()"></textarea>

    <div class="preview-area" id="previewArea">
      <button class="remove-btn" onclick="removeAttachment()">&times;</button>
      <img id="previewImg">
      <div id="previewFile" style="display:none;padding:24px;text-align:center;">
        <div style="font-size:36px;margin-bottom:8px;">&#x1F4C4;</div>
        <div id="previewFileName" style="font-size:14px;color:var(--text-secondary);"></div>
      </div>
    </div>

    <div class="uploading-indicator" id="uploadingIndicator">Uploading...</div>

    <div class="bg-picker" id="bgPicker">
      <div class="bg-picker-label">Background:</div>
      <div class="bg-options">
        <div class="bg-opt selected" style="background:var(--card-bg);position:relative;" onclick="selectBg(null, this)"><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-muted);">x</div></div>
        <div class="bg-opt" style="background:linear-gradient(135deg, #667eea, #764ba2);" onclick="selectBg('linear-gradient(135deg, #667eea, #764ba2)', this)"></div>
        <div class="bg-opt" style="background:linear-gradient(135deg, #f093fb, #f5576c);" onclick="selectBg('linear-gradient(135deg, #f093fb, #f5576c)', this)"></div>
        <div class="bg-opt" style="background:linear-gradient(135deg, #4facfe, #00f2fe);" onclick="selectBg('linear-gradient(135deg, #4facfe, #00f2fe)', this)"></div>
        <div class="bg-opt" style="background:linear-gradient(135deg, #43e97b, #38f9d7);" onclick="selectBg('linear-gradient(135deg, #43e97b, #38f9d7)', this)"></div>
        <div class="bg-opt" style="background:linear-gradient(135deg, #fa709a, #fee140);" onclick="selectBg('linear-gradient(135deg, #fa709a, #fee140)', this)"></div>
        <div class="bg-opt" style="background:linear-gradient(135deg, #8B9D83, #5a7a5a);" onclick="selectBg('linear-gradient(135deg, #8B9D83, #5a7a5a)', this)"></div>
        <div class="bg-opt" style="background:#1a1a1a;" onclick="selectBg('#1a1a1a', this)"></div>
      </div>
    </div>

    <div class="actions-bar">
      <button class="action-btn" onclick="document.getElementById('fileInput').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Photo
      </button>
      <button class="action-btn" onclick="document.getElementById('docInput').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Document
      </button>
      <input type="file" id="fileInput" accept="image/*" style="display:none;" multiple>
      <input type="file" id="docInput" accept=".pdf" style="display:none;">
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://studyflowsuite.onrender.com';
    const supabaseClient = window.supabase.createClient(
      'https://mxddgbpxjoltaimftpmn.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14ZGRnYnB4am9sdGFpbWZ0cG1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUxNzEsImV4cCI6MjA4OTU5MTE3MX0.rlZYIkFEBgJVQmOpLeWxn0ih1hTKhzZpjqax8dhhjeI'
    );

    let authToken = null;
    let imageUrls = [];
    let noteId = null;
    let selectedBg = null;
    let uploading = false;

    document.addEventListener('DOMContentLoaded', async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = 'mobile.html'; return; }
      authToken = session.access_token;

      try {
        const res = await fetch(BACKEND_URL + '/api/current-user', { headers: { 'Authorization': 'Bearer ' + authToken } });
        if (res.ok) {
          const ud = await res.json();
          document.getElementById('userName').textContent = ud.name || ud.username || '';
          const av = document.getElementById('userAvatar');
          if (ud.avatar_url) av.innerHTML = '<img src="' + ud.avatar_url + '">';
          else av.textContent = (ud.name || ud.username || 'U')[0].toUpperCase();
        }
      } catch {}
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
      const files = Array.from(e.target.files).slice(0, 10);
      if (!files.length) return;
      noteId = null;
      imageUrls = [];

      var preview = document.getElementById('previewArea');
      var previewImg = document.getElementById('previewImg');
      preview.style.display = 'block';
      document.getElementById('previewFile').style.display = 'none';
      document.getElementById('bgPicker').style.display = 'none';

      // Try local preview (won't work for HEIC)
      var localUrl = URL.createObjectURL(files[0]);
      previewImg.src = localUrl;
      previewImg.style.display = 'block';
      previewImg.onerror = function() { previewImg.style.display = 'none'; };

      uploading = true;
      document.getElementById('uploadingIndicator').style.display = 'block';
      updatePostBtn();

      var formData = new FormData();
      files.forEach(function(f) { formData.append('files', f); });
      fetch(BACKEND_URL + '/api/social/upload-images', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + authToken }, body: formData
      }).then(function(r) { return r.json(); }).then(function(data) {
        imageUrls = data.urls || [];
        // Show server-converted image (works for HEIC)
        if (imageUrls[0]) { previewImg.src = imageUrls[0]; previewImg.style.display = 'block'; }
        uploading = false;
        document.getElementById('uploadingIndicator').style.display = 'none';
        updatePostBtn();
      }).catch(function() {
        uploading = false;
        document.getElementById('uploadingIndicator').style.display = 'none';
      });
    });

    document.getElementById('docInput').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      imageUrls = [];

      var preview = document.getElementById('previewArea');
      preview.style.display = 'block';
      document.getElementById('previewImg').style.display = 'none';
      document.getElementById('previewFile').style.display = 'block';
      document.getElementById('previewFileName').textContent = file.name;
      document.getElementById('bgPicker').style.display = 'none';

      uploading = true;
      document.getElementById('uploadingIndicator').style.display = 'block';
      updatePostBtn();

      var formData = new FormData();
      formData.append('file', file);
      formData.append('content_type', 'note');
      fetch(BACKEND_URL + '/api/social/upload-note', {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + authToken }, body: formData
      }).then(function(r) { return r.json(); }).then(function(data) {
        noteId = data.note_id;
        uploading = false;
        document.getElementById('uploadingIndicator').style.display = 'none';
        updatePostBtn();
      }).catch(function() {
        uploading = false;
        document.getElementById('uploadingIndicator').style.display = 'none';
      });
    });

    document.getElementById('postText').addEventListener('input', function() {
      var text = this.value.trim();
      var hasAttach = imageUrls.length > 0 || noteId;
      document.getElementById('bgPicker').style.display = (text && !hasAttach) ? 'block' : 'none';
    });

    function removeAttachment() {
      imageUrls = [];
      noteId = null;
      document.getElementById('previewArea').style.display = 'none';
      document.getElementById('fileInput').value = '';
      document.getElementById('docInput').value = '';
      updatePostBtn();
      document.getElementById('postText').dispatchEvent(new Event('input'));
    }

    function selectBg(bg, el) {
      selectedBg = bg;
      document.querySelectorAll('.bg-opt').forEach(function(o) { o.classList.remove('selected'); });
      el.classList.add('selected');
    }

    function updatePostBtn() {
      var text = document.getElementById('postText').value.trim();
      var hasContent = text || imageUrls.length > 0 || noteId || uploading;
      document.getElementById('postBtn').disabled = !hasContent || uploading;
    }

    function submitPost() {
      if (uploading) return;
      var text = document.getElementById('postText').value.trim();
      if (!text && !imageUrls.length && !noteId) return;

      var btn = document.getElementById('postBtn');
      btn.disabled = true;
      btn.textContent = 'Posting...';

      var postData = {
        post_type: noteId ? 'note' : 'text',
        text_content: text || null,
        note_id: noteId || null,
        images: imageUrls.length > 0 ? imageUrls : undefined,
        bg_color: selectedBg || undefined
      };

      fetch(BACKEND_URL + '/api/social/posts', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + authToken, 'Content-Type': 'application/json' },
        body: JSON.stringify(postData)
      }).then(function(res) {
        if (res.ok) {
          window.location.href = 'social.html';
        } else {
          return res.json().then(function(err) { alert(err.error || 'Failed to post'); });
        }
      }).catch(function() {
        alert('Failed to post');
      }).finally(function() {
        btn.disabled = false;
        btn.textContent = 'Post';
      });
    }
  </script>
</body>
</html>
